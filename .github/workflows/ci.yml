name: ci

on:
  push:
  pull_request:

jobs:
  baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project
        run: make install
      - name: Lint
        run: make lint
      - name: Typecheck
        run: make typecheck
      - name: Validate schemas
        run: make validate-schemas
      - name: Validate configs
        run: make validate-configs
      - name: Test
        run: make test
