summary: A full-featured, hackable Next.js AI chatbot built by Vercel
raw_evidence_excerpt: "A full-featured, hackable Next.js AI chatbot built by Vercel\n\
  \nChatbot\n\nChatbot (formerly AI Chatbot) is a free, open-source template built\
  \ with Next.js and the AI SDK that helps you quickly build powerful chatbot applications.\n\
  \nRead Docs \xB7 Features \xB7 Model Providers \xB7 Deploy Your Own \xB7 Running\
  \ locally\n\nFeatures\n\n- Next.js App Router - Advanced routing for seamless navigation\
  \ and performance - React Server Components (RSCs) and Server Actions for server-side\
  \ rendering and increased performance - AI SDK - Unified API for generating text,\
  \ structured objects, and tool calls with LLMs - Hooks for building dynamic chat\
  \ and generative user interfaces - Supports OpenAI, Anthropic, Google, xAI, and\
  \ other model providers via AI Gateway - shadcn/ui - Styling with Tailwind CSS -\
  \ Component primitives from Radix UI for accessibility and flexibility - Data Persistence\
  \ - Neon Serverless Postgres for saving chat history and user data - Vercel Blob\
  \ for efficient file storage - Auth.js - Simple and secure authentication\n\nModel\
  \ Providers\n\nThis template uses the Vercel AI Gateway to access multiple AI models\
  \ through a unified interface. Models are configured in `lib/ai/models.ts` with\
  \ per-model provider routing. Included models: Mistral, Moonshot, DeepSeek, OpenAI,\
  \ and xAI.\n\nAI Gateway Authentication\n\n**For Vercel deployments**: Authentication\
  \ is handled automatically via OIDC tokens.\n\n**For non-Vercel deployments**: You\
  \ need to provide an AI Gateway API key by setting the `AI_GATEWAY_API_KEY` environment\
  \ variable in your `.env.local` file.\n\nWith the AI SDK, you can also switch to\
  \ direct LLM providers like OpenAI, Anthropic, Cohere, and many more with just a\
  \ few lines of code.\n\nDeploy Your Own\n\nYou can deploy your own version of Chatbot\
  \ to Vercel with one click:\n\nRunning locally\n\nYou will need to use the environment\
  \ variables defined in `.env.example` to run Chatbot. It's recommended you use Vercel\
  \ Environment Variables for this, but a `.env` file is all that is necessary.\n\n\
  > Note: You should not commit your `.env` file or it will expose secrets that will\
  \ allow others to control access to your various AI and authentication provider\
  \ accounts.\n\n1. Install Vercel CLI: `npm i -g vercel` 2. Link local instance with\
  \ Vercel and GitHub accounts (creates `.vercel` directory): `vercel link` 3. Download\
  \ your environment variables: `vercel env pull`\n\nYour app template should now\
  \ be running on localhost:3000."
