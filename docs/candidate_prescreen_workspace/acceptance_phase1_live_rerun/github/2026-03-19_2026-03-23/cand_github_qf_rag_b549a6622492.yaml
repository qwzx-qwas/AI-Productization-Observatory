raw_evidence_excerpt: "In-depth tutorials on LLMs, RAGs and real-world AI agent applications.\n\
  \n---\n\nAI Engineering Hub \U0001F680\n\nWelcome to the **AI Engineering Hub**\
  \ - your comprehensive resource for learning and building with AI!\n\n\U0001F31F\
  \ Why This Repo?\n\nAI Engineering is advancing rapidly, and staying at the forefront\
  \ requires both deep understanding and hands-on experience. Here, you will find:\
  \ - **93+ Production-Ready Projects** across all skill levels - In-depth tutorials\
  \ on **LLMs, RAG, Agents, and more** - Real-world **AI agent** applications - Examples\
  \ to implement, adapt, and scale in your projects\n\nWhether you're a beginner,\
  \ practitioner, or researcher, this repo provides resources for all skill levels\
  \ to experiment and succeed in AI engineering.\n\n---\n\n\U0001F4CB Table of Contents\n\
  \n- Getting Started - Newsletter - Projects by Difficulty - Beginner Projects (22)\
  \ - Intermediate Projects (48) - Advanced Projects (23) - Contributing - License\n\
  \n---\n\n\U0001F3AF Getting Started\n\nNew to AI Engineering? Start here:\n\n1.\
  \ **Complete Beginners**: Check out the AI Engineering Roadmap for a comprehensive\
  \ learning path 2. **Learn the Basics**: Start with Beginner Projects like OCR apps\
  \ and simple RAG implementations 3. **Build Your Skills**: Move to Intermediate\
  \ Projects with agents and complex workflows 4. **Master Advanced Concepts**: Tackle\
  \ Advanced Projects including fine-tuning and production systems\n\n---\n\n\U0001F4EC\
  \ Stay Updated with Our Newsletter!\n\n**Get a FREE Data Science eBook** \U0001F4D6\
  \ with 150+ essential lessons in Data Science when you subscribe to our newsletter!\
  \ Stay in the loop with the latest tutorials, insights, and exclusive resources.\
  \ Subscribe now!\n\n---\n\n\U0001F393 Projects by Difficulty\n\n\U0001F7E2 Beginner\
  \ Projects\n\nPerfect for getting started with AI engineering. These projects focus\
  \ on single components and straightforward implementations.\n\nOCR & Vision - **LaTeX\
  \ OCR with Llama** - Convert LaTeX equation images to code using Llama 3.2 vision\
  \ - **Llama OCR** - 100% local OCR app with Llama 3.2 and Streamlit - **Gemma-3\
  \ OCR** - Local OCR with structured text extraction using Gemma-3 - **Qwen 2.5 OCR**\
  \ - Text extraction using Qwen 2.5 VL model\n\nChat Interfaces & UI - **Local ChatGPT\
  \ with DeepSeek** - Mini-ChatGPT with DeepSeek-R1 and Chainlit - **Local ChatGPT\
  \ with Llama** - ChatGPT clone using Llama 3.2 vision - **Local ChatGPT with Gemma\
  \ 3** - Local chat interface with Gemma 3 - **DeepSeek Thinking UI** - ChatGPT with\
  \ visible reasoning using DeepSeek-R1 - **Qwen3 Thinking UI** - Thinking UI with\
  \ Qwen3:4B and Streamlit - **GPT-OSS Thinking UI** - GPT-OSS with reasoning visualization\
  \ - **Streaming AI Chatbot** - Real-time AI streaming with Motia framework\n\nBasic\
  \ RAG - **Simple RAG Workflow** - Basic RAG with LlamaIndex and Ollama - **Document\
  \ Chat RAG** - Chat with documents using Llama 3.3 - **Fastest RAG Stack** - Fast\
  \ RAG with SambaNova, LlamaIndex, and Qdrant - **GitHub RAG** - Chat with GitHub\
  \ repos locally - **ModernBERT RAG** - RAG with ModernBert embeddings - **Llama\
  \ 4 RAG** - RAG powered by Meta's Llama 4\n\nMultimodal & Media - **Image Generation\
  \ with Janus-Pro** - Local image generation with DeepSeek Janus-pro 7B - **Video\
  \ RAG with Gemini** - Chat with videos using Gemini AI\n\nOther Tools - **Website\
  \ to API with FireCrawl** - Convert websites to APIs - **AI News Generator** - News\
  \ generation with CrewAI and Cohere - **Siamese Network** - Digit similarity detection\
  \ on MNIST\n\n---\n\n\U0001F7E1 Intermediate Projects\n\nMulti-component systems,\
  \ agentic workflows, and advanced features for experienced practitioners.\n\nAI\
  \ Agents & Workflows - **YouTube Trend Analysis** - Analyze YouTube trends with\
  \ CrewAI and BrightData - **AutoGen Stock Analyst** - Advanced analyst with Microsoft\
  \ AutoGen - **Agentic RAG** - RAG with document search and web fallback - **Agentic\
  \ RAG with DeepSeek** - Enterprise agentic RAG with GroundX - **Book Writer Flow**\
  \ - Automated book writing with CrewAI - **Content Planner Flow** - Content workflow\
  \ with CrewAI Flow - **Brand Monitoring** - Automated brand monitoring system -\
  \ **Hotel Booking Crew** - Multi-agent hotel booking with DeepSeek-R1 - **Deploy\
  \ Agentic RAG** - Private Agentic RAG API with LitServe - **Zep Memory Assistant**\
  \ - AI Agent with human-like memory - **Agent with MCP Memory** - Agents with Graphiti\
  \ memory and Opik - **ACP Code** - Agent Communication Protocol demo - **Motia Content\
  \ Creation** - Social media automation workflow\n\nVoice & Audio - **Real-time Voice\
  \ Bot** - Conversational travel guide with AssemblyAI - **RAG Voice Agent** - Real-time\
  \ RAG Voice Agent with Cartesia - **Chat with Audios** - RAG over audio files -\
  \ **Audio Analysis Toolkit** - Audio analysis with AssemblyAI - **Multilingual Meeting\
  \ Notes** - Auto meeting notes with language detection\n\nAdvanced RAG - **RAG with\
  \ Dockling** - RAG over Excel with IBM's Docling - **Trustworthy RAG** - RAG over\
  \ complex docs with TLM - **Fastest RAG with Milvus and Groq** - Sub-15ms retrieval\
  \ latency - **Chat with Code** - Chat with code using Qwen3-Coder - **RAG SQL Router**\
  \ - Agent with RAG and SQL routing\n\nMultimodal - **DeepSeek Multimodal RAG** -\
  \ MultiModal RAG with DeepSeek-Janus-Pro - **ColiVara Website RAG** - MultiModal\
  \ RAG for websites - **Multimodal RAG with AssemblyAI** - Audio + vector database\
  \ + CrewAI\n\nMCP (Model Context Protocol) - **Cursor Linkup MCP** - Custom MCP\
  \ with deep web search - **EyeLevel MCP RAG** - MCP for RAG over complex docs -\
  \ **LlamaIndex MCP** - Local MCP client with LlamaIndex - **MCP Agentic RAG** -\
  \ MCP-powered Agentic RAG for Cursor - **MCP Agentic RAG Firecrawl** - Agentic RAG\
  \ with Firecrawl - **MCP Video RAG** - Video RAG using Ragie via MCP - **MCP Voice\
  \ Agent** - Voice agent with Firecrawl and Supabase - **SDV MCP** - Synthetic Data\
  \ Vault orchestration - **KitOps MCP** - ML model management with KitOps - **Stagehand\
  \ \xD7 MCP-Use** - Web automation with Stagehand MCP\n\nModel Comparison & Evaluation\
  \ - **Evaluation and Observability** - E2E RAG evaluation with CometML Opik - **Llama\
  \ 4 vs DeepSeek-R1** - Compare models using RAG - **Qwen3 vs DeepSeek-R1** - Model\
  \ comparison with Opik - **O3 vs Claude Code** - Compare Claude 3.7 and o3 - **Sonnet4\
  \ vs O4** - Code generation comparison - **Sonnet4 vs Qwen3-Coder** - Coder model\
  \ comparison - **Code Model Comparison** - Frontier model code comparison - **GPT-OSS\
  \ vs Qwen3** - Reasoning capabilities comparison\n\n---\n\n\U0001F534 Advanced Projects\n\
  \nComplex systems, fine-tuning, production deployments, and cutting-edge implementations.\n\
  \nFine-tuning & Model Development - **DeepSeek Fine-tuning** - Fine-tune DeepSeek\
  \ with Unsloth and Ollama - **Build Reasoning Model** - Build DeepSeek-R1-like reasoning\
  \ models - **Attention Is All You Need Implementation** - Transformer architecture\
  \ from scratch\n\nAdvanced Agent Systems - **NVIDIA Demo** - Documentation writer\
  \ with CrewAI Flows and NVIDIA NIM - **Documentation Writer Flow** - Agentic documentation\
  \ workflow - **Multi-Agent Deep Researcher** - MCP-powered deep researcher - **Multiplatform\
  \ Deep Researcher** - Multi-platform research with BrightData - **Web Browsing Agent**\
  \ - Browser automation with CrewAI and Stagehand - **Paralegal Agent Crew** - Intelligent\
  \ paralegal with RAG - **FireCrawl Agent** - Corrective RAG with web search fallback\
  \ - **Context Engineering Workflow** - Research assistant with TensorLake and Zep\
  \ - **Parlant Conversational Agent** - Compliance-driven conversational agent -\
  \ **Stock Portfolio Analysis Agent** - Portfolio analysis with React frontend -\
  \ **Guidelines vs Traditional Prompt** - Structured guidelines comparison\n\nAdvanced\
  \ MCP & Infrastructure - **MindsDB MCP** - Unified MCP for all data sources - **Financial\
  \ Analyst DeepSeek** - MCP financial analysis workflow - **Graphiti MCP** - Persistent\
  \ memory with Zep's Graphiti - **Pixeltable MCP** - Unified multimodal data orchestration\
  \ - **Ultimate AI Assistant** - Multi-MCP server interface\n\nProduction Systems\
  \ - **GroundX Document Pipeline** - World-class document processing - **NotebookLM\
  \ Clone** - Full NotebookLM with RAG, citations, and podcasts"
