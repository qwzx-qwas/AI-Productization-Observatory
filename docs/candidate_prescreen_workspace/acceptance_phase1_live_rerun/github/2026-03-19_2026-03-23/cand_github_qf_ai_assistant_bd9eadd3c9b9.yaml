title: n8n-workflow-builder
summary: AI assistant integration for n8n workflow automation through Model Context
  Protocol (MCP). Connect Claude Desktop, ChatGPT, and other AI assistants to n8n
  for natural language workflow management.
raw_evidence_excerpt: "AI assistant integration for n8n workflow automation through\
  \ Model Context Protocol (MCP). Connect Claude Desktop, ChatGPT, and other AI assistants\
  \ to n8n for natural language workflow management.\n\nn8n Workflow Builder MCP Server\n\
  \n**The ultimate AI assistant integration for n8n workflow automation** - Connect\
  \ Claude Desktop, ChatGPT, and other AI assistants directly to your n8n instance\
  \ for seamless workflow management, creation, and execution through the Model Context\
  \ Protocol (MCP).\n\nA powerful Model Context Protocol (MCP) server that enables\
  \ AI assistants to manage n8n workflows seamlessly. Connect your AI tools directly\
  \ to n8n for automated workflow creation, execution, and management.\n\n\U0001F4DA\
  \ Table of Contents\n\n- What is this? - Key Features - Requirements - Installation\
  \ & Usage - Configuration - MCP Client Setup - Available Tools - Usage Examples\
  \ - Troubleshooting - FAQ - Contributing - License - Useful Links\n\n\U0001F4D6\
  \ Additional Documentation\n\n- **\U0001F680 Getting Started Guide** - Quick setup\
  \ in under 5 minutes - **\U0001F4BC Real-World Use Cases** - E-commerce, data processing,\
  \ API integrations, and more - **\U0001F50D Comparison with Alternatives** - vs\
  \ Zapier, Make.com, n8n Web UI, and CLI - **\U0001F527 Comprehensive Troubleshooting**\
  \ - Solutions for common issues and problems\n\n\U0001F3AF What is this?\n\nThe\
  \ n8n Workflow Builder MCP Server bridges the gap between AI assistants (like Claude\
  \ Desktop, Cline, or any MCP-compatible client) and your n8n automation platform.\
  \ It provides a comprehensive set of tools that allow AI assistants to:\n\n- **List\
  \ and browse** your existing n8n workflows - **Create new workflows** with complex\
  \ node configurations - **Execute workflows** on demand - **Manage workflow lifecycle**\
  \ (activate, deactivate, update, delete) - **Monitor workflow status** and retrieve\
  \ detailed information\n\nPerfect for teams using n8n who want to leverage AI assistants\
  \ for workflow automation and management.\n\n\u2728 Key Features\n\n- \U0001F527\
  \ **Complete Workflow Management** - Full CRUD operations for n8n workflows - \U0001F916\
  \ **AI-First Design** - Built specifically for AI assistant integration - \U0001F680\
  \ **Zero Configuration** - Works out of the box with NPX - \U0001F512 **Secure**\
  \ - Uses n8n's official API with proper authentication - \U0001F4E6 **Modern Architecture**\
  \ - Built with TypeScript and latest MCP SDK - \u26A1 **High Performance** - Optimized\
  \ for fast response times\n\n\U0001F4CB Requirements\n\n- **Node.js** v18.0.0 or\
  \ higher - **n8n instance** (self-hosted or cloud) - **n8n API key** with appropriate\
  \ permissions\n\n\U0001F680 Installation & Usage\n\nMethod 1: Smithery.ai (Hosted\
  \ - Recommended)\n\nUse the hosted version on Smithery.ai - no installation required:\n\
  \n1. **Visit**: smithery.ai 2. **Search**: \"n8n-workflow-builder\" 3. **Connect**:\
  \ Configure with your n8n host and API key 4. **Use**: Access from any MCP-compatible\
  \ AI assistant\n\n**Benefits**: No local setup, automatic updates, professional\
  \ hosting, tool playground.\n\nMethod 2: NPX (Local)\n\nRun locally with NPX:\n\n\
  Method 2: Manual Installation\n\nFor development or customization:\n\n\u2699\uFE0F\
  \ Configuration\n\nEnvironment Variables\n\nConfigure the following environment\
  \ variables to connect to your n8n instance:\n\n| Variable | Description | Example\
  \ | |----------|-------------|---------| | `N8N_HOST` | Your n8n instance URL |\
  \ `http://localhost:5678` or `https://your-n8n.com/api/v1` | | `N8N_API_KEY` | Your\
  \ n8n API key | `n8n_api_1234567890abcdef...` |\n\nGetting Your n8n API Key\n\n\
  1. Open your n8n instance 2. Go to **Settings** \u2192 **API Keys** 3. Click **Create\
  \ API Key** 4. Copy the generated key\n\nSetting Environment Variables\n\n\U0001F527\
  \ MCP Client Setup\n\nClaude Desktop\n\nAdd this configuration to your `claude_desktop_config.json`:\n\
  \nCline (VS Code Extension)\n\nAdd this to your Cline MCP settings:\n\nOther MCP\
  \ Clients\n\nThe server works with any MCP-compatible client. Use the same configuration\
  \ pattern with your client's specific setup method.\n\n\U0001F6E0\uFE0F Available\
  \ Tools\n\nThe MCP server provides 15 comprehensive tools for complete n8n workflow\
  \ and execution management:\n\nCore Workflow Operations\n\n| Tool | Description\
  \ | Parameters | |------|-------------|------------| | `list_workflows` | List all\
  \ workflows from your n8n instance | None | | `get_workflow` | Retrieve detailed\
  \ information about a specific workflow | `id`: Workflow ID (string) | | `create_workflow`\
  \ | Create a new workflow with nodes and connections | `workflow`: Workflow object\
  \ | | `execute_workflow` | Manually execute a workflow | `id`: Workflow ID (string)\
  \ |\n\nWorkflow Lifecycle Management\n\n| Tool | Description | Parameters | |------|-------------|------------|\
  \ | `update_workflow` | Update an existing workflow's configuration | `id`: Workflow\
  \ ID, `workflow`: Updated workflow object | | `activate_workflow` | Activate a workflow\
  \ to enable automatic execution | `id`: Workflow ID (string) | | `deactivate_workflow`\
  \ | Deactivate a workflow to stop automatic execution | `id`: Workflow ID (string)\
  \ | | `delete_workflow` | Permanently delete a workflow | `id`: Workflow ID (string)\
  \ |\n\nAdvanced Operations\n\n| Tool | Description | Parameters | |------|-------------|------------|\
  \ | `create_workflow_and_activate` | Create a new workflow and immediately activate\
  \ it | `workflow`: Workflow object |\n\nExecution Management \u2B50 NEW\n\n| Tool\
  \ | Description | Parameters | |------|-------------|------------| | `list_executions`\
  \ | List workflow executions with filtering and pagination | `includeData`, `status`,\
  \ `workflowId`, `projectId`, `limit`, `cursor` | | `get_execution` | Get detailed\
  \ information about a specific execution | `id`: Execution ID, `includeData`: Include\
  \ detailed data | | `delete_execution` | Delete a workflow execution record | `id`:\
  \ Execution ID |\n\nTag Management \u2B50 NEW\n\n| Tool | Description | Parameters\
  \ | |------|-------------|------------| | `list_tags` | List all workflow tags with\
  \ pagination | `limit`, `cursor` | | `create_tag` | Create a new workflow tag for\
  \ organization | `name`: Tag name |\n\nSecurity & Compliance \u2B50 NEW\n\n| Tool\
  \ | Description | Parameters | |------|-------------|------------| | `generate_audit`\
  \ | Generate comprehensive security audit report | `additionalOptions`: Audit configuration\
  \ |\n\n\U0001F4A1 Usage Examples\n\nBasic Operations\n\nCreating Workflows\n\nWorkflow\
  \ Management\n\nExecution Management \u2B50 NEW\n\nTag Management \u2B50 NEW\n\n\
  Security Audit \u2B50 NEW\n\n\U0001F527 Troubleshooting\n\nCommon Issues\n\n\"Connection\
  \ refused\" or \"ECONNREFUSED\" - **Cause**: Cannot connect to your n8n instance\
  \ - **Solution**: Verify your `N8N_HOST` is correct and n8n is running - **Check**:\
  \ Try accessing your n8n instance in a browser first\n\n\"Unauthorized\" or \"401\
  \ Error\" - **Cause**: Invalid or missing API key - **Solution**: 1. Verify your\
  \ `N8N_API_KEY` is correct 2. Ensure the API key has proper permissions 3. Check\
  \ if the API key hasn't expired\n\n\"Workflow not found\" or \"404 Error\" - **Cause**:\
  \ Workflow ID doesn't exist - **Solution**: Use `list_workflows` to get valid workflow\
  \ IDs\n\nServer won't start - **Cause**: Missing Node.js or dependencies - **Solution**:\
  \ 1. Ensure Node.js v18+ is installed: `node --version` 2. Try clearing npm cache:\
  \ `npm cache clean --force` 3. For manual installation, run: `npm install && npm\
  \ run build`\n\nDebug Mode\n\nFor detailed logging, set the debug environment variable:\n\
  \nGetting Help\n\n1. Check the GitHub Issues 2. Review n8n's API documentation 3.\
  \ Verify your MCP client configuration\n\n\u2753 Frequently Asked Questions\n\n\
  What is an MCP Server?\n\nA **Model Context Protocol (MCP) server** is a standardized\
  \ way for AI assistants to access external tools and data sources. This MCP server\
  \ specifically provides AI assistants with the ability to interact with n8n workflows,\
  \ enabling automated workflow management through natural language commands.\n\n\
  How do I connect AI assistants to n8n workflows?"
