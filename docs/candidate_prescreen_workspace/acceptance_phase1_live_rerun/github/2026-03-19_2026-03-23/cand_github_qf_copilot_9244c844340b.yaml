title: BrasilAPI
summary: Vamos transformar o Brasil em uma API?
raw_evidence_excerpt: "Vamos transformar o Brasil em uma API?\n\nArquivos de Instru\xE7\
  \xF5es e Automa\xE7\xE3o\n\nEste diret\xF3rio cont\xE9m arquivos de configura\xE7\
  \xE3o e instru\xE7\xF5es para auxiliar no desenvolvimento e revis\xE3o de c\xF3\
  digo do BrasilAPI.\n\n\U0001F4DA Arquivos de Instru\xE7\xE3o\n\n\U0001F916 Para\
  \ GitHub Copilot e Desenvolvedores\n\n`copilot-instructions.md` **Prop\xF3sito:**\
  \ Instru\xE7\xF5es gerais para desenvolvimento assistido por IA\n\n**Uso:** - Referenciado\
  \ automaticamente pelo GitHub Copilot durante desenvolvimento - Guia para desenvolvedores\
  \ entenderem padr\xF5es do projeto - Define princ\xEDpios fundamentais: compatibilidade,\
  \ documenta\xE7\xE3o, custos, qualidade\n\n**Conte\xFAdo:** - Vis\xE3o geral e miss\xE3\
  o do projeto - Arquitetura e padr\xF5es de c\xF3digo - Workflow para criar endpoints\
  \ - Exemplos de c\xF3digo e testes - FAQ e comandos \xFAteis\n\n`copilot-review-instructions.md`\
  \ **Prop\xF3sito:** Instru\xE7\xF5es espec\xEDficas para revis\xE3o autom\xE1tica\
  \ de PRs pelo GitHub Copilot\n\n**Uso:** - Treina o Copilot para revisar PRs seguindo\
  \ nossos padr\xF5es - Define crit\xE9rios objetivos de aprova\xE7\xE3o/rejei\xE7\
  \xE3o - Automatiza parte do processo de code review\n\n**Conte\xFAdo:** - Regras\
  \ n\xE3o-negoci\xE1veis (breaking changes, documenta\xE7\xE3o, testes, seguran\xE7\
  a) - Checklist obrigat\xF3ria de revis\xE3o em 7 categorias - Templates de feedback\
  \ espec\xEDfico para cada tipo de problema - Prioriza\xE7\xE3o: cr\xEDtico vs importante\
  \ vs sugest\xE3o - Casos especiais (doc-only, dependabot, refatora\xE7\xE3o)\n\n\
  **Como funciona:** 1. Desenvolvedor abre PR 2. GitHub Copilot l\xEA este arquivo\
  \ 3. Copilot analisa mudan\xE7as seguindo checklist 4. Copilot comenta problemas\
  \ encontrados com solu\xE7\xF5es espec\xEDficas 5. Copilot sugere aprova\xE7\xE3\
  o ou solicita mudan\xE7as\n\n\U0001F465 Para Revisores Humanos\n\n`CODE_REVIEW_GUIDELINES.md`\
  \ **Prop\xF3sito:** Guia completo para revisores humanos\n\n**Uso:** - Consulta\
  \ durante revis\xE3o manual de PRs - Treinamento de novos revisores - Refer\xEA\
  ncia para crit\xE9rios de qualidade\n\n**Conte\xFAdo:** - Checklist detalhada de\
  \ revis\xE3o - Como verificar compatibilidade de API - Como validar documenta\xE7\
  \xE3o e testes - Como avaliar performance e custos - Como identificar vulnerabilidades\
  \ - Como dar feedback efetivo - Red flags para rejei\xE7\xE3o imediata\n\n\U0001F4DD\
  \ Para Contribuidores\n\n`PULL_REQUEST_TEMPLATE.md` **Prop\xF3sito:** Template autom\xE1\
  tico para todos os PRs\n\n**Uso:** - Aplicado automaticamente ao abrir novo PR -\
  \ Guia contribuidor no checklist antes de submeter - Garante que informa\xE7\xF5\
  es essenciais sejam fornecidas\n\n**Conte\xFAdo:** - Checklists de compatibilidade,\
  \ documenta\xE7\xE3o, testes, c\xF3digo - Se\xE7\xE3o para descrever como testar\
  \ - Instru\xE7\xF5es para revisores - Lembretes sobre impacto em produ\xE7\xE3o\n\
  \n\U0001F504 Workflow de Contribui\xE7\xE3o\n\n\U0001F3AF Diferen\xE7a entre os\
  \ Arquivos\n\n| Arquivo | Audi\xEAncia | Momento | Foco | |---------|-----------|---------|------|\
  \ | `copilot-instructions.md` | Copilot + Devs | Durante desenvolvimento | Como\
  \ escrever c\xF3digo | | `copilot-review-instructions.md` | Copilot | Durante review\
  \ autom\xE1tico | Como revisar c\xF3digo | | `CODE_REVIEW_GUIDELINES.md` | Revisores\
  \ humanos | Durante review manual | Como revisar profundamente | | `PULL_REQUEST_TEMPLATE.md`\
  \ | Contribuidor | Ao abrir PR | O que incluir no PR |\n\n\U0001F916 Quais Arquivos\
  \ S\xE3o Usados Automaticamente?\n\n\u2705 Arquivos Autom\xE1ticos (Nenhuma Configura\xE7\
  \xE3o Necess\xE1ria)\n\n1. `PULL_REQUEST_TEMPLATE.md` - \u2705 **Uso 100% autom\xE1\
  tico** - Aplicado automaticamente quando qualquer pessoa abre um PR - N\xE3o requer\
  \ nenhuma configura\xE7\xE3o - Funciona imediatamente ap\xF3s o merge\n\n2. `copilot-instructions.md`\
  \ - \u2705 **Uso autom\xE1tico pelo GitHub Copilot** - GitHub Copilot no VS Code/IDE\
  \ detecta e usa automaticamente - Aplicado durante desenvolvimento quando Copilot\
  \ est\xE1 ativo - N\xE3o requer configura\xE7\xE3o adicional no reposit\xF3rio -\
  \ **Requisito**: Desenvolvedor precisa ter GitHub Copilot instalado no IDE\n\n\u2699\
  \uFE0F Arquivos que Requerem A\xE7\xE3o Manual\n\n3. `copilot-review-instructions.md`\
  \ - \u2699\uFE0F **Uso via comando ou configura\xE7\xE3o** - **Op\xE7\xE3o A - Uso\
  \ manual por mantenedores**: Comente no PR:\n\nOu mencione o arquivo espec\xEDfico:\n\
  \n- **Op\xE7\xE3o B - Configura\xE7\xE3o autom\xE1tica** (se dispon\xEDvel no plano):\
  \ - GitHub Copilot Enterprise pode ter configura\xE7\xE3o para revis\xE3o autom\xE1\
  tica - Verificar em Settings \u2192 Copilot do reposit\xF3rio - **Uso alternativo**:\
  \ Mantenedores podem usar como checklist manual\n\n4. `CODE_REVIEW_GUIDELINES.md`\
  \ - \U0001F4D6 **Documento de refer\xEAncia - uso manual** - Revisores humanos consultam\
  \ durante review - N\xE3o \xE9 usado automaticamente por ferramentas - Serve como\
  \ guia e treinamento\n\n5. `README.md` (este arquivo) - \U0001F4D6 **Documenta\xE7\
  \xE3o - uso manual** - Explica\xE7\xE3o sobre todos os outros arquivos - Consultado\
  \ quando necess\xE1rio\n\n\U0001F680 Resumo: Configura\xE7\xE3o Necess\xE1ria\n\n\
  | Arquivo | Autom\xE1tico? | A\xE7\xE3o Necess\xE1ria | |---------|-------------|-----------------|\
  \ | `PULL_REQUEST_TEMPLATE.md` | \u2705 Sim | Nenhuma - j\xE1 funciona | | `copilot-instructions.md`\
  \ | \u2705 Sim (com Copilot no IDE) | Nenhuma - desenvolvedores precisam ter Copilot\
  \ | | `copilot-review-instructions.md` | \u2699\uFE0F Parcial | Mantenedores devem\
  \ usar `@copilot review` nos PRs | | `CODE_REVIEW_GUIDELINES.md` | \u274C N\xE3\
  o | Revisores consultam manualmente | | `README.md` | \u274C N\xE3o | Documenta\xE7\
  \xE3o de refer\xEAncia |\n\n\U0001F4A1 Recomenda\xE7\xF5es de Uso\n\nPara Come\xE7\
  ar Agora (Zero Configura\xE7\xE3o) 1. **Template de PR**: J\xE1 funciona! Pr\xF3\
  ximo PR ter\xE1 o template automaticamente 2. **Instru\xE7\xF5es de desenvolvimento**:\
  \ Desenvolvedores com Copilot j\xE1 recebem as instru\xE7\xF5es automaticamente\n\
  \nPara Aproveitar Revis\xE3o Autom\xE1tica **Mantenedores devem**, em cada PR importante:\n\
  \nIsso far\xE1 o Copilot analisar o PR seguindo as regras em `copilot-review-instructions.md`\n\
  \nPara Revis\xE3o Manual Revisores humanos devem consultar `CODE_REVIEW_GUIDELINES.md`\
  \ como guia detalhado\n\n\U0001F527 Configura\xE7\xE3o Avan\xE7ada (Opcional)\n\n\
  Se sua organiza\xE7\xE3o tem **GitHub Copilot Enterprise**, voc\xEA pode: 1. Ir\
  \ em **Settings** \u2192 **Copilot** (no n\xEDvel da organiza\xE7\xE3o ou reposit\xF3\
  rio) 2. Procurar por op\xE7\xF5es de \"Code Review\" ou \"PR Review\" 3. Configurar\
  \ revis\xE3o autom\xE1tica para todos os PRs 4. O Copilot usar\xE1 `copilot-review-instructions.md`\
  \ automaticamente\n\n> **Nota**: Esta funcionalidade pode n\xE3o estar dispon\xED\
  vel em todos os planos. Consulte a documenta\xE7\xE3o do GitHub Copilot para detalhes.\n\
  \n\U0001F4D6 Mantendo as Instru\xE7\xF5es\n\nQuando Atualizar\n\n**`copilot-instructions.md`:**\
  \ - Novos padr\xF5es de c\xF3digo s\xE3o adotados - Mudan\xE7as em arquitetura -\
  \ Novos comandos ou ferramentas - Li\xE7\xF5es aprendidas de erros comuns\n\n**`copilot-review-instructions.md`:**\
  \ - Novos tipos de problemas frequentes em PRs - Mudan\xE7as em crit\xE9rios de\
  \ aprova\xE7\xE3o - Novos checks automatizados necess\xE1rios - Feedback que deve\
  \ ser padronizado\n\n**`CODE_REVIEW_GUIDELINES.md`:** - Processos de revis\xE3o\
  \ evoluem - Novos requisitos de qualidade - Melhores pr\xE1ticas s\xE3o descobertas\n\
  \n**`PULL_REQUEST_TEMPLATE.md`:** - Informa\xE7\xF5es faltando frequentemente em\
  \ PRs - Novos checks necess\xE1rios antes do merge\n\nComo Atualizar\n\n1. Abra\
  \ PR com mudan\xE7as nas instru\xE7\xF5es 2. Explique motivo da mudan\xE7a 3. Se\
  \ poss\xEDvel, referencie PRs que motivaram a mudan\xE7a 4. Pe\xE7a feedback de\
  \ outros mantenedores 5. Merge ap\xF3s aprova\xE7\xE3o\n\n\U0001F393 Filosofia do\
  \ Projeto\n\nTodos esses arquivos refletem os princ\xEDpios fundamentais do BrasilAPI:\n\
  \n1. **\U0001F512 Compatibilidade \xE9 sagrada**: Nunca quebre aplica\xE7\xF5es\
  \ existentes 2. **\U0001F4DD Documenta\xE7\xE3o \xE9 obrigat\xF3ria**: C\xF3digo\
  \ sem doc n\xE3o existe 3. **\U0001F4B0 Custos devem ser zero**: Projeto deve ser\
  \ sustent\xE1vel sem financiamento 4. **\U0001F510 Seguran\xE7a em primeiro lugar**:\
  \ Prote\xE7\xE3o de dados e valida\xE7\xE3o sempre 5. **\u2705 Qualidade \xE9 mandat\xF3\
  ria**: Testes, linting, padr\xF5es s\xE3o obrigat\xF3rios 6. **\U0001F30D Open-source\
  \ e comunidade**: Decis\xF5es transparentes e colaborativas\n\n\U0001F4DE D\xFA\
  vidas?\n\n- Para d\xFAvidas sobre desenvolvimento: Ver `copilot-instructions.md`\
  \ - Para d\xFAvidas sobre revis\xE3o: Ver `CODE_REVIEW_GUIDELINES.md` - Para d\xFA\
  vidas sobre contribui\xE7\xE3o: Ver `/CONTRIBUTING.md` - Para issues: github.com/BrasilAPI/BrasilAPI/issues\n\
  \n---\n\n**Mantido pela comunidade BrasilAPI** \U0001F1E7\U0001F1F7"
