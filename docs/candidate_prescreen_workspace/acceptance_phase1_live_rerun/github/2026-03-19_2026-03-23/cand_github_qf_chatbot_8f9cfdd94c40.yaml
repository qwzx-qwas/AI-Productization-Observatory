summary: .NET Client for Telegram Bot API
raw_evidence_excerpt: ".NET Client for Telegram Bot API\n\n**Telegram.Bot** is the\
  \ most popular .NET Client for [Telegram Bot API].\n\nThe Bot API is an HTTP-based\
  \ interface created for developers keen on building bots for [Telegram].\n\nCheck\
  \ \U0001F449 [_Bots: An introduction for developers_] \U0001F448 to understand what\
  \ a Telegram bot is and what it can do.\n\nWe, the [Telegram Bots team], mainly\
  \ focus on developing multiple [NuGet packages] for creating chatbots.\n\n> \u27A1\
  \uFE0F If Bot API is too limited for your use cases you can try Telegram Client\
  \ API implementation written 100% in C# >\n\n|Packages|Documentation|News Channel|Team|Group\
  \ Chat| |:-----:|:-----------:|:----------:|:--:|:--------:| | !Packages | !documentations\
  \ | !News Channel | !Team | !Group Chat | | nuget.org package feed | Telegram bots\
  \ book | Subscribe to \U0001F4E3 [`@tgbots_dotnet`] channel to get our latest news\
  \ | The team contributing to this work | [Join our chat] \U0001F4AC to talk about\
  \ bots and ask questions |\n\n\U0001F528 Getting Started\n\nPlease check \u27A1\uFE0F\
  \ [the Quickstart guide].\n\n\U0001F6A7 Supported Platforms\n\nProject targets **.NET\
  \ Standard 2.0** and **.NET 6** at minimum, with **.NET 8** or more recent recommended.\n\
  \n\U0001F4E6 Extension Packages\n\nThis project is referred to as the core package\
  \ and is always required for developing Telegram bots. There are extension packages\
  \ that you can include in your bot projects for additional functionality:\n\n- [Telegram.Bot.Extensions.LoginWidget]\
  \ - [Telegram.Bot.Extensions.Passport]\n\n\u2705 Correctness & Testing\n\nThis project\
  \ is fully tested using Unit tests and Systems Integration tests before each release.\
  \ In fact, our test cases are self-documenting and serve as examples for Bot API\
  \ methods. Once you learn the basics of Telegram chatbots, you will be able to easily\
  \ understand the code in examples and use it in your own bot projects.\n\n\U0001F5C2\
  \ References\n\n- Documentation - Examples\n\n[Telegram Bot API]: https://core.telegram.org/bots/api\
  \ [Telegram]: https://www.telegram.org/ [_Bots: An introduction for developers_]:\
  \ https://core.telegram.org/bots [Telegram Bots team]: https://github.com/orgs/TelegramBots/people\
  \ [NuGet packages]: https://www.nuget.org/profiles/TelegramBots [`@tgbots_dotnet`]:\
  \ https://t.me/tgbots_dotnet [Join our chat]: https://t.me/joinchat/B35YY0QbLfd034CFnvCtCA\
  \ [the Quickstart guide]: https://telegrambots.github.io/book/1/quickstart.html\
  \ [Telegram.Bot.Extensions.LoginWidget]: https://github.com/TelegramBots/Telegram.Bot.Extensions.LoginWidget\
  \ [Telegram.Bot.Extensions.Passport]: https://github.com/TelegramBots/Telegram.Bot.Extensions.Passport"
