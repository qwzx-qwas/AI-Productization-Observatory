summary: "\U0001F916 An open-source AI assistant answering questions using your docs"
raw_evidence_excerpt: "\U0001F916 An open-source AI assistant answering questions\
  \ using your docs\n\nRagpi\n\nRagpi is an open-source AI assistant that answers\
  \ questions using your documentation, GitHub issues, and READMEs. It combines LLMs\
  \ with intelligent search to provide relevant, documentation-backed answers through\
  \ a simple API. It supports multiple providers like OpenAI, Ollama, and Deepseek,\
  \ and has built-in integrations with Discord and Slack. A web widget integration\
  \ is also available to embed the assistant in your website.\n\nDocumentation | API\
  \ Reference\n\nKey Features\n\n- \U0001F4DA Builds knowledge bases from docs, GitHub\
  \ issues and READMEs - \U0001F916 Agentic RAG system for dynamic document retrieval\
  \ - \U0001F50C Supports OpenAI, Ollama, Deepseek & OpenAI-Compatible models - \U0001F4AC\
  \ Discord and slack integrations for community support - \U0001F680 API-first design\
  \ with Docker deployment\n\nExample Workflow\n\nHere's a simple workflow to get\
  \ started with Ragpi once it's deployed:\n\n1. Set up a Source with a Connector\n\
  \n- Use the `/sources` endpoint to configure a source with your chosen connector.\
  \ - Each connector type has its own configuration parameters.\n\nExample payload\
  \ using the Sitemap connector:\n\n2. Monitor Source Synchronization\n\n- After adding\
  \ a source, documents will be synced automatically. You can monitor the sync process\
  \ through the `/tasks` endpoint.\n\n3. Chat with the AI Assistant\n\n- Use the `/chat`\
  \ endpoint to query the AI assistant using the configured sources:\n\n- You can\
  \ also interact with the AI assistant through the Discord or Slack integration,\
  \ or by embedding the Web Widget in your website.\n\nConnectors\n\nRagpi supports\
  \ the following connectors for building knowledge bases:\n\n- **Documentation Website\
  \ (Sitemap)** - **GitHub Issues** - **GitHub README Files** - **GitHub PDF Files**\
  \ - **REST API Responses**\n\nExplore connectors \u2192\n\nProviders\n\nRagpi supports\
  \ the following LLM providers for generating responses and embeddings:\n\n- **OpenAI**\
  \ (default) - **Ollama** - **Deepseek** - **OpenAI-compatible APIs**\n\nConfigure\
  \ providers \u2192\n\nIntegrations\n\nRagpi supports the following integrations\
  \ for interacting with the AI assistant:\n\n- **Discord** - **Slack** - **Web Widget**\n\
  \nContributing\n\nContributions to Ragpi are welcome! Please check out the contributing\
  \ guidelines for more information."
