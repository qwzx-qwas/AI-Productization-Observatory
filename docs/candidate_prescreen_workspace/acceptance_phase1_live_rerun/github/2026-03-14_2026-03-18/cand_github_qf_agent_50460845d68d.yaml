raw_evidence_excerpt: "Fully Local Manus AI. No APIs, No $200 monthly bills. Enjoy\
  \ an autonomous agent that thinks, browses the web, and code for the sole cost of\
  \ electricity. \U0001F514 Official updates only via twitter @Martin993886460 (Beware\
  \ of fake account)\n\nAgenticSeek: Private, Local Manus Alternative.\n\nEnglish\
  \ | \u4E2D\u6587 | \u7E41\u9AD4\u4E2D\u6587 | Fran\xE7ais | \u65E5\u672C\u8A9E |\
  \ Portugu\xEAs (Brasil) | Espa\xF1ol | T\xFCrk\xE7e\n\n*A **100% local alternative\
  \ to Manus AI**, this voice-enabled AI assistant autonomously browses the web, writes\
  \ code, and plans tasks while keeping all data on your device. Tailored for local\
  \ reasoning models, it runs entirely on your hardware, ensuring complete privacy\
  \ and zero cloud dependency.*\n\nWhy AgenticSeek ?\n\n* \U0001F512 Fully Local &\
  \ Private - Everything runs on your machine \u2014 no cloud, no data sharing. Your\
  \ files, conversations, and searches stay private.\n\n* \U0001F310 Smart Web Browsing\
  \ - AgenticSeek can browse the internet by itself \u2014 search, read, extract info,\
  \ fill web form \u2014 all hands-free.\n\n* \U0001F4BB Autonomous Coding Assistant\
  \ - Need code? It can write, debug, and run programs in Python, C, Go, Java, and\
  \ more \u2014 all without supervision.\n\n* \U0001F9E0 Smart Agent Selection - You\
  \ ask, it figures out the best agent for the job automatically. Like having a team\
  \ of experts ready to help.\n\n* \U0001F4CB Plans & Executes Complex Tasks - From\
  \ trip planning to complex projects \u2014 it can split big tasks into steps and\
  \ get things done using multiple AI agents.\n\n* \U0001F399\uFE0F Voice-Enabled\
  \ - Clean, fast, futuristic voice and speech to text allowing you to talk to it\
  \ like it's your personal AI from a sci-fi movie. (In progress)\n\n**Demo**\n\n\
  > *Can you search for the agenticSeek project, learn what skills are required, then\
  \ open the CV_candidates.zip and then tell me which match best the project*\n\n\
  Disclaimer: This demo, including all the files that appear (e.g: CV_candidates.zip),\
  \ are entirely fictional. We are not a corporation, we seek open-source contributors\
  \ not candidates.\n\n> \U0001F6E0\u26A0\uFE0F\uFE0F **Active Work in Progress**\n\
  \n> \U0001F64F This project started as a side-project and has zero roadmap and zero\
  \ funding. It's grown way beyond what I expected by ending in GitHub Trending. Contributions,\
  \ feedback, and patience are deeply appreciated.\n\nPrerequisites\n\nBefore you\
  \ begin, ensure you have the following software installed:\n\n* **Git:** For cloning\
  \ the repository. Download Git * **Python 3.10.x:** We strongly recommend using\
  \ Python version 3.10.x. Using other versions might lead to dependency errors. Download\
  \ Python 3.10 (pick a 3.10.x version). * **Docker Engine & Docker Compose:** For\
  \ running bundled services like SearxNG. * Install Docker Desktop (which includes\
  \ Docker Compose V2): Windows | Mac | Linux * Alternatively, install Docker Engine\
  \ and Docker Compose separately on Linux: Docker Engine | Docker Compose (ensure\
  \ you install Compose V2, e.g., `sudo apt-get install docker-compose-plugin`).\n\
  \n1. **Clone the repository and setup**\n\n2. Change the .env file content\n\nUpdate\
  \ the `.env` file with your own values as needed:\n\n- **SEARXNG_BASE_URL**: Leave\
  \ unchanged unless running on host with CLI mode. - **REDIS_BASE_URL**: Leave unchanged\
  \ - **WORK_DIR**: Path to your working directory on your local machine. AgenticSeek\
  \ will be able to read and interact with these files. - **OLLAMA_PORT**: Port number\
  \ for the Ollama service. - **LM_STUDIO_PORT**: Port number for the LM Studio service.\
  \ - **CUSTOM_ADDITIONAL_LLM_PORT**: Port for any additional custom LLM service.\n\
  \n**API Key are totally optional for user who choose to run LLM locally. Which is\
  \ the primary purpose of this project. Leave empty if you have sufficient hardware**\n\
  \n3. **Start Docker**\n\nMake sure Docker is installed and running on your system.\
  \ You can start Docker using the following commands:\n\n- **On Linux/macOS:** Open\
  \ a terminal and run:\n\nOr launch Docker Desktop from your applications menu if\
  \ installed.\n\n- **On Windows:** Start Docker Desktop from the Start menu.\n\n\
  You can verify Docker is running by executing:\n\nIf you see information about your\
  \ Docker installation, it is running correctly.\n\nSee the table of Local Providers\
  \ below for a summary.\n\nNext step: Run AgenticSeek locally\n\n*See the Troubleshooting\
  \ section if you are having issues.* *If your hardware can't run LLMs locally, see\
  \ Setup to run with an API.* *For detailed `config.ini` explanations, see Config\
  \ Section.*\n\n---\n\nSetup for running LLM locally on your machine\n\n**Hardware\
  \ Requirements:**\n\nTo run LLMs locally, you'll need sufficient hardware. At a\
  \ minimum, a GPU capable of running Magistral, Qwen or Deepseek 14B is required.\
  \ See the FAQ for detailed model/performance recommendations.\n\n**Setup your local\
  \ provider**\n\nStart your local provider (for example with ollama):\n\nUnless you\
  \ wish to to run AgenticSeek on host (CLI mode), export or set the provider listen\
  \ address:\n\nThen, start you provider:\n\nSee below for a list of local supported\
  \ provider.\n\n**Update the config.ini**\n\nChange the config.ini file to set the\
  \ provider_name to a supported provider and provider_model to a LLM supported by\
  \ your provider. We recommend reasoning model such as *Magistral* or *Deepseek*.\n\
  \nSee the **FAQ** at the end of the README for required hardware.\n\n**Warning**:\n\
  \n- The `config.ini` file format does not support comments. Do not copy and paste\
  \ the example configuration directly, as comments will cause errors. Instead, manually\
  \ modify the `config.ini` file with your desired settings, excluding any comments.\n\
  \n- Do *NOT* set provider_name to `openai` if using LM-studio for running LLMs.\
  \ Set it to `lm-studio`.\n\n- Some provider (eg: lm-studio) require you to have\
  \ `http://` in front of the IP. For example `http://127.0.0.1:1234`\n\n**List of\
  \ local providers**\n\n| Provider | Local? | Description | |-----------|--------|-----------------------------------------------------------|\
  \ | ollama | Yes | Run LLMs locally with ease using ollama as a LLM provider | |\
  \ lm-studio | Yes | Run LLM locally with LM studio (set `provider_name` to `lm-studio`)|\
  \ | openai | Yes | Use openai compatible API (eg: llama.cpp server) |\n\nNext step:\
  \ Start services and run AgenticSeek\n\n*See the Troubleshooting section if you\
  \ are having issues.* *If your hardware can't run LLMs locally, see Setup to run\
  \ with an API.* *For detailed `config.ini` explanations, see Config Section.*\n\n\
  Setup to run with an API\n\nThis setup uses external, cloud-based LLM providers.\
  \ You'll need an API key from your chosen service.\n\n**1. Choose an API Provider\
  \ and Get an API Key:**\n\nRefer to the List of API Providers below. Visit their\
  \ websites to sign up and obtain an API key.\n\n**2. Set Your API Key as an Environment\
  \ Variable:**\n\n* **Linux/macOS:** Open your terminal and use the `export` command.\
  \ It's best to add this to your shell's profile file (e.g., `~/.bashrc`, `~/.zshrc`)\
  \ for persistence.\n\nExample for TogetherAI:\n\n* **Windows:** * **Command Prompt\
  \ (Temporary for current session):**\n\n* **PowerShell (Temporary for current session):**\n\
  \n* **Permanently:** Search for \"environment variables\" in the Windows search\
  \ bar, click \"Edit the system environment variables,\" then click the \"Environment\
  \ Variables...\" button. Add a new User variable with the appropriate name (e.g.,\
  \ `OPENAI_API_KEY`) and your key as the value.\n\n*(See FAQ: How do I set API keys?\
  \ for more details).*\n\n**3. Update `config.ini`:**\n\n*Warning:* Make sure there\
  \ are no trailing spaces in the `config.ini` values.\n\n**List of API Providers**"
