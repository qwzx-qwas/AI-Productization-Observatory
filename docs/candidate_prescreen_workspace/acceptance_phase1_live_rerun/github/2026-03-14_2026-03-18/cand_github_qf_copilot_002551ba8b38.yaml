  \u514B\u9686\u9879\u76EE\n\n\u7B2C\u4E8C\u6B65\uFF1A\u914D\u7F6E\u6570\u636E\u5E93\
  \n\n\u7B2C\u4E09\u6B65\uFF1A\u914D\u7F6E\u540E\u7AEF\n\n\u7F16\u8F91 `copilot-admin/src/main/resources/application.yml`\uFF1A\
