title: private-gpt
summary: Interact with your documents using the power of GPT, 100% privately, no data
  leaks
raw_evidence_excerpt: "Interact with your documents using the power of GPT, 100% privately,\
  \ no data leaks\n\nPrivateGPT\n\nPrivateGPT -built by Zylon- is a production-ready\
  \ AI project that allows you to ask questions about your documents using the power\
  \ of Large Language Models (LLMs), even in scenarios without an Internet connection.\
  \ 100% private, no data leaves your execution environment at any point.\n\n>[!TIP]\
  \ > If you are looking for an **enterprise-ready, fully private AI platform for\
  \ regulated industries** like financial services (banks, insurance, investment),\
  \ defense, critical infrastructure services, government and healthcare, > check\
  \ out Zylon's website or request a demo. > **Zylon** is an enterprise AI platform\
  \ delivering private generative AI and on-premise AI software for regulated industries,\
  \ enabling secure deployment inside enterprise infrastructure without external cloud\
  \ dependencies.\n\nThe project provides an API offering all the primitives required\
  \ to build private, context-aware AI applications. It follows and extends the OpenAI\
  \ API standard, and supports both normal and streaming responses.\n\nThe API is\
  \ divided into two logical blocks:\n\n**High-level API**, which abstracts all the\
  \ complexity of a RAG (Retrieval Augmented Generation) pipeline implementation:\
  \ - Ingestion of documents: internally managing document parsing, splitting, metadata\
  \ extraction, embedding generation and storage. - Chat & Completions using context\
  \ from ingested documents: abstracting the retrieval of context, the prompt engineering\
  \ and the response generation.\n\n**Low-level API**, which allows advanced users\
  \ to implement their own complex pipelines: - Embeddings generation: based on a\
  \ piece of text. - Contextual chunks retrieval: given a query, returns the most\
  \ relevant chunks of text from the ingested documents.\n\nIn addition to this, a\
  \ working Gradio UI client is provided to test the API, together with a set of useful\
  \ tools such as bulk model download script, ingestion script, documents folder watch,\
  \ etc.\n\n\U0001F39E\uFE0F Overview >[!WARNING] > This README is not updated as\
  \ frequently as the documentation. > Please check it out for the latest updates!\n\
  \nMotivation behind PrivateGPT Generative AI is a game changer for our society,\
  \ but adoption in companies of all sizes and data-sensitive domains like healthcare\
  \ or legal is limited by a clear concern: **privacy**. Not being able to ensure\
  \ that your data is fully under your control when using third-party AI tools is\
  \ a risk those industries cannot take.\n\nPrimordial version The first version of\
  \ PrivateGPT was launched in May 2023 as a novel approach to address the privacy\
  \ concerns by using LLMs in a complete offline way.\n\nThat version, which rapidly\
  \ became a go-to project for privacy-sensitive setups and served as the seed for\
  \ thousands of local-focused generative AI projects, was the foundation of what\
  \ PrivateGPT is becoming nowadays; thus a simpler and more educational implementation\
  \ to understand the basic concepts required to build a fully local -and therefore,\
  \ private- chatGPT-like tool.\n\nIf you want to keep experimenting with it, we have\
  \ saved it in the primordial branch of the project.\n\n> It is strongly recommended\
  \ to do a clean clone and install of this new version of PrivateGPT if you come\
  \ from the previous, primordial version.\n\nPresent and Future of PrivateGPT PrivateGPT\
  \ is now evolving towards becoming a gateway to generative AI models and primitives,\
  \ including completions, document ingestion, RAG pipelines and other low-level building\
  \ blocks. We want to make it easier for any developer to build AI applications and\
  \ experiences, as well as provide a suitable extensive architecture for the community\
  \ to keep contributing.\n\nStay tuned to our releases to check out all the new features\
  \ and changes included.\n\n\U0001F4C4 Documentation Full documentation on installation,\
  \ dependencies, configuration, running the server, deployment options, ingesting\
  \ local documents, API details and UI features can be found here: https://docs.privategpt.dev/\n\
  \n\U0001F9E9 Architecture Conceptually, PrivateGPT is an API that wraps a RAG pipeline\
  \ and exposes its primitives. * The API is built using FastAPI and follows OpenAI's\
  \ API scheme. * The RAG pipeline is based on LlamaIndex.\n\nThe design of PrivateGPT\
  \ allows to easily extend and adapt both the API and the RAG implementation. Some\
  \ key architectural decisions are: * Dependency Injection, decoupling the different\
  \ components and layers. * Usage of LlamaIndex abstractions such as `LLM`, `BaseEmbedding`\
  \ or `VectorStore`, making it immediate to change the actual implementations of\
  \ those abstractions. * Simplicity, adding as few layers and new abstractions as\
  \ possible. * Ready to use, providing a full implementation of the API and RAG pipeline.\n\
  \nMain building blocks: * APIs are defined in `private_gpt:server: `. Each package\
  \ contains an ` _router.py` (FastAPI layer) and an ` _service.py` (the service implementation).\
  \ Each *Service* uses LlamaIndex base abstractions instead of specific implementations,\
  \ decoupling the actual implementation from its usage. * Components are placed in\
  \ `private_gpt:components: `. Each *Component* is in charge of providing actual\
  \ implementations to the base abstractions used in the Services - for example `LLMComponent`\
  \ is in charge of providing an actual implementation of an `LLM` (for example `LlamaCPP`\
  \ or `OpenAI`).\n\n\U0001F4A1 Contributing Contributions are welcomed! To ensure\
  \ code quality we have enabled several format and typing checks, just run `make\
  \ check` before committing to make sure your code is ok. Remember to test your code!\
  \ You'll find a tests folder with helpers, and you can run tests using `make test`\
  \ command.\n\nDon't know what to contribute? Here is the public Project Board with\
  \ several ideas.\n\nHead over to Discord contributors channel and ask for write\
  \ permissions on that GitHub project.\n\n\U0001F4AC Community Join the conversation\
  \ around PrivateGPT on our: - Twitter (aka X) - Discord\n\n\U0001F4D6 Citation If\
  \ you use PrivateGPT in a paper, check out the Citation file for the correct citation.\
  \ You can also use the \"Cite this repository\" button in this repo to get the citation\
  \ in different formats.\n\nHere are a couple of examples:\n\nBibTeX\n\nAPA\n\n\U0001F917\
  \ Partners & Supporters PrivateGPT is actively supported by the teams behind: *\
  \ Qdrant, providing the default vector database * Fern, providing Documentation\
  \ and SDKs * LlamaIndex, providing the base RAG framework and abstractions\n\nThis\
  \ project has been strongly influenced and supported by other amazing projects like\
  \ LangChain, GPT4All, LlamaCpp, Chroma and SentenceTransformers."
