raw_evidence_excerpt: 'Agent service for Optimizely Feature Experimentation and Optimizely
  Full Stack (legacy)


  Optimizely Agent


  This repository houses the Optimizely Agent service for use with Optimizely Feature
  Experimentation and Optimizely Full Stack (legacy).


  Optimizely Feature Experimentation is an A/B testing and feature management tool
  for product development teams that enables you to experiment at every step. Using
  Optimizely Feature Experimentation allows for every feature on your roadmap to be
  an opportunity to discover hidden insights. Learn more at Optimizely.com, or see
  the developer documentation.


  Optimizely Rollouts is free feature flags for development teams. You can easily
  roll out and roll back features in any application without code deploys, mitigating
  risk for every feature on your roadmap.


  Get Started


  Refer to the Agent''s developer documentation for detailed instructions on getting
  started with using the SDK.


  Requirements


  Optimizely Agent is implemented in Golang. Golang version 1.24.0+ is required for
  developing and compiling from source. Installers and binary archives for most platforms
  can be downloaded directly from the Go downloads page.


  Run from source (Linux / OSX)


  Once Go is installed, the Optimizely Agent can be started via the following `make`
  command:


  This will start the Optimizely Agent with the default configuration in the foreground.


  Run from source (Windows)


  A helper script is available under scripts/build.ps1 to automate compiling Agent
  in a Windows environment. The script will download and install both Git and Golang
  and then attempt to compile Agent. Open a Powershell terminal and run


  Run via Docker


  If you have Docker installed, Optimizely Agent can be started as a container. First
  pull the Docker image with:


  By default this will pull the "latest" tag. You can also specify a specific version
  of Agent by providing the version as a tag to the docker command:


  Then run the docker container with:


  This will start Agent in the foreground and expose the container API port 8080 to
  the host.


  Note that when a new version is released, 2 images are pushed to dockerhub, they
  are distinguished by their tags:


  - :latest (same as :X.Y.Z) - :alpine (same as :X.Y.Z-alpine)


  The difference between latest and alpine is that latest is built `FROM scratch`
  while alpine is `FROM alpine`.


  - latest Dockerfile - alpine Dockerfile


  Configuration Options


  Optimizely Agent configuration can be overridden by a yaml configuration file provided
  at runtime.


  By default the configuration file will be sourced from the current active directory
  `e.g. ./config.yaml`. Alternative configuration locations can be specified at runtime
  via environment variable or command line flag.


  The default configuration can be found here.


  Below is a comprehensive list of available configuration properties.'
