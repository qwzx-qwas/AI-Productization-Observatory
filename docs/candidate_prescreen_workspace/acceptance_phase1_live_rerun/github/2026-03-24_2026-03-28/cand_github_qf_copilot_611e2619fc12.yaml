raw_evidence_excerpt: '**NOTE**: This is a **sample** application to help you understand
  how Semantic Kernel and AI can work in Web Applications. This sample is **NOT FOR
  PRODUCTION** deployments.


  Chat Copilot Sample Application


  This sample allows you to build your own integrated large language model (LLM) chat
  copilot. The sample is built on Microsoft Semantic Kernel and has three components:


  1. A frontend application React web app 2. A backend REST API .NET web API service
  3. A .NET worker service for processing semantic memory.


  These quick-start instructions run the sample locally. They can also be found on
  the official Chat Copilot Microsoft Learn documentation page for getting started.


  To deploy the sample to Azure, please view Deploying Chat Copilot after meeting
  the requirements described below.


  > **IMPORTANT:** This sample is for educational purposes only and is not recommended
  for production deployments.


  > **IMPORTANT:** Each chat interaction will call Azure OpenAI/OpenAI which will
  use tokens that you may be billed for.


  Requirements


  You will need the following items to run the sample:


  - .NET 8.0 SDK _(via Setup install.\* script)_ - Node.js _(via Setup install.\*
  script)_ - Yarn _(via Setup install.\* script)_ - Git - AI Service (one of the following
  is required)


  | AI Service | Requirement | | ------------ | ---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------
  | | Azure OpenAI | - Access - Resource - Deployed models (`gpt-4o` and `text-embedding-ada-002`)
  - Endpoint - API key | | OpenAI | - Account - API key |


  Instructions


  Windows


  1. Open PowerShell as an administrator. > NOTE: Ensure that you have PowerShell
  Core 6+ installed. This is different from the default PowerShell installed on Windows.
  1. Clone this repository


  1. Setup your environment.


  The following is a script to help you install the dependencies required. Feel free
  to install `dotnet`, `nodejs`, and `yarn` with your method of choice or use this
  script.


  > NOTE: This script will install `Chocolatey`, `dotnet-8.0-sdk`, `nodejs`, and `yarn`.


  > NOTE: If you receive an error that the script is not digitally signed or cannot
  execute on the system, you may need to change the execution policy (see list of
  policies and scopes) or unblock the script.


  1. Configure Chat Copilot.


  - `AI_SERVICE`: `AzureOpenAI` or `OpenAI`. - `API_KEY`: The `API key` for Azure
  OpenAI or for OpenAI. - `AZURE_OPENAI_ENDPOINT`: The Azure OpenAI resource `Endpoint`
  address. This is only required when using Azure OpenAI, omit `-Endpoint` if using
  OpenAI.


  - > **IMPORTANT:** For `AzureOpenAI`, if you deployed models `gpt-4o` and `text-embedding-ada-002`
  with custom names (instead of the default names), also use the parameters:


  Open the `.\Configure.ps1` script to see all of the available parameters.


  1. Run Chat Copilot locally. This step starts both the backend API and frontend
  application.


  It may take a few minutes for Yarn packages to install on the first run.


  > NOTE: Confirm pop-ups are not blocked and you are logged in with the same account
  used to register the application.


  - (Optional) To start ONLY the backend:


  Linux/macOS


  1. Open Bash as an Administrator. 1. Clone this repository


  1. Configure environment.


  The following is a script to help you install the dependencies required. Feel free
  to install `dotnet`, `nodejs`, and `yarn` with your method of choice or use this
  script.


  **Ubuntu/Debian Linux**


  > NOTE: This script uses `apt` to install `dotnet-sdk-8.0`, `nodejs`, and `yarn`.


  **macOS**


  > NOTE: This script uses `homebrew` to install `dotnet-sdk`, `nodejs`, and `yarn`.


  1. Configure Chat Copilot.


  1. For OpenAI


  - `API_KEY`: The `API key` for OpenAI.


  2. For Azure OpenAI


  - `AZURE_OPENAI_ENDPOINT`: The Azure OpenAI resource `Endpoint` address. - `API_KEY`:
  The `API key` for Azure OpenAI.


  **IMPORTANT:** If you deployed models `gpt-4o` and `text-embedding-ada-002` with
  custom names (instead of the default names), you need to specify the deployment
  names with three additional parameters:


  1. Run Chat Copilot locally. This step starts both the backend API and frontend
  application.


  It may take a few minutes for Yarn packages to install on the first run.


  > NOTE: Confirm pop-ups are not blocked and you are logged in with the same account
  used to register the application.


  - (Optional) To start ONLY the backend:


  (Optional) Run the memory pipeline


  By default, the webapi is configured to work without the memory pipeline for synchronous
  processing documents. To enable asynchronous document processing, you need to configure
  the webapi and the memory pipeline. Please refer to the webapi README and the memory
  pipeline README for more information.


  (Optional) Enable backend authentication via Azure AD


  By default, Chat Copilot runs locally without authentication, using a guest user
  profile. If you want to enable authentication with Azure Active Directory, follow
  the steps below.


  Requirements


  - Azure account - Azure AD Tenant


  Instructions


  1. Create an application registration for the frontend web app, using the values
  below


  - `Supported account types`: "_Accounts in this organizational directory only ({YOUR
  TENANT} only - Single tenant)_" - `Redirect URI (optional)`: _Single-page application
  (SPA)_ and use _http://localhost:3000_.


  2. Create a second application registration for the backend web api, using the values
  below: - `Supported account types`: "_Accounts in this organizational directory
  only ({YOUR TENANT} only - Single tenant)_" - Do **not** configure a `Redirect URI
  (optional)`


  > NOTE: Other account types can be used to allow multitenant and personal Microsoft
  accounts to use your application if you desire. Doing so may result in more users
  and therefore higher costs.


  > Take note of the `Application (client) ID` for both app registrations as you will
  need them in future steps.


  3. Expose an API within the second app registration


  1. Select _Expose an API_ from the menu


  2. Add an _Application ID URI_


  1. This will generate an `api://` URI


  2. Click _Save_ to store the generated URI


  3. Add a scope for `access_as_user`


  1. Click _Add scope_


  2. Set _Scope name_ to `access_as_user`


  3. Set _Who can consent_ to _Admins and users_


  4. Set _Admin consent display name_ and _User consent display name_ to `Access copilot
  chat as a user`


  5. Set _Admin consent description_ and _User consent description_ to `Allows the
  accesses to the Copilot chat web API as a user`


  4. Add the web app frontend as an authorized client application


  1. Click _Add a client application_


  2. For _Client ID_, enter the frontend''s application (client) ID


  3. Check the checkbox under _Authorized scopes_


  4. Click _Add application_


  4. Add permissions to web app frontend to access web api as user


  1. Open app registration for web app frontend


  2. Go to _API Permissions_


  3. Click _Add a permission_


  4. Select the tab _APIs my organization uses_


  5. Choose the app registration representing the web api backend


  6. Select permissions `access_as_user`


  7. Click _Add permissions_


  5. Run the Configure script with additional parameters to set up authentication.


  **Powershell**


  **Bash**'
