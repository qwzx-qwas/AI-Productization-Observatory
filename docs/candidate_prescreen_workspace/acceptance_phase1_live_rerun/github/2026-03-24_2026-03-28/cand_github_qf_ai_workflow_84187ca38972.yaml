title: roast
summary: Structured AI workflows made easy
raw_evidence_excerpt: "Structured AI workflows made easy\n\nRoast\n\nA Ruby-based\
  \ domain-specific language for creating structured AI workflows. Build complex AI-powered\
  \ automation with simple, declarative Ruby syntax.\n\nOverview\n\nRoast lets you\
  \ orchestrate AI workflows by combining \"cogs\" - building blocks that interact\
  \ with LLMs, run code, execute commands, and process data. Write workflows that:\n\
  \n- **Chain AI steps together** - Output from one cog flows seamlessly to the next\
  \ - **Run coding agents locally** - Full filesystem access with Claude Code or other\
  \ providers - **Process collections** - Map operations over arrays with serial or\
  \ parallel execution - **Control flow intelligently** - Conditional execution, iteration,\
  \ and error handling - **Reuse workflow components** - Create modular, parameterized\
  \ scopes\n\nQuick Example\n\nRun with:\n\nCore Cogs\n\n- **`chat`** - Send prompts\
  \ to cloud-based LLMs (OpenAI, Anthropic, Gemini, etc.) - **`agent`** - Run local\
  \ coding agents with filesystem access (Claude Code CLI, etc.) - **`ruby`** - Execute\
  \ custom Ruby code within workflows - **`cmd`** - Run shell commands and capture\
  \ output - **`map`** - Process collections in serial or parallel - **`repeat`**\
  \ - Iterate until conditions are met - **`call`** - Invoke reusable workflow scopes\n\
  \nInstallation\n\nOr add to your Gemfile:\n\nRequirements\n\n- Ruby 3.0+ - API keys\
  \ for your AI provider (OpenAI/Anthropic) - Claude Code CLI installed (for agent\
  \ cog)\n\nGetting Started\n\nThe best way to learn Roast is through the interactive\
  \ tutorial:\n\n\U0001F4DA **Start the Tutorial**\n\nThe tutorial covers: 1. Your\
  \ first workflow 2. Chaining cogs together 3. Accepting targets and parameters 4.\
  \ Configuration options 5. Control flow 6. Reusable scopes 7. Processing collections\
  \ 8. Iterative workflows 9. Async execution\n\nDocumentation\n\n- Tutorial - Step-by-step\
  \ guide with examples - Workflow Examples - Toy workflows that demonstrate all functional\
  \ patterns, use for end-to-end test\n\nDocumentation & References\n\n* __Source\
  \ code root__: https://github.com/Shopify/roast/tree/main/lib/roast\n\nThe public\
  \ interfaces of Roast are extensively documented in class and method comments on\
  \ the relevant classes.\n\n* __Tutorial and Examples__ * Tutorial -- Table of Contents\
  \ (contains step-by-step guides and runnable examples showing real-world usage)\
  \ * Additional Example Workflows) (these comprise the Roast end-to-end test suite)\
  \ * __Configuation__ * General configuration block: `config-context.rbi` * Global\
  \ cog configuration: `cog/config.rb` * Agent cog configuration: `agent/config.rb`\
  \ * Chat cog configuration: `chat/config.rb` * Cmd cog configuration: `cmd/config.rb`\
  \ * Map cog configuration: `map.rb` * __Execution__ * General Execution block: `execution-context.rbi`\
  \ * __Input and Output__ * General cog input block: `cog-input-context.rbi` * Global\
  \ cog output: `cog/output.rb` * Agent cog input `agent/input.rb` * Agent cog output\
  \ `agent/output.rb` * Call cog input: `call.rb` * Chat cog input: `chat.rb` * Chat\
  \ cog output: `chat.rb` * Cmd cog input: `cmd.rb:159` (scroll down) * Cmd cog output:\
  \ `cmd.rb:214` (scroll down) * Map cog input: `map.rb:116` (scroll down) * Repeat\
  \ cog input: `repeat.rb` * Ruby cog input: `ruby.rb` * Ruby cog output: `ruby.rb:63`\
  \ (scroll down)\n\nContributing\n\nWe welcome contributions! Please see our Contributing\
  \ Guide for details.\n\nLicense\n\nMIT License"
