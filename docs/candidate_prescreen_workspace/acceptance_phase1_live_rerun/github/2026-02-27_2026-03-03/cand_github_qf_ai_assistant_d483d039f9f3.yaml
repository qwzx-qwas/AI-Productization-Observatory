raw_evidence_excerpt: 'Build AI assistants that interact with your systems


  GPTScript


  GPTScript is a framework that allows Large Language Models (LLMs) to operate and
  interact with various systems. These systems can range from local executables to
  complex applications with OpenAPI schemas, SDK libraries, or any RAG-based solutions.
  GPTScript is designed to easily integrate any system, whether local or remote, with
  your LLM using just a few lines of prompts.


  Here are some sample use cases of GPTScript: 1. Chat with a local CLI - Try it!
  2. Chat with an OpenAPI compliant endpoint - Try it! 3. Chat with local files and
  directories - Try it! 4. Run an automated workflow - Try it!


