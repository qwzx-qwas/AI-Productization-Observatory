raw_evidence_excerpt: "CompassVPN Agent\n\n\u26A0\uFE0F Caution: This project is under\
  \ active development! \u26A0\uFE0F\n\nCompass VPN Agent\n\nRead the complete guide\
  \ on our website.\n\nFeatures Read Here.\n\nRequirements\n\nRead Here.\n\nHow to\
  \ run\n\n1. Setup Agent\n\nFollow this tutorial to get the Compass VPN Agent running.\n\
  \n2. Setup Manager Follow this tutorial to create a manager.\n\nEnsure you obtain\
  \ the authentication values from the manager setup. These values will be required\
  \ to be included in the `env_file` of the agent.\n\nCommands\n\nBootstrap: _(first\
  \ time)_\n\nRebuild and restart all services:\n\nStart the Panel\n\nView Configuration\
  \ Links:\n\nCheck & Update:\n\nShow Logs:\n\nServices\n\n`xray-config` Creates `config.json`,\
  \ monitors configurations, and export Xray configurations via `/metrics` path.\n\
  \n`xray` Reads `config.json` from the **xray-config** service and runs the Xray-core.\n\
  \n`v2ray-exporter` Exports V2Ray/Xray configuration metrics.\n\n`node-exporter`\
  \ Prometheus Node Exporter that collects all critical metrics of the agent machine.\n\
  \n`nginx` NGINX webserver to manage Xray inbounds and fallbacks, enhancing both\
  \ performance and security.\n\n`metric-forwarder` Reads metrics from `xray-config`,\
  \ `node-exporter`, and `v2ray-exporter` services and pushes them to a remote manager\
  \ `Pushgateway` service or `Grafana Cloud Prometheus` endpoint.\n\n`user-metrics`\
  \ Tracks approximate active unique users across all configured inbounds and monitors\
  \ blocked requests due to junk traffic, providing insights into bandwidth optimization."
