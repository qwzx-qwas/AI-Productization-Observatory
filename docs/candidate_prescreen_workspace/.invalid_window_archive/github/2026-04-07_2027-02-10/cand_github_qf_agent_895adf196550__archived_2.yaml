summary: This is the entrypoint repository for the Superblocks Agent Platform
raw_evidence_excerpt: "This is the entrypoint repository for the Superblocks Agent\
  \ Platform\n\nThe Superblocks Agent\n\n----\n\nThe Superblocks On-Premise Agent\
  \ is a stateless service that securely connects the Superblocks platform to your\
  \ data without leaving your network. It is the execution engine that powers Superblocks\
  \ Application APIs, Workflows, and Scheduled Jobs. Here's how it works.\n\nWhen\
  \ your developers build apps in Superblocks and write SQL statements or API calls,\
  \ your customer data flows from your Database to the On-premise Agent to the browser\
  \ directly; never to Superblocks Cloud. In addition, the Superblocks Cloud cannot\
  \ make any inbound network calls to the customer\u2019s network.\n\nThe Browser\
  \ will call out to the Superblocks Cloud only for Authentication, Permissions, App\
  \ UI Definitions and App Integration Definitions. This approach keeps Superblocks\
  \ components and functionality up-to-date for your developers with each release\
  \ and bug fix, without needing to upgrade the On-Premise Agent.\n\nWhen the Developer\
  \ is ready to go to production, they click \u201CDeploy\u201D (Superblocks can alternatively\
  \ integrate into your version control system) and the application will be accessible\
  \ on a URL.\n\nIn the deployed app, when a user clicks a button to trigger an API\
  \ call, the call is routed to the On-Premise Agent and the App Integration Definition\
  \ will be fetched from Superblocks Cloud (Optionally customers can connect to their\
  \ version control system so API Integration Definitions are fetched directly from\
  \ a branch). This round-trip restricts end users from running arbitrary APIs, only\
  \ APIs from the App Integration Definition approved by Developers with the right\
  \ permissions can be triggered. The On-Premise Agent will execute the API logic\
  \ based on the definition and all customer data flows from the data sources to the\
  \ agent to the browser directly, never leaving the customer\u2019s network and never\
  \ going to the Superblocks Cloud.\n\n---\n\nQuick Start\n\nBuild and run the agent\
  \ from source. You can create an agent key access token here.\n\nUsage\n\nThe agent\
  \ exposes HTTP and gRPC interfaces to run APIs. A full OpenAPI specification is\
  \ under development. Here is an exmaple that runs a basic API.\n\n> NOTE: To avoid\
  \ authentication errors, run the docker container with `-e SB_AUTH_JWT_ENABLED=false`.\n\
  \nDevelopment\n\nLearn how to develop locally with our guide.\n\nContributing\n\n\
  Learn how to contribute with our guide.\n\nSupport\n\nSend an email to help@superblocks.com."
