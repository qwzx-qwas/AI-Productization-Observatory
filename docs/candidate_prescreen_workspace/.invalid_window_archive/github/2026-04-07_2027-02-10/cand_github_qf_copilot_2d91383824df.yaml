summary: Copilot Chat extension for VS Code
raw_evidence_excerpt: "Copilot Chat extension for VS Code\n\nGitHub Copilot - Your\
  \ autonomous AI peer programmer\n\n**GitHub Copilot** is an AI peer programming\
  \ tool that transforms how you write code in Visual Studio Code.\n\nGitHub Copilot\
  \ agents handle complete coding tasks end-to-end, autonomously planning work, editing\
  \ files, running commands, and self-correcting when they hit errors. You can also\
  \ leverage inline suggestions for quick coding assistance and inline chat for precise,\
  \ focused edits directly in the editor.\n\n**Sign up for GitHub Copilot Free!**\n\
  \nGetting access to GitHub Copilot\n\nSign up for GitHub Copilot Free, or request\
  \ access from your enterprise admin.\n\nTo access GitHub Copilot, an active GitHub\
  \ Copilot subscription is required. You can read more about our business and individual\
  \ offerings at github.com/features/copilot.\n\nBuild with autonomous agents\n\n\
  **Let AI agents implement complex features end-to-end**. Give an agent a high-level\
  \ task and it breaks the work into steps, edits multiple files, runs terminal commands,\
  \ and self-corrects when it hits errors or failing tests. Agents excel at building\
  \ new features, debugging and fixing failing tests, refactoring codebases, and collaborating\
  \ via pull requests.\n\n**Manage sessions from a central view.** Run multiple agent\
  \ sessions in parallel and track them in one place. Monitor session status, switch\
  \ between active work, review file changes, and resume where you left off.\n\n**Run\
  \ agents with your preferred harness.** Use agents locally in VS Code, in the background\
  \ via Copilot CLI, or Cloud via Copilot Coding Agent. You can also work with providers\
  \ like Claude and Codex, and hand tasks off between agent types with context preserved\
  \ all within the VS Code.\n\n**Use agents to plan before you build with the Plan\
  \ agent**, which breaks tasks into structured implementation plans and asks clarifying\
  \ questions. When your plan is ready, hand it off to an implementation agent to\
  \ execute it. You can also delegate tasks to cloud agents that create branches,\
  \ implement changes, and open pull requests for your team to review.\n\nMore ways\
  \ to code with AI\n\n**Receive intelligent inline suggestions** as you type with\
  \ ghost text suggestions and next edit suggestions, helping you write code faster.\
  \ Copilot predicts your next logical change, and you can accept suggestions with\
  \ the Tab key.\n\n**Use inline chat for targeted edits** by pressing `Ctrl+I`/`Cmd+I`\
  \ to open a chat prompt directly in the editor. Describe a change and Copilot suggests\
  \ edits in place for refactoring methods, adding error handling, or explaining complex\
  \ algorithms without leaving your editor.\n\nCustomize AI for your workflow\n\n\
  **Agents work best when they understand your project's conventions and have the\
  \ right tools**. Tailor Copilot so it generates code that fits your codebase from\
  \ the start.\n\n**Project context.** Use custom instructions to specify project-wide\
  \ or task-specific context and coding guidelines.\n\n**Add specialized capabilities**.\
  \ Teach Copilot specialized capabilities with agent skills or define specialized\
  \ personas with custom agents.\n\n**Connect to external tools and services**. Extend\
  \ agents further with tools from MCP servers and extensions to give Copilot a gateway\
  \ to external data sources, APIs, or specialized tools.\n\nSupported languages and\
  \ frameworks\n\nGitHub Copilot works on any language, including Java, PHP, Python,\
  \ JavaScript, Ruby, Go, C#, or C++. Because it\u2019s been trained on languages\
  \ in public repositories, it works for most popular languages, libraries and frameworks.\n\
  \nVersion compatibility\n\nAs Copilot Chat releases in lockstep with VS Code due\
  \ to its deep UI integration, every new version of Copilot Chat is only compatible\
  \ with the latest and newest release of VS Code. This means that if you are using\
  \ an older version of VS Code, you will not be able to use the latest Copilot Chat.\n\
  \nOnly the latest Copilot Chat versions will use the latest models provided by the\
  \ Copilot service, as even minor model upgrades require prompt changes and fixes\
  \ in the extension.\n\nPrivacy and preview terms\n\nBy using Copilot Chat you agree\
  \ to GitHub Copilot chat preview terms. Review the transparency note to understand\
  \ about usage, limitations and ways to improve Copilot Chat during the technical\
  \ preview.\n\nPlease refer to our Privacy Statement to learn about the data we collect,\
  \ how we use it, and the controls available to you.\n\nTo get the latest security\
  \ fixes, please use the latest version of the Copilot extension and VS Code.\n\n\
  Resources & next steps * **Sign up for GitHub Copilot Free**: Explore Copilot's\
  \ AI capabilities at no cost before upgrading to a paid plan. * If you're using\
  \ Copilot for your business, check out Copilot Business and Copilot Enterprise.\
  \ * **Copilot Quickstart**: Discover the key features of Copilot in VS Code. * **Agents\
  \ Tutorial**: Get started with autonomous agents across different environments.\
  \ * **VS Code on YouTube**: Watch the latest demos and updates on the VS Code channel.\
  \ * **Frequently Asked Questions**: Get answers to commonly asked questions about\
  \ Copilot in VS Code. * **Provide Feedback**: Send us your feedback and feature\
  \ request to help us make GitHub Copilot better!\n\nData and telemetry\n\nThe GitHub\
  \ Copilot Extension for Visual Studio Code collects usage data and sends it to Microsoft\
  \ to help improve our products and services. Read our privacy statement to learn\
  \ more. This extension respects the `telemetry.telemetryLevel` setting which you\
  \ can learn more about at https://code.visualstudio.com/docs/supporting/faq#_how-to-disable-telemetry-reporting.\n\
  \nTrademarks\n\nThis project may contain trademarks or logos for projects, products,\
  \ or services. Authorized use of Microsoft trademarks or logos is subject to and\
  \ must follow Microsoft's Trademark & Brand Guidelines. Use of Microsoft trademarks\
  \ or logos in modified versions of this project must not cause confusion or imply\
  \ Microsoft sponsorship. Any use of third-party trademarks or logos are subject\
  \ to those third-party's policies.\n\nLicense\n\nCopyright (c) Microsoft Corporation.\
  \ All rights reserved.\n\nLicensed under the MIT license."
