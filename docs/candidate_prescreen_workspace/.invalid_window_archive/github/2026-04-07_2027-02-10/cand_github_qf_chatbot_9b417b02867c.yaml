title: gradio
summary: "Build and share delightful machine learning apps, all in Python. \U0001F31F\
  \ Star to support our work!"
raw_evidence_excerpt: "Build and share delightful machine learning apps, all in Python.\
  \ \U0001F31F Star to support our work!\n\nWebsite | Documentation | Guides | Getting\
  \ Started | Examples\n\nEnglish | \u4E2D\u6587\n\nGradio: Build Machine Learning\
  \ Web Apps \u2014 in Python\n\nGradio is an open-source Python package that allows\
  \ you to quickly **build** a demo or web application for your machine learning model,\
  \ API, or any arbitrary Python function. You can then **share** a link to your demo\
  \ or web application in just a few seconds using Gradio's built-in sharing features.\
  \ *No JavaScript, CSS, or web hosting experience needed!*\n\nIt just takes a few\
  \ lines of Python to create your own demo, so let's get started \U0001F4AB\n\nInstallation\n\
  \n**Prerequisite**: Gradio requires Python 3.10 or higher.\n\nWe recommend installing\
  \ Gradio using `pip`, which is included by default in Python. Run this in your terminal\
  \ or command prompt:\n\n> [!TIP] > It is best to install Gradio in a virtual environment.\
  \ Detailed installation instructions for all common operating systems are provided\
  \ here .\n\nBuilding Your First Demo\n\nYou can run Gradio in your favorite code\
  \ editor, Jupyter notebook, Google Colab, or anywhere else you write Python. Let's\
  \ write your first Gradio app:\n\n> [!TIP] > We shorten the imported name from gradio\
  \ to gr . This is a widely adopted convention for better readability of code.\n\n\
  Now, run your code. If you've written the Python code in a file named `app.py`,\
  \ then you would run `python app.py` from the terminal.\n\nThe demo below will open\
  \ in a browser on http://localhost:7860 if running from a file. If you are running\
  \ within a notebook, the demo will appear embedded within the notebook.\n\nType\
  \ your name in the textbox on the left, drag the slider, and then press the Submit\
  \ button. You should see a friendly greeting on the right.\n\n> [!TIP] > When developing\
  \ locally, you can run your Gradio app in hot reload mode , which automatically\
  \ reloads the Gradio app whenever you make changes to the file. To do this, simply\
  \ type in gradio before the name of the file instead of python . In the example\
  \ above, you would type: `gradio app.py` in your terminal. You can also enable vibe\
  \ mode by using the --vibe flag, e.g. gradio --vibe app.py , which provides an in-browser\
  \ chat that can be used to write or edit your Gradio app using natural language.\
  \ Learn more in the Hot Reloading Guide .\n\n**Understanding the `Interface` Class**\n\
  \nYou'll notice that in order to make your first demo, you created an instance of\
  \ the `gr.Interface` class. The `Interface` class is designed to create demos for\
  \ machine learning models which accept one or more inputs, and return one or more\
  \ outputs.\n\nThe `Interface` class has three core arguments:\n\n- `fn`: the function\
  \ to wrap a user interface (UI) around - `inputs`: the Gradio component(s) to use\
  \ for the input. The number of components should match the number of arguments in\
  \ your function. - `outputs`: the Gradio component(s) to use for the output. The\
  \ number of components should match the number of return values from your function.\n\
  \nThe `fn` argument is very flexible -- you can pass *any* Python function that\
  \ you want to wrap with a UI. In the example above, we saw a relatively simple function,\
  \ but the function could be anything from a music generator to a tax calculator\
  \ to the prediction function of a pretrained machine learning model.\n\nThe `inputs`\
  \ and `outputs` arguments take one or more Gradio components. As we'll see, Gradio\
  \ includes more than 30 built-in components (such as the `gr.Textbox()`, `gr.Image()`,\
  \ and `gr.HTML()` components) that are designed for machine learning applications.\n\
  \n> [!TIP] > For the `inputs` and `outputs` arguments, you can pass in the name\
  \ of these components as a string (`\"textbox\"`) or an instance of the class (`gr.Textbox()`).\n\
  \nIf your function accepts more than one argument, as is the case above, pass a\
  \ list of input components to `inputs`, with each input component corresponding\
  \ to one of the arguments of the function, in order. The same holds true if your\
  \ function returns more than one value: simply pass in a list of components to `outputs`.\
  \ This flexibility makes the `Interface` class a very powerful way to create demos.\n\
  \nWe'll dive deeper into the `gr.Interface` on our series on building Interfaces.\n\
  \nSharing Your Demo\n\nWhat good is a beautiful demo if you can't share it? Gradio\
  \ lets you easily share a machine learning demo without having to worry about the\
  \ hassle of hosting on a web server. Simply set `share=True` in `launch()`, and\
  \ a publicly accessible URL will be created for your demo. Let's revisit our example\
  \ demo, but change the last line as follows:\n\nWhen you run this code, a public\
  \ URL will be generated for your demo in a matter of seconds, something like:\n\n\
  \U0001F449 `https://a23dsf231adb.gradio.live`\n\nNow, anyone around the world can\
  \ try your Gradio demo from their browser, while the machine learning model and\
  \ all computation continues to run locally on your computer.\n\nTo learn more about\
  \ sharing your demo, read our dedicated guide on sharing your Gradio application.\n\
  \nAn Overview of Gradio\n\nSo far, we've been discussing the `Interface` class,\
  \ which is a high-level class that lets you build demos quickly with Gradio. But\
  \ what else does Gradio include?\n\nCustom Demos with `gr.Blocks`\n\nGradio offers\
  \ a low-level approach for designing web apps with more customizable layouts and\
  \ data flows with the `gr.Blocks` class. Blocks supports things like controlling\
  \ where components appear on the page, handling multiple data flows and more complex\
  \ interactions (e.g. outputs can serve as inputs to other functions), and updating\
  \ properties/visibility of components based on user interaction \u2014 still all\
  \ in Python.\n\nYou can build very custom and complex applications using `gr.Blocks()`.\
  \ For example, the popular image generation Automatic1111 Web UI is built using\
  \ Gradio Blocks. We dive deeper into the `gr.Blocks` on our series on building with\
  \ Blocks.\n\nChatbots with `gr.ChatInterface`\n\nGradio includes another high-level\
  \ class, `gr.ChatInterface`, which is specifically designed to create Chatbot UIs.\
  \ Similar to `Interface`, you supply a function and Gradio creates a fully working\
  \ Chatbot UI. If you're interested in creating a chatbot, you can jump straight\
  \ to our dedicated guide on `gr.ChatInterface`.\n\nThe Gradio Python & JavaScript\
  \ Ecosystem\n\nThat's the gist of the core `gradio` Python library, but Gradio is\
  \ actually so much more! It's an entire ecosystem of Python and JavaScript libraries\
  \ that let you build machine learning applications, or query them programmatically,\
  \ in Python or JavaScript. Here are other related parts of the Gradio ecosystem:\n\
  \n* Gradio Python Client (`gradio_client`): query any Gradio app programmatically\
  \ in Python. * Gradio JavaScript Client (`@gradio/client`): query any Gradio app\
  \ programmatically in JavaScript. * Hugging Face Spaces: the most popular place\
  \ to host Gradio applications \u2014 for free! * Server mode (`gradio.Server`):\
  \ build a custom frontend with Gradio's backend \u2014 queue, streaming, MCP, ZeroGPU,\
  \ and Spaces hosting included.\n\nWhat's Next?\n\nKeep learning about Gradio sequentially\
  \ using the Gradio Guides, which include explanations as well as example code and\
  \ embedded interactive demos. Next up: let's dive deeper into the Interface class.\n\
  \nOr, if you already know the basics and are looking for something specific, you\
  \ can search the more technical API documentation.\n\nAI Coding Skills\n\nGradio\
  \ provides a \"skill\" that enriches AI coding assistants (like Cursor, Claude Code,\
  \ Codex, etc.) with Gradio-specific knowledge, so that they can build Gradio apps\
  \ more effectively. This is especially useful when creating custom Gradio components\
  \ or styling. Install the Gradio skill for your coding assistant with a single command:\n\
  \nUse `--global` to install at the user level (applies to all projects). Your skill\
  \ will be automatically available for the particular coding agent."
