raw_evidence_excerpt: "an open source, extensible AI agent that goes beyond code suggestions\
  \ - install, execute, edit, and test with any LLM\n\ngoose\n\n_a local, extensible,\
  \ open source AI agent that automates engineering tasks_\n\n<a href=\"https://opensource.org/licenses/Apache-2.0\"\
  \n\n<a href=\"https://discord.gg/goose-oss\"\n\n<a href=\"https://github.com/block/goose/actions/workflows/ci.yml\"\
  \n\ngoose is your on-machine AI agent, capable of automating complex development\
  \ tasks from start to finish. More than just code suggestions, goose can build entire\
  \ projects from scratch, write and execute code, debug failures, orchestrate workflows,\
  \ and interact with external APIs - _autonomously_.\n\nWhether you're prototyping\
  \ an idea, refining existing code, or managing intricate engineering pipelines,\
  \ goose adapts to your workflow and executes tasks with precision.\n\nDesigned for\
  \ maximum flexibility, goose works with any LLM and supports multi-model configuration\
  \ to optimize performance and cost, seamlessly integrates with MCP servers, and\
  \ is available as both a desktop app as well as CLI - making it the ultimate AI\
  \ assistant for developers who want to move faster and focus on innovation.\n\n\
  Quick Links - Quickstart - Installation - Tutorials - Documentation - Governance\
  \ - Custom Distributions - build your own goose distro with preconfigured providers,\
  \ extensions, and branding\n\nNeed Help? - Diagnostics & Reporting - Known Issues\n\
  \na little goose humor \U0001FABF\n\n> Why did the developer choose goose as their\
  \ AI agent? > > Because it always helps them \"migrate\" their code to production!\
  \ \U0001F680\n\ngoose around with us - Discord - YouTube - LinkedIn - Twitter/X\
  \ - Bluesky - Nostr"
