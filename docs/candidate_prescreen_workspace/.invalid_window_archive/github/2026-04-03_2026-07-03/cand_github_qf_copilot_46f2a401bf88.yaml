raw_evidence_excerpt: "The Frontend Stack for Agents & Generative UI. React + Angular.\
  \ Makers of the AG-UI Protocol\n\nCopilotKit\n\nDocs \xB7 Examples \xB7 Copilot\
  \ Cloud \xB7 Discord\n\nBuild **agent-native applications** with generative UI,\
  \ shared state, and human-in-the-loop workflows.\n\n---\n\nWhat is CopilotKit\n\n\
  CopilotKit is a best-in-class SDK for building full-stack agentic applications,\
  \ Generative UI, and chat applications.\n\nWe are the company behind the **AG-UI\
  \ Protocol**, adopted by Google, LangChain, AWS, Microsoft, Mastra, PydanticAI,\
  \ and more!\n\n**Features:**\n\n- **Chat UI** \u2013 A React-based chat interface\
  \ that supports message streaming, tool calls, and agent responses. - **Backend\
  \ Tool Rendering** \u2013 Enables agents to call backend tools that return UI components\
  \ rendered directly in the client. - **Generative UI** \u2013 Allows agents to generate\
  \ and update UI components dynamically at runtime based on user intent and agent\
  \ state. - **Shared State** \u2013 A synchronized state layer that both agents and\
  \ UI components can read from and write to in real time. - **Human-in-the-Loop**\
  \ \u2013 Lets agents pause execution to request user input, confirmation, or edits\
  \ before continuing.\n\nQuick Start\n\nNew projects:\n\nExisting projects:\n\nWhat\
  \ this gives you:\n\n- **CopilotKit installed** \u2013 Core packages are fully set\
  \ up in your app - **Provider configured** \u2013 Context, state, and hooks ready\
  \ to use - **Agent <> UI connected** \u2013 Agents can stream actions and render\
  \ UI immediately - **Deployment-ready** \u2013 Your app is ready to deploy\n\nComplete\
  \ getting started guide \u2192\n\nHow it works:\n\nCopilotKit connects your UI,\
  \ agents, and tools into a single interaction loop.\n\nThis enables:\n\n- Agents\
  \ that ask users for input - Tools that render UI - Stateful workflows across steps\
  \ and sessions\n\n\u2B50\uFE0F useAgent Hook\n\nThe `useAgent` hook is a proper\
  \ superset of `useCoAgent` and sits directly on AG-UI, giving more control over\
  \ the agent connection.\n\nCheck out the useAgent docs to learn more.\n\nGenerative\
  \ UI\n\nGenerative UI is a core CopilotKit pattern that allows agents to dynamically\
  \ render UI as part of their workflow.\n\nCompare the Three Types\n\nExplore:\n\n\
  - Static (AG-UI Protocol) - Declarative (A2UI) - Open-Ended (MCP Apps & Open JSON)\n\
  \nGenerative UI educational repo \u2192\n\n\U0001F5A5\uFE0F AG-UI: The Agent\u2013\
  User Interaction Protocol\n\nConnect agent workflow to user-facing apps, with deep\
  \ partnerships and 1st-party integrations across the agentic stack\u2014including\
  \ LangGraph, CrewAI, and more.\n\n---\n\nLearn more in the AG-UI README \u2192\n\
  \n\U0001F91D Community\n\n- What's New Have questions or need help?\n\nJoin our\
  \ Discord \u2192\n\nRead the Docs \u2192\n\nTry Copilot Cloud \u2192\n\nStay up\
  \ to date with our latest releases!\n\nFollow us on LinkedIn \u2192\n\nFollow us\
  \ on X \u2192\n\n\U0001F64B\U0001F3FD\u200D\u2642\uFE0F Contributing\n\nThanks for\
  \ your interest in contributing to CopilotKit! \U0001F49C\n\nWe value all contributions,\
  \ whether it's through code, documentation, creating demo apps, or just spreading\
  \ the word.\n\nHere are a few useful resources to help you get started:\n\n- For\
  \ code contributions, CONTRIBUTING.md. - For documentation-related contributions,\
  \ check out the documentation contributions guide.\n\n- Want to contribute but not\
  \ sure how? Join our Discord and we'll help you out!\n\n\U0001F4C4 License\n\nThis\
  \ repository's source code is available under the MIT License."
