raw_evidence_excerpt: 'NGINX Agent provides an administrative entry point to remotely
  manage, configure and collect metrics and events from NGINX instances


  F5 NGINX Agent


  F5 NGINX Agent is a companion application designed to efficiently manage NGINX instances.
  Key features include:


  - Remote management: Easily control and configure NGINX instances remotely. - Real-time
  metrics: Monitor and analyze performance data for NGINX and the underlying operating
  system.


  Discover more advanced features and capabilities by visiting Try NGINX One: Free
  Enterprise Trial.


  Installation


  You can install **NGINX Agent** using one of the following methods:


  1. **Official documentation** Follow the step-by-step guide to add and configure
  instances: How to add an instance


  2. **GitHub releases** Download the latest binaries or packages directly from the
  GitHub releases page: NGINX Agent GitHub releases


  3. **Installation and upgrade guide** Access detailed instructions to install or
  upgrade NGINX Agent from the official NGINX documentation: NGINX Agent Installation
  Guide


  Useful links


  * v2 - Official NGINX Agent documentation * v3 - Official NGINX Agent documentation
  * F5 Support


  Community If you have any questions please reach out using the NGINX Community'
