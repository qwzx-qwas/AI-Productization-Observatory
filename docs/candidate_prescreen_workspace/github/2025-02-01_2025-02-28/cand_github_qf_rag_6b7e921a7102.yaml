raw_evidence_excerpt: "Multi AI agents for customer support email automation built\
  \ with Langchain & Langgraph\n\nTitle: Customer Support Email Automation System\
  \ | Langchain/Langgraph Integration Description: Automate customer support emails\
  \ with our system built using Langchain/Langgraph. Features include email categorization,\
  \ query synthesis, draft email creation, and email verification. Keywords: Customer\
  \ support automation, email automation, Langchain, Langgraph, AI email agents, Gmail\
  \ API, Python email automation, email categorization, email verification, AI agents,\
  \ AI tools Author: kaymen99\n\n\U0001F680 **Customer Support Email Automation with\
  \ AI Agents and RAG**\n\n\U0001F4E9 **FULL TUTORIAL: Build AI-Powered Email Automation\
  \ Using AI Agents + RAG!** \U0001F449 Read Now \U0001F3AF\n\n**Introduction**\n\n\
  In today's **fast-paced environment**, customers demand **quick, accurate, and personalized\
  \ responses**\u2014expectations that can overwhelm traditional support teams. Managing\
  \ large volumes of emails, categorizing them, crafting appropriate replies, and\
  \ ensuring quality consumes **significant time and resources**, often leading to\
  \ **delays or errors**, which can harm customer satisfaction.\n\n**Customer Support\
  \ Email Automation** is an **AI solution** designed to enhance **customer communication**\
  \ for businesses. Leveraging a **Langgraph-driven workflow**, multiple **AI agents**\
  \ collaborate to efficiently manage, categorize, and respond to customer emails.\
  \ The system also implements **RAG (Retrieval-Augmented Generation)** technology\
  \ to deliver **accurate responses** to any business or product-related questions.\n\
  \n**Features**\n\n**Email Inbox Management with AI Agents**\n\n- **Continuously\
  \ monitors** the agency's Gmail inbox - **Categorizes emails** into '**customer\
  \ complaint**,' '**product inquiry**,' '**customer feedback**,' or '**unrelated**'\
  \ - **Automatically handles irrelevant emails** to maintain efficiency\n\n**AI Response\
  \ Generation**\n\n- **Quickly drafts emails** for customer complaints and feedback\
  \ using **Langgraph** - Utilizes **RAG techniques** to answer **product/service-related\
  \ questions** accurately - **Creates personalized email content** tailored to each\
  \ customer's needs\n\n**Quality Assurance with AI**\n\n- **Automatically checks**\
  \ email **quality, formatting, and relevance** - **Ensures every response** meets\
  \ high standards before reaching the client\n\n**How It Works**\n\n1. **Email Monitoring**:\
  \ The system **constantly checks** for new emails in the agency's Gmail inbox using\
  \ the **Gmail API**. 2. **Email Categorization**: **AI agents** sort each email\
  \ into **predefined categories**. 3. **Response Generation**: - **For complaints\
  \ or feedback**: The system **quickly drafts** a tailored email response. - **For\
  \ service/product questions**: The system uses **RAG** to retrieve **accurate information**\
  \ from agency documents and generates a response. 4. **Quality Assurance**: Each\
  \ draft email undergoes **AI quality and formatting checks**. 5. **Sending**: **Approved\
  \ emails** are sent to the client **promptly**, ensuring **timely communication**.\n\
  \nSystem Flowchart\n\nThis is the detailed flow of the system:\n\nTech Stack\n\n\
  * Langchain & Langgraph: for developing AI agents workflow. * Langserve: simplify\
  \ API development & deployment (using FastAPI). * Groq and Gemini APIs: for LLMs\
  \ access. * Google Gmail API\n\nHow to Run\n\nPrerequisites\n\n- Python 3.7+ - Groq\
  \ api key - Google Gemini api key (for embeddings) - Gmail API credentials - Necessary\
  \ Python libraries (listed in `requirements.txt`)\n\nSetup\n\n1. **Clone the repository:**\n\
  \n2. **Create and activate a virtual environment:**\n\n3. **Install the required\
  \ packages:**\n\n4. **Set up environment variables:**\n\nCreate a `.env` file in\
  \ the root directory of the project and add your GMAIL address, we are using the\
  \ Groq llama-3.1-70b model and the Google gemini embedding model so you must also\
  \ get API keys to access them:\n\n5. **Ensure Gmail API is enabled:**\n\nFollow\
  \ this guide to enable Gmail API and obtain your credentials.\n\nRunning the Application\n\
  \n1. **Start the workflow:**\n\nThe application will start checking for new emails,\
  \ categorizing them, synthesizing queries, drafting responses, and verifying email\
  \ quality.\n\n2. **Deploy as API:** you can deploy the workflow as an API using\
  \ Langserve and FastAPI by running the command below:\n\nThe workflow api will be\
  \ running on `localhost:8000`, you can consult the API docs on `/docs` and you can\
  \ use the langsergve playground (on the route `/playground`) to test it out.\n\n\
  Customization\n\nYou can customize the behavior of each agent by modifying the corresponding\
  \ methods in the `Nodes` class or the agents prompt `prompts` located in the `src`\
  \ directory.\n\nYou can also add your own agency data into the `data` folder, then\
  \ you must create your own vector store by running (update first the data path):\n\
  \nContributing\n\nContributions are welcome! Please open an issue or submit a pull\
  \ request for any changes.\n\nContact\n\nIf you have any questions or suggestions,\
  \ feel free to contact me at `aymenMir1001@gmail.com`."
