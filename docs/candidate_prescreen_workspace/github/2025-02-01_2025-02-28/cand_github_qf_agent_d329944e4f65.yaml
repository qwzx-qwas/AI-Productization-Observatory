raw_evidence_excerpt: 'A database of SDKs, frameworks, libraries, and tools for creating,
  monitoring, debugging and deploying autonomous AI agents


  :gift: Awesome SDKs For AI Agents


  Welcome to our list of AI agents SDKs. A database of SDKs, frameworks, libraries,
  and tools for creating, monitoring, debugging and deploying autonomous AI agents


  The list is done according to our best knowledge, although definitely not comprehensive.
  Discussion and feedback appreciated! :heart:


  Have anything to add? You have something to add or improve about our list? Do it
  via pull request.


  Who''s behind this? This list is made by the team behind e2b. E2b is building an
  operation system of AI agents - that is, a set of tools, environments, SDKs and
  APIs. E2b is agnostic to your tech stack and aims to work with any tooling for building
  AI agents.


  Join the community - Follow us on Twitter - Join Twitter community for AI agents
  - Join our Discord - Want to discuss anything about AI agents? Schedule a call with
  us


  Feel free to reach out to us at hello@e2b.dev. Check out also our database of AI
  agents.


  E2B E2b is an operating system for AI agents, that is, a set of tools, APIs, and
  cloud environments for agents.


  Links - Web - GitHub - e2b Dashboard - The Agent Protocol - ChatGPT Pluhin - Twitter
  - Vasek Mlejnsky (CEO, founder) - Tomas Valenta (CEO, founder) - Tereza Tizkova
  (Growth & Community) - Jakub Novak (Software Engineer) - Discord


  AgentOps AgentOps create tools to make agents actually work, e.g., graphs, monitoring,
  and replay analytics.


  Links - Web


  Chidori Chidori is a reactive runtime for building AI agents. It provides a framework
  for building AI agents that are reactive, observable, and robust. It supports building
  agents with Node.js, Python, and Rust. It is currently in alpha, and is not yet
  ready for production use.


  Links - Web - GitHub - Discord


  [Fixie]()


  Fixie is a platform for conversational AI that enables to build agents in any language.
  They have their own agent protocol.


  Links - Web


  Helicone An open-source observability platform for GPT-3. Allows to track usage,
  costs, and latency with one line of code.


  Links - Web - GitHub - Linkedin


  Langchain LangChain is a framework designed to simplify the creation of applications
  using large language models.


  Links - Web - GitHub


  Langfuse Langfuse is an open-source analytics for LLM apps. The analytics is currently
  in a closed alph


  Links - Web - GitHub


  LangSmith A unified platform for debugging, testing, evaluating, and monitoring
  LLM applications. LangSmith is now in closed beta.


  Links - Web


  SID


  SID is a YC S23 company that makes data infrastructure for AI easy by letting AI
  devs connect to all of their customer''s data with a single button and API.


  Links - Web - Twitter


  Steamship Steamship is a platform that allows to build, scale, and monitor AI agents
  with serverless cloud hosting, vector search, webhooks, callbacks, and more.


  -


  Links - Web - GitHub - Twitter - Discord


  Vercel AI SDK


  An open source library for building AI-powered user interfaces.


  Links - Web - GitHub'
