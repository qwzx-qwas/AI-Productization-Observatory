raw_evidence_excerpt: "This repo is for the LInkedin Learning course: Build AI Agents\
  \ and Chatbots with LangGraph\n\nBuild AI Agents and Chatbots with LangGraph This\
  \ is the repository for the LinkedIn Learning course `Build AI Agents and Chatbots\
  \ with LangGraph`. The full course is available from [LinkedIn Learning][lil-course-url].\n\
  \nCourse Description\n\nConversational chatbots are growing in popularity, and nearly\
  \ every product or service supports one today. Agentic AI provides capabilities\
  \ that can provide chatbots with higher levels of autonomy and value. In this course,\
  \ instructor Kumaran Ponnambalam helps you to apply agentic AI to build sophisticated\
  \ chatbots that can provide the next generation of self-service. Kumaran takes you\
  \ through the step-by-step process of building a chatbot with agentic capabilities\
  \ using LangChain and LangGraph, and discusses best practices for building agentic\
  \ chatbots.\n\nThis course is integrated with GitHub Codespaces, an instant cloud\
  \ developer environment that offers all the functionality of your favorite IDE without\
  \ the need for any local machine setup. With GitHub Codespaces, you can get hands-on\
  \ practice from any machine, at any time\u2014all while using a tool that you\u2019\
  ll likely encounter in the workplace. Check out \u201CSetting up GitHub Codespaces\"\
  \ with this course to learn how to get started.\n\n[0]: # (Replace these placeholder\
  \ URLs with actual course URLs)\n\n[lil-course-url]: https://www.linkedin.com/learning/build-ai-agents-and-chatbots-with-langgraph\
  \ [lil-thumbnail-url]: https://media.licdn.com/dms/image/v2/D4D0DAQG43w2UoFGhqA/learning-public-crop_675_1200/B4DZSa0e5nG4Ac-/0/1737764237244?e=2147483647&v=beta&t=UXmQzVGx5Bl45kFaiIPMtIv7FGkn5fR8fMOFwfoTF0k"
