raw_evidence_excerpt: 'This repository will contain all the presentations, content,
  hands-on notebooks for a full day Generative AI workshop on Training, Fine-tuning
  Large Language Models for the DataHack Summit 2024 conference.


  Mastering Large Language Models: Training and Fine-Tuning Large Language Models
  Workshop (DHS 2024)


  This repository contains all the presentations and hands-on code notebooks for the
  "Training and Fine-Tuning Large Language Models" workshop held at Analytics Vidhya
  DataHack Summit 2024. The workshop is divided into several modules, each focusing
  on different aspects of working with large language models (LLMs) from prompting
  to fine-tuning


  __Workshop instructor:__ Dipanjan (DJ) Sarkar


  Tools and Frameworks Used


  Server Configuration Setting


  - I have used Runpod with A40 NVIDIA GPUs with 48GB VRAM. - Also the software stack
  used was PyTorch 2.4.0, Python 3.11, CUDA 12.4 and Ubuntu 22.04. - Try to keep the
  stack as similar to prevent library issues.


  Workshop Overview


  This workshop is divided into 5 modules, the following graphic clearly showcases
  what is covered in each module. It is recommended to navigate sequentially through
  each module to get the best experience. Also do go through the presentation decks
  to learn the conceptual aspects of the topics besides trying out the hands-on python
  notebooks.


  __Note:__ For environment setup each module has its own `requirements.ipynb` notebook
  with all the necessary libraries needed to be installed. We use Runpod.io A40 Servers
  which give us a 48GB VRAM GPU which is enough for these experiments. Make sure you
  have a separate disk volume of at least 30GB to store the Llama 3 LLM weight files
  after fine-tuning, else you will get an error.


  Modules Overview


  Module 01: Transformers, LLMs, and Generative AI Essentials


  This module serves as the foundational introduction to Transformers, Foundation
  models, and fine-tuned Large Language Models (LLMs). You''ll learn about both simple
  and contextual embedding models and their applications in real-world scenarios.
  Practical exercises include building a custom search engine and leveraging Transformer-based
  LLMs for tasks such as sentiment analysis, Q&A, summarization, and zero-shot classification.
  A special focus is given to using Microsoft Phi-3 Mini Instruct locally for prompt
  engineering and comparing performance across models like GPT-4o mini and Meta Llama
  3.1 8B.


  - **Module_01_Install_Requirements.ipynb**: A notebook to set up the required environment
  and dependencies for the exercises in this module. - **Module_01_LC1_Simple_Word_Embedding_Models_Solutions.ipynb**:
  Introduction to simple word embedding models, providing hands-on exercises to understand
  their workings. - **Module_01_LC2_Contextual_Embeddings_and_Semantic_Search_Engines_with_Transformers_Solutions.ipynb**:
  Explores the use of contextual embeddings and the implementation of semantic search
  engines using Transformer models. - **Module_01_LC3_Real_World_Applications_with_Fine_tuned_Transformers_Solutions.ipynb**:
  Demonstrates real-world applications of fine-tuned Transformers in various domains,
  such as sentiment analysis, Q&A, and summarization. - **Module_01_LC4_Prompt_Engineering_with_Local_Open_LLMs_Solutions.ipynb**:
  Covers techniques for prompt engineering with locally hosted open-source LLMs like
  Microsoft Phi-3 Mini, including tasks like zero-shot classification and summarization.
  - **Module_01_LC5_BONUS_Comparing_Llama_3_1_vs_GPT_4o_mini_Walkthrough.ipynb**:
  A bonus walkthrough comparing Llama 3.1 and GPT-4o mini models in different tasks
  using prompt engineering.


  ---


  Module 02: Pre-training and Fine-tuning LLMs


  This module dives deep into the processes of pre-training and fine-tuning LLMs.
  You''ll explore the key steps for building LLMs or SLMs (Small Language Models)
  from scratch, with hands-on experience in customizing models like GPT-2 through
  pre-training on unlabeled datasets. The module also covers the process of full fine-tuning
  of pre-trained BERT models for specific tasks like text classification, helping
  you understand the key workflows of adapting LLMs to specialized applications.


  - **Module_02_Install_Requirements.ipynb**: A notebook to install necessary dependencies
  for this module. - **Module_02_LC1_Pre-training_GPT-2_on_Custom_Data_Solutions.ipynb**:
  Hands-on exercise for pre-training GPT-2 on custom datasets, focusing on how LLMs
  can start learning patterns on unsupervised datasets but can still be used to perform
  tasks like Q&A - **Module_02_LC2_Full-fine-tuning_BERT_for_Classification_Solutions.ipynb**:
  Covers the process of fully fine-tuning a BERT model for classification tasks, with
  practical examples.


  ---


  Module 03: Parameter Efficient Fine-tuning of LLMs


  In this module, you''ll learn about Parameter Efficient Fine-Tuning (PEFT) techniques,
  which allow you to fine-tune large language models (LLMs) with fewer resources.
  The module includes practical exercises on fine-tuning a BERT model using PEFT methods
  like QLoRA (Quantized Low-Rank Adaptation) for text classification and named entity
  recognition. You''ll also explore advanced methods like merging and switching LoRA
  adapters on the same model, making your fine-tuning efforts more flexible and efficient.


  - **Module_03_Install_Requirements.ipynb**: A notebook to set up the environment
  for parameter efficient fine-tuning. - **Module_03_LC1_Parameter-Efficient_fine-tuning_BERT_for_Classification_with_QLoRA_Solutions.ipynb**:
  Exercise on paramter efficient fine-tuning BERT for text classification tasks using
  QLoRA, allowing for resource-efficient model adaptation. - **Module_03_LC2_Parameter-Efficient_fine-tuning_BERT_for_Named_Entity_Recognition_QLoRA_Solutions.ipynb**:
  Focuses on using QLoRA for fine-tuning BERT in named entity recognition (NER) tasks,
  demonstrating how to apply parameter-efficient methods to complex NLP tasks. - **Module_03_LC3_Parameter-Efficient_fine-tuning_Switching_LoRA_Adapters_Walkthrough.ipynb**:
  Walkthrough of switching LoRA adapters to demonstrate flexible and efficient model
  fine-tuning across various tasks.


  ---


  Module 04: Instruction Fine-tune LLMs with Supervised Fine-tuning


  This module deep dives into instruction-based fine-tuning of LLMs by leveraging
  Supervised fine-tuning. You''ll start by working on a simple, yet challenging task
  of instruct fine-tuning a TinyLlama 1B SLM for text-to-SQL operations. Then you
  will work step-by-step on building a custom fine-tuned RAG pipeline. You will start
  by leveraging LLMs and prompting to prepare your own labeled datasets for Retrieval-Augmented
  Generation (RAG). Next you will work on fine-tuning your own embedder model using
  your prepared dataset. Then you will fine-tune a Llama 3 LLM on your labeled dataset
  for RAG Q&A response generation using instruction tuning and PEFT. Finally you will
  leverage all these components and build your own end-to-end custom fine-tuned RAG
  pipeline.'
