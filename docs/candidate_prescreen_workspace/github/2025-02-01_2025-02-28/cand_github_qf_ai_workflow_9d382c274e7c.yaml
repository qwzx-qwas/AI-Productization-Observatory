raw_evidence_excerpt: "AI-powered web scraping agent built with LangGraph, LangSmith,\
  \ Firecrawl, and Anthropic AI. Automates intelligent crawling, structured data extraction,\
  \ and LLM-powered content formatting. Efficiently handles anti-bot mechanisms, error\
  \ recovery, and batch processing. \U0001F680\n\n\U0001F680 Scraping Agent AI\n\n\
  An AI-powered **web scraping agent** that automates data extraction from websites\
  \ with intelligent crawling, anti-bot detection, and structured data parsing. Built\
  \ using **LangGraph**, **LangSmith**, **Firecrawl**, and **Anthropic AI tools**\
  \ for seamless AI-driven web scraping and structured data processing.\n\n\U0001F525\
  \ Features - **Graph-based AI Agent**: Uses LangGraph for managing scraping workflows.\
  \ - **Intelligent Web Crawling**: Powered by Firecrawl to extract structured data.\
  \ - **LLM-Powered Formatting**: Uses Anthropic AI for content summarization. - **Adaptive\
  \ Error Handling**: Retries failed requests dynamically. - **Batch Processing**:\
  \ Efficiently processes multiple URLs with batched requests. - **Flexible Output\
  \ Formats**: Supports JSON, Markdown, and more.\n\n---\n\n\U0001F6E0\uFE0F Setup\
  \ Instructions\n\nFollow these steps to set up and run the project on your local\
  \ machine:\n\n1. Clone the Repository\n\n2. Create a Virtual Environment\n\n3. Install\
  \ LangGraph CLI\n\n4. Install Other Dependencies\n\n---\n\n5. Generate LangSmith\
  \ API Key 1. Visit LangSmith. 2. Create an API key for accessing LangSmith logs.\
  \ 3. Copy the generated API key.\n\n---\n\n6. Generate Anthropic Claude API Key\
  \ 1. Visit Anthropic. 2. Create an API key for accessing Claude. 3. Copy the generated\
  \ API key.\n\n---\n\n7. Configure the Environment Variables - Copy the `.env.example`\
  \ file and rename it to `.env`:\n\n- Open the `.env` file and update the API keys\
  \ and configuration values:\n\n8. Run the project\n\n---\n\n9. LangGraph of the\
  \ AI Agent\n\n---\n\n\U0001F4C2 Project Structure\n\n---\n\n\u2B50 Acknowledgments\n\
  \nSpecial thanks to:\n\n- **LangGraph** for building graph-based AI workflows. -\
  \ **LangSmith** for debugging and monitoring AI agents. - **Firecrawl** for powerful\
  \ web crawling and data extraction. - **Anthropic AI** for AI-powered text summarization\
  \ and formatting.\n\n---\n\n\U0001F4DC License\n\nThis project is open-source and\
  \ licensed under the MIT License.\n\n---\n\n\U0001F4E2 Get Involved!\n\nIf you find\
  \ this repository helpful, please consider:\n\n- \u2B50 **Starring the Repository**\
  \ to show your support. - \U0001F4E4 **Forking the Repository** to explore further\
  \ and make your own customizations. - \U0001F4AC **Sharing Your Feedback** by opening\
  \ issues or discussions.\n\n---\n\n\U0001F4DD Notes\n\n**LangGraph**, **LangSmith**,\
  \ **Claude** and **FireCrawl** is currently in limited or preview release (depending\
  \ on your region and timing), and integration details may change as the service\
  \ evolves.\n\nAlways refer to official documentation for the most up-to-date guidance.\n\
  \nLet's build smart, scalable AI-powered web scrapers together! \U0001F680"
