raw_evidence_excerpt: "Discover how to use GitHub Copilot to quickly build a Node.js\
  \ application with OpenAI and Azure\n\n\U0001F916 copilot-openai-todo\n\nThis project\
  \ is an example Todo app implementation, that aims to showcase how to use GitHub\
  \ Copilot to build an AI-powered todo app using Azure OpenAI and Azure Cosmos DB.\n\
  \n**The completed application is located in the completed branch.**\n\nPrerequisites\
  \ - **Node.js v20+** - **Docker v20+** - **Azure account**. If you're new to Azure,\
  \ get an Azure account for free to get free Azure credits to get started. - **Azure\
  \ subscription with access enabled for the Azure OpenAI service**. You can request\
  \ access with this form. * Alternatively, you can use an OpenAI API key instead\
  \ of the Azure OpenAI service.\n\nYou can use GitHub Codespaces to work on this\
  \ project directly from your browser: select the **Code** button, then the **Codespaces**\
  \ tab and click on **Create Codespaces on main**.\n\nYou can also use the Dev Containers\
  \ extension for VS Code to work locally using a ready-to-use dev environment.\n\n\
  After you cloned or opened the project in your dev environment, run the following\
  \ command to install the dependencies:\n\nProject details\n\nThis project is structured\
  \ as monorepo and makes use of NPM Workspaces. It's organized as follows:\n\nHow\
  \ to build the project\n\nThis command will build the client and server packages.\n\
  \nHow to setup deployment\n\nTo provision the resources on Azure and deploy the\
  \ services, we use the Azure Dev CLI.\n\nYou can also provision and deploy the infrastructure\
  \ separately:\n\nHow to run locally\n\nIn order to run the application locally,\
  \ you'll need to setup the following environment variables in a `.env` file at the\
  \ root of the project with the following content:\n\nAs the application rely on\
  \ Azure services for the OpenAI completions and Cosmos DB storage, you'll need to\
  \ provision these resources on Azure first (see How to setup deployment).\n\nThen,\
  \ run the following commands to generate your `.env` file:\n\nOnce your `.env` file\
  \ is ready, you can start the application by running the following command at the\
  \ root of the project:\n\nThis will run both the client and server: - The client\
  \ will be available at http://localhost:4200. - The server will be available at\
  \ http://localhost:3000.\n\nContributing\n\nThis project welcomes contributions\
  \ and suggestions. Most contributions require you to agree to a Contributor License\
  \ Agreement (CLA) declaring that you have the right to, and actually do, grant us\
