title: site-rag
summary: A Chrome extension for asking questions over websites
raw_evidence_excerpt: 'A Chrome extension for asking questions over websites


  Site RAG


  Demo video


  A Chrome extension for asking questions over websites. Site RAG can:


  - Preform one off queries on the current page - Index the current page & persist
  the documents in a vector store. Then preform RAG when generating a response - Index
  an entire site & persist the documents in a vector store. Then preform RAG when
  generating a response


  Site RAG runs 100% locally in your browser, storing all secrets in browser storage.


  You can even connect a locally running Ollama instance to use local LLM inference
  with Site RAG.


  Table of contents


  - Requirements - Setup - Usage - Advanced Setup - FAQ - How to add new LLMs


  Requirements


  For the quickstart (no RAG, only context stuffing) you only need _one_ of the following
  API keys:


  - Anthropic - OpenAI - Google GenAI - Together AI


  And a FireCrawl API key for scraping sites:


  - FireCrawl


  Setup


  First, clone the repository:


  Then, install the dependencies:


  and build:


  Usage


  Once built, go to chrome://extensions/ and click "Load unpacked". From there, select
  the `dist` directory of this repository.


  Once loaded, open the extension and visit the settings page. Here you can add your
  API keys, secrets, and other configuration. Once set, scroll to the bottom and click
  `Save`.


  Then, return to the chat view and ask your first question!


  This will scrape the site you currently have the extension opened on, and use that
  context to answer your question.


  Advanced Setup


  Site RAG also allows for integrating a vector store to persist your indexed documents.
  To do this, you need to create a Supabase database.


  Sign up for a free Supabase account here.


  Next, create a new project and execute this PostgreSQL command to create the necessary
  table and functions:


  After setting up the vector store, you can add your credentials to the settings
  page of the extension.


  FAQ


  What happens if I index the same site twice?


  Site RAG will ask you if you want to delete existing documents before indexing again,
  so you don''t have to worry about duplicates. It deletes documents by URL.


  What is "multi query mode"?


  Multi query mode will generate multiple queries based on your input message, then
  preform a semantic search on each generated query. Finally, using all of the results,
  it will remove duplicates and generate a final response.


  How does retrieval work in followup questions?


  Site RAG preforms retrieval (if you aren''t using context stuffing mode) on each
  request by you. Once documents are retrieved, they are stored in your browser''s
  storage with a `sessionID` tying them to your current chat session. Then, in followup
  questions the context from the most recent question will be included in the system
  prompt, and previous context will be passed as `user` messages before each of your
  previous requests, so the model always has the full context.


  How does context stuff work?


  Context stuff mode will scrape the current page, then store those results in your
  browser''s storage. Then, each time you send a request using context stuffing mode,
  it will include the entire contents of the page in the system prompt.


  How to add new LLMs


  If you want to use additional LLMs which are not included in the default model list,
  you''ll need to update a few things:


  1. Navigate to `constants.ts` and either add the new model ID and name to an existing
  provider list, or create a new provider list. 2. If adding a new provider list,
  ensure you add the proper types for that list below, and include them in the `ALL_MODELS`
  array, and `ALL_MODEL_NAMES` type. 3. The last step is to update the `MODEL_NAME_PROVIDER_MAP`
  by adding the new model ID, and provider name to the map. The provider name must
  be a valid provider which is accepted by `initChatModel`. See docs on `initChatModel`
  for more info here.'
