title: chatdocs
summary: Chatbot for your online documentation.
raw_evidence_excerpt: "Chatbot for your online documentation.\n\nChatDocs\n\nChatDocs\
  \ is an open-source project that enables you to ask questions about your online\
  \ documentation and receive real-time answers.\n\nHow it works:\n\n1. Index your\
  \ documentation \U0001F4DD 2. Deploy the web application \U0001F680 3. Ask questions\
  \ \U0001F914\n\nPrerequisites \U0001F4CB\n\nThis project uses:\n\n- OpenAI for generating\
  \ answers. - Pinecone for indexing the documentation. - Vercel for hosting the web\
  \ application.\n\nBe sure to have an account and your credentials for each of these\
  \ services.\n\n> Ensure you have Node.js and Python 3 installed on your machine.\n\
  \nArchitecture \U0001F3DB\uFE0F\n\nThe project is composed of the following components:\n\
  \n- `webapp`: folder containing the frontend code for the Q&A website. - `crawl.py`:\
  \ Python script to crawl a website and index its content in Pinecone.\n\nGetting\
  \ Started \U0001F680\n\nTo get started with ChatDocs, follow these instructions:\n\
  \nClone the repository\n\nInstall dependencies and setup the project\n\nIt will\
  \ create a Python virtual environment and install the dependencies.\n\nIt will also\
  \ ask your for your **OpenAI** and **Pinecone** credentials.\n\nCustomize the project\n\
  \nEdit `webapp/public/logo.svg` with the logo of your service.\n\nIndex your documentation\n\
  \n- `domain` is your top-level domain (e.g. `stripe.com`). - `url` is the root URL\
  \ of the page you want to index (e.g. `https://stripe.com/docs/atlas/`). In that\
  \ case, the script will crawl all the pages with the following wildcard: `https://stripe.com/docs/atlas/*`.\
  \ - `excludes` (optional) is a list of URLs you want to exclude from the index.\
  \ It can be useful if you want to exclude the homepage or the pricing page.\n\n\
  Running the project locally\n\nOpen a terminal and run:\n\nGo to http://localhost:3000\
  \ to see the website.\n\nDeploy the web application on Vercel\n\n- Go to your dashboard\
  \ and create a new project. - Select `Next.js` as the framework preset. - Select\
  \ `webapp` as the root directory. - Copy the content of `webapp/.env.local` into\
  \ the `Environment Variables` section. - Click on `Deploy` and wait for the deployment\
  \ to finish.\n\nContributing \U0001F9D1\u200D\U0001F4BB\n\nWe welcome contributions\
  \ to ChatDocs! To get started, follow these steps:\n\n- Fork the repository. - Create\
  \ a new branch for your changes. - Make your changes and commit them to your branch.\
  \ - Push your changes to your fork. - Submit a pull request with a detailed description\
  \ of your changes.\n\nContact \U0001F919\n\nIf you have any questions or comments\
  \ about ChatDocs or if you want some help to deploy it for your project, please\
  \ contact us at clement@cthiriet.com.\n\nWe hope you find ChatDocs useful and enjoy\
  \ using it!\n\nCreator \U0001F9D1\U0001F3FC\u200D\U0001F3A8\n\nCreated by Cl\xE9\
  ment Thiriet."
