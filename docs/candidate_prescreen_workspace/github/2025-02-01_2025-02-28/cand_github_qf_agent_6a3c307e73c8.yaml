raw_evidence_excerpt: "AI Travel Planner \U0001F30E\u2708\uFE0F\n\nAn intelligent\
  \ travel planning assistant that helps users plan their trips by finding flights,\
  \ hotels, restaurants, and providing local insights.\n\nFeatures\n\n\U0001F50D Smart\
  \ Travel Search - Single-input natural language processing for travel details -\
  \ Intelligent parsing of dates, locations, and preferences - Real-time flight and\
  \ hotel search - Progress tracking for search operations\n\n\U0001F916 AI-Powered\
  \ Assistants - **Travel Assistant**: Helps with trip planning and itinerary details\
  \ - **Research Assistant**: Provides local insights and restaurant recommendations\
  \ - Restaurant database with vector search capabilities (only enabled for Thailand\
  \ currently) - Integration with search engines for up-to-date information\n\n\U0001F3E8\
  \ Comprehensive Results - Flight options and pricing - Hotel recommendations - Local\
  \ restaurant suggestions with detailed information: - Ratings and reviews - Opening\
  \ hours - Location and contact details - Price ranges - Available services\n\n\U0001F4AC\
  \ Interactive Chat Interface - Natural conversation with AI assistants - Suggested\
  \ prompts for easy starting points - Context-aware responses based on your travel\
  \ plans - Rich formatting for clear information display\n\nTechnical Stack\n\n-\
  \ **Frontend**: Streamlit - **Language Models**: Ollama/Claude - **Vector Store**:\
  \ ChromaDB - **Embeddings**: nomic-embed-text - **Search**: DuckDuckGo API - **Data\
  \ Storage**: JSON + Vector Database - **Web Data (Realtime, Datasets, Scraping)**:\
  \ BrightData\n\nGetting Started\n\n1. **Install Dependencies**\n\n2. **Environment\
  \ Setup**\n\n3. **Initialize the Application**\n\n4. **Run the Backend**\n\nUsage\n\
  \n1. **Enter Travel Details** - Use natural language to describe your trip - Example:\
  \ \"I want to travel to Bangkok from New York from July 1st to July 10th\"\n\n2.\
  \ **View Results** - Check flight options and pricing - Browse hotel recommendations\
  \ - Explore local restaurants\n\n3. **Get Local Insights** - Chat with the Research\
  \ Assistant about local attractions - Get restaurant recommendations - Learn about\
  \ local customs and travel tips"
