raw_evidence_excerpt: "ANIMAT is the first AI platform to integrate MMD and facial\
  \ tracking for dynamic 3D Model, enabling realistic customization and upgrade of\
  \ AgentAI.\n\nAnimatAI A collection of tamagotchi characters to give AI assistants\
  \ an identity.\n\nTamagotchi\n\nThis project is inspired by the classic Tamagotchi\
  \ device, featuring a virtual character drawn with JavaScript. The character can\
  \ be controlled through various buttons, or it can dynamically change based on interactions\
  \ with an AI assistant.\n\nHow to Use:\n\n1. **Manual Mode**: Click on the buttons\
  \ to perform actions. 2. **AI-Controlled Mode**: Connect this with an AI assistant\
  \ to automatically update the character.\n\nFeel free to customize the project,\
  \ or expand it for AI assistant interaction.\n\nAI Characters:\n\nEyes\n\nNotion\n\
  \nCat\n\nPlant\n\nHow to Connect to Chatbot:\n\nCall `setAction` based on the AI\
  \ model\u2019s status or reactions. For example:\n\n- `setAction('curious')` if\
  \ the AI\u2019s response includes a question. - `setAction('excited')` if the response\
  \ shows excitement. - `setAction('speaking')` for general replies.\n\nProject Setup\n\
  \nCompile and Hot-Reload for Development\n\nType-Check, Compile and Minify for Production\n\
  \nLint with ESLint\n\nCheck the demo for more action details."
