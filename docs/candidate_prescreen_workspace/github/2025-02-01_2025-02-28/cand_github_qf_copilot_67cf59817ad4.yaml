raw_evidence_excerpt: 'This extension allows you to interact with the DeepSeek models
  for Github Copilot Chat, fully locally and offline. It uses Ollama under the hood
  to provide a seamless experience.


  DeepSeek Agent for Github Copilot


  This extension allows you to interact with the DeepSeek models for Github Copilot
  Chat, fully locally and offline. It uses Ollama under the hood to provide a seamless
  experience.


  How to use


  1. Install the extension from the Visual Studio Code Marketplace 2. Open Github
  Copilot Chat panel 3. In the chat, type `@deepseek` followed by your prompt


  > [!NOTE] > During the first run, the extension will download the model. This may
  take a few minutes.


  Build from source


  1. Clone this repository 2. Run `npm install` 3. Run `npm run package` 4. Install
  the generated `.vsix` file in Visual Studio Code


  Settings


  You can configure the extension by opening the settings panel (or `settings.json`)
  and editing the following settings:


  > [!NOTE] > You can find a list of available DeepSeek models at ollama.com.


  Limitations


  Currently, the extension does not have access to your files, so it cannot provide
  context-aware completions. This will be fixed in future versions.


  To remedy this, you can copy the code you want to complete and paste it in the chat.


  Requirements


  This extension requires the Ollama app to be installed on your system. You can install
  it by following the instructions from ollama.com.'
