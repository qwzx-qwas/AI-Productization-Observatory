summary: Desktop AI assistant for Windows, Mac and Linux
raw_evidence_excerpt: "Desktop AI assistant for Windows, Mac and Linux\n\nAI Assistant\
  \ Electron\n\nDISCLAIMER\n\nThis project is MAINTAINED but is migrating to premium\
  \ \"Vidy\u0101\" GUI which will be close-sourced.\n\nIf you want to follow and support\
  \ the project, please join our Discord (it's French).\n\nFeatures\n\n1. #### Session\
  \ manager to change account easily, 2. #### Streamer mode to hide your name, mail\
  \ and avatar 3. #### Change assistant (GPT, Copilot, Mistral, more soon) 4. ####\
  \ Custom CSS themes\n\n| OS | Location of folder for CSS themes | |---|---| | Windows\
  \ | `C:\\Users\\{username}\\AppData\\Roaming\\chatgpt-electron` | | macOS | `/Users/{username}/Library/Application\
  \ Support/chatgpt-electron` | | Linux | `/home/{username}/.config/chatgpt-electron`\
  \ |\n\nRequirements\n\n- NodeJS v20 or +\n\nInstallation\n\nGenerate package\n\n\
  This will create a folder (ie: `out/chatgpt-electron-linux-x64`) which contains\
  \ the executable file for your system.\n\nYou can directly run `out/chatgpt-electron-linux-x64/chatgpt-electron`\
  \ or you may want to use it in a \"widget\":\n\nUse on Windows\n\n1. Move the executable\
  \ folder `out/chatgpt-electron-win32-x64` anywhere you like it\n\n2. Run `chatgpt-electron.exe`\
  \ and enjoy!\n\nUse on MacOS\n\n1. Move the executable folder `out/chatgpt-electron-darwin-arm64`\
  \ anywhere you like it\n\n2. Run `chatgpt-electron.app` and enjoy!\n\nUse on Linux\n\
  \n1. Move the executable folder `out/chatgpt-electron-linux-x64` anywhere you like\
  \ it\n\n2. run `chatgpt-electron-linux-x64/chatgpt-electron` and enjoy!\n\nPanel\
  \ shortcut in XFCE\n\nRequirements\n\n- xdotool `apt install xdotool` - wmctrl `apt\
  \ install wmctrl`\n\nTo make a shortcut to open a controlled window from your XFCE\
  \ panel, you need to call your `./open_chatgpt.sh`.\n\nThe goal of `./open_chatgpt.sh`\
  \ is to find the Electron window then resize it at will.\n\nIt works with a `package`\
  \ output and I did NOT tested it with deb and rpm.\n\n1. Right click on your XFCE\
  \ Panel > \"Panel\" > \"Add new items...\"\n\n2. Double-click on \"Launcher\":\n\
  \n3. In the \"Launcher\" window, press the \"+\" button.\n\n4. In the \"Edit Launcher\"\
  \ window, configure the Launcher so the command will open your `open_chatgpt.sh`\
  \ from its path:\n\n5. Optional: Name the shortcut and select an Icon (you can copy\
  \ it from `GPT.svg`)\n\n6. Save, Close, Enjoy!\n\nCredits\n\nThis was made by Axel\
  \ Andaroth (aka Anda Pirate) for personal use with Debian 12 XFCE.\n\nSource is\
  \ open because sharing is caring.\n\nThanks for your support!"
