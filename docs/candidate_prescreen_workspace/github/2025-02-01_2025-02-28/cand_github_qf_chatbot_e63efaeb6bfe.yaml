raw_evidence_excerpt: 'This project is a simple node based React application built
  with React Flow and next.js .


  React Flow live demo


  This project is a simple React application built with React Flow and next.js . It
  demonstrates the implementation of drag and drop nodes with the ability to connect
  them. The state of the nodes and their connections can be saved and restored.


  Features


  1. Drag and drop nodes. 2. Connect nodes by clicking and dragging from one node''s
  edge to another. 3. Clicking on a node selects it, and its label can be modified
  from the sidebar. 4. Clicking anywhere on the pane deselects the selected node.
  5. Save and restore functionality, which saves the current state of the nodes and
  their connections, and can restore the state later.


  Setup and Installation


  First, clone the repository to your local machine:


  Navigate into the project directory:


  Install the project dependencies:


  To start the project in development mode:


  The application should now be running on http://localhost:3000.


  Deployment


  The project can be deployed on any hosting service that supports Node.js applications.
  Examples of such services include Heroku, Vercel, and Netlify. Please refer to the
  respective platform''s documentation for deploying React applications.


  Contributing


  If you want to contribute to this project, you''re always welcome! You can take
  a look at contributing.md.


  Support


  If you are having issues with the project, please let me know. i have an email,
  siddharth0sinha@gmail.com, where you can reach out to me.'
