  License


  MIT


  Troubleshooting


  Common Issues


  1. **Qdrant Connection Error**


  - Check if Docker is running - Verify Qdrant container is running: `docker ps |
  grep qdrant` - Try restarting the container


  2. **Ollama Model Missing**


  - Run: `ollama pull nomic-embed-text` - Verify model is installed: `ollama list`


  3. **Configuration Path Issues** - Windows: Replace `YOUR_USERNAME` with your actual
  Windows username - Check file permissions - Verify the paths exist


  4. **npm Global Install Issues** - Try installing with admin privileges - Check
  npm is in PATH: `npm -v` - Verify global installation: `npm list -g @qpd-v/mcp-server-ragdocs`


  For other issues, please check: - Docker logs: `docker logs $(docker ps -q --filter
  ancestor=qdrant/qdrant)` - Ollama status: `ollama list` - Node.js version: `node
  -v` (should be 16 or higher)


  Contributing


  Contributions are welcome! Please feel free to submit a Pull Request.'
