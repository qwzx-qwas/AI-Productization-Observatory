title: aie-book
summary: '[WIP] Resources for AI engineers. Also contains supporting materials for
  the book AI Engineering (Chip Huyen, 2025)'
raw_evidence_excerpt: "[WIP] Resources for AI engineers. Also contains supporting\
  \ materials for the book AI Engineering (Chip Huyen, 2025)\n\nAI Engineering book\
  \ and other resources > _This repo will be updated with more resources in the next\
  \ few weeks._\n\n- About the book AI Engineering - Table of contents - Chapter summaries\
  \ - Study notes - AI engineering resources - Prompt examples - Case studies - Misalignment\
  \ AI - Appendix - Fun tools:\n\n- ChatGPT and Claude conversation heatmap generator\
  \ - And more ...\n\nAbout the book The availability of foundation models has transformed\
  \ AI from a specialized discipline into a powerful development tool everyone can\
  \ use. This book covers the end-to-end process of adapting foundation models to\
  \ solve real-world problems, encompassing tried-and-true techniques from other engineering\
  \ fields and techniques emerging with foundation models.\n\nThe book is available\
  \ on: - Amazon - O'Reilly - Kindle\n\nand most places where technical books are\
  \ sold.\n\n_This is NOT a tutorial book, so it doesn't have a lot of code snippets._\n\
  \nWhat this book is about This book provides a framework for adapting foundation\
  \ models, which include both large language models (LLMs) and large multimodal models\
  \ (LMMs), to specific applications. It not only outlines various solutions for building\
  \ an AI application but also raises questions you can ask to evaluate the best solution\
  \ for your needs. Here are just some of the many questions that this book can help\
  \ you answer:\n\n1. Should I build this AI application? 1. How do I evaluate my\
  \ application? Can I use AI to evaluate AI outputs? 1. What causes hallucinations?\
  \ How do I detect and mitigate hallucinations? 1. What are the best practices for\
  \ prompt engineering? 1. Why does RAG work? What are the strategies for doing RAG?\
  \ 1. What\u2019s an agent? How do I build and evaluate an agent? 1. When to finetune\
  \ a model? When not to finetune a model? 1. How much data do I need? How do I validate\
  \ the quality of my data? 1. How do I make my model faster, cheaper, and secure?\
  \ 1. How do I create a feedback loop to improve my application continually?\n\n\
  The book will also help you navigate the overwhelming AI landscape: types of models,\
  \ evaluation benchmarks, and a seemingly infinite number of use cases and application\
  \ patterns.\n\nThe content in this book is illustrated using actual case studies,\
  \ many of which I\u2019ve worked on, backed by ample references and extensively\
  \ reviewed by experts from a wide range of backgrounds. Even though the book took\
  \ two years to write, it draws from my experience working with language models and\
  \ ML systems from the last decade.\n\nLike my previous book, _Designing Machine\
  \ Learning Systems (DMLS)_, this book focuses on the fundamentals of AI engineering\
  \ instead of any specific tool or API. Tools become outdated quickly, but fundamentals\
  \ should last longer.\n\nReading _AI Engineering_ (AIE) with _Designing Machine\
  \ Learning Systems_ (DMLS) AIE can be a companion to DMLS. DMLS focuses on building\
  \ applications on top of traditional ML models, which involves more tabular data\
  \ annotations, feature engineering, and model training. AIE focuses on building\
  \ applications on top of foundation models, which involves more prompt engineering,\
  \ context construction, and parameter-efficient finetuning. Both books are self-contained\
  \ and modular, so you can read either book independently.\n\nSince foundation models\
  \ are ML models, some concepts are relevant to working with both. If a topic is\
  \ relevant to AIE but has been discussed extensively in DMLS, it\u2019ll still be\
  \ covered in this book, but to a lesser extent, with pointers to relevant resources.\n\
  \nNote that many topics are covered in DMLS but not in AIE, and vice versa. The\
  \ first chapter of this book also covers the differences between traditional ML\
  \ engineering and AI engineering.\n\nA real-world system often involves both traditional\
  \ ML models and foundation models, so knowledge about working with both is often\
  \ necessary.\n\nWho this book is for\n\nThis book is for anyone who wants to leverage\
  \ foundation models to solve real-world problems. This is a technical book, so the\
  \ language of this book is geared towards technical roles, including AI engineers,\
  \ ML engineers, data scientists, engineering managers, and technical product managers.\
  \ This book is for you if you can relate to one of the following scenarios: * You\u2019\
  re building or optimizing an AI application, whether you\u2019re starting from scratch\
  \ or looking to move beyond the demo phase into a production-ready stage. You may\
  \ also be facing issues like hallucinations, security, latency, or costs, and need\
  \ targeted solutions. * You want to streamline your team\u2019s AI development process,\
  \ making it more systematic, faster, and reliable. * You want to understand how\
  \ your organization can leverage foundation models to improve the business\u2019\
  s bottom line and how to build a team to do so.\n\nYou can also benefit from the\
  \ book if you belong to one of the following groups: * Tool developers who want\
  \ to identify underserved areas in AI engineering to position your products in the\
  \ ecosystem. * Researchers who want to understand better AI use cases. * Job candidates\
  \ seeking clarity on the skills needed to pursue a career as an AI engineer. * Anyone\
  \ wanting to better understand AI's capabilities and limitations, and how it might\
  \ affect different roles.\n\nI love getting to the bottom of things, so some sections\
  \ dive a bit deeper into the technical side. While many early readers like the detail,\
  \ I know it might not be for everyone. I\u2019ll give you a heads-up before things\
  \ get too technical. Feel free to skip ahead if it feels a little too in the weeds!\n\
  \nReviews - _\"This book offers a comprehensive, well-structured guide to the essential\
  \ aspects of building generative AI systems. A must-read for any professional looking\
  \ to scale AI across the enterprise.\"_ - Vittorio Cretella, former global CIO at\
  \ P&G and Mars\n\n- _\"Chip Huyen gets generative AI. She is a remarkable teacher\
  \ and writer whose work has been instrumental in helping teams bring AI into production.\
  \ Drawing on her deep expertise, AI Engineering is a comprehensive and holistic\
  \ guide to building generative AI applications in production.\"_ - Luke Metz, co-creator\
  \ of ChatGPT, ex-research manager @ OpenAI\n\n- _\"Every AI engineer building real-world\
  \ applications should read this book. It\u2019s a vital guide to end-to-end AI system\
  \ design, from model development and evaluation to large-scale deployment and operation.\"\
  _ - Andrei Lopatenko, Director Search and AI, Neuron7\n\n- _\"This book serves as\
  \ an essential guide for building AI products that can scale. Unlike other books\
  \ that focus on tools or current trends that are constantly changing, Chip delivers\
  \ timeless foundational knowledge. Whether you're a product manager or an engineer,\
  \ this book effectively bridges the collaboration gap between cross-functional teams,\
  \ making it a must-read for anyone involved in AI development.\"_ - Aileen Bui,\
  \ AI Product Operations Manager, Google\n\n- _\"This is the definitive segue into\
  \ AI Engineering from one of the greats of ML Engineering! Chip has seen through\
  \ successful projects and careers at every stage of a company and for the first\
  \ time ever condensed her expertise for new AI Engineers entering the field.\"_\
  \ - swyx, Curator, AI.Engineer\n\n- _\"AI Engineering is a practical guide that\
  \ provides the most up-to-date information on AI development, making it approachable\
  \ for novice and expert leaders alike. This book is an essential resource for anyone\
  \ looking to build robust and scalable AI systems.\"_ - Vicki Reyzelman, Chief AI\
  \ Solutions Architect, Mave Sparks\n\n- _\"AI Engineering is a comprehensive guide\
  \ that serves as an essential reference for both understanding and implementing\
  \ AI systems in practice.\"_ - Han Lee, Director - Data Science, Moody's."
