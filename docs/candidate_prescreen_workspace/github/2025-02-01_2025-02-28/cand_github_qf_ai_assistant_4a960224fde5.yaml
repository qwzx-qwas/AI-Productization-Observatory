raw_evidence_excerpt: "A Model Context Protocol (MCP) Server for https://joplinapp.org/\
  \ that enables note access through the https://modelcontextprotocol.io. Perfect\
  \ for integration with AI assistants like Claude.\n\n\U0001F4DD Joplin MCP Server\n\
  \nA Model Context Protocol (MCP) Server for Joplin that enables note access through\
  \ the Model Context Protocol. Perfect for integration with AI assistants like Claude.\n\
  \n\u2728 Features\n\n- \U0001F50D **Search Notes**: Full-text search across all\
  \ notes - \U0001F4D6 **Read Notes**: Retrieve individual notes - \u270F\uFE0F **Edit\
  \ Notes**: Create new notes and update existing ones - \U0001F5D1\uFE0F **Delete\
  \ Notes**: Move notes to trash or delete permanently - \U0001F4E5 **Markdown Import**:\
  \ Import markdown files as notes - \U0001F916 **AI Integration**: Seamless integration\
  \ with Claude and other MCP-capable AI assistants\n\n\U0001F680 Installation\n\n\
  Prerequisites\n\n- Python 3.10 or higher - Joplin Desktop with Web Clipper Service\
  \ enabled - uv (Python package manager)\n\nuv pip install -e .\n\nJOPLIN_TOKEN=your_api_token_here\n\
  \n{ \"mcpServers\": { \"joplin\": { \"command\": \"/PATH/TO/UV/uv\", \"args\": [\
  \ \"--directory\", \"/PATH/TO/YOUR/PROJECT/joplin_mcp\", \"run\", \"src/mcp/joplin_mcp.py\"\
  \ ] } } }\n\nMCP_LOG_LEVEL=debug mcp dev src/mcp/joplin_mcp.py"
