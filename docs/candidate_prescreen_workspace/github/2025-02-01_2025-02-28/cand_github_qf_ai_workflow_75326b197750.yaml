  \nWebsite | Documentation\n\nSystemPrompt MCP Notion Server\n\nA high-performance\
  \ Model Context Protocol (MCP) server that seamlessly integrates Notion into your\
  \ AI workflows. This server enables AI agents to interact with Notion pages and\
  \ databases through a standardized protocol. This server supports and requires MCP\
  \ Sampling, which is required to the MCP to create and update Notion pages.\n\n\
  A compatible MCP client is available here.\n\nServer Capabilities\n\nKey Features\n\
  \n- **\U0001F4DD Comprehensive Content Management**\n\n- Create and update pages\
  \ with rich text formatting - Search across your Notion workspace\n\n- **\U0001F6E0\
  \ Developer-Friendly** - Extensive test coverage with Jest - TypeScript support\
  \ - Comprehensive error handling - Detailed logging and debugging tools\n\nPrerequisites\n\
  \nBefore using this server, you'll need:\n\n1. **Systemprompt API Key** (Free)\n\
  \n- Sign up at systemprompt.io/console - Create a new API key in your dashboard\n\
  \n2. **Notion Account and Workspace**\n\n- Active Notion account - Workspace with\
  \ content you want to access\n\n3. **Notion Integration**\n\n- Create at notion.so/my-integrations\
  \ - Required capabilities: - Read/Update/Insert content - Database management -\
  \ Search functionality\n\n4. **MCP-Compatible Client** - Systemprompt MCP Client\
