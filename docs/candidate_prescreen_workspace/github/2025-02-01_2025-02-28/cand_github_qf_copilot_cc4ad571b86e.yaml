raw_evidence_excerpt: 'SQL and AI Workshop


  SQL AI Workshop


  Introduction


  This workshop is designed to help you get started with SQL AI. The workshop is divided
  into eight modules, each of which is designed to help you learn about SQL AI and
  how to use it in your applications.


  Pre-requisites


  In order to complete exercises in this workshop that are part of demos or specific
  lab steps you will need:


  - An Azure subscription with a minimum Contributor role. - You will need access
  to deploy an Azure OpenAI Service. - You will need access to deploy an Azure SQL
  Database. - Your tenant will need to have Copilot for Azure enabled. See more at
  https://aka.ms/sqlcopilot. - SQL Server Management Studio (SSMS) which you can download
  at https://aka.ms/ssms. We recommend the latest SSMS version. - The ability to run
  a Python based notebook. - To run any Fabric exercise you will need access to a
  Microsoft Fabric account. You can use a free trial from Microsoft Fabric.


  Slides


  This workshop comes with a PowerPoint slide deck that is used to teach the workshop.
  You can find the deck in the **slides** folder.


  To learn more about each module click on any Module below.


  **Module 1 - SQL and AI Fundamentals**


  **Module 2 - AI Models**


  **Module 3 - SQL and AI Services**


  **Module 4 - Vector Search and RAG Patterns**


  **Module 5 - Content Safety**


  **Module 6 - AI Frameworks**


  **Module 7 - Copilots**


  **Module 8 - Microsoft Fabric**


  Summary


  Getting Started To begin the lab, clone this repository and follow the instructions
  in each section.


  Contributing Contributions to this lab are welcome! Please create a PR for any contributions.


  License This lab is provided under the MIT License. See the `LICENSE` file for more
  details.


  Acknowledgments A special thanks to all the contributors and maintainers of this
  lab.


  Contact For any queries or feedback regarding the lab, please open an issue in this
  repository or contact the lab maintainers directly.


  Happy coding and learning!'
