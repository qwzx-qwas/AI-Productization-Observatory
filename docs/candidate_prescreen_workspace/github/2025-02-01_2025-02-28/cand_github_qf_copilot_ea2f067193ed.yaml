summary: Ask LLM directly from your terminal
raw_evidence_excerpt: 'Ask LLM directly from your terminal


  shell-ask


  ---


  **Shell Ask is sponsored by ChatWise, a free chat app for ChatGPT and many other
  models.**


  Install


  This requires Node.js to be installed.


  Supported LLMs


  - OpenAI - Anthropic Claude - Ollama - Google Gemini - Groq - GitHub Copilot Chat


  Configuration


  Minimal config to use OpenAI, create a `~/.config/shell-ask/config.json` with the
  following content:


  Check out config documentation for more.


  Usage


  Ask a question:


  Using command output as context:


  Interactively select a model:


  Select a model by id:


  Prompt without quotes:


  Piping


  You can pipe the output of other programs to `ask`, for example you can use `cat`
  to add file contents to the LLM context:


  If you want to add multiple files, especially when you also want to include filenames
  in the context, you can use `--files` flag to add files into model context:


  Ask Follow-up Questions


  Using `-r` or `--reply` flag to ask follow-up questions to the previous answer:


  Result Type


  Command


  Using `-c` or `--command` flag to enforce the output to be a command only:


  Using `-b` or `--breakdown` flag to return a command and the breakdown of the command:


  Custom Type


  Define the type of the result using `-t` or `--type` flag:


  Copilot Chat


  First you need to login to Copilot Chat:


  Then you can ask questions:


  To log out, run `ask copilot-logout`.


  Web Search


  Enable web search by using `-s` or `--search` flag:


  Web search is powered by https://s.jina.ai


  Fetching Web Pages


  For a single page, you can just use `curl`:


  For multiple pages, you can use `-u` or `--url` flag:


  You may only need the markdown output of the web page, you can use https://r.jina.ai
  to retrive markdown content instead:


  Disable Streaming Output


  Using `--no-stream` flag to disable streaming output:


  When `--no-stream` is enabled the output markdown will have proper syntax highlighting,
  when streaming is enabled the output will be plain text because the terminal have
  trouble clearing the screen when the output is too long


  Reusable AI Commands


  Shell Ask allows you to define reusable AI commands in the config file, for example
  the builtin `ask cm` command:


  Built-in AI Commands


  - `ask cm`: Generate git commit message from stdin - example: `git diff | ask cm`


  License


  MIT.'
