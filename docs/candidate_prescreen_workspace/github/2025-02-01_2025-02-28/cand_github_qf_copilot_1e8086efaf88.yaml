raw_evidence_excerpt: "Repository to Assist Trainers during the Copilot for Developers\
  \ - Intermediate Training\n\nGitHub Copilot Intermediate Training Repository\n\n\
  Introduction\n\n:bulb: This repository is designed to support engineers and trainers\
  \ in delivering **GitHub Copilot Intermediate Training demonstrations**. The exercises\
  \ included here aim to illustrate real-world scenarios where Copilot and Copilot\
  \ Chat can significantly improve development workflows.\n\nWhether you're a trainer\
  \ facilitating this session or an engineer participating in the training, this repository\
  \ provides the materials and guidance needed to effectively engage with Copilot\
  \ and Copilot Chat.\n\n---\n\nOverview\n\nGitHub Copilot is a powerful tool that\
  \ can streamline your coding process, offering context-aware code suggestions and\
  \ interactive assistance through Copilot Chat. However, its true potential lies\
  \ in how effectively you can **interact with and guide** it.\n\nThis repository\
  \ covers: - **Real-world scenarios** to showcase Copilot\u2019s and Copilot Chat\u2019\
  s strengths. - **Hands-on demos** focused on Repository Analysis, Enhancement Recommendations,\
  \ and Level of Effort (LOE) Estimations. - Tips for trainers to facilitate meaningful\
  \ and impactful demonstrations.\n\nThe repository is divided into individual exercises\
  \ that highlight specific use cases for Copilot and Copilot Chat, providing participants\
  \ with an immersive and practical learning experience.\n\n---\n\nObjectives of This\
  \ Repository\n\nBy the end of this training, participants will: - Gain a deeper\
  \ understanding of **GitHub Copilot** and **Copilot Chat** workflows. - Explore\
  \ the power of **prompt engineering** to guide Copilot effectively. - Learn how\
  \ to evaluate codebases, enhance functionality, and estimate development effort.\
  \ - Build confidence in leveraging Copilot for complex, real-world tasks.\n\nFor\
  \ trainers, this repository offers structured guidance to **deliver engaging demonstrations**\
  \ that showcase Copilot\u2019s impact.\n\n---\n\nDemos Included\n\nThis repository\
  \ contains two detailed demonstrations, each with its own README file:\n\n1. **Demo\
  \ 1: Repository Analysis and Enhancements** - **Objective:** Leverage Copilot and\
  \ Copilot Chat to analyze the VS Code repository, enhance its logging mechanisms,\
  \ and estimate the Level of Effort (LOE) for proposed improvements. - **Key Focus\
  \ Areas:** Repository Analysis with @workspace, logging enhancements, and LOE estimation.\n\
  \nRead the Demo 1 Instructions\n\n---\n\n2. **Demo 2: Building Utilities and Unit\
  \ Tests** - **Objective:** Implement a utility function, generate unit tests, and\
  \ refactor code using GitHub Copilot\u2019s AI-driven suggestions. - **Key Focus\
  \ Areas:** Writing new functionality, creating robust tests, and improving code\
  \ readability through refactoring.\n\nRead the Demo 2 Instructions\n\n---\n\nPrerequisites\n\
  \nTo get started, ensure you have the following: - **GitHub Account**: Required\
  \ for accessing repositories and enabling Copilot. - **Visual Studio Code**: Your\
  \ IDE of choice for this workshop. - **GitHub Copilot & Copilot Chat Extensions**:\
  \ Installed and enabled in VS Code. - Familiarity with basic development workflows,\
  \ including GitHub and VS Code.\n\n---\n\nGetting Started\n\n1. Clone this repository:"
