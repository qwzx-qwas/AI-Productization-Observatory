  To select an algorithm, pass `--algo=ppo/mappo/happo/hatrpo/...` as an argument.
  For example, if you want to use happo algorithm, run this line in `bidexhands` folder:


  Supported Single-Agent RL algorithms are listed below:


  - Proximal Policy Optimization (PPO) - Trust Region Policy Optimization (TRPO) -
  Twin Delayed DDPG (TD3) - Soft Actor-Critic (SAC) - Deep Deterministic Policy Gradient
  (DDPG)


  Supported Multi-Agent RL algorithms are listed below:


  - Heterogeneous-Agent Proximal Policy Optimization (HAPPO) - Heterogeneous-Agent
  Trust Region Policy Optimization (HATRPO) - Multi-Agent Proximal Policy Optimization
  (MAPPO) - Independent Proximal Policy Optimization (IPPO) - Multi-Agent Deep Deterministic
  Policy Gradient (MADDPG)


  Multi-task/Meta RL Examples'
