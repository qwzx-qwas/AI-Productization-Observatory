raw_evidence_excerpt: "Integrating AI into every workflow with our open-source, no-code\
  \ platform, powered by the actor model for dynamic, graph-based solutions.\n\nHomepage\
  \ | Examples | Discord\n\nCraftgen.ai: Open-source AI agent platform with intuitive\
  \ workflows, graph-based solutions, agent capabilities, model management, and real-time\
  \ monitoring for fast prototyping to production. Key features include:\n\n**1. Workflow**:\
  \ Build and test powerful AI workflows on a visual canvas, leveraging all the following\
  \ features and beyond.\n\n**2. Comprehensive model support**: Seamless integration\
  \ with hundreds of proprietary / open-source LLMs from dozens of inference providers\
  \ and self-hosted solutions, covering GPT, Mistral, Llama3, Ollama and any OpenAI\
  \ API-compatible models.\n\n**3. Agent capabilities**: You can define agents based\
  \ on LLM Function Calling or ReAct, and add pre-built or custom tools for the agent.\
  \ Or you can create tools on demand.\n\nWhat is CraftGen?\n\nCraftgen.ai is an AI\
  \ platform designed for both technical and non-technical users. Built on a scalable\
  \ graph architecture and the Actor Model, it allows users to customize AI components\
  \ to fit their needs.\n\nThe platform features an event-driven architecture for\
  \ reliable data processing and universal access via web technologies. It supports\
  \ dynamic tool and workflow generation, with offline capabilities for secure environments\
  \ and plans for desktop integration.\n\nCraftgen.ai uses JSON schema for industry-standard\
  \ alignment, enabling seamless integration with any API following the OpenAPI spec.\
  \ This allows for a broad range of applications, from automating data analysis to\
  \ streamlining content management.\n\nThe platform is designed to bridge the gap\
  \ between advanced AI technology and practical usability. It's a flexible, secure,\
  \ and intuitive platform that empowers users, from developers seeking to create\
  \ custom AI solutions to businesses looking to automate routine tasks. Craftgen.ai's\
  \ goal is to make AI technology an integral, seamless part of everyday problem-solving\
  \ and innovation, providing a platform where modular AI and a thriving marketplace\
  \ converge to meet the diverse needs of its users.\n\nFeature comparison\n\nFeature\
  \ CraftGen LangChain Flowise OpenAI Assistants API\n\nProgramming Approach API +\
  \ App-oriented Python Code App-oriented API-oriented\n\nSupported LLMs Rich Variety\
  \ Rich Variety Rich Variety OpenAI-only\n\nRAG Engine \u2705 \u2705 \u2705 \u2705\
  \n\nAgent \u2705 \u2705 \u274C \u2705\n\nWorkflow \u2705 \u274C \u2705 \u274C\n\n\
  Observability \u2705 \u2705 \u274C \u274C\n\nCode Interpreter \u2705 \u274C \u274C\
  \ \u274C\n\nLocal Deployment \u2705 \u2705 \u2705 \u274C\n\nStaying ahead\n\nStar\
  \ CraftGen on GitHub and be instantly notified of new releases.\n\n> **Note:** >\
  \ This project is a dynamic work in progress, evolving in the open. Stay updated\
  \ with our journey on Twitter @CraftgenAI.\n\nStuck? Got Questions? We're Here!\n\
  \nHit a snag? Pondering how to start? Reach out on Discord. We're all ears and ready\
  \ to assist."
