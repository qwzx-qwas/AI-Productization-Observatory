title: LLM-Agent-Survey
summary: ''
raw_evidence_excerpt: "A Survey on LLM-based Autonomous Agents\n\nAutonomous agents\
  \ are designed to achieve specific objectives through self-guided instructions.\
  \ With the emergence and growth of large language models (LLMs), there is a growing\
  \ trend in utilizing LLMs as fundamental controllers for these autonomous agents.\
  \ While previous studies in this field have achieved remarkable successes, they\
  \ remain independent proposals with little effort devoted to a systematic analysis.\
  \ To bridge this gap, we conduct a comprehensive survey study, focusing on the construction,\
  \ application, and evaluation of LLM-based autonomous agents. In particular, we\
  \ first explore the essential components of an AI agent, including a profile module,\
  \ a memory module, a planning module, and an action module. We further investigate\
  \ the application of LLM-based autonomous agents in the domains of natural sciences,\
  \ social sciences, and engineering. Subsequently, we delve into a discussion of\
  \ the evaluation strategies employed in this field, encompassing both subjective\
  \ and objective methods. Our survey aims to serve as a resource for researchers\
  \ and practitioners, providing insights, related references, and continuous updates\
  \ on this exciting and rapidly evolving field.\n\n**\U0001F4CD This is the first\
  \ released and published survey paper in the field of LLM-based autonomous agents.**\n\
  \nPaper link: A Survey on Large Language Model based Autonomous Agents\n\nUpdate\
  \ Records - \U0001F525 [25/3/2024] Our survey paper has been accepted by Frontiers\
  \ of Computer Science, which is the first published survey paper in the field of\
  \ LLM-based agents.\n\n- \U0001F525 [9/8/2023] The second version of our survey\
  \ has been released on arXiv.\n\nUpdated contents\n\n- **\U0001F4DA Additional References**\
  \ - We have added 31 new works until 9/1/2023 to make the survey more comprehensive\
  \ and up-to-date.\n\n- **\U0001F4CA New Figures** - **Figure 3:** This is a new\
  \ figure illustrating the differences and similarities between various planning\
  \ approaches. This helps in gaining a clearer understanding of the comparisons between\
  \ different planning methods.\n\n- **Figure 4:** This is a new figure that describes\
  \ the evolutionary path of model capability acquisition from the \"Machine Learning\
  \ era\" to the \"Large Language Model era\" and then to the \"Agent era.\" Specifically,\
  \ a new concept, \"mechanism engineering,\" has been introduced, which, along with\
  \ \"parameter learning\" and \"prompt engineering,\" forms part of this evolutionary\
  \ path.\n\n- **\U0001F50D Optimized Classification System** - We have slightly modified\
  \ the classification system in our survey to make it more logical and organized.\n\
  \n- \U0001F525 [8/23/2023] The first version of our survey has been released on\
