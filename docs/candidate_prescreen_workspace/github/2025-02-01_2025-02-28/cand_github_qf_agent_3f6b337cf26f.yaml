title: awesome-ai-agents
summary: A list of AI autonomous agents
raw_evidence_excerpt: "A list of AI autonomous agents\n\nTBD: - Add to visual:\n\n\
  - LLM Stack - Promptly - Devon - vortic ai - UFO - GPT Swarm - Eidolon - NexusGPT\
  \ - Brain Soup - L2MAC\n\nAdd to readme list: - Codeium - tinybio - Semantix AI\
  \ Agents - add when they have english version - NoteWizard - only if it's AI agent\
  \ - TBD test - Postbot (TBD - check more)\n\n\U0001F52E Awesome AI Agents\n\nAdd\
  \ Code Interpreter to your AI App\n\n\U0001F31F See this list in web UI \U0001F449\
  \ Submit new product here\n\nWelcome to our list of AI agents. We structured the\
  \ list into two parts: - Open source projects - Closed-source projects and companies\n\
  \nTo filter the products by categories and use-cases, see the \U0001F31F web version\
  \ of this list. \U0001F31F\n\nThe list is done according to our best knowledge,\
  \ although definitely not comprehensive. Check out also the Awesome List of SDKs\
  \ for AI Agents . Discussion and feedback appreciated! :heart:\n\nHave anything\
  \ to add? Create a pull request or fill in this form. Please keep the alphabetical\
  \ order and in the correct category.\n\nFor adding AI agents'-related SDKs, frameworks\
  \ and tools, please visit Awesome SDKs for AI Agents. This list is only for AI assistants\
  \ and agents.\n\nWho's behind this? This list is made by the team behind e2b. E2b\
  \ is building AWS for AI agents. We help developers to deploy, test, and monitor\
  \ AI agents. E2b is agnostic to your tech stack and aims to work with any tooling\
  \ for building AI agents.\n\nCheck out E2B - Code Interpreting for AI apps - Check\
  \ out Code Interpreter SDK - Explore examples in E2B Cookbook - Read our docs -\
  \ Contact us at hello@e2b.dev or on Discord. Follow us on X (Twitter)\n\nOpen-source\
  \ projects\n\nAdala Adala: Autonomous Data (Labeling) Agent framework\n\nCategory\
  \ General purpose, Build your own, Multi-agent\n\nDescription\n\n- **Reliable agents**:\
  \ Built on ground truth data for consistent, trustworthy results. - **Controllable\
  \ output**: Tailor output with flexible constraints to fit your needs. - **Specialized\
  \ in data processing**: Agents excel in custom data labeling and processing tasks.\
  \ - **Autonomous learning**: Agents evolve through observations and reflections,\
  \ not just automation. - **Flexible and extensible runtime**: Adaptable framework\
  \ with community-driven evolution for diverse needs. - **Easily customizable**:\
  \ Develop agents swiftly for unique challenges, no steep learning curve.\n\nLinks\
  \ - Documentation - Discord - GitHub\n\nAgent4Rec Recommender system simulator with\
  \ 1,000 agents\n\nCategory General purpose, Build your own, Multi-agent\n\nDescription\
  \ - Agent4Rec is a recommender system simulator that utilizes 1,000 LLM-empowered\
  \ generative agents. - These agents are initialized from the MovieLens-1M dataset,\
  \ embodying varied social traits and preferences. - Each agent interacts with personalized\
  \ movie recommendations in a page-by-page manner and undertakes various actions\
  \ such as watching, rating, evaluating, exiting, and interviewing.\n\nLinks - Paper\n\
  \nAgentForge LLM-agnostic platform for agent building & testing\n\nCategory General\
  \ purpose, Build your own, Multi-agent\n\nDescription - A low-code framework designed\
  \ for the swift creation, testing, and iteration of AI-powered autonomous agents\
  \ and Cognitive Architectures, compatible with various LLM models. - Facilitates\
  \ building custom agents and cognitive architectures with ease. - Supports multiple\
  \ LLM models including OpenAI, Anthropic's Claude, and local Oobabooga, allowing\
  \ flexibility in running different models for different agents based on specific\
  \ requirements. - Provides customizable agent memory management and on-the-fly prompt\
  \ editing for rapid development and testing. - Comes with a database-agnostic design\
  \ ensuring seamless extensibility, with straightforward integration with different\
  \ databases like ChromaDB for various AI projects.\n\nLinks - GitHub - Web - Discord\
  \ - X\n\nAgentGPT Browser-based no-code version of AutoGPT\n\nCategory General purpose\n\
  \nDescription - A no-code platform - Process: - Assigning a goal to the agent -\
  \ Witnessing its thinking process - Formulation of an execution plan - Taking actions\
  \ accordingly - Uses OpenAI functions - Supports gpt-3.5-16k, pinecone and pg_vector\
  \ databases - Stack - Frontend: NextJS + Typescript - Backend: FastAPI + Python\
  \ - DB: MySQL through docker with the option of running SQLite locally\n\nFeatures\
  \ - Uses OpenAI **functions** - Supports gpt-3.5-16k, pinecone and pg_vector databases\n\
  \nStack - Frontend: NextJS + Typescript - Backend: FastAPI + Python - DB: MySQL\
  \ through docker with the option of running SQLite locally\n\nLinks - Documentation\
  \ - Website - GitHub\n\nAgentPilot Build, manage, and chat with agents in desktop\
  \ app\n\nCategory General purpose\n\nDescription\n\n- Integrated into Open Interpreter\
  \ and MemGPT - Group chats feature\n\nLinks - GitHub - X -\n\nAgents\n\nLibrary/framework\
  \ for building language agents\n\nCategory General purpose, Build your own, Multi-agent\n\
  \nDescription - **Long-short Term Memory**: Language agents in the library are equipped\
  \ with both long-term memory implemented via VectorDB + Semantic Search and short-term\
  \ memory (working memory) maintained and updated by an LLM. - **Tool Usage**: Language\
  \ agents in the library can use any external tools via function-calling and developers\
  \ can add customized tools/APIs here. - **Web Navigation**: Language agents in the\
  \ library can use search engines to navigate the web and get useful information.\
  \ - **Multi-agent Communication**: In addition to single language agents, the library\
  \ supports building multi-agent systems in which language agents can communicate\
  \ with other language agents and the environment. Different from most existing frameworks\
  \ for multi-agent systems that use pre-defined rules to control the order for agents'\
  \ action, **Agents** includes a _controller_ function that dynamically decides which\
  \ agent will perform the next action using an LLM by considering the previous actions,\
  \ the environment, and the target of the current states. This makes multi-agent\
  \ communication more flexible. - **Human-Agent interaction**: In addition to letting\
  \ language agents communicate with each other in an environment, our framework seamlessly\
  \ supports human users to play the role of the agent by himself/herself and input\
  \ his/her own actions, and interact with other language agents in the environment.\
  \ - **Symbolic Control**: Different from existing frameworks for language agents\
  \ that only use a simple task description to control the entire multi-agent system\
  \ over the whole task completion process, **Agents** allows users to use an **SOP\
  \ (Standard Operation Process)** that defines subgoals/subtasks for the overall\
  \ task to customize fine-grained workflows for the language agents.\n\nLinks - Author:\
  \ AIWaves Inc. - Paper - GitHub Repository - Documentation - Tweet\n\nAgentVerse\
  \ Platform for task-solving & simulation agents\n\nCategory General purpose, Build\
  \ your own, Multi-agent\n\nDescription - Assembles multiple agents to collaboratively\
  \ accomplish tasks. - Allows custom environments for observing or interacting with\
  \ multiple agents.\n\nLinks - Paper: AgentVerse: Facilitating Multi-Agent Collaboration\
  \ and Exploring Emergent Behaviors - Twitter - Discord - Hugging Face\n\nAI Legion\
  \ Multi-agent TS platform, similar to AutoGPT\n\nCategory Multi-agent, Build-your-own\n\
  \nDescription - An LLM-powered autonomous agent platform - A framework for autonomous\
  \ agents who can work together to accomplish tasks - Interaction with agents done\
  \ via console direct messages\n\nLinks - Author: eumemic - Website - GitHub - Twitter\n\
  \nAider Use command line to edit code in your local repo\n\nCategory Coding, GitHub"
