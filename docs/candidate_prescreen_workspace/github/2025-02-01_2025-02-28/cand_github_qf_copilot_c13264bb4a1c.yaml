raw_evidence_excerpt: "About the Arm & GitHub Partnership\n\nThis ground\u2013breaking\
  \ partnership between Arm & GitHub unites the world\u2019s most ubiquitous compute\
  \ platform with the world\u2019s largest developer platform.\n\nTogether we are\
  \ revolutionizing the software development experience for developers \u2013 enabling\
  \ them to write once and deploy everywhere.\n\nArm is GitHub\u2019s 2024 Overall\
  \ Technology Partner of the Year!\n\nThis award highlights our achievements with\
  \ Arm-based runners for GitHub Actions and sets the stage for future innovations\
  \ in MLOps and Copilot. We're excited to keep working closely together with GitHub\
  \ to drive unmatched performance and efficiency across any device, anywhere.\n\n\
  Watch the Arm\u2019s Mainstage talk @ GitHub Universe \u201824\n\nIntegration Details\n\
  \nTogether with GitHub we have built the following integrations:\n\n1. **Native\
  \ Arm Runners for GitHub Actions**:\n\nThe GitHub Arm-hosted runners offer significant\
  \ benefits for developers:\n\nNative performance: Execute your build and test cycles\
  \ directly on Arm Neoverse-based processors. This eliminates the overhead and complexities\
  \ tied to instruction emulation and cross-compilation. Integrated Workflow: Experience\
  \ a seamless integration within the familiar GitHub Actions environment, making\
  \ your development process more straightforward. Cost-effectiveness: Enjoy the convenience\
  \ and cost savings that come with the GitHub hosted runner infrastructure. Arm Linux\
  \ and Windows runners are now generally available in Teams and Enterprise Accounts\
  \ ...\n\nAND ... free in public reposities (Private Preview)!!\n\n2. **The Arm Extendion\
  \ for GitHub Copilot**:\n\nSoon to be available as part of the GitHub marketplace,\
  \ GitHub Copilot Arm extensions help developers build, test, and deploy software\
  \ more efficiently, increasing productivity and impact. The extensions, integrated\
  \ with curated datasets, offer specialized tools for AI code development such as\
  \ code migration, containerization, CI/CD workflows, and performance optimization,\
  \ helping to ensure a smooth cloud to edge deployment experience. Watch the Demo!.\n\
  \nRelevant Links and Articles\n\nHere are some articles and links that provide more\
  \ information about how to use our our technology and integrations and to learn\
  \ more about our partnership:\n\n- Optimize MLOps with Arm-hosted GitHub Runners\
  \ - Build Multi-Architecture Container Images with GitHub Arm-hosted - Visit GitHub\u2019\
  s page in the Arm Partner Catalog - View Arm's GitHub success story\n\nContact Us\n\
  \nFor any queries or support, please reach out to us at [support@arm.com]."
