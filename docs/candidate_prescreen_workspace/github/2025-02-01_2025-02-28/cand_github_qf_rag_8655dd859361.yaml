raw_evidence_excerpt: "This RAG (Retrieval-Augmented Generation) project is implemented\
  \ using pure Java. This approach makes it easier to adapt to enterprise-level environments\
  \ and is more conducive to secondary development.\n\nEnglish | \u7B80\u4F53\u4E2D\
  \u6587 JAVA-RAG\n\nIntroduction RAG (Retrieval - Augmented Generation) project,\
  \ implemented in pure Java without relying on frameworks like JFinal or spring -\
  \ boot. It provides the RAG pipeline and Agent pattern, which makes it more convenient\
  \ to adapt to the enterprise - level environment and more conducive to secondary\
  \ development. Quick Start\n\nUsage Tutorial\n\n\U0001F4BD Database Storage - Read\
  \ and write for multi-turn conversations in Redis - File storage in MinIO - Search\
  \ engine with Elastic Search\n\n\U0001F9E0 LLM Conversations - OpenAI chat interface\
  \ - Ollama chat interface - Chat with multi-turn conversations\n\n\U0001F4DA Document\
  \ Parsing - Word - PPT - PDF - EXCEL - PPT - Markdown, HTML\n\n\u2702\uFE0F Chunking\
  \ - Fixed size - Sentence splitting - Recursive splitting - Semantic chunking\n\n\
  \U0001F4CA Vectorization Models - Jina-Cobert - Baichuan\n\n\U0001F50E Search -\
  \ Recall - Sorting - Re-ranking\n\n\U0001F381 more pipeline - Advanced RAG - Modular\
  \ RAG \U0001F9BE [Agent] - MASExample.java\n\n\U0001F3B0 balance - RoundRobinLoadBalancer\
  \ - WeightedRandomLoadBalancer\n\nProject Structure Explanation\n\n\U0001F9D2 Concise\
  \ Installation Tutorial\n\n1. Clone the code\n\n2. Enter the project directory\n\
  \n3. Configure Maven dependencies\n\n4. Create relevant databases\n\n\U0001F978\
  \ Detailed Installation Tutorial - See Link for details.\n\nFeatures\n\n- OpenAI-style\
  \ LLM/Embedding interfaces - Very simple dependency management with pom.xml (Maven)\
  \ - Support for multi-user and multi-knowledge base management - Free arrangement\
  \ of search strategies: multi-channel recall, rough sorting, fine sorting, re-ranking\
  \ - Free arrangement of file chunking: fixed size, sentence splitting, recursive\
  \ splitting, semantic chunking - Support for mainstream file parsing with Apache\
  \ POI - Integration of mainstream databases: Elastic Search, Redis, Mysql, MinIO\
  \ - Highly customizable configuration with Nacos\n\nview\n\nReferences\n\n- llm-apps-java-spring-ai\
  \ - ragflow - ollama - langchain"
