raw_evidence_excerpt: 'The first open source Kick.com viewbot


  NEW UPDATE! Hello everyone, it seems so crazy that I have been working on this project
  for two years! Since its release, we have made huge improvements. It is now fully
  server-sided & we offer Viewbotting, Followbots, Ai Chatbots, Normal Chatbots, Pollbots,
  Clip Viewbots & More! Everything is VERY cheap and can either be bought through
  one of our plans or bought individually!


  Website: https://kvb.gg Discord: https://discord.gg/kvb


  New Features


  - Improved UI - Improved view botting (Up to 20,000+ Viewers) - Chatbot - Pollbot
  - Clip Viewbot - Ai Chatbot (Coming Soon!) - Followbot - Auto Start (The bots automatically
  send when you go live!) - Premium Support - Weekly Updates - Proxy Support - Anti-Finger
  Printing - Anti-Bot Detection


  Preview


  Kick View Bot


  Hello, my name is AnonX. I created a simple view bot for the new streaming site
  called kick.com, I have been working on this for quite some time now to ensure that
  it had little to no issues upon it''s public release.


  This tool is to only be used for preventing view botting on your own website, via
  testing using this tool. I do not condone using this on kick.com or any other streaming
  platform.


  Installation


  1: Download Python 3.10 from the Microsoft store


  2: Open a command prompt in the folder with the Python files


  3: Install using these commands


  Need more help? Here''s a video! https://www.youtube.com/watch?v=asG2wI9VA4k


  Discord & Guilded If you need any help or if you would just like to be up to date
  on future updates for this tool, please join the Discord server. I also added a
  guilded server just in case the Discord server gets banned (Guilded is a Discord
  alternative with less rules).


  - Discord Link: https://discord.gg/8PV8k4QFHB - Create a Guilded Account here: https://www.guilded.gg?r=4DQZMKMd
  - Guilded Server Invite (Click after you''ve created an account): https://www.guilded.gg/i/2VVeW832


  Features


  - Auto Age Confirmation - Multi-Threading - Low CPU Usage - No viewer drop-offs
  - Simple UI - Easy to use - Headless Version! - New UI Coming Soon! - Paid Version
  Coming Soon! - Proxy Support Coming Soon!


  The Future Of The Tool I have plans to make a paid version of the tool with improved
  functionality, better UI and better performance. I will also be actively updating
  the free tool to add new features and fix bugs or other issues that may come up
  with the script.


  Credit I do ask that anyone that uses this tool please leave the credits in the
  script, yes the script is open source but getting credit for something I made is
  just as cool as it being free to use. Thank You!'
