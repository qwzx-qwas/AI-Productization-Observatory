summary: Universal AI Agent Frontend. Build your backend we handle the rest.
raw_evidence_excerpt: "Universal AI Agent Frontend. Build your backend we handle the\
  \ rest.\n\n.\n\nOpen-source universal frontend for your AI Agents that you can control\
  \ with a realtime bidirectional streaming SDK from your backend.\n\nAgentLabs allows\
  \ you to ship your AI Agents to public users in a snap by providing an Authentication\
  \ Portal, a neat Chat Frontend interface as well as the Analytics and Payment features\
  \ you need.\n\nFocus on your AI Agent backend, we handle the rest for you.\n\n.\n\
  \n\U0001F31F Give us some love by starring this repository! \U0001F31F\n\n.\n\n\
  AgentLabs - Open-Source Universal AI Agent Frontend\n\nAgentLabs is fully open-sourced\
  \ (Apache 2.0) and AgentLabs Inc. offers cloud hosting and dedicated enterprise\
  \ grade support.\n\nHow it works\n\nGetting Started\n\n\U0001F31F Try the **Alpha\
  \ Cloud Version** to get started quickly.\n\n\U0001F31F Check our **Documentation**\
  \ to learn more about our SDK and find out how to get started with AgentLabs.\n\n\
  Note: more documentation about self-hosting will be added soon, although we recommend\
  \ using the cloud version for now.\n\nDead simple SDKs\n\nAlpha Release is Live!\n\
  \nThe Alpha release is live! We're still actively developing the project so expect\
  \ many things to change and improve.\n\n| Component | Status | Features | |:-------------------------|:------:|-------------------------------------------------------------------------------------------------------------------------------------|\
  \ | Backoffice | \u2705\uFE0F | Manage your projects Configure basic auth methods\
  \ for users Manage agents Manage your users | | Agent UI | \u2705 | Authentication\
  \ / Registration Basic multi-agent support Chat-based UI Realtime request/response\
  \ streaming | | SDKs | \u2705 | Python Streaming backend SDK Typescript Streaming\
  \ backend SDK | | Cloud hosting | \u2705\uFE0F | Basic support for cloud hosted\
  \ version | | Self hosting | \u2705\uFE0F | Self hosted version with `docker-compose`.\
  \ | | Basic docs with examples | \u2705\uFE0F | Everything will be documented so\
  \ you can get started either with the cloud version or the self hosted version.\
  \ |\n\nRoadmap\n\nWe're constantly improving the project, feel free to open an issue\
  \ if you have any suggestions or feedback.\n\n| Component | Status | Features |\
  \ |:-------------------------|:------:|---------------------------------------------------------------------------------------------------------------------------------------------|\
  \ | Make it embeddable | \u2705\uFE0F\uFE0F | Embed in any website as an iFrame\
  \ Embed as a Chat Bot | | Move login into the chat | \u2705\uFE0F | Add support\
  \ for anonymous mode Integrate the login inside the chat for a better UX experience\
  \ with embedded mode. | | Add Rich components | \u2705\uFE0F\uFE0F | Ability to\
  \ send some interactif component into the chat (like text inputs, charts, or more).\
  \ | | Improve SDK | \U0001F3D7\uFE0F | List the conversations Get user's information\
  \ and more... |\n\n.\n\n\U0001F31F Give us some love by starring this repository!\
  \ \U0001F31F\n\n."
