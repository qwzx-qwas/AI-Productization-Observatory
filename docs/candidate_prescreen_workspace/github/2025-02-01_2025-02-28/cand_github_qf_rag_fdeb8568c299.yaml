raw_evidence_excerpt: "This repository contains LLM (Large language model) interview\
  \ question asked in top companies like Google, Nvidia , Meta , Microsoft & fortune\
  \ 500 companies.\n\n100+ LLM Interview Questions for Top Companies\n\nThis repository\
  \ contains over 100+ interview questions for Large Language Models (LLM) used by\
  \ top companies like Google, NVIDIA, Meta, Microsoft, and Fortune 500 companies.\
  \ Explore questions curated with insights from real-world scenarios, organized into\
  \ 15 categories to facilitate learning and preparation.\n\n---\n\nYou're not alone\u2014\
  many learners have been reaching out for detailed explanations and resources to\
  \ level up their prep.\n\nYou can find answers here, visit Mastering LLM. Use the\
  \ code `LLM50` at checkout to get **50% off**\n\n---\n\n--- Table of Contents\n\n\
  1. Prompt Engineering & Basics of LLM 2. Retrieval Augmented Generation (RAG) 3.\
  \ Document digitization & Chunking 4. Embedding Models 5. Internal Working of Vector\
  \ Databases 6. Advanced Search Algorithms 7. Language Models Internal Working 8.\
  \ Supervised Fine-Tuning of LLM 9. Preference Alignment (RLHF/DPO) 10. Evaluation\
  \ of LLM System 11. Hallucination Control Techniques 12. Deployment of LLM 13. Agent-Based\
  \ System 14. Prompt Hacking 15. Miscellaneous 16. Case Studies\n\n---\n\nPrompt\
  \ Engineering & Basics of LLM\n\n- **What is the difference between Predictive/Discriminative\
  \ AI and Generative AI?** - **What is LLM, and how are LLMs trained?** - **What\
  \ is a token in the language model?** - **How to estimate the cost of running SaaS-based\
  \ and Open Source LLM models?** - **Explain the Temperature parameter and how to\
  \ set it.** - **What are different decoding strategies for picking output tokens?**\
  \ - **What are different ways you can define stopping criteria in large language\
  \ model?** - **How to use stop sequences in LLMs?** - **Explain the basic structure\
  \ prompt engineering.** - **Explain in-context learning** - **Explain type of prompt\
  \ engineering** - **What are some of the aspect to keep in mind while using few-shots\
  \ prompting?** - **What are certain strategies to write good prompt?** - **What\
  \ is hallucination, and how can it be controlled using prompt engineering?** - **How\
  \ to improve the reasoning ability of LLM through prompt engineering?** - **How\
  \ to improve LLM reasoning if your COT prompt fails?**\n\nBack to Top\n\n---\n\n\
  Retrieval Augmented Generation (RAG)\n\n- **how to increase accuracy, and reliability\
  \ & make answers verifiable in LLM** - **How does RAG work?** - **What are some\
  \ benefits of using the RAG system?** - **When should I use Fine-tuning instead\
  \ of RAG?** - **What are the architecture patterns for customizing LLM with proprietary\
  \ data?**\n\nBack to Top\n\n---\n\nDocument digitization & Chunking\n\n- **What\
  \ is chunking, and why do we chunk our data?** - **What factors influence chunk\
  \ size?** - **What are the different types of chunking methods?** - **How to find\
  \ the ideal chunk size?** - **What is the best method to digitize and chunk complex\
  \ documents like annual reports?** - **How to handle tables during chunking?** -\
  \ **How do you handle very large table for better retrieval?** - **How to handle\
  \ list item during chunking?** - **How do you build production grade document processing\
  \ and indexing pipeline?** - **How to handle graphs & charts in RAG**\n\nBack to\
  \ Top\n\n---\n\nEmbedding Models\n\n- **What are vector embeddings, and what is\
  \ an embedding model?** - **How is an embedding model used in the context of LLM\
  \ applications?** - **What is the difference between embedding short and long content?**\
  \ - **How to benchmark embedding models on your data?** - **Suppose you are working\
  \ with an open AI embedding model, after benchmarking accuracy is coming low, how\
  \ would you further improve the accuracy of embedding the search model?** - **Walk\
  \ me through steps of improving sentence transformer model used for embedding?**\n\
  \nBack to Top\n\n---\n\nInternal Working of Vector Databases\n\n- **What is a vector\
  \ database?** - **How does a vector database differ from traditional databases?**\
  \ - **How does a vector database work?** - **Explain difference between vector index,\
  \ vector DB & vector plugins?** - **You are working on a project that involves a\
  \ small dataset of customer reviews. Your task is to find similar reviews in the\
  \ dataset. The priority is to achieve perfect accuracy in finding the most similar\
  \ reviews, and the speed of the search is not a primary concern. Which search strategy\
  \ would you choose and why?** - **Explain vector search strategies like clustering\
  \ and Locality-Sensitive Hashing.** - **How does clustering reduce search space?\
  \ When does it fail and how can we mitigate these failures?** - **Explain Random\
  \ projection index?** - **Explain Locality-sensitive hashing (LHS) indexing method?**\
  \ - **Explain product quantization (PQ) indexing method?** - **Compare different\
  \ Vector index and given a scenario, which vector index you would use for a project?**\
  \ - **How would you decide ideal search similarity metrics for the use case?** -\
  \ **Explain different types and challenges associated with filtering in vector DB?**\
  \ - **How to decide the best vector database for your needs?**\n\nBack to Top\n\n\
  ---\n\nAdvanced Search Algorithms\n\n- **What are architecture patterns for information\
  \ retrieval & semantic search?** - **Why it\u2019s important to have very good search**\
  \ - **How can you achieve efficient and accurate search results in large-scale datasets?**\
  \ - **Consider a scenario where a client has already built a RAG-based system that\
  \ is not giving accurate results, upon investigation you find out that the retrieval\
  \ system is not accurate, what steps you will take to improve it?** - **Explain\
  \ the keyword-based retrieval method** - **How to fine-tune re-ranking models?**\
  \ - **Explain most common metric used in information retrieval and when it fails?**\
  \ - **If you were to create an algorithm for a Quora-like question-answering system,\
  \ with the objective of ensuring users find the most pertinent answers as quickly\
  \ as possible, which evaluation metric would you choose to assess the effectiveness\
  \ of your system?** - **I have a recommendation system, which metric should I use\
  \ to evaluate the system?** - **Compare different information retrieval metrics\
  \ and which one to use when?** - **How does hybrid search works?** - **If you have\
  \ search results from multiple methods, how would you merge and homogenize the rankings\
  \ into a single result set?** - **How to handle multi-hop/multifaceted queries?**\
  \ - **What are different techniques to be used to improved retrieval?**\n\nBack\
  \ to Top\n\n---\n\nLanguage Models Internal Working\n\n- **Can you provide a detailed\
  \ explanation of the concept of self-attention?** - **Explain the disadvantages\
  \ of the self-attention mechanism and how can you overcome it.** - **What is positional\
  \ encoding?** - **Explain Transformer architecture in detail.** - **What are some\
  \ of the advantages of using a transformer instead of LSTM?** - **What is the difference\
  \ between local attention and global attention?** - **What makes transformers heavy\
  \ on computation and memory, and how can we address this?** - **How can you increase\
  \ the context length of an LLM?** - **If I have a vocabulary of 100K words/tokens,\
  \ how can I optimize transformer architecture?** - **A large vocabulary can cause\
  \ computation issues and a small vocabulary can cause OOV issues, what approach\
  \ you would use to find the best balance of vocabulary?** - **Explain different\
  \ types of LLM architecture and which type of architecture is best for which task?**\n\
  \nBack to Top\n\n---\n\nSupervised Fine-Tuning of LLM"
