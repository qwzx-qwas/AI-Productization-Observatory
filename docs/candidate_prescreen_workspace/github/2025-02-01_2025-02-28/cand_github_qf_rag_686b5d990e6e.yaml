raw_evidence_excerpt: 'A practical RAG where you can download and chat with github
  repo


  GithubChat


  A RAG assistant to allow you to chat with any github repo. Learn fast. The default
  repo is AdalFlow github repo.


  *Click the image above to watch the demo video*


  Project Structure


  Backend Setup


  1. Install dependencies:


  2. Set up OpenAI API key:


  Create a `.streamlit/secrets.toml` file in your project root:


  Add your OpenAI API key to `.streamlit/secrets.toml`:


  Running the Applications


  Streamlit UI Run the streamlit app:


  FastAPI Backend Run the API server:


  The API will be available at http://localhost:8000


  React Frontend 1. Navigate to the frontend directory:


  2. Install Node.js dependencies:


  3. Start the development server:


  The frontend will be available at http://localhost:3000


  API Endpoints


  POST /query Analyzes a GitHub repository based on a query.


  ROADMAP - [x] Clearly structured RAG that can prepare a repo, persit from reloading,
  and answer questions. - `DatabaseManager` in `src/data_pipeline.py` to manage the
  database. - `RAG` class in `src/rag.py` to manage the whole RAG lifecycle.


  On the RAG backend - [ ] Conditional retrieval. Sometimes users just want to clarify
  a past conversation, no extra context needed. - [ ] Create an evaluation dataset
  - [ ] Evaluate the RAG performance on the dataset - [ ] Auto-optimize the RAG model


  On the React frontend


  - [ ] Support the display of the whole conversation history instead of just the
  last message. - [ ] Support the management of multiple conversations.'
