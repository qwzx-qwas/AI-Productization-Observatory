raw_evidence_excerpt: "Python SDK for Eden AI workflows. Create or update your workflow\
  \ from your python code, to keep your workflow aligned with your git repo\n\nPython\
  \ SDK for Eden AI workflows\n\nBuild and update your Eden AI workflows straight\
  \ from your python code, without needing a UI! This way you can easily commit changes\
  \ to your workflow, as all you need to do is putting this code into a git repo \U0001F680\
  \n\nThis package is in **alpha** and the API can still change\n\nInstallation\n\n\
  Example\n\nYou can use `client.create_or_update(name=\"my_unique_name\", data=data)`\
  \ to create a workflow. If a workflow with this name already exists it will update\
  \ the workflow. You can always view the workflow you've build in the UI in the Eden\
  \ AI App\n\nTo see which parameters are availabe for each feature, you can check\
  \ our api docs"
