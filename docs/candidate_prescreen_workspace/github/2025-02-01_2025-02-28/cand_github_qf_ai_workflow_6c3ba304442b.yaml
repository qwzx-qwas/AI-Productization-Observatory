summary: Open Source LLMOps tool for AI teams
raw_evidence_excerpt: "Open Source LLMOps tool for AI teams\n\nKitchenAI\n\n**KitchenAI**\
  \ is a control plane for AI implementations \u2014 designed to bridge the gap between\
  \ application developers and AI teams. Our platform simplifies AI integration with\
  \ a loosely coupled, modular architecture that delivers production-grade reliability\
  \ while letting your teams focus on what they do best.\n\n---\n\n\U0001F680 Quick\
  \ Start\n\n- **Explore Our Interactive Playground:** Try KitchenAI in Action - **Take\
  \ a Guided Tour:** Watch the Guided Tour\n\n---\n\n\U0001F31F What Makes KitchenAI\
  \ Unique\n\nModular Architecture - **Bento Boxes:** Package your AI workflows into\
  \ independent \"bento boxes\" that encapsulate complex logic. - **Flexibility:**\
  \ Update, replace, or scale individual modules without disrupting your overall system.\
  \ - **Clear Separation:** Let AI teams build advanced logic in a reproducible and\
  \ swappable space, while app developers enjoy a simple, stable API.\n\nHigh-Performance\
  \ Messaging - **Powered by NATS:** - Lightning-fast, reliable communication between\
  \ AI modules - Dynamic service discovery and routing - Robust support for event-driven\
  \ workflows in distributed environments\n\nFramework Agnostic - **Plug & Play:**\
  \ - No vendor lock-in\u2014integrate with any AI framework or model - Native support\
  \ for LangChain, LlamaIndex, and custom implementations - Future-proof your AI infrastructure\
  \ with flexible integration options\n\n---\n\n\U0001F6E0\uFE0F How It Works\n\n\
  KitchenAI\u2019s three-layer architecture makes it easy to manage your AI workflows:\n\
  \n1. **Application Layer:** Your business applications call a simple, unified API\
  \ (just like using OpenAI\u2019s Chat Completions).\n\n2. **NATS Messaging Layer:**\
  \ This is our high-performance backbone for routing messages and discovering services\
  \ dynamically.\n\n3. **Bento Boxes Layer:** Modular AI implementations where your\
  \ AI team builds the complex logic (be it LLM logic, RAG, agents, or custom workflows).\n\
  \nFor Application Developers Your code remains clean and simple:\n\nFor AI Teams\
  \ Focus on building powerful AI code:\n\n--- Self hosting the control plane\n\n\
  KitchenAI is designed to be self-hosted. You can deploy the control plane and the\
  \ bento boxes separately.\n\n1. Clone the KitchenAI repository\n\n2. Bring up the\
  \ control plane and dependencies\n\n4. Creating the Bucket for media. KitchenAI\
  \ uses S3 for media. For local development, the compose file has a minio container.\
  \ This only needs to be done the first time.\n\nyou will need to login to the minio\
  \ container and create a bucket called `kitchenai`.\n\nendpoint: http://localhost:9001\
  \ username: minioadmin password: minioadmin\n\nbucket name: kitchenai\n\n3. Bring\
  \ up the bento boxes using this demo demo notebooks ---\n\nSettings\n\navailable\
  \ environment variables\n\n\U0001F4DA Documentation\n\n- Getting Started - Core\
  \ Concepts - Deployment Guide - API Reference\n\n---\n\n\U0001F6E0\uFE0F Key Features\n\
  \n- **Version Control & Rollback:** Safely iterate and revert as needed. - **Monitoring\
  \ & Observability Hooks:** Integrate with your favorite tools. - **Plugin Ecosystem:**\
  \ Extend KitchenAI with additional capabilities. - **Security Integrations:** Designed\
  \ with production-grade best practices.\n\n---\n\n\U0001F64B\u200D\u2642\uFE0F Join\
  \ the Beta!\n\nKitchenAI is still in beta\u2014we're excited to have early adopters\
  \ help shape the platform. - **Join the Waitlist:** Get Early Access - **Play in\
  \ Our Playground:** Try it out now\n\n---\n\n\U0001F517 Quick Links\n\n- Website\
  \ - Documentation - Interactive Playground - GitHub\n\n---\n\n\U0001F4C4 License\n\
  \nKitchenAI is released under the Apache 2.0 License.\n\n---\n\n\U0001F64B\u200D\
  \u2642\uFE0F Support & Community\n\n- Community Forum - GitHub Issues - Email Support\n\
  \n---\n\nBuilt with \u2764\uFE0F by the KitchenAI Team"
