  \ setting up and using the AI assistant as a teaching tool, enabling seamless interaction\
  \ through the LINE mobile app.\n\nFeatures - **AI-Powered Chat**: Engage in real-time\
  \ conversations using OpenAI's advanced language model. - **LINE Integration**:\
  \ Easily chat with your AI assistant via the LINE messaging app. - **Customizable\
  \ Deployment**: Users can integrate and extend functionalities to suit their teaching\
  \ needs. - **Seamless Setup**: Requires minimal configuration to get started.\n\n\
  Installation\n\n**Prerequisites** - A **LINE account** to connect with the AI assistant.\
  \ - An **OpenAI API key** for chatbot functionality. - **Python 3.9+** installed\
