raw_evidence_excerpt: "Your CAD Copilot\n\nArtifex: AI-Powered Text-to-CAD Tool \U0001F680\
  \n\nArtifex is an AI-driven engineering tool that acts as a copilot designed to\
  \ simplify CAD workflows by enabling natural language-driven design. With **Artifex**,\
  \ you can describe your ideas in plain English, and it will translate them into\
  \ complex 3D CAD models within FreeCAD. Built as a macro, Artifex leverages state-of-the-art\
  \ APIs like OpenAI, Claude and Mistral AI to provide real-time design assistance.\n\
  \nArtifex in action:\n\n---\n\n\u2728 Features - **Text-to-CAD**: Transform natural\
  \ language descriptions into CAD models. - **Real-time AI Assistance**: Get instant\
  \ feedback and suggestions for design improvements. - **Multi-API Support**: Compatible\
  \ with OpenAI, Claude and Mistral AI APIs. - **Open-Source and Extensible**: Built\
  \ to encourage community contributions and enhancements.\n\n---\n\n\U0001F6E0 Installation\
  \ & Setup\n\n1. **Install FreeCAD** Download and install FreeCAD from the official\
  \ website.\n\n2. **Clone the Repository** Clone this repository to your local machine:\n\
  \n3. **Set Up API Keys** Obtain API keys for the required service: - OpenAI API:\
  \ Sign up here. - Claude API: Sign up here. - Mistral AI API: Sign up here.\n\n\
  Configure the keys as environment variables:\n\n4. **Load the Macro in FreeCAD**\
  \ - Open FreeCAD and navigate to `Macro > Macros...`. - Load the `Artifex-Anthropic.FCMacro`,\
  \ `Artifex-OpenAI.FCMacro` or `Artifex-MistralAI.FCMacro` file from the `src/` directory.\
  \ - Click **Run** to start using Artifex.\n\n---\n\nHow It Works Artifex uses AI\
  \ to process natural language inputs and generate 3D CAD models: 1. **Input Design**:\
  \ You describe your design in text, such as: *\"Create two spheres (20mm diameter)\
  \ connected by a cylinder (20mm diameter, 200mm height).\"* 2. **AI Processing**:\
  \ Artifex uses OpenAI or Claude to interpret your input and create a script for\
  \ FreeCAD. 3. **Model Generation**: FreeCAD executes the script, generating a precise\
  \ 3D model.\n\n---\n\nProject Structure\n\n---\n\nContributing Contributions are\
  \ welcome! Please read the CONTRIBUTING.md for guidelines.\n\nHow to Contribute\
  \ - **Bug Reports**: Open an issue describing the problem. - **Feature Requests**:\
  \ Suggest new features via issues. - **Pull Requests**: Submit code improvements\
  \ or fixes.\n\n1. Fork this repository. 2. Create a new branch for your feature\
  \ or fix:\n\n3. Commit your changes with clear messages:\n\n4. Push to your branch\
  \ and open a pull request.\n\n---\n\nLicense This project is licensed under the\
  \ MIT License. See the LICENSE file for details.\n\n---\n\nCredits - Developed by\
  \ Izzy and Mussie. - Powered by FreeCAD, OpenAI, and Claude.\n\n---\n\nLinks - **Website**:\
  \ Artifex.com - **Twitter**: Izzy on X"
