raw_evidence_excerpt: "AiDE provides a structured approach to developing projects\
  \ with AI assistance. It creates a standardized way for AI to understand your project\
  \ context and maintain documentation.\n\nAiDE Framework for AI-Assisted Development\n\
  \nThe AiDE framework is a lightweight, drop-in solution for structuring AI-assisted\
  \ development. It standardizes project context management, documentation, and collaboration,\
  \ ensuring your assistant stays informed and productive throughout the project lifecycle.\n\
  \n> **\u26A0 Disclaimer** > Some AI-powered code assistants have predefined token\
  \ limits that could be quickly consumed when reading or writing to `.context` files.\
  \ While this framework has proven tremendously helpful, developers should be aware\
  \ of these limitations. Using it with code assistants that leverage your own API\
  \ keys can help avoid the stricter token limits imposed by some platforms.\n\nFeatures\n\
  \n- **Drop-in simplicity**: No dependencies or configuration required. Just drop\
  \ the `.context` folder into your project. - **Versatile usage**: - **New projects**:\
  \ Use your AI assistant or the AiDE Planning Assistant GPT to generate an initial\
  \ roadmap, tasks, and documentation. - **Existing projects**: Let the assistant\
  \ analyze your codebase and update the `.context` files to reflect the current state.\
  \ - **Standardized structure**: Organized templates for roadmaps, tasks, decisions,\
  \ and sessions.\n\nHow It Works\n\n1. **Project State** - `current_state.md` tracks\
  \ active features, technical state, and recent changes. - AI keeps this updated\
  \ as you work. - Always know where your project stands.\n\n2. **Decision Records**\
  \ - Document architectural decisions in `decisions/`. - Track context, consequences,\
  \ and validation. - Build institutional knowledge.\n\n3. **Task Management** - Track\
  \ tasks in `tasks/`. - AI helps manage priorities and progress. - Keep development\
  \ focused.\n\n4. **Session Tracking** - Record session summaries in `sessions/`.\
  \ - Track changes, decisions, and next steps. - Maintain development continuity.\n\
  \nGetting Started\n\nNew Project 1. Start with the **AiDE Planning Assistant GPT**\
  \ here. For those who wish to create their own version, the base prompt is included\
  \ in AiDE_Planning_Assistant_GPT.md. 2. Use it to brainstorm and generate a `planning_doc.md`\
  \ for your project. 3. Save the `planning_doc.md` in the project root. 4. Instruct\
  \ your AI code assistant to: - Read the `planning_doc.md`. - Generate and populate\
  \ the `.context` files (e.g., roadmap, tasks, decisions).\n\nExisting Project 1.\
  \ Drop the `.context` folder into your project\u2019s root directory. 2. Instruct\
  \ your AI assistant to: - Analyze the codebase. - Update `current_state.md` with\
  \ the technical state, features, and recent changes. - Populate or update `roadmap.md`\
  \ and any relevant tasks or decisions.\n\nBest Practices\n\n1. **Start every session**:\
  \ Begin each chat session by asking your AI assistant to review the files in `.context`.\
  \ 2. **Task completion**: When completing a task, ask the assistant to: - Move the\
  \ task to `.context/tasks/completed/`. - Update related files (e.g., current state,\
  \ roadmap). 3. **Track decisions**: Document key decisions in `.context/decisions/`\
  \ and reference them for future guidance. 4. **Session summaries**: Record discussions\
  \ and outcomes in `.context/sessions/` to maintain continuity.\n\nFolder Structure\n\
  \nContributions\n\nWe welcome contributions! Feel free to suggest improvements or\
  \ submit templates that enhance the usability of `.context`.\n\nOptional Consideration:\
  \ Global Rules for AI Assistants\n\nIf your AI assistant supports global rules or\
  \ instructions that persist across all chats or sessions, consider using the following\
  \ set of rules to optimize its integration with the `.context` framework:\n\nImplementing\
  \ these rules ensures the assistant operates effectively, maintains consistency,\
  \ and reduces the effort required to manage project context."
