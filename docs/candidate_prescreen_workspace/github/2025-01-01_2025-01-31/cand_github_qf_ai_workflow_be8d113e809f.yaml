title: aider-based-code-generator
summary: VS Code extension that streamlines development workflows through AI-powered
  task execution, intelligent file management, and automated code generation. Built
  on Aider, it integrates with Open AI to enhance productivity and code quality while
  simplifying complex development tasks.
raw_evidence_excerpt: "VS Code extension that streamlines development workflows through\
  \ AI-powered task execution, intelligent file management, and automated code generation.\
  \ Built on Aider, it integrates with Open AI to enhance productivity and code quality\
  \ while simplifying complex development tasks.\n\n\U0001F680 Code Generator\n\n\
  **HAI Code Generator** is a cutting-edge tool designed to simplify and automate\
  \ task execution while enhancing code generation workflows. Leveraging Specif AI,\
  \ it streamlines processes like task execution, file identification, and code documentation\
  \ through intelligent automation and AI-driven capabilities.\n\n> \U0001F3D7\uFE0F\
  \ **Built on Aider**'s powerful foundation for AI-assisted development.\n\n\u26A0\
  \uFE0F Notice: A newer and more advanced version of this tool is available! We highly\
  \ recommend using the latest HAI Code Generator for enhanced features and improved\
  \ performance.\n\nTable of Contents\n\n- \U0001F31F Overview - \U0001F4E5 Getting\
  \ Started - \u2728 Features - \U0001F91D Contributing - \u2139\uFE0F Usage Instructions\
  \ - \U0001F4DC License - \U0001F64F Acknowledgments - \U0001F4E7 Contact\n\n\U0001F31F\
  \ Overview\n\n**HAI Code Generator** is designed to boost productivity and precision\
  \ by automating task execution and integrating file management capabilities. It\
  \ combines intelligent file indexing, context generation, and LLM-driven automation\
  \ to minimize manual effort and ensure task accuracy. With user-friendly interfaces\
  \ and configurable settings, HAI Code Generator is perfect for both developers and\
  \ teams aiming to enhance their workflows.\n\n\U0001F4E5 Getting Started - Download\
  \ the latest HAI Code Generator extension from our releases page - Open Visual Studio\
  \ Code \u2192 Extensions (\u21E7\u2318X) \u2192 Views and More Actions (Button with\
  \ three dots in the top right corner of the left pane)\n\n- Click Install from VSIX\
  \ and select the downloaded \u201C.vsix\u201D file - Upon installation, press `Shift\
  \ + Command + P` (on macOS) or `Shift + Ctrl + P` (on Windows), then select `hai\
  \ Build: Initialize` from the command palette to load the extension.\n\n\u2728 Features\n\
  \n\U0001F4C2 Prepare Code A critical step in ensuring accurate and efficient file\
  \ management, **Code Preparation** focuses on enhancing file context and accessibility\
  \ through :\n\n- **Contextual Code Comments** - Automatically generate contextual\
  \ comments for every identified file, offering deeper insights and clarifications.\
  \ - Store all generated comments in a dedicated folder, ensuring they are easily\
  \ accessible without cluttering your codebase.\n\n- **Faiss DB Indexing** - Built\
  \ on the robust vector-search engine, Faiss DB ensures real-time and highly accurate\
  \ file indexing, enabling instant discovery of relevant files. - Handles large repositories\
  \ effortlessly, ensuring HAI Code Generator scales with your project's needs.\n\n\
  By performing **Code Preparation** as a mandatory step, you establish a foundation\
  \ for seamless and contextual file discovery, enabling smoother task execution and\
  \ streamlined workflows.\n\n---\n\n\U0001F4DD Build from Requirements Harness the\
  \ power of AI for seamless task management and user-story execution, HAI Code Generator\
  \ integrates tasks generated by Specif AI, allowing them to be loaded directly into\
  \ the HAI Tasks page. This streamlined process enables you to:\n\n- **Review** AI-generated\
  \ tasks within a dedicated interface. - **Execute** them instantly with a single\
  \ click. - **Manage** all tasks in one place for improved clarity and productivity.\n\
  \nBy centralizing AI-driven tasks in HAI Code Generator, you can maintain an efficient\
  \ workflow from ideation to execution.\n\n---\n\n\U0001F527 Refine Existing Code\
  \ The **Refine Existing Code** feature empowers users to directly perform tasks\
  \ on their existing codebase without the need to load tasks from Specif AI. This\
  \ allows you to:\n\n- Quickly edit or enhance your code based on specific requirements\
  \ or improvements. - Leverage AI-driven suggestions to make precise and efficient\
  \ changes. - Maintain control over your codebase while benefiting from automation\
  \ and contextual understanding.\n\nThis feature provides a streamlined way to refine\
  \ and improve your code without additional setup, ensuring productivity and flexibility\
  \ in your workflow.\n\n---\n\n\U0001F50D File Identification Enhanced file identification\
  \ with intelligent discovery and retrieval, the **File Identification** feature\
  \ provides the ability to locate and retrieve files swiftly within large codebases.\n\
  \nFile Identification\n\nThis feature ensures accurate and efficient file management\
  \ by leveraging HAI\u2019s advanced file-tracking capabilities to:\n\n- Pinpoint\
  \ relevant files based on your specific queries or requirements. - Optimize navigation\
  \ within extensive repositories to enhance productivity.\n\n\U0001F91D Contributing\n\
  \nTo contribute to the project, start by exploring open issues or checking our feature\
  \ request board.\n\nTo get started with HAI Code Generator, follow these steps:\n\
  \nLocal Development Instructions\n\n1. Clone the repository:\n\n2. Open the project\
  \ in VSCode:\n\n3. Run the command:\n\n4. Make sure to open plugin folder in a separate\
  \ VS Code window.Launch by pressing F5 (or Run -> Start Debugging) to open a new\
  \ VSCode window with the extension loaded. (You may need to install the esbuild\
  \ problem matchers extension if you run into issues building the project.)\n\nFor\
  \ detailed setup instructions, refer to: - Coder Setup - Code Generator Setup -\
  \ Plugin Setup\n\nPlease read our Contributing Guidelines for more details.\n\n\u2139\
  \uFE0F Usage Instructions\n\nPrepare Code **Data Required:** - Absolute path of\
  \ the `src` folder of the codebase/project - Application context \u2013 Description\
  \ of the project - Excluded folders(Optional) \u2013 Folders that should not be\
  \ vectorized (e.g., `node_modules`, `.git`)\n\n**Prerequisite Condition:** - The\
  \ codebase must be present within a `src` directory.\n\n**Workflow:** 1. The user\
  \ clicks on \"Prepare Code\" after entering the necessary details. 2. A Code Preparation\
  \ orchestrator manages the workflow, with agents performing the following functions:\
  \ - Adds comments to the entire codebase before vectorizing, providing code context.\
  \ - Finds every file across the codebase, vectorizes the files, and stores them\
  \ in a `tmp` folder. Faiss DB is used for the vector store. 3. Once vectorization\
  \ is complete, HAI sends a message to the user, asking if any additional tasks need\
  \ to be done.\n\n---\n\nBuild From Requirements **Data Required:** - Absolute path\
  \ of the `tmp` folder containing the vectorized project - Absolute path of the requirements\
  \ generated by the Requirements app\n\n**Prerequisite Condition:** - Code Preparation\
  \ must be done. - Tasks must be generated by Specif AI.\n\n**Workflow:** 1. Once\
  \ the \"Build from Requirements\" button is clicked, two terminals are initialized:\
  \ - **HAI Build Terminal**: For chatting with the LLM and validating code generation.\
  \ - **HAI Build Watch Terminal**: For monitoring file changes and updating the vector\
  \ store of the codebase accordingly. 2. After the terminals are initialized, HAI\
  \ prompts the user to select a task to be implemented in the codebase. 3. The user\
  \ clicks on the task of their choice from the list. 4. The agent first identifies\
  \ the files to be edited and seeks confirmation from the user regarding the files\
  \ to be edited/added. 5. Once the user confirms, the tasks are implemented through\
  \ a few exchanges.\n\n---\n\nRefine Existing Code **Data Required:** - Absolute\
  \ path of the `tmp` folder containing the vectorized project\n\n**Prerequisite Condition:**\
  \ - Code Preparation must be done.\n\n**Workflow:** 1. Once the \"Start Conversation\"\
  \ button is clicked, two terminals are initialized: - **HAI Build Terminal**: For\
  \ chatting with the LLM and validating code generation. - **HAI Build Watch Terminal**:\
  \ For monitoring file changes and updating the vector store of the codebase accordingly.\
  \ 2. After the terminals are initialized, HAI asks for a task to be implemented\
  \ in the codebase. 3. The user enters the task they want to be completed. 4. The\
  \ agent first identifies the files to be edited and seeks confirmation from the\
  \ user regarding the files to be edited/added. 5. Once the user confirms, the tasks\
  \ are implemented through a few exchanges."
