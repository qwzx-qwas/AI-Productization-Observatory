raw_evidence_excerpt: "LangChain-Streamlit Template\n\nThis repo serves as a template\
  \ for how to deploy a LangGraph agent on Streamlit.\n\nThis repo contains an `main.py`\
  \ file which has a template for a chatbot implementation.\n\nAdding your chain\n\
  \nTo add your chain, you need to change the `load_chain` function in `main.py`.\
  \ Depending on the type of your chain, you may also need to change the inputs/outputs\
  \ that occur later on.\n\nRun locally\n\nAfter installing dependencies with e.g.\
  \ `$ pip install -r requirements.txt`, you can run this project locally with the\
  \ following command:\n\nDeploy on Streamlit\n\nThis is easily deployable on the\
  \ Streamlit platform. Note that when setting up your Streamlit app you should make\
  \ sure to add `OPENAI_API_KEY` as a secret environment variable.\n\nSetting up LangSmith\n\
  \nTo quickly spot issues and improve the performance of your LangGraph projects,\
  \ sign up for LangSmith. LangSmith lets you use trace data to debug, test, and monitor\
  \ your LLM apps built with LangGraph \u2014 read more about how to get started here."
