raw_evidence_excerpt: "Codebase Analysis Tools\n\nThis directory contains utility\
  \ scripts for codebase analysis, structure visualization, and file summarization.\
  \ These tools are designed to help developers and AI systems better understand and\
  \ interact with the codebase.\n\nScripts Overview\n\ncaptureCodebase.ts \U0001F4F8\
  \n\n**Captures a snapshot** of your codebase while respecting include/exclude patterns.\
  \ Useful for documentation and analysis.\n\n**Key Features:**\n\n* Configurable\
  \ file inclusion via CSV patterns (simple/regex) * Outputs matched file contents\
  \ to paste.txt * Built-in exclusion of common non-source directories\n\ndiff.ts\
  \ \u2194\uFE0F\n\n**Generates Git diffs** for code review and documentation.\n\n\
  **Key Features:**\n\n* Captures staged changes * Includes whitespace-ignored diffs\
  \ * Requires an active Git repository\n\ngetStructure.ts \U0001F333\n\n**Creates\
  \ a directory structure map** with file token counts.\n\n**Key Features:**\n\n*\
  \ Hierarchical directory tree output * Token estimation (4 characters = 1 token)\
  \ * Copies LLM-friendly prompt to clipboard * Writes structure to paste.txt\n\n\
  rag.ts \U0001F916\n\n**Generates AI-powered file summaries** using Claude 3 Haiku.\n\
  \n**Key Features:**\n\n* Summary caching with MD5 hash validation * Metadata tracking\
  \ (timestamps, file paths) * Configurable file extensions * Error handling for API/file\
  \ operations\n\nInstallation \U0001F6E0\uFE0F\n\n1. Install dependencies:\n\n2.\
  \ Set up environment variables:\n\nConfiguration \u2699\uFE0F\n\nCommon Ignore Patterns\n\
  \nUsage \U0001F680\n\nCodebase Capture\n\nGit Diff Generation\n\nDirectory Structure\
  \ Analysis\n\nFile Summarization\n\nOutput Files \U0001F4C2\n\npaste.txt \U0001F4CB\
  \n\n* Capture: Selected file contents * Structure: Directory tree with token counts\
  \ * Diff: Git diff output\n\nSummary Files (/summaries/*.json) \U0001F5C3\uFE0F\n\
  \nError Handling \U0001F512\n\nAll scripts include:\n\n* File system error detection\
  \ * Pattern validation * API error handling (rag.ts) * JSON read/write safeguards"
