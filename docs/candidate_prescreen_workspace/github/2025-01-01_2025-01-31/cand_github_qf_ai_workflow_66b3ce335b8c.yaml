title: sd-webui-agent-scheduler
summary: An open source Scheduling Agent for Generative AI
raw_evidence_excerpt: "An open source Scheduling Agent for Generative AI\n\nAgent\
  \ Scheduler\n\nIntroducing AgentScheduler, an Automatic1111/Vladmandic Stable Diffusion\
  \ Web UI extension to power up your image generation workflow!\n\nTable of Content\n\
  \n- Compatibility - Installation - Using Vlad Fork - Using the built-in extension\
  \ list - Manual clone - Functionality - Settings - API Access - Troubleshooting\
  \ - Road Map - Contributing - License - Disclaimer\n\n---\n\nCompatibility\n\nThis\
  \ version of AgentScheduler is compatible with latest versions of:\n\n- A1111: commit\
  \ baf6946 - Vladmandic: commit 9726b4d\n\n> Older versions may not working properly.\n\
  \nInstallation\n\nUsing Vlad's WebUI Fork\n\nThe extension is already included in\
  \ Vlad fork's builtin extensions.\n\nUsing the built-in extension list\n\n1. Open\
  \ the Extensions tab 2. Open the \"Install From URL\" sub-tab 3. Paste the repo\
  \ url: https://github.com/ArtVentureX/sd-webui-agent-scheduler.git 4. Click \"Install\"\
  \n\nManual clone\n\n(The second argument specifies the name of the folder, you can\
  \ choose whatever you like).\n\nBasic Features\n\n1\uFE0F\u20E3 Input your usual\
  \ Prompts & Settings. **Enqueue** to send your current prompts, settings, controlnets\
  \ to **AgentScheduler**.\n\n2\uFE0F\u20E3 **AgentScheduler** Extension Tab.\n\n\
  3\uFE0F\u20E3 See all queued tasks, current image being generated and tasks' associated\
  \ information. **Drag and drop** the handle in the begining of each row to reaggrange\
  \ the generation order.\n\n4\uFE0F\u20E3 **Pause** to stop queue auto generation.\
  \ **Resume** to start.\n\n5\uFE0F\u20E3 Press \u25B6\uFE0F to prioritize selected\
  \ task, or to start a single task when queue is paused. **Delete** tasks that you\
  \ no longer want.\n\n6\uFE0F\u20E3 Show queue history.\n\n7\uFE0F\u20E3 **Filter**\
  \ task status or search by text.\n\n8\uFE0F\u20E3 **Bookmark** task to easier filtering.\n\
  \n9\uFE0F\u20E3 Double click the task id to **rename** and quickly update basic\
  \ parameters. Click \u21A9\uFE0F to **Requeue** old task.\n\n\U0001F51F Click on\
  \ each task to **view** the generation results.\n\nHidden Features:\n\nQueue all\
  \ checkpoints at the same time\n\nRight click the `Enqueue` button and select `Queue\
  \ with all checkpoints` to quickly queue the current setting with all available\
  \ checkpoints.\n\nQueue with a subset of checkpoints\n\nWith the custom checkpoint\
  \ select enabled (see Extension Settings section below), you can select a folder\
  \ (or subfolder) to queue task with all checkpoints inside. Eg: Select `anime` will\
  \ queue `anime\\AOM3A1B_oragemixs`, `anime\\counterfeit\\Counterfeit-V2.5_fp16`\
  \ and `anime\\counterfeit\\Counterfeit-V2.5_pruned`.\n\nEdit queued task\n\nDouble\
  \ click a queued task to edit. You can name a task by changing `task_id` or update\
  \ some basic parameters: `prompt`, `negative prompt`, `sampler`, `checkpoint`, `steps`,\
  \ `cfg scale`.\n\nExtension Settings\n\nGo to `Settings > Agent Scheduler` to access\
  \ extension settings.\n\n**Disable Queue Auto-Processing**: Check this option to\
  \ disable queue auto-processing on start-up. You can also temporarily pause or resume\
  \ the queue from the Extension tab.\n\n**Queue Button Placement**: Change the placement\
  \ of the queue button on the UI.\n\n**Hide the Checkpoint Dropdown**: The Extension\
  \ provides a custom checkpoint dropdown.\n\nBy default, queued tasks use the currently\
  \ loaded checkpoint. However, changing the system checkpoint requires some time\
  \ to load the checkpoint into memory, and you also cannot change the checkpoint\
  \ during image generation. You can use this dropdown to quickly queue a task with\
  \ a custom checkpoint.\n\n**Auto Delete Queue History**: Select a timeframe to keep\
  \ your queue history. Tasks that are older than the configured value will be automatically\
  \ deleted. Please note that bookmarked tasks will not be deleted.\n\nAPI Access\n\
  \nAll the functionality of this extension can be accessed through HTTP APIs. You\
  \ can access the API documentation via `http://127.0.0.1:7860/docs`. Remember to\
  \ include `--api` in your startup arguments.\n\nQueue Task\n\nThe two apis `/agent-scheduler/v1/queue/txt2img`\
  \ and `/agent-scheduler/v1/queue/img2img` support all the parameters of the original\
  \ webui apis. These apis response the task id, which can be used to perform updates\
  \ later.\n\nDownload Results\n\nUse api `/agent-scheduler/v1/results/{id}` to get\
  \ the generated images. The api supports two response format:\n\n- json with base64\
  \ encoded\n\n- zip file with querystring `zip=true`\n\nAPI Callback\n\nQueue task\
  \ with param `callback_url` to register an API callback. Eg:\n\nThe callback endpoint\
  \ must support `POST` method with body in `multipart/form-data` encoding. Body format:\n\
  \nExample code of the endpoint handle with `FastApi`:\n\nTroubleshooting\n\nMake\
  \ sure that you are running the latest version of the extension and an updated version\
  \ of the WebUI.\n\n- To update the extension, go to `Extension` tab and click `Check\
  \ for Updates`, then click `Apply and restart UI`. - To update the WebUI it self,\
  \ you run the command `git pull origin master` in the same folder as webui.bat (or\
  \ webui.sh).\n\nSteps to try to find the cause of issues:\n\n- Check the for errors\
  \ in the WebUI output console. - Press F12 in the browser then go to the console\
  \ tab and reload the page, find any error message here.\n\nCommon errors:\n\n**AttributeError:\
  \ module 'modules.script_callbacks' has no attribute 'on_before_reload'**\n\nIf\
  \ you see this error message in the output console, try update the WebUI to the\
  \ latest version.\n\n**Update**: The extension is updated to print this warning\
  \ message instead: **YOUR SD WEBUI IS OUTDATED AND AGENT SCHEDULER WILL NOT WORKING\
  \ PROPERLY.** You can still able to use the extension but it will not working correctly\
  \ after a reload.\n\n~~**ReferenceError: submit_enqueue is not defined**~~\n\n~~If\
  \ you click the `Enqueue` button and nothing happen, and you find above error message\
  \ in the browser F12 console, follow the steps in this comment.~~\n\nUpdate: This\
  \ issue is now fixed.\n\n**TypeError: issubclass() arg 1 must be a class** Please\
  \ update the extension, there's a chance it's already fixed.\n\n**TypeError: Object\
  \ of type X is not JSON serializable** Please update the extension, it should be\
  \ fixed already. If not, please fire an issue report with the list of installed\
  \ extensions.\n\nFor other errors, feel free to fire a new Github issue.\n\nContributing\n\
  \nWe welcome contributions to the Agent Scheduler Extension project! Please feel\
  \ free to submit issues, bug reports, and feature requests through the GitHub repository.\n\
  \nPlease give us a \u2B50 if you find this extension helpful!\n\nLicense\n\nThis\
  \ project is licensed under the Apache License 2.0.\n\nDisclaimer\n\nThe author(s)\
  \ of this project are not responsible for any damages or legal issues arising from\
  \ the use of this software. Users are solely responsible for ensuring that they\
  \ comply with any applicable laws and regulations when using this software and assume\
  \ all risks associated with its use. The author(s) are not responsible for any copyright\
  \ violations or legal issues arising from the use of input or output content.\n\n\
  ---\n\nCRAFTED BY THE PEOPLE BUILDING **SIPHER//AGI**, **PROTOGAIA**, **ATHERLABS**\
  \ & **SIPHER ODYSSEY**\n\nAbout ProtoGAIA\n\nProtoGAIA offers powerful collaboration\
  \ features for Generative AI Image workflows. It is designed to help designers and\
  \ creative professionals of all levels collaborate more efficiently, unleash their\
  \ creativity, and have full transparency and tracking over the creation process.\n\
  \nCurrent protoGAIA Features\n\nLike any open project that seeks to bring the powerful\
  \ of Generative AI to the masses, ProtoGAIA offers the following key features:\n\
  \n\u2705 Seamless Access: available on desktop and mobile\n\n\u2705 Powerful Macro\
  \ Abilities that allowing the chaining of tasks, which is then packaged as Macro\
  \ Command ready for AI Agent Automation\n\n\u2705 Multiplayer & Collaborative UX.\
  \ Strong collaboration features, such as real-time commenting and feedback, version\
  \ control, and image/file/project sharing\n\n\u2705 Rooms Chat for lively discussion\
  \ between users and running Generative AI workflows right in the chat\n\n\u2705\
  \ Custom Models Management including Lora, Diffusion Models, Controlnet Models and\
  \ more\n\n\u2705 Powerful semantic search capabilities"
