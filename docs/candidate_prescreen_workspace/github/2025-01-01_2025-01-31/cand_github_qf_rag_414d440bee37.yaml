summary: The easiest way to use Agentic RAG in any enterprise
raw_evidence_excerpt: "The easiest way to use Agentic RAG in any enterprise\n\nThe\
  \ easiest way to use Agentic RAG in any enterprise.\n\nAs simple to configure as\
  \ OpenAI's custom GPTs , but deployable in your own cloud infrastructure using Docker.\
  \ Built using LlamaIndex .\n\nGet Started \xB7 Endpoints \xB7 Deployment \xB7 Contact\n\
  \nGet Started\n\nTo run, start a docker container with our image:\n\nThen, access\
  \ the Admin UI at http://localhost:8000/admin to configure your RAGapp.\n\nYou can\
  \ use hosted AI models from OpenAI or Gemini, and local models using Ollama.\n\n\
  > _Note_: To avoid running into any errors, we recommend using the latest version\
  \ of Docker and (if needed) Docker Compose.\n\nEndpoints\n\nThe docker container\
  \ exposes the following endpoints:\n\n- Admin UI: http://localhost:8000/admin -\
  \ Chat UI: http://localhost:8000 - API: http://localhost:8000/docs\n\n> _Note_:\
  \ The Chat UI and API are only functional if the RAGapp is configured.\n\nSecurity\n\
  \nAuthentication\n\nJust the RAGapp container doesn't come with any authentication\
  \ layer by design. This is the task of an API Gateway routing the traffic to RAGapp.\
  \ This step heavily depends on your cloud provider and the services you use. For\
  \ a pure Docker Compose environment, you can look at our RAGapp with management\
  \ UI deployment.\n\nAuthorization\n\nLater versions of RAGapp will support restricting\
  \ access based on access tokens forwarded from an API Gateway or similar.\n\nDeployment\n\
  \nUsing Docker Compose\n\nYou can easily deploy RAGapp to your own infrastructure\
  \ with one of these Docker Compose deployments:\n\n1. RAGapp with Ollama and Qdrant\
  \ 2. Multiple RAGapps with a management UI\n\nKubernetes\n\nIt's easy to deploy\
  \ RAGapp in your own cloud infrastructure. Customized K8S deployment descriptors\
  \ are coming soon.\n\nDevelopment\n\nRAGApp:\n\n> _Important_: Parts of this project's\
  \ source code is dynamically retrieved from the create-llama project. Before committing\
  \ changes, make sure to update the source code by calling `make build-frontends`.\n\
  \nMove to src/ragapp directory and start with these commands:\n\nThen, to check\
  \ out the admin UI, go to http://localhost:3000/admin.\n\n> _Note_: Make sure you\
  \ have Poetry installed.\n\nContact\n\nQuestions, feature requests or found a bug?\
  \ Open an issue or reach out to marcusschiesser.\n\nStar History"
