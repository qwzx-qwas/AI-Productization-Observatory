raw_evidence_excerpt: "MCP Discovery & Recommendation Service - Find the right MCP\
  \ server for your needs\n\nMCP Compass \U0001F9ED\n\nMCP Discovery & Recommendation\n\
  \nExperience MCP Compass \U0001F310\n\nYou can now experience MCP discovery directly\
  \ on our website! \U0001F449 **Explore MCP Compass** \U0001F448\n\nDive in to discover\
  \ the power of MCP services in action with real-time recommendations and insights.\n\
  \n---\n\nWhat is this? \U0001F914\n\nMCP Compass is a discovery & recommendation\
  \ service that helps you explore Model Context Protocol servers. It acts as a smart\
  \ guide that helps AI assistants find and understand available MCP services out\
  \ there based on **natural language queries**, making it easier to discover and\
  \ utilize the right tools for specific tasks.\n\nQuick Example\n\nFeatures \U0001F31F\
  \n\n- \U0001F50D **Smart Search**: Find MCP services using natural language queries\
  \ - \U0001F4DA **Rich Metadata**: Get detailed information about each service\n\n\
  - \U0001F91D **Easy Integration**: Simple to integrate with any MCP-compatible AI\
  \ assistant\n\nQuick Start \U0001F680\n\nUsage\n\n1. Clone the repository\n\nor\n\
  \n2. Use `npx`\n\nInstallation\n\nFor Claude Desktop, edit your `claude_desktop_config.json`\
  \ file:\n\nMacOS/Linux\n\nWindows\n\n1. **As an MCP Service**:\n\nAdd to your AI\
  \ assistant's MCP configuration to enable service discovery capabilities.\n\nor\n\
  \nLicense \U0001F4DD\n\nMIT License - See LICENSE file for details.\n\nSupport \U0001F4AC\
  \n\n- \U0001F41B Report issues - \U0001F4A1 Feature requests - \U0001F4D6 Documentation"
