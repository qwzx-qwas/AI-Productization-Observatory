raw_evidence_excerpt: "List of language agents based on paper \"Cognitive Architectures\
  \ for Language Agents\"\n\n\U0001F428CoALA: Awesome Language Agents\n\nA compilation\
  \ of language agents using the **Cognitive Architectures for Language Agents (\U0001F428\
  CoALA)** framework. - CoALA Paper (16 pages of main content): https://arxiv.org/abs/2309.02427\
  \ - CoALA Tweet (6 threads): https://twitter.com/ShunyuYao12/status/1699396834983362690\
  \ - CoALA BibTex file with 300+ related citations: CoALA.bib - CoALA BibTex citation\
  \ if you find our work/resources useful:\n\n\U0001F428CoALA Overview CoALA neatly\
  \ specifies a language agent starting with its **action space**, which has 2 parts:\
  \ * External actions to interact with external environments (**grounding**) * Internal\
  \ actions to interact with internal memories (**reasoning**, **retrieval**, **learning**)\
  \ * A language agent has a short-term working memory and several (optional) long-term\
  \ memories (episodic for experience, semantic for knowledge, procedural for code/LLM)\
  \ * **Reasoning** = update working memory (with LLM) * **Retrieval** = read long-term\
  \ memory * **Learning** = write long-term memory\n\nThen how does a language agent\
  \ choose which action to take? Its actions are structured into **decision making**\
  \ cycles, and each cycle has two stages: * **Planning**: The agent applies reasoning/retrieval\
  \ actions to (iteratively) propose and evaluate actions, then select a learning/grounding\
  \ action. * **Execution**: The selected learning/grounding action is executed to\
  \ affect the internal memory or external world.\n\nTo understand more, read Section\
  \ 4 of our paper.\n\nPapers Below is only a subset of papers scraped from CoALA.bib\
  \ plus pulled requests, with potentially incorrect action space labels. Date is\
  \ based on arxiv v1. They do not represent all language agent work, and we plan\
  \ to add more work soon (pull requests welcome), and have labels for highly cited\
  \ work."
