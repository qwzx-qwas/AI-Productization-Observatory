  Star History


  Large Language Models: ---


  Every LLM is a little different, it takes some time to get used to how each model
  should be talked to for the best results.


  LLMs are powerful tools but it''s important to understand how they work. The input
  text is vectorized and put through matrix multiplications and a big complex vector
  is built up. Then each word is added to that vector as it is chosen in turn one
  at a time, with some randomity to get better speech flavor, until the next probable
  token is a stop token or max length is exceeded.


  In an LLM every word is a cloud of numbers that represent how that token relates
  to other words, concepts or phrase structures. By turning words into numbers, we
  can then beat them with math and determine which numbers probably are appropriate
  to go next.


  It doesn''t really reason, it doesn''t really think, it amplifies patterns and guesses
  using probabilities and random, each next word chosen with such accuracy and literate
  complexity that kind of functionally it simulates having thought. An important note:
  LLMs return a list of probable tokens and their probability, and after the LLM has
  done the math, one word is selected by user set rules from the returned set.


  LLM models don''t make the choice, sampling happens after they do the magic, and
  then the machine is asked for the next tokens to choose from, ev-ery -to-ke-n -
  however the words are sliced.


  It''s weird, but they have no state, it''s data-crunch-out every word in turn, no
  real consideration.


  Use them effectively within their limits to succeed in 2024.


  You can go find the right data and paste the text at an LLM and it can use that
  data, but no LLM should be trusted implicitly, just as a first resort, right here
  aboard the Clipboard Conqueror.


