raw_evidence_excerpt: 'Clipboard Conqueror is a novel copy and paste copilot alternative
  designed to bring your very own LLM AI assistant to any text field.


  Clipboard Conqueror: Your Personal AI Copilot


  Welcome to Clipboard Conqueror, a powerful tool that brings the power of Artificial
  Intelligence to your fingertips. Whether you''re a developer, writer, student, or
  just someone who loves to explore, Clipboard Conqueror is here to help.


  Install, Choosing a Model, Basic Use, Bookmarklets, Prompt Reference, Prompt Formatting,
  API Switching, Chaining Inference, Setup.js


  What is Clipboard Conqueror?


  Clipboard Conqueror is a copy paste Large Language Model interface that works as
  a personal universal copilot. It simply works anywhere. No need to sign in, no required
  keys. CC allows you to leverage cutting-edge Artificial Intelligence models to enhance
  your productivity and creativity. Almost everything is configurable.


  With Clipboard Conqueror, you can simply copy three pipes "`|||`" and a question
  or command, and it will generate a response into the clipboard that you can paste
  directly into any text field.


  Clipboard Conqueror works out of the box with - KoboldCPP, - Text Generation WebUI,
  - Ollama, - LMStudio *closed source


  These local inference servers are generally considered secure and reliable, and
  can be invoked simply like "|||ollama|" or "|||tgw|". They do not require an internet
  connection or any sensitive data to be sent on the network. Clipboard Conqeror is
  very configurable and should be compatible with any inference server.


  CC works online via: - Novita AI - 01.AI - Anyscale - Claude - Fireworks - Groq
  - Openrouter - Together - OpenAI''s API


  Put your key into the appropriate endpoint.key in setup.js.


  Key Features


  Summon any text right where you need it.


  - **Control Every Part of LLM Prompts:** Manage and customize every aspect of your
  AI without leaving your current workspace.


  - **Quickly Prototype Prompts:** Test and refine your prompts quickly for deployment
  in production environments.


  - **Locally Run Models:** Trust your data with locally run models that do not phone
  home or report any metrics.


  - **Supports Multiple Inference Endpoints:** Flexibly interface with your favorite
  inference engines.


  - **No-code Multi-hop Inference Framework** Prepare powerful chain-of-inference
  prompts for superior responses or prototype workflows for use in multi-step agentic
  frameworks.


  - **Desktop Platforms** Clipboard Conqueror is designed to work seamlessly across
  multiple desktop platforms including Windows, macOS, and Linux. It has been gently
  tested to ensure stability and compatibility.


  - **OpenAI Compatible** local inference engines are not strictly required to use
  Clipboard Conqueror, it works against ChatGPT API and other internet inference sources.


  - CC provides a whole toolbox of predefined and targeted assistants, ready to work
  for you.


  - Save system prompts on the fly to draft, define, translate, think, review, or
  tell jokes.


  Getting Started


  1. Installing Clipboard Conqueror 2. Choosing a Model 3. Basic Use 4. Bookmarklets
  4. Prompt Reference 5. Prompt Formatting 6. API Switching 7. Chain of Inference
  8. Setup.js


  Privacy Policy Clipboard Conqueror does not collect any metrics or send any data
  behind the scenes. When used with local LLMs, no data leaves the local machine.
  When used with online APIs, please refer to the privacy policy of your chosen host.


  Additional Resources


  - Prompt Tower


  This VSCode extension is excellent for building and arranging code prompts, and
  works seamlessly with CC, just add an invocation to the top of the prompt tower
  and click Copy Prompt.


  - Toggle Design Mode Bookmarklet


  Morph the web on demand as you browse. - Effects of Basic Sampling Parameters -
  Unofficial Kobold Guide and Model Suggestions - AMD GPU Resources - The Hitchhiker''s
  Guide to LLMs - LLMs: How Do They Work? - OpenHermes 2.5 Mistral Prompting Ideas
  - Llama 3 Quant Loss - Visual Guide to Quantization


