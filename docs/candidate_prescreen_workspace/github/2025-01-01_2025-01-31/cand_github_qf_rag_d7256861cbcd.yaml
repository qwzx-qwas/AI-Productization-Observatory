raw_evidence_excerpt: 'Jupyter Notebooks for Mastering LLM with Advanced RAG Course


  Mastering Large Language Models (LLM) with Retrieval Augmented Generation (RAG)


  This repository includes a set of assets that are used in the above course, which
  dives deeper into the various problems and solutions when building a RAG system
  in enterprise environments.


  The course is available on edX.


  Simple RAG Flow


  Jupyter Notebooks


  2. Embedding Model: This notebook examines the role of embedding models in RAG systems,
  including their applications and limitations. 3. Semantic Chunking: This notebook
  investigates the process of semantic chunking in RAG systems, focusing on its significance
  in information retrieval. 4. Contextual Retrieval: This notebook delves into the
  strategies for contextual retrieval in RAG systems, emphasizing the effective handling
  of numerical data and tables. 5. Reverse Hyde: This notebook explores the Reverse
  Hyde technique in RAG systems, highlighting its importance in addressing contextual
  relevance and query ambiguity. 6. Hybrid Search: This notebook discusses the integration
  of hybrid search capabilities in RAG systems, encompassing both temporal relevance
  and multi-lingual support. 7. Reranking: This notebook discusses the importance
  of reranking in RAG systems, focusing on techniques to refine the initial retrieval
  results for more accurate and relevant outputs. 8. Multi Modal Retrieval: This notebook
  explore the possibilities of retrieval from images and not limited to text.


  Common Problems in RAG Systems and Their Solutions


  The problematic part of a RAG application is usually the retrieval part. The system
  might retrieve the wrong documents, or only part of them and lead to wrong replies.
  This is the classical problem in machine learning of the precision-recall-tradeoff.


  The following list of complexity factors in real-life documents can lead to a decrease
  in overall retrieval accuracy, and the various techniques that can improve the retrieval
  performance.


  1. **Long Documents** - Problem: Difficulty in processing and retrieving information
  from lengthy documents. - Solutions: - Chunking options - Sentence-based chunking
  - Paragraph-based chunking - Fixed-size chunking with overlap - Statistical chunking
  (see: 03_semantic_chunking.ipynb) - Hierarchical retrieval (e.g., parent-child chunks)
  - Contextual retrieval (see: 05_contextual_retrieval.ipynb)


  2. **Mismatch Between Questions and Document Formats** - Problem: User queries may
  not align with the way information is structured in documents. - Solutions: - Hypothetical
  Document Embeddings (HyDE) - Reverse HyDE (see: 04_reverse_hyde.ipynb)


  3. **Domain-Specific Jargon** - Problem: General LLMs may struggle with specialized
  vocabulary. - Solutions: - Incorporating domain-specific embeddings (see: 02_embedding_model.ipynb)
  - Hybrid Search (see: 06_hybrid_search.ipynb) - Fine-tuning on domain-specific corpora


  4. **Complex Documents** - Problem: Handling documents with complex structures,
  such as scanned documents, which can be challenging for traditional text-based retrieval
  methods. - Solutions: - Multi-modal retrieval (see: 07_multimodal_pdf.ipynb) - Utilizing
  computer vision techniques to extract information from images and other non-textual
  elements within documents. - Integrating this information with text-based retrieval
  methods for a more comprehensive search capability.


  Advanced RAG System


