raw_evidence_excerpt: 'Scalable Multi-Agent RL Training School for Autonomous Driving


  SMARTS


  SMARTS (Scalable Multi-Agent Reinforcement Learning Training School) is a simulation
  platform for multi-agent reinforcement learning (RL) and research on autonomous
  driving. Its focus is on realistic and diverse interactions. It is part of the XingTian
  suite of RL platforms from Huawei Noah''s Ark Lab.


  Check out the paper at SMARTS: Scalable Multi-Agent Reinforcement Learning Training
  School for Autonomous Driving.


  Documentation 1. Read the docs :notebook_with_decorative_cover: at smarts.readthedocs.io
  :fire: 1. Base examples 1. RL models


  Issues, Bugs, Feature Requests 1. First, read how to communicate issues, report
  bugs, and request features here. 1. Next, raise them using appropriate tags at https://github.com/huawei-noah/SMARTS/issues.


  Cite this work If you use SMARTS in your research, please cite the paper. In BibTeX
  format:'
