raw_evidence_excerpt: "Free US Investment Agent System \U0001F680\n\nA sophisticated\
  \ AI-powered investment agent system for US stock market analysis and trading decisions,\
  \ leveraging yfinance for market data and AlphaVantage for news sentiment analysis.\n\
  \n\U0001F30F English | \u7B80\u4F53\u4E2D\u6587\n\n\U0001F6E1\uFE0F Disclaimer\n\
  \nThis project is for **educational and research purposes only**.\n\n- Not intended\
  \ for real trading or investment - No warranties or guarantees provided - Past performance\
  \ does not indicate future results - Creator assumes no liability for financial\
  \ losses - Consult a financial advisor for investment decisions\n\nBy using this\
  \ software, you agree to use it solely for learning purposes.\n\n\u2728 Features\n\
  \n- Real-time US stock market data analysis using yfinance - News sentiment analysis\
  \ through AlphaVantage API - AI-powered trading decision making - Comprehensive\
  \ backtesting capabilities - Detailed reasoning for investment decisions - Support\
  \ for multiple trading strategies\n\n\U0001F3D7\uFE0F System Architecture\n\nThe\
  \ system employs multiple AI agents working together to make investment decisions:\n\
  \nAgent Descriptions\n\n1. **Market Data Agent**\n\n- Gathers historical price data\
  \ from yfinance - Collects financial metrics and statements - Preprocesses data\
  \ for other agents\n\n2. **Technical Analyst**\n\n- Analyzes price trends and patterns\
  \ - Calculates technical indicators - Generates technical trading signals\n\n3.\
  \ **Fundamentals Analyst**\n\n- Evaluates company financial health - Analyzes growth\
  \ metrics - Provides fundamental analysis signals\n\n4. **Sentiment Analyst**\n\n\
  - Fetches news from AlphaVantage - Analyzes news sentiment using Gemini - Generates\
  \ sentiment-based signals\n\n5. **Risk Manager**\n\n- Integrates signals from all\
  \ analysts - Evaluates potential risks - Sets position limits - Provides risk-adjusted\
  \ recommendations\n\n6. **Portfolio Manager** - Makes final trading decisions -\
  \ Manages position sizing - Balances risk and reward - Generates executable orders\n\
  \nWorkflow\n\n1. Market Data Agent collects all necessary data 2. Three analysts\
  \ (Technical, Fundamental, Sentiment) work in parallel 3. Risk Manager combines\
  \ and evaluates all signals 4. Portfolio Manager makes the final decision\n\n\U0001F4C1\
  \ Project Structure\n\nLogs and Data\n\nThe system generates two types of logs:\n\
  \n- `api_calls_[date].log`: Records all API calls and their responses - `backtest_[ticker]_[date]_[start]_[end].log`:\
  \ Records backtesting results and analysis\n\nThe system stores data in JSON format:\n\
  \n- News data: `src/data/stock_news/[ticker]/[date]_news.json` (Note: The date in\
  \ filename represents the day before the analysis date, as we use historical news\
  \ to make current day's decisions)\n\n- Sentiment cache: `src/data/sentiment_cache.json`\n\
  \n\U0001F4CB Prerequisites\n\n- Python 3.11 - Poetry for dependency management -\
  \ AlphaVantage API key (Get your free API key from AlphaVantage) - Note: Free API\
  \ key has a limit of 25 requests per day for news data - Gemini API key (Get your\
  \ free API key from Google AI Studio)\n\n\u26A0\uFE0F Important Notes\n\nThe investment\
  \ strategy implemented in this system is for educational purposes only. Users are\
  \ encouraged to:\n\n- Develop and implement their own trading strategies - Customize\
  \ the analysis parameters - Modify the decision-making logic - Test thoroughly before\
  \ any real trading\n\n\U0001F527 Installation\n\n1. Install Poetry:\n\nWindows (PowerShell)\n\
  \nUnix/macOS\n\n2. Clone the repository:\n\n3. Install dependencies:\n\n4. Set up\
  \ your environment variables:\n\nYou can set up your environment variables in two\
  \ ways:\n\na) **Directly edit the .env file** (Recommended):\n\nThen edit the .env\
  \ file:\n\nb) **Via command line**:\n\nUnix/macOS:\n\nWindows PowerShell:\n\n\U0001F680\
  \ Usage\n\nReal-time Analysis\n\nThe system predicts trading decisions for the next\
  \ trading day based on current market data and historical news:\n\n1. **Basic Usage**\n\
  \n2. **Show Detailed Analysis**\n\n3. **Custom Date and News Analysis**\n\nParameters:\n\
  \n- `--ticker`: Stock symbol (e.g., TSLA for Tesla) - `--show-reasoning`: Display\
  \ AI reasoning for decisions - `--end-date`: The date for which to predict next\
  \ day's trading decision (YYYY-MM-DD format) - `--num-of-news`: Number of historical\
  \ news articles to analyze (default: 5, max: 100) - `--initial-capital`: Initial\
  \ cash amount (optional, default: 100,000)\n\nBacktesting\n\nTo run backtesting\
  \ analysis:\n\nParameters:\n\n- `--ticker`: Stock symbol - `--start-date`: Backtesting\
  \ start date (YYYY-MM-DD format) - `--end-date`: Backtesting end date (YYYY-MM-DD\
  \ format) - `--num-of-news`: Number of news articles to analyze (default: 5, max:\
  \ 100) - `--initial-capital`: Initial cash amount (optional, default: 100,000)\n\
  \nOutput Description\n\nThe system will output:\n\n1. Fundamental analysis results\
  \ 2. Technical analysis results 3. Sentiment analysis results 4. Risk management\
  \ assessment 5. Final trading decision\n\nWhen using `--show-reasoning`, you'll\
  \ see detailed analysis from each agent.\n\nExample Output:\n\n\U0001F4CA Results\n\
