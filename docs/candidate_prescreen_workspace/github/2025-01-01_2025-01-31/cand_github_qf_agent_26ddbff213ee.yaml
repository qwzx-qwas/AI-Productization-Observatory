  \ excellent work and inspiration.\n\nAdditional acknowledgments:\n\n- yfinance for\
  \ market data - AlphaVantage for news and sentiment analysis\n\n\u2615 Support the\
  \ Project\n\nIf you find this project helpful, consider buying me a coffee!"
