summary: GPT chat with your docs!
raw_evidence_excerpt: "GPT chat with your docs!\n\nRAG Agent: Document Assistant \U0001F680\
  \U0001F916\n\nThis project has evolved from a simple PDF chatbot to a sophisticated\
  \ RAG (Retrieval-Augmented Generation) agent capable of accessing conversation history,\
  \ retrieving context, summarizing documents, and answering follow-up questions based\
  \ on user queries and intent detection.\n\nTry it out yourself at agentic-rag\n\n\
  Screenshot:\n\nInstallation\n\nTo set up this project, you'll first need your OPENAI_API\
  \ key. Next, ensure you have the necessary dependencies installed. You can install\
  \ them via:\n\n`pip install -r requirements.txt`\n\nUsage\n\nTo launch the RAG agent,\
  \ run the command:\n\n`python -m streamlit run agentic_rag.py`\n\nThis will start\
  \ the Streamlit app in your browser. Once launched, you can upload your `.pdf, .txt,\
  \ .docx` docs and start querying naturally for summaries, in depth queries, and\
  \ follow up questions!\n\nFeatures\n\n- **Conversation History**: The RAG agent\
  \ can access conversation history to maintain context and provide more relevant\
  \ responses. - **Document Summarization**: It can summarize documents to provide\
  \ concise answers or overviews. - **Follow-up Answers**: The agent can answer follow-up\
  \ questions based on previous interactions and the current conversation context.\
  \ - **Logical Intent Determination**: It uses logic to determine user intent, ensuring\
  \ accurate responses. - **Supported File Types**: Users can upload and select `.pdf,\
  \ .txt, .docx` documents directly within the app interface.\n\nHistory\n\nThis project\
  \ is an ongoing effort to enhance the capabilities of the RAG agent. While the functionality\
  \ is currently demonstrated in the provided .py file, further developments are in\
  \ progress. Stay tuned for updates as I transition this project into a fully functional\
  \ application that enables local execution and PDF selection through a user-friendly\
  \ interface.\n\nCredits\n\nYour's truly \U0001F605\n\nLicense\n\nApache2.0\n\nEnjoy\
  \ interacting with your documents through this intelligent RAG Agent!"
