summary: Code editing environment with an AI copilot and real-time collaboration
raw_evidence_excerpt: "Code editing environment with an AI copilot and real-time collaboration\n\
  \nSandbox \U0001F4E6\U0001FA84 (Case Study)\n\nSandbox is an open-source cloud-based\
  \ code editing environment with custom AI code autocompletion and real-time collaboration.\n\
  \nCheck out the Twitter thread with the demo video!\n\nCheck out this guide made\
  \ by @jamesmurdza on setting it up locally!\n\nRunning Locally\n\n> Note: For links\
  \ in `.env` files, do not include a trailing slash\n\nFrontend\n\nInstall dependencies\n\
  \nAdd the required environment variables in `.env` (example file provided in `.env.example`).\
  \ You will need to make an account on Clerk and Liveblocks to get API keys.\n\n\
  Then, run in development mode\n\nBackend\n\nThe backend consists of a primary Express\
  \ and Socket.io server, and 3 Cloudflare Workers microservices for the D1 database,\
  \ R2 storage, and Workers AI. The D1 database also contains a service binding to\
  \ the R2 storage worker. Each open sandbox instantiates a secure Linux sandboxes\
  \ on E2B, which is used for the terminal and live preview.\n\nYou will need to make\
  \ an account on E2B to get an API key.\n\nSocket.io server\n\nInstall dependencies\n\
  \nAdd the required environment variables in `.env` (example file provided in `.env.example`)\n\
  \nProject files will be stored in the `projects/ ` directory. The middleware contains\
  \ basic authorization logic for connecting to the server.\n\nRun in development\
  \ mode\n\nThis directory is dockerized, so feel free to deploy a container on any\
  \ platform of your choice! I chose not to deploy this project for public access\
  \ due to costs & safety, but deploying your own for personal use should be no problem.\n\
  \nCloudflare Workers (Database, Storage, AI)\n\nDirectories:\n\n- `/backend/database`:\
  \ D1 database - `/backend/storage`: R2 storage - `/backend/ai`: Workers AI\n\nInstall\
  \ dependencies\n\nRead the documentation to learn more about workers.\n\nFor each\
  \ directory, add the required environment variables in `wrangler.toml` (example\
  \ file provided in `wrangler.example.toml`). For the AI worker, you can define any\
  \ value you want for the `CF_AI_KEY` -- set this in other `.env` files to authorize\
  \ access.\n\nRun in development mode\n\nDeploy to Cloudflare with Wrangler\n\n---\n\
  \nContributing\n\nThanks for your interest in contributing! Review this section\
  \ before submitting your first pull request. If you need any help, feel free to\
  \ reach out to @ishaandey\\_.\n\nPlease prioritize existing issues, but feel free\
  \ to contribute new issues if you have ideas for a feature or bug that you think\
  \ would be useful.\n\nStructure\n\n| Path | Description | | ------------------ |\
  \ -------------------------------------------------------------------------- | |\
  \ `frontend` | The Next.js application for the frontend. | | `backend/server` |\
  \ The Express websocket server. | | `backend/database` | API for interfacing with\
  \ the D1 database (SQLite). | | `backend/storage` | API for interfacing with R2\
  \ storage. Service-bound to `/backend/database`. | | `backend/ai` | API for making\
  \ requests to Workers AI . |\n\nDevelopment\n\nFork this repo\n\nYou can fork this\
  \ repo by clicking the fork button in the top right corner of this page.\n\nClone\
  \ repository\n\nCreate a new branch\n\nCommit convention\n\nBefore you create a\
  \ Pull Request, please check that you use the Conventional Commits format\n\nIt\
  \ should be in the form `category(scope or module): message` in your commit message\
  \ from the following categories:\n\n- `feat / feature`: all changes that introduce\
  \ completely new code or new features - `fix`: changes that fix a bug (ideally you\
  \ will additionally reference an issue if present) - `refactor`: any code related\
  \ change that is not a fix nor a feature - `docs`: changing existing or creating\
  \ new documentation (i.e. README, docs for usage of a lib or cli usage) - `chore`:\
  \ all changes to the repository that do not fit into any of the above categories\n\
  \ne.g. `feat(editor): improve tab switching speed`\n\n---\n\nTech stack\n\nFrontend\n\
  \n- Next.js - TailwindCSS - Shadcn UI - Clerk - Monaco - Liveblocks\n\nBackend\n\
  \n- Cloudflare Workers - D1 database - R2 storage - Workers AI - Express - Socket.io\
  \ - Drizzle ORM - E2B"
