raw_evidence_excerpt: "Integration of DeepSeek API into AI Assistant of PyCharm IDE\n\
  \nDeepSeek Integration Guide for AI Assistant in PyCharm\n\nThis guide provides\
  \ step-by-step instructions to integrate **DeepSeek V3** into **AI Assistant** as\
  \ a third-party provider in **PyCharm 2024.3.1 (Professional Edition)**. Data is\
  \ routed through a fake Ollama server to DeepSeek.\n\n---\n\nPrerequisites - **DeepSeek\
  \ API Key**: Ensure you have the necessary API key from DeepSeek. - **Python/Docker\
  \ Knowledge**: Basic understanding of Python and Docker is required.\n\n---\n\n\
  Setting Up the Fake Ollama Server\n\nUsing Docker To run the docker container, replace\
  \ `your_api_key_here` with your DeepSeek API key:\n\nUsing Python 1. **Set Up the\
  \ Repository**: - Clone the repository. - Create a virtual environment. - Install\
  \ dependencies from `requirements.txt`.\n\n2. **Configure PyCharm**: - Open your\
  \ project in PyCharm. - Navigate to `Run > Edit Configurations`. - Add a new configuration\
  \ for `fake_ollama_server.py`. - Add your DeepSeek API key as `API_KEY` environment\
  \ variable in the run configuration.\n\n---\n\nConfiguring AI Assistant in PyCharm\n\
  \n1. **Add Third-Party AI Provider**: - Go to `Tools > AI Assistant > Third-party\
  \ AI providers`. - Check `Enable Ollama` and update `URL` if changed. - Use `Test\
  \ connection` and `Apply` settings. - AI Assistant will automatically detect the\
  \ server (approximately every minute) otherwise disable/enable it.\n\n2. **Select\
  \ the Model**: - Once the server is detected, choose the DeepSeek model from the\
  \ available options.\n\n3. **Use the Model**: - Enter a user prompt to interact\
  \ with the selected model.\n\n---\n\nVisual Guides **Python Setup**\n\n**Third-Party\
  \ AI Providers Configuration**\n\n**AI Assistant Chat Interface**\n\n---\n\nNotes\
  \ - Ensure `fake_ollama_server.py` is running before proceeding with the integration.\
  \ - If the server is not detected, restart the server and verify the environment\
  \ variables.\n\n---\n\nUseful Links - PyCharm AI Assistant Documentation - DeepSeek\
  \ Chat - DeepSeek API Documentation - Ollama GitHub Repository\n\n---\n\nJoin the\
  \ Community We welcome contributions and feedback! If you have suggestions or encounter\
  \ issues, please: - Open an issue. - Submit a pull request.\n\nLet\u2019s improve\
  \ this integration together!\n\n---\n\nCredits - **DeepSeek V3**: With system prompts\
  \ of AI Assistant in PyCharm 2024.3.1 (Professional Edition) and the web chat edition.\
  \ - RobToMars - starkirby125918 - JasonLovesDoggo\n\n---\n\nFor further assistance,\
  \ refer to the official DeepSeek documentation or contact the support team."
