summary: Pinecone + Vercel AI SDK Starter
raw_evidence_excerpt: 'Pinecone + Vercel AI SDK Starter


  In this example, we''ll build a full-stack application that uses Retrieval Augmented
  Generation (RAG) powered by Pinecone to deliver accurate and contextually relevant
  responses in a chatbot.


  RAG is a powerful tool that combines the benefits of retrieval-based models and
  generative models. Unlike traditional chatbots that can struggle with maintaining
  up-to-date information or accessing domain-specific knowledge, a RAG-based chatbot
  uses a knowledge base created from crawled URLs to provide contextually relevant
  responses.


  Incorporating Vercel''s AI SDK into our application will allow us easily set up
  the chatbot workflow and utilize streaming more efficiently, particularly in edge
  environments, enhancing the responsiveness and performance of our chatbot.


  By the end of this tutorial, you''ll have a context-aware chatbot that provides
  accurate responses without hallucination, ensuring a more effective and engaging
  user experience. Let''s get started on building this powerful tool (Full code listing).


  Step 1: Setting Up Your Next.js Application


  Next.js is a powerful JavaScript framework that enables us to build server-side
  rendered and static web applications using React. It''s a great choice for our project
  due to its ease of setup, excellent performance, and built-in features such as routing
  and API routes.


  To create a new Next.js app, run the following command:


  npx


  Next, we''ll add the `ai` package:


  You can use the full list of dependencies if you''d like to build along with the
  tutorial.


  Step 2: Create the Chatbot


  In this step, we''re going to use the Vercel SDK to establish the backend and frontend
  of our chatbot within the Next.js application. By the end of this step, our basic
  chatbot will be up and running, ready for us to add context-aware capabilities in
  the following stages. Let''s get started.


  Chatbot frontend component


  Now, let''s focus on the frontend component of our chatbot. We''re going to build
  the user-facing elements of our bot, creating the interface through which users
  will interact with our application. This will involve crafting the design and functionality
  of the chat interface within our Next.js application.


  First, we''ll create the `Chat` component, that will render the chat interface.


  This component will display the list of messages and the input form for the user
  to send messages. The `Messages` component to render the chat messages:


  Our main `Page` component will manage the state for the messages displayed in the
  `Chat` component:


  The useful `useChat` hook will manage the state for the messages displayed in the
  `Chat` component. It will:


  1. Send the user''s message to the backend 2. Update the state with the response
  from the backend 3. Handle any internal state changes (e.g. when the user types
  a message)


  Chatbot API endpoint


  Next, we''ll set up the Chatbot API endpoint. This is the server-side component
  that will handle requests and responses for our chatbot. We''ll create a new file
  called `api/chat/route.ts` and add the following dependencies:


  The first dependency is the `openai-edge` package which makes it easier to interact
  with OpenAI''s APIs in an edge environment. The second dependency is the `ai` package
  which we''ll use to define the `Message` and `OpenAIStream` types, which we''ll
  use to stream back the response from OpenAI back to the client.


  Next initialize the OpenAI client:


  To define this endpoint as an edge function, we''ll define and export the `runtime`
  variable


  Next, we''ll define the endpoint handler:


  Here we deconstruct the messages from the post, and create our initial prompt. We
  use the prompt and the messages as the input to the `createChatCompletion` method.
  We then convert the response into a stream and return it to the client. Note that
  in this example, we only send the user''s messages to OpenAI (as opposed to including
  the bot''s messages as well).


  Step 3. Adding Context


  As we dive into building our chatbot, it''s important to understand the role of
  context. Adding context to our chatbot''s responses is key for creating a more natural,
  conversational user experience. Without context, a chatbot''s responses can feel
  disjointed or irrelevant. By understanding the context of a user''s query, our chatbot
  will be able to provide more accurate, relevant, and engaging responses. Now, let''s
  begin building with this goal in mind.


  First, we''ll first focus on seeding the knowledge base. We''ll create a crawler
  and a seed script, and set up a crawl endpoint. This will allow us to gather and
  organize the information our chatbot will use to provide contextually relevant responses.


  After we''ve populated our knowledge base, we''ll retrieve matches from our embeddings.
  This will enable our chatbot to find relevant information based on user queries.


  Next, we''ll wrap our logic into the getContext function and update our chatbot''s
  prompt. This will streamline our code and improve the user experience by ensuring
  the chatbot''s prompts are relevant and engaging.


  Finally, we''ll add a context panel and an associated context endpoint. These will
  provide a user interface for the chatbot and a way for it to retrieve the necessary
  context for each user query.


  This step is all about feeding our chatbot the information it needs and setting
  up the necessary infrastructure for it to retrieve and use that information effectively.
  Let''s get started.


  Seeding the Knowledge Base


  Now we''ll move on to seeding the knowledge base, the foundational data source that
  will inform our chatbot''s responses. This step involves collecting and organizing
  the information our chatbot needs to operate effectively. In this guide, we''re
  going to use data retrieved from various websites which we''ll later on be able
  to ask questions about. To do this, we''ll create a crawler that will scrape the
  data from the websites, embed it, and store it in Pinecone.


  Create the crawler


  For the sake of brevity, you''ll be able to find the full code for the crawler here.
  Here are the pertinent parts:


  The `Crawler` class is a web crawler that visits URLs, starting from a given point,
  and collects information from them. It operates within a certain depth and a maximum
  number of pages as defined in the constructor. The crawl method is the core function
  that starts the crawling process.


  The helper methods fetchPage, parseHtml, and extractUrls respectively handle fetching
  the HTML content of a page, parsing the HTML to extract text, and extracting all
  URLs from a page to be queued for the next crawl. The class also maintains a record
  of visited URLs to avoid duplication.


  Create the `seed` function


  To tie things together, we''ll create a seed function that will use the crawler
  to seed the knowledge base. In this portion of the code, we''ll initialize the crawl
  and fetch a given URL, then split it''s content into chunks, and finally embed and
  index the chunks in Pinecone.


  To chunk the content we''ll use one of the following methods:


  1. `RecursiveCharacterTextSplitter` - This splitter splits the text into chunks
  of a given size, and then recursively splits the chunks into smaller chunks until
  the chunk size is reached. This method is useful for long documents. 2. `MarkdownTextSplitter`
  - This splitter splits the text into chunks based on Markdown headers. This method
  is useful for documents that are already structured using Markdown. The benefit
  of this method is that it will split the document into chunks based on the headers,
  which will be useful for our chatbot to understand the structure of the document.
  We can assume that each unit of text under a header is an internally coherent unit
  of information, and when the user asks a question, the retrieved context will be
  internally coherent as well.


  Add the `crawl` endpoint`


  The endpoint for the `crawl` endpoint is pretty straightforward. It simply calls
  the `seed` function and returns the result.'
