summary: A Demo app mimicking VectorShift's No-code AI workflow generator.
raw_evidence_excerpt: "A Demo app mimicking VectorShift's No-code AI workflow generator.\n\
  \nA Vectorshift clone that uses pure react to build a workflow generator similar\
  \ to vectorshift's.\n\nFrontend Dependencies:-\n\n-> Tailwind CSS -> Framer motion\
  \ -> Zustand (i \U0001F496 zustand now)\n\nBackend Info :-\n\nA simple backend built\
  \ on FastAPI that accepts a request from the client (number of nodes, edges), performs\
  \ DFS to check if it is an DAG and returns the response.\n\nAvailable Scripts\n\n\
  In the project directory (for the frontend), you can run:\n\n`npm start`\n\nRuns\
  \ the app in the development mode.\\ Open http://localhost:3000 to view it in your\
  \ browser.\n\nThe page will reload when you make changes.\\ You may also see any\
  \ lint errors in the console.\n\n`npm test`\n\nLaunches the test runner in the interactive\
  \ watch mode.\\ See the section about running tests for more information.\n\n`npm\
  \ run build`\n\nBuilds the app for production to the `build` folder.\\ It correctly\
  \ bundles React in production mode and optimizes the build for the best performance.\n\
  \nThe build is minified and the filenames include the hashes.\\ Your app is ready\
  \ to be deployed!\n\nSee the section about deployment for more information.\n\n\
  `npm run eject`\n\n**Note: this is a one-way operation. Once you `eject`, you can't\
  \ go back!**\n\nIf you aren't satisfied with the build tool and configuration choices,\
  \ you can `eject` at any time. This command will remove the single build dependency\
  \ from your project.\n\nInstead, it will copy all the configuration files and the\
  \ transitive dependencies (webpack, Babel, ESLint, etc) right into your project\
  \ so you have full control over them. All of the commands except `eject` will still\
  \ work, but they will point to the copied scripts so you can tweak them. At this\
  \ point you're on your own.\n\nYou don't have to ever use `eject`. The curated feature\
  \ set is suitable for small and middle deployments, and you shouldn't feel obligated\
  \ to use this feature. However we understand that this tool wouldn't be useful if\
  \ you couldn't customize it when you are ready for it.\n\nLearn More\n\nYou can\
  \ learn more in the Create React App documentation.\n\nTo learn React, check out\
  \ the React documentation.\n\nCode Splitting\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/code-splitting\n\
  \nAnalyzing the Bundle Size\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/analyzing-the-bundle-size\n\
  \nMaking a Progressive Web App\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/making-a-progressive-web-app\n\
  \nAdvanced Configuration\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/advanced-configuration\n\
  \nDeployment\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/deployment\n\
  \n`npm run build` fails to minify\n\nThis section has moved here: https://facebook.github.io/create-react-app/docs/troubleshooting#npm-run-build-fails-to-minify"
