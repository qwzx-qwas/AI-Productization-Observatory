title: delia
summary: 'DICOM Extraction for Large-scale Image Analysis (DELIA). '
raw_evidence_excerpt: 'DICOM Extraction for Large-scale Image Analysis (DELIA).


  DELIA facilitates data extraction from DICOM files to support large-scale image
  analysis workflows.


  Notable features


  - Bulk extraction of images and segmentations from multiple patients'' DICOM files.
  Segmentations must be in DICOM-SEG or RTStruct format. - Creation of an HDF5 database
  containing multiple patients'' medical images as well as binary label maps (segmentations).
  The database is then easier to use than DICOMs to perform tasks on medical data,
  such as training deep neural networks. - Bulk extraction of radiomics features from
  multiple patients'' DICOM files using pyradiomics. Note that `pyradiomics` is not
  a dependency of `delia` and must be installed separately.


  Installation


  Latest stable version :


  Latest (possibly unstable) version :


  Quick usage preview


  Extract images as `numpy` arrays


  Create patients database (HDF5)


  Create radiomics dataset (CSV)


  *Note that `pyradiomics` is not a dependency of `delia` and must be installed separately.*


  Motivation


  **Digital Imaging and Communications in Medicine** (**DICOM**) is *the* international
  standard for medical images and related information. The working group DICOM WG-23
  on Artificial Intelligence / Application Hosting is currently working to identify
  or develop the DICOM mechanisms to support AI workflows, concentrating on the clinical
  context. Moreover, their future *roadmap and objectives* includes working on the
  concern that current DICOM mechanisms might not be adequate to cover some use cases,
  particularly bulk analysis of large repository data, e.g. for training deep learning
  neural networks. **However, no tool has been developed to achieve this goal at present.**


  The main **purpose** of this module is therefore to provide the necessary tools
  to facilitate the use of medical images in an AI workflow. This goal is accomplished
  by using the HDF file format to create a database containing patients'' medical
  images as well as binary label maps obtained from the segmentation of these images.


  How it works


  Main concepts


  There are 4 main concepts :


  1. `PatientDataModel` : It is the primary `delia` data structure. It is a named
  tuple gathering the image and segmentation data available in a patient record. 2.
  `PatientsDataExtractor` : A Python Generator that allows to iterate over several
  patients and create a `PatientDataModel` object for each of them. A sequence of
  `delia` and/or `monai` transformations to apply to specific images or segmentations
  can be specified (see MONAI). 3. `PatientsDatabase` : An object that is used to
  create/interact with an HDF5 file (a database!) containing all patients information
  (images + label maps). The `PatientsDataExtractor` is used to populate this database.
  4. `RadiomicsDataset` : An object that is used to create/interact with a csv file
  (a dataset!) containing radiomics features extracted from images. The `PatientsDataExtractor`
  is used to populate this dataset.


  Organize your data


  Since this module requires the use of data, it is important to properly configure
  the data-related elements before using it.


  File format


  Images files must be in standard **DICOM** format and segmentation files must be
  in DICOM-SEG or RTStruct format.


  If your segmentation files are in a research file format (`.nrrd`, `.nii`, etc.),
  you need to convert them into the standardized DICOM-SEG or RTStruct format. You
  can use the pydicom-seg library to create the DICOM-SEG files OR use the itkimage2dicomSEG
  python module, which provide a complete pipeline to perform this conversion. Also,
  you can use the RT-Utils library to create the RTStruct files.


  Tag values (Optional)


  *This dictionary is **not** mandatory for the code to work and therefore its default
  value is `None`. Note that if no `tag_values` dictionary is given, i.e. `tag_values
  = None`, then all images will be added to the database.*


  The tag values are specified as a **dictionary** that contains the values for the
  tag specified when creating the PatientsDataExtractor object of the images that
  need to be extracted from the patients'' files. Keys are arbitrary names given to
  the images we want to add and values are lists of values for the desired tag. The
  images associated with these tag values do not need to have a corresponding segmentation
  volume. If none of the descriptions match the series in a patient''s files, a warning
  is raised and the patient is added to the list of patients for whom the pipeline
  has failed.


  Note that the tag values can be specified as a python dictionary or as a path to
  a **json file** that contains the desired values. Both methods are presented below.


  Using a json file


  Create a json file containing only the dictionary of the names given to the images
  we want to add (keys) and lists of tag values (values). Place this file in your
  data folder.


