  This file can then be executed to obtain an hdf5 database.


  The created HDF5 database will then look something like :


  Example using the `PatientsDataExtractor`class


  This file can then be executed to perform on-the-fly tasks on images.


  Need more examples?


  You can find more in the examples folder.


  A deeper look into the `PatientsDataExtractor` object


  The `PatientsDataExtractor` has 4 important variables: a `path_to_patients_folder`
  (which dictates the path to the folder that contains all patient records), a `tag`
  (which specifies which tag to use when choosing which images need to be extracted,
  if no value is given, this defaults to `SeriesDescription`), a `tag_values` (which
  dictates the images that needs to be extracted from the patient records) and `transforms`
  that defines a sequence of transformations to apply on images or segmentations.
  For each patient/folder available in the `path_to_patients_folder`, all DICOM files
  in their folder are read. If the specified tag''s value of a certain volume match
  one of the descriptions present in the given `tag_values` dictionary, this volume
  and its segmentation (if available) are automatically added to the `PatientDataModel`.
  Note that if no `tag_values` dictionary is given (`tag_values = None`), then all
  images (and associated segmentations) will be added to the database.


  The `PatientsDataExtractor` can therefore be used to iteratively perform tasks on
  each of the patients, such as displaying certain images, transforming images into
  numpy arrays, or creating an HDF5 database using the `PatientsDatabase`. It is this
  last task that is highlighted in this package, but it must be understood that the
  data extraction is performed in a very general manner by the `PatientsDataExtractor`
  and is therefore not limited to this single application. For example, someone could
  easily develop a `Numpydatabase` whose creation would be ensured by the `PatientsDataExtractor`,
  similar to the current `PatientsDatabase` based on the HDF5 format.


