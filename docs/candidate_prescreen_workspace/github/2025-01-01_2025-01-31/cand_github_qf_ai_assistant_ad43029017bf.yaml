raw_evidence_excerpt: "Telegram Bot using GPT4 beta assistant api.\n\nTelegram AI\
  \ Assistant Bot\n\nThis repository provides a framework for integrating AI-powered\
  \ assistants with a Telegram bot. Currently, it supports OpenAI's conversational\
  \ models, allowing users to interact seamlessly through Telegram.\n\n**Path Forward:**\
  \ We aim to expand this bot's capabilities by integrating support for additional\
  \ AI platforms such as Anthropic's Claude, Google Bard, and Hugging Face Inference\
  \ API. This will enable users to choose and switch between multiple AI providers.\n\
  \nFeatures\n\n- Real-time responses powered by OpenAI (current implementation).\
  \ - Modular design for future multi-platform AI support. - Daily message count tracking.\
  \ - Storage of question and answer pairs for future retrieval and analysis.\n\n\
  Roadmap\n\nOur next steps include: 1. Designing a modular architecture to support\
  \ multiple AI platforms. 2. Adding compatibility with popular AI providers beyond\
  \ OpenAI. 3. Providing seamless configuration for selecting AI platforms in the\
  \ `.env` file.\n\nIf you'd like to contribute to these efforts, check the Contributions\
  \ section.\n\nFeatures\n\n- Real-time response to user queries. - Daily message\
  \ count tracking. - Storage of question and answer pairs for future retrieval and\
  \ analysis.\n\nPrerequisites\n\nBefore you begin, ensure you have met the following\
  \ requirements:\n\n- You have a `Python` environment running version 3.7+. - You\
  \ have a Telegram account and have created a bot with `@BotFather` to obtain a token.\
  \ - You have an `OpenAI` account to obtain your API keys.\n\nYou also need\n\n-\
  \ An open ai assistant id : https://platform.openai.com/assistants - An open ai\
  \ API key : https://platform.openai.com/api-keys - A telegram token : use botfather\
  \ directly from telegram to create your bot and get the telegram token\n\nInstallation\n\
  \nClone the repository to your local machine:\n\nInstall the packages:\n\nConfiguration\n\
  \nCreate a `.env` file in the root directory and fill in your OpenAI and Telegram\
  \ credentials. For consistency, both TELEGRAM_TOKEN_BOT and ASSISTANT_ID_BOT support\
  \ comma-separated lists for multiple bot configurations.\n\nExample .env file:\n\
  \nIf you have only one bot, simply provide a single value (e.g., bot1_token or assistant1_id).\
  \ Tokens and IDs will be processed as lists automatically.\n\nUsage\n\nTo start\
  \ the bots, run the following command in your terminal:\n\nThe bots should now be\
  \ running and can be interacted with through your Telegram bot interface.\n\nLaunching\
  \ the Telegram Bot Client on DeepSquare\n\n> This is not working, until the testnet\
  \ is up and running again, happening soon.\n\nYou can easily launch the Telegram\
  \ bot client using the `job.telegram_openai_assistant.yaml` workflow file in our\
  \ repository. Follow these simple steps to get started:\n\nLaunching through the\
  \ DeepSquare Platform\n\n1. **Log in to the DeepSquare Platform:** Ensure you are\
  \ logged into app.deepsquare.run. 2. **Navigate to Workflows:** Go to the 'Workflows'\
  \ section in the platform. 3. **Create a new Workflow:** Click on the 'New Workflow'\
  \ and copy paste the content of the `job.telegram_openai_assistant.yaml` file 4.\
  \ **Start the Workflow:** Once created, you can start the workflow by clicking on\
  \ the 'Run Workflow' button. 5. **Monitor and Access:** Monitor the progress of\
  \ your job under the 'Jobs' section. Upon completion, access the Telegram bot as\
  \ per the instructions provided in the job logs.\n\nLaunching through the DeepSquare\
  \ Command Line Tool\n\n1. **Install DeepSquare CLI:** If you haven\u2019t already,\
  \ install the DeepSquare CLI tool. Instructions can be found here. 2. **Clone the\
  \ Repository:** Clone the repository containing the `job.telegram_openai_assistant.yaml`\
  \ file. 3. **Navigate to the Repository Directory:** Open a terminal and navigate\
  \ to the directory where you cloned the repository. 4. **Run the Workflow File:**\
  \ Execute the following command:\n\n5. **Monitor the Job:** Use the following command\
  \ to monitor the status of your job:\n\n6. **Access the Telegram Bot:** Once the\
  \ job is complete, follow the instructions provided in the job logs to access and\
  \ interact with the Telegram bot.\n\nBy following these steps, you can effortlessly\
  \ launch and interact with the Telegram bot client on DeepSquare.\n\nContributions\n\
  \nWe welcome contributions to support this path forward. Some potential areas for\
  \ contribution include:\n\n- Designing the modular framework for multiple AI platforms.\
  \ - Adding integrations for new AI platforms - Improving bot configuration and management.\
  \ - Enhancing documentation for future developers and users.\n\n1. Fork the Project\
  \ 2. Create your Feature Branch (\\`git checkout -b feature/AmazingFeature\\`) 3.\
  \ Commit your Changes (\\`git commit -m 'Add some AmazingFeature'\\`) 4. Push to\
  \ the Branch (\\`git push origin feature/AmazingFeature\\`) 5. Open a Pull Request\n\
