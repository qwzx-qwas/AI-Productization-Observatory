raw_evidence_excerpt: 'DWService agent for Linux, Mac and Windows


  DWService - Agent


  This is DWService agent for operative systems Linux, Mac and Windows. The code is
  written in python2 and several libraries are written c++.


  Start the agent


  If you prefer you can start the agent from the sources but you keep in mind in this
  mode the agent does not update automatically, so you need to update sources manually
  every time. Before to start the agent you need to: - Install python3 - Install g++/make
  (if Windows download Mingw-w64 version 64bit or 32bit) - To compile Wayland support
  on Linux, install libraries: `libpipewire-0.3-dev`, `libdbus-1-3`, and `libdbus-1-dev`
  - Download agent source code (zip or git clone) - Execute these commands from agent/make:


  Now you are ready to start the agent by execute this command from agent/core:


  If the agent still tries setting up a Xorg session on client connect, with Wayland
  active and even environment `XDG_SESSION_TYPE=wayland` set, try forcing Wayland
  in the agent configuration:


  Setup the agent for development


  Thanks Eclipse + Pydev and CDT you can develop the agent with only one IDE from
  your prefer operative system. You also need of python3 and g++/make (if Windows
  download Mingw-w64 version 64bit or 32bit) installed on your system. After configuring
  the IDE and importing the source code, you need to execute same scripts of **"Start
  the agent"** section.


  You can read the guide on the wiki to learn how to setup the agent for development.


  License Agreement


  This software is free and open source. It consists of one core component released
  under the MPLv2 license, and several libraries and components defined "app" that
  could be governed by different licenses. you can read the "LICENSE" file in each
  folder.'
