raw_evidence_excerpt: "Universal memory layer for AI Agents\n\nLearn more \xB7 Join\
  \ Discord \xB7 Demo\n\n\U0001F4C4 Building Production-Ready AI Agents with Scalable\
  \ Long-Term Memory \u2192\n\n\u26A1 +26% Accuracy vs. OpenAI Memory \u2022 \U0001F680\
  \ 91% Faster \u2022 \U0001F4B0 90% Fewer Tokens\n\n> **\U0001F389 mem0ai v1.0.0\
  \ is now available!** This major release includes API modernization, improved vector\
  \ store support, and enhanced GCP integration. See migration guide \u2192\n\n\U0001F525\
  \ Research Highlights - **+26% Accuracy** over OpenAI Memory on the LOCOMO benchmark\
  \ - **91% Faster Responses** than full-context, ensuring low-latency at scale -\
  \ **90% Lower Token Usage** than full-context, cutting costs without compromise\
  \ - Read the full paper\n\nIntroduction\n\nMem0 (\"mem-zero\") enhances AI assistants\
  \ and agents with an intelligent memory layer, enabling personalized AI interactions.\
  \ It remembers user preferences, adapts to individual needs, and continuously learns\
  \ over time\u2014ideal for customer support chatbots, AI assistants, and autonomous\
  \ systems.\n\nKey Features & Use Cases\n\n**Core Capabilities:** - **Multi-Level\
  \ Memory**: Seamlessly retains User, Session, and Agent state with adaptive personalization\
  \ - **Developer-Friendly**: Intuitive API, cross-platform SDKs, and a fully managed\
  \ service option\n\n**Applications:** - **AI Assistants**: Consistent, context-rich\
  \ conversations - **Customer Support**: Recall past tickets and user history for\
  \ tailored help - **Healthcare**: Track patient preferences and history for personalized\
  \ care - **Productivity & Gaming**: Adaptive workflows and environments based on\
  \ user behavior\n\n\U0001F680 Quickstart Guide\n\nChoose between our hosted platform\
  \ or self-hosted package:\n\nHosted Platform\n\nGet up and running in minutes with\
  \ automatic updates, analytics, and enterprise security.\n\n1. Sign up on Mem0 Platform\
  \ 2. Embed the memory layer via SDK or API keys\n\nSelf-Hosted (Open Source)\n\n\
  Install the sdk via pip:\n\nInstall sdk via npm:\n\nCLI\n\nManage memories from\
  \ your terminal:\n\nSee the CLI documentation for the full command reference.\n\n\
  Basic Usage\n\nMem0 requires an LLM to function, with `gpt-4.1-nano-2025-04-14 from\
  \ OpenAI as the default. However, it supports a variety of LLMs; for details, refer\
  \ to our Supported LLMs documentation.\n\nFirst step is to instantiate the memory:\n\
  \nFor detailed integration steps, see the Quickstart and API Reference.\n\n\U0001F517\
  \ Integrations & Demos\n\n- **ChatGPT with Memory**: Personalized chat powered by\
  \ Mem0 (Live Demo) - **Browser Extension**: Store memories across ChatGPT, Perplexity,\
  \ and Claude (Chrome Extension) - **Langgraph Support**: Build a customer bot with\
  \ Langgraph + Mem0 (Guide) - **CrewAI Integration**: Tailor CrewAI outputs with\
  \ Mem0 (Example)\n\n\U0001F4DA Documentation & Support\n\n- Full docs: https://docs.mem0.ai\
  \ - Community: Discord \xB7 X (formerly Twitter) - Contact: founders@mem0.ai\n\n\
  Citation\n\nWe now have a paper you can cite:\n\n\u2696\uFE0F License\n\nApache\
  \ 2.0 \u2014 see the LICENSE file for details."
