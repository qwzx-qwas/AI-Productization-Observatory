raw_evidence_excerpt: "DBpedia Chatbot\n\n** NOTE: THIS PROJECT IS DEPRECATED AND\
  \ WILL NOT BE MAINTAINED **\n\nDBpedia Chatbot\n\n**Final Application**\n\nFor more\
  \ information about this project and **GSoC Progress** please refer to **GSoC Wiki**\n\
  \nEnvironment Configurations\n\nWhen running locally or in development, include\
  \ the following configuration as a properties file in the `src/main/resources` folder.\n\
  \nIn case you do not have a proper CouchDB instance or API key,s please use the\
  \ following **dummy configuration file**.\n\n_Please note that using the dummy configuration\
  \ file can result in some features being unavailable since they may require the\
  \ requisite API services._\n\nDevelopment Only Configurations\n\nDeployment\n\n\
  Development\n\nEmbed Code\n\nAdd the following snippet to the ` ` section of the\
  \ webpage where you want to embed the ChatBot.\n\nAPI Usage The chatbot exposes\
  \ a REST API that allows developers to integrate chatbot functionality into their\
  \ applications.\n\nEndpoint\n\n**Note:** This is a public webhook endpoint that\
  \ does not require authentication. Currently, no application-level rate limiting\
  \ is configured. For production deployments, consider implementing rate limiting\
  \ via an API gateway or reverse proxy (e.g., nginx, AWS API Gateway) to prevent\
  \ abuse.\n\nRequest Format\n\n| Field | Type | Description | |-------|------|-------------|\
  \ | userId | string | Unique identifier for the user/session | | messageType | string\
  \ | `text` for queries, `parameter` for button responses | | messageData | array\
  \ | Array containing message objects with `text` field |\n\nResponse Format The\
  \ API returns an array of response objects:\n\n| Field | Type | Description | |-------|------|-------------|\
  \ | messageType | string | Type of response (typically `text`) | | messageData |\
  \ array | Array of response objects | | title | string | Title/subject of the response\
  \ | | text | string | Main response content | | image | string | URL to related\
  \ image (optional, may be empty) | | buttons | array | Interactive buttons for follow-up\
  \ actions (optional) |\n\nExample\n\n**Request:**\n\n**Response:**\n\nSample Queries\
  \ - \"Who is Albert Einstein?\" - \"What is the capital of France?\" - \"Tell me\
  \ about DBpedia\" - \"Where is Paris?\"\n\nLimitations & Notes\n\n- **Supported\
  \ messageType values:** Only `text` and `parameter` are currently supported - **Query\
  \ length:** For optimal results, keep queries concise (under 200 characters recommended)\
  \ - **Character encoding:** UTF-8 is fully supported, including special characters\
  \ (\xB2, \u20AC, etc.) - **Error responses:** Invalid messageType or malformed requests\
  \ may return HTTP 500 errors\n\nTesting Locally\n\nIf running the chatbot locally:\n\
  \nCitation"
