summary: Agentic AI Framework for Java Developers
raw_evidence_excerpt: "Agentic AI Framework for Java Developers\n\nSpring AI Alibaba\n\
  \nA production-ready framework for building Agentic, Workflow, and Multi-agent applications.\n\
  \nAgent Framework Docs , Graph Docs , Spring AI , Examples .\n\nArchitecture\n\n\
  **Spring AI Alibaba Admin** is a one-stop Agent platform that supports visualized\
  \ Agent development, observability, evaluation, and MCP management, etc. It also\
  \ integrates with open-source low-code platforms like Dify, enabling rapid migration\
  \ from DSL to Spring AI Alibaba project.\n\n**Spring AI Alibaba Agent Framework**\
  \ is an agent development framework that can quickly develop agents with builtin\
  \ **Context Engineering** and **Human In The Loop** support. For scenarios requiring\
  \ more complex process control, Agent Framework offers built-in workflows like `SequentialAgent`,\
  \ `ParallelAgent`, `RoutingAgent`, `LoopAgent`.\n\n**Spring AI Alibaba Graph** serves\
  \ as the underlying runtime of the Agent Framework, providing essential capabilities\
  \ such as persistence, workflow orchestration, and streaming required for long-running\
  \ stateful agents. Compared to the Agent Framework, users can build more flexible\
  \ multi-agent workflows based on the Graph API.\n\nCore Features\n\n* **Multi-Agent\
  \ Orchestration**: Compose multiple agents with built-in patterns including `SequentialAgent`,\
  \ `ParallelAgent`, `RoutingAgent`, and `LoopAgent` for complex task execution.\n\
  \n* **Multimodal Support**: ReactAgent with text and media input (image understanding).\
  \ ReactAgent with tool based image or audio generation.\n\n* **Voice Agent**: WebSocket-based\
  \ real-time voice agent that supports streaming audio or text input and responds\
  \ with generated audio.\n\n* **Context Engineering**: Built-in best practices for\
  \ context engineering policies to improve agent reliability and performance, including\
  \ human-in-the-loop, context compaction, context editing, model & tool call limit,\
  \ tool retry, planning, dynamic tool selection.\n\n* **Graph-based Workflow**: Graph\
  \ based workflow runtime and api for conditional routing, nested graphs, parallel\
  \ execution, and state management. Export workflows to PlantUML and Mermaid formats.\n\
  \n* **A2A Support**: Agent-to-Agent communication support with Nacos integration,\
  \ enabling distributed agent coordination and collaboration across services.\n\n\
  * **Rich Model, Tool and MCP Support**: Leveraging core concepts of Spring AI, supports\
  \ multiple LLM providers (DashScope, OpenAI, etc.), tool calling, and Model Context\
  \ Protocol (MCP).\n\n* **One-stop Agent Platform**: Build agent in a visualized\
  \ way, deploy agent without code or export as a standalone java project.\n\nGetting\
  \ Started\n\nPrerequisites\n\n* Requires JDK 17+. * Choose your LLM provider and\
  \ get the API-KEY.\n\nQuickly Run a ChatBot\n\nThere's a ChatBot example provided\
  \ by the community at examples/chatbot.\n\n1. Download the code.\n\n2. Start the\
  \ ChatBot.\n\nBefore starting, set API-KEY first (visit Aliyun Bailian to get API-KEY):\n\
  \n3. Chat with ChatBot.\n\nOpen the browser and visit http://localhost:8080/chatui/index.html\
  \ to chat with the ChatBot.\n\nChatbot Code Explained\n\n1. Add dependencies\n\n\
  2. Define Chatbot\n\nFor more details of how to write a Chatbot, please check the\
  \ Quick Start on our official website.\n\n\U0001F4DA Documentation * Overview -\
  \ High level overview of the framework * Quick Start - Get started with a simple\
  \ agent * Agent Framework Tutorials - Step by step tutorials * Use Graph API to\
  \ Build Complex Workflows - In-depth user guide for building multi-agent and workflows\
  \ * Spring AI Basics - Ai Application basic concepts, including ChatModel, MCP,\
  \ Tool, Messages, etc.\n\nProject Structure\n\nThis project consists of several\
  \ core components:\n\n* spring-ai-alibaba-agent-framework: A multi-agent framework\
  \ designed for building intelligent agents with built-in context engineering best\
  \ practices. * spring-ai-alibaba-graph: The underlying runtime for Agent Framework.\
  \ We recommend developers to use Agent Framework but it's totally fine to use the\
  \ Graph API directly. * spring-ai-alibaba-admin: A one-stop Agent platform that\
  \ supports visualized Agent development, observability, evaluation, and MCP management,\
  \ etc. * spring-ai-alibaba-studio: The embedded ui for quickly debugging agent in\
  \ a visualized way. * spring-boot-starters: Starters integrating Agent Framework\
  \ with Nacos to provide A2A and dynamic config features.\n\nSpring AI Alibaba Ecosystem\
  \ Repository | Description | \u2B50 --- | --- | ---\n\nContact Us\n\n* Dingtalk\
  \ Group (\u9489\u9489\u7FA4), search `94405033092` and join.\n\n* WeChat Group (\u5FAE\
  \u4FE1\u516C\u4F17\u53F7), scan the QR code below and follow us.\n\nResources *\
  \ AI-Native Application Architecture White Paper\uFF1ACo-authored by 40 frontline\
  \ engineers and endorsed by 15 industry experts, this 200,000+ word white paper\
  \ is the first comprehensive guide dedicated to the full DevOps lifecycle of AI-native\
  \ applications. It systematically breaks down core concepts and key challenges,\
  \ offering practical problem-solving approaches and architectural insights.\n\n\
  Star History\n\n---\n\nMade with \u2764\uFE0F by the Spring AI Alibaba Team"
