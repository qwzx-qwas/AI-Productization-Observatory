summary: "\U0001F680 Retrieval Augmented Generation (RAG) with txtai. Combine search\
  \ and LLMs to find insights with your own data."
raw_evidence_excerpt: "\U0001F680 Retrieval Augmented Generation (RAG) with txtai.\
  \ Combine search and LLMs to find insights with your own data.\n\n\U0001F680 RAG\
  \ with txtai\n\nThis project is a Retrieval Augmented Generation (RAG) Streamlit\
  \ application backed by txtai.\n\nRetrieval Augmented Generation (RAG) helps generate\
  \ factually correct content by limiting the context in which a LLM can generate\
  \ answers. This is typically done with a search query that hydrates a prompt with\
  \ a relevant context.\n\nThis application supports two categories of RAG.\n\n- Vector\
  \ RAG: Context supplied via a vector search query - Graph RAG: Context supplied\
  \ via a graph path traversal query\n\nQuickstart\n\nThe two primary ways to run\
  \ this application are as a Docker container and with a Python virtual environment.\
  \ Running through Docker is recommended, at least to get an idea of the application's\
  \ capabilities.\n\nDocker\n\nneuml/rag is available on Docker Hub:\n\nThis can be\
  \ run with the default settings as follows.\n\nPython virtual environment\n\nThe\
  \ application can also be directly installed and run. It's recommended that this\
  \ be run within a Python virtual environment.\n\nStart the application.\n\nDemo\n\
  \nThe short video clip above gives a brief overview on this RAG system. It shows\
  \ a basic vector RAG query. It also shows a Graph RAG query with uploaded data.\
  \ The following sections cover more on these concepts.\n\nRAG\n\nTraditional RAG\
  \ or vector RAG runs a vector search to find the top N most relevant matches to\
  \ a user's input. Those matches are passed to an LLM and the answer is returned.\n\
  \nThe query `Who created Linux?` runs a vector search for the best matching documents\
  \ in the Embeddings index. Those matches are then placed into a LLM prompt. The\
  \ LLM prompt is executed and the answer is returned.\n\nGraph RAG\n\nGraph RAG is\
  \ a new method that uses knowledge or semantic graphs to generate a context. Instead\
  \ of a vector search, graph path queries are run. Graph RAG in the context of this\
  \ application supports the following methods to generate context.\n\n- Graph query\
  \ with the `gq: ` prefix. This is a form of graph query expansion. It starts with\
  \ a vector search to find the top n results. Those results are then expanded using\
  \ a graph network stored alongside the vector database. - `gq: Tell me about Linux`\n\
  \n- Graph path query. This query takes a list of concepts and finds the nodes that\
  \ match closest to those concepts. A graph path traversal then runs to build a context\
  \ of nodes related to those concepts. The result of this traversal is passed to\
  \ the LLM as the context. - `linux -> macos -> microsoft windows`\n\n- Combination\
  \ of both. This first runs a graph path query then runs a graph query only within\
  \ the context of that path traversal. - `linux -> macos -> microsoft windows gq:\
  \ Tell me about Linux`\n\nEvery Graph RAG query response will also show a corresponding\
  \ graph to help understand how the query works. Each node in the graph is a section\
  \ (paragraph). The node nodes are generated with a LLM prompt that applies a topic\
  \ label at upload time.\n\nAdding data to the index\n\nRegardless of whether the\
  \ RAG application was a new Embeddings index or an existing one, additional data\
  \ can be added.\n\nData can be added as follows.\n\n| Method | | |:-------------------------------------------\
  \ |:-------------------------------------- | | `# file path or URL` | !Upload File\
  \ | | `# custom notes and text as a string here!` | !Upload Text |\n\nWhen a query\
  \ begins with a `#` the URL or file is read by the RAG application and loaded into\
  \ the index. This method also supports loading text directly into the index. For\
  \ example `# txtai is an all-in-one AI framework` would create a new entry in the\
  \ Embeddings database.\n\nConfiguration parameters\n\nThe RAG application has a\
  \ number of environment variables that can be set to control how the application\
  \ behaves.\n\n| Variable | Description | Default Value | |:----------- |:-------------------------------------------\
  \ |:----------------------------------- | | TITLE | Main title of the application\
  \ | \U0001F680 RAG with txtai | | EXAMPLES | List of queries separated by `;` |\
  \ `Who created Linux?` | | | | `gq: Tell me about Linux` | | | | `linux -> macos\
  \ -> microsoft windows` | | | | `linux -> macos -> microsoft windows gq: Tell me\
  \ about Linux` | | LLM | Path to LLM | Qwen3-4B-Instruct-2507 | | EMBEDDINGS | Embeddings\
  \ database path | neuml/txtai-wikipedia-slim | | MAXLENGTH | Maximum generation\
  \ length | 2048 for topics, 4096 for RAG | | STRIPTHINK | Strip thinking text from\
  \ responses | False | | CONTEXT | RAG context size | 10 | | TEXTBACKEND | Text extraction\
  \ backend | available | | DATA | Optional directory to index data from | None |\
  \ | PERSIST | Optional directory to save index updates to | None | | TOPICSBATCH\
  \ | Optional batch size for LLM topic queries | None |\n\nIn the application, these\
  \ settings can be shown by typing `:settings`.\n\nSee the following examples for\
  \ setting this configuration with the Docker container. When running within a Python\
  \ virtual environment, simply set these as environment variables.\n\nGPT-OSS\n\n\
  GPT-OSS via Ollama\n\nGPT-5.1\n\nRun with another embeddings index\n\nStart with\
  \ an empty embeddings index\n\nBuild an embeddings index with a local directory\
  \ of files\n\nUse the Docling text extraction backend\n\nPersist embeddings and\
  \ cache models\n\nSee the documentation for the LLM pipeline and Embeddings for\
  \ more information.\n\nFurther Reading\n\n- Introducing RAG with txtai"
