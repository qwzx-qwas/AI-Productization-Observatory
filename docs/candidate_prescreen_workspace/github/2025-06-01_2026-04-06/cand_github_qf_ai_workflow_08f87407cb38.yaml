raw_evidence_excerpt: "AI-Driven Life Cycle (AI-DLC) adaptive workflow steering rules\
  \ for AI coding agents\n\nAI-DLC (AI-Driven Development Life Cycle)\n\n> [!IMPORTANT]\
  \ > Generative AI can make mistakes. You should consider reviewing all output and\
  \ costs generated by your chosen AI model and agentic coding assistant. See AWS\
  \ Responsible AI Policy.\n\nAI-DLC is an intelligent software development workflow\
  \ that adapts to your needs, maintains quality standards, and keeps you in control\
  \ of the process. For learning more about AI-DLC Methodology, read this blog and\
  \ the Method Definition Paper referred in it.\n\nTable of Contents\n\n- Quick Start\
  \ - Platform-Specific Setup - Usage - Three-Phase Adaptive Workflow - Key Features\
  \ - Extensions - Tenets - Prerequisites - Troubleshooting - Version Control Recommendations\
  \ - Additional Resources - Security - License\n\n---\n\nQuick Start\n\n1. Download\
  \ the latest release zip from the Releases page to a folder **outside** your project\
  \ directory (e.g., `~/Downloads`). 2. Extract the zip. It contains an `aidlc-rules/`\
  \ folder with two subdirectories: - `aws-aidlc-rules/` \u2014 the core AI-DLC workflow\
  \ rules - `aws-aidlc-rule-details/` \u2014 detailed rules conditionally referenced\
  \ by the core rules 3. Follow the setup instructions for your coding agent and platform\
  \ below.\n\n---\n\nPlatform-Specific Setup\n\n- Kiro - Amazon Q Developer IDE Plugin\
  \ - Cursor IDE - Cline - Claude Code - GitHub Copilot - Other Agents\n\n---\n\n\
  Kiro\n\nAI-DLC uses Kiro Steering Files within your project workspace.\n\nThe commands\
  \ below assume you extracted the zip to your `Downloads` folder. If you used a different\
  \ location, replace `Downloads` with your actual folder path.\n\nOn macOS/Linux:\n\
  \nOn Windows (PowerShell):\n\nOn Windows (CMD):\n\nYour project should look like:\n\
  \nTo verify the rules are loaded:\n\nVerify in Kiro IDE\n\nOpen the steering files\
  \ panel and confirm you see an entry for `core-workflow` under `Workspace` as shown\
  \ in the screenshot below.\n\nWe use Kiro IDE in Vibe mode to run the AI-DLC workflow.\
  \ This ensures that AI-DLC workflow guides the development workflow in Kiro. At\
  \ times, Kiro may nudge you to switch to spec mode. Select `No` to such prompts\
  \ to stay in Vibe mode.\n\nVerify in Kiro CLI Run `kiro-cli`, then `/context show`,\
  \ and confirm entries for `.kiro/steering/aws-aidlc-rules`.\n\n---\n\nAmazon Q Developer\
  \ IDE Plugin/Extension\n\nAI-DLC uses Amazon Q Rules within your project workspace.\n\
  \nThe commands below assume you extracted the zip to your `Downloads` folder. If\
  \ you used a different location, replace `Downloads` with your actual folder path.\n\
  \nOn macOS/Linux:\n\nOn Windows (PowerShell):\n\nOn Windows (CMD):\n\nYour project\
  \ should look like:\n\nTo verify the rules are loaded:\n\n1. In the Amazon Q Chat\
  \ window, click the `Rules` button in the lower right corner. 2. Confirm you see\
  \ entries for `.amazonq/rules/aws-aidlc-rules`.\n\n---\n\nCursor IDE\n\nAI-DLC uses\
  \ Cursor Rules to implement its intelligent workflow.\n\nThe commands below assume\
  \ you extracted the zip to your `Downloads` folder. If you used a different location,\
  \ replace `Downloads` with your actual folder path.\n\nOption 1: Project Rules (Recommended)\n\
  \n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\n**Windows CMD:**\n\nOption\
  \ 2: AGENTS.md (Simple Alternative)\n\n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\
  \n**Windows CMD:**\n\n**Verify Setup:** 1. Open **Cursor Settings \u2192 Rules,\
  \ Commands** 2. Under **Project Rules**, you should see `ai-dlc-workflow` listed\
  \ 3. For `AGENTS.md`, it will be automatically detected and applied\n\n**Directory\
  \ Structure (Option 1):**\n\n---\n\nCline\n\nAI-DLC uses Cline Rules to implement\
  \ its intelligent workflow.\n\nThe commands below assume you extracted the zip to\
  \ your `Downloads` folder. If you used a different location, replace `Downloads`\
  \ with your actual folder path.\n\nOption 1: .clinerules Directory (Recommended)\n\
  \n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\n**Windows CMD:**\n\nOption\
  \ 2: AGENTS.md (Alternative)\n\n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\
  \n**Windows CMD:**\n\n**Verify Setup:** 1. In Cline's chat interface, look for the\
  \ Rules popover under the chat input field 2. Verify that `core-workflow.md` is\
  \ listed and active 3. You can toggle the rule file on/off as needed\n\n**Directory\
  \ Structure (Option 1):**\n\n---\n\nClaude Code\n\nAI-DLC uses Claude Code's project\
  \ memory file (`CLAUDE.md`) to implement its intelligent workflow.\n\nThe commands\
  \ below assume you extracted the zip to your `Downloads` folder. If you used a different\
  \ location, replace `Downloads` with your actual folder path.\n\nOption 1: Project\
  \ Root (Recommended)\n\n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\n**Windows\
  \ CMD:**\n\nOption 2: .claude Directory\n\n**Unix/Linux/macOS:**\n\n**Windows PowerShell:**\n\
  \n**Windows CMD:**\n\n**Verify Setup:** 1. Start Claude Code in your project directory\
  \ (CLI: `claude` or VS Code extension) 2. Use the `/config` command to view current\
  \ configuration 3. Ask Claude: \"What instructions are currently active in this\
  \ project?\"\n\n**Directory Structure (Option 1):**\n\n---\n\nGitHub Copilot\n\n\
  AI-DLC uses GitHub Copilot custom instructions to implement its intelligent workflow.\
  \ The `.github/copilot-instructions.md` file is automatically detected and applied\
  \ to all chat requests in the workspace.\n\nThe commands below assume you extracted\
  \ the zip to your `Downloads` folder. If you used a different location, replace\
  \ `Downloads` with your actual folder path.\n\n**Unix/Linux/macOS:**\n\n**Windows\
  \ PowerShell:**\n\n**Windows CMD:**\n\n**Verify Setup:** 1. Open VS Code with your\
  \ project folder 2. Open the Copilot Chat panel (Cmd/Ctrl+Shift+I) 3. Select **Configure\
  \ Chat** (gear icon) > **Chat Instructions** and verify that `copilot-instructions`\
  \ is listed 4. Alternatively, type `/instructions` in the chat input to view active\
  \ instructions\n\n**Directory Structure:**\n\n---\n\nOther Agents\n\nAI-DLC works\
  \ with any coding agent that supports project-level rules or steering files. The\
  \ general approach:\n\n1. Place `aws-aidlc-rules/` wherever your agent reads project\
  \ rules from (consult your agent's documentation). 2. Place `aws-aidlc-rule-details/`\
  \ at a sibling level so the rules can reference it.\n\nIf your agent has no convention\
  \ for rules files, place both folders at your project root and point the agent to\
  \ `aws-aidlc-rules/` as its rules directory.\n\n---\n\nUsage\n\n1. Start any software\
  \ development project by stating your intent starting with the phrase **\"Using\
  \ AI-DLC, ...\"** in the chat 2. AI-DLC workflow automatically activates and guides\
  \ you from there 3. Answer structured questions that AI-DLC asks you 4. Carefully\
  \ review every plan that AI generates. Provide your oversight and validation 5.\
  \ Review the execution plan to see which stages will run 6. Carefully review the\
  \ artifacts and approve each stage to maintain control 7. All the artifacts will\
  \ be generated in the `aidlc-docs/` directory\n\n---\n\nThree-Phase Adaptive Workflow\n\
  \nAI-DLC follows a structured three-phase approach that adapts to your project's\
  \ complexity:\n\n\U0001F535 INCEPTION PHASE Determines **WHAT** to build and **WHY**\
  \ - Requirements analysis and validation - User story creation (when applicable)\
  \ - Application Design and creating units of work for parallel development - Risk\
  \ assessment and complexity evaluation\n\n\U0001F7E2 CONSTRUCTION PHASE Determines\
  \ **HOW** to build it - Detailed component design - Code generation and implementation\
  \ - Build configuration and testing strategies - Quality assurance and validation\n\
  \n\U0001F7E1 OPERATIONS PHASE Deployment and monitoring (future) - Deployment automation\
  \ and infrastructure - Monitoring and observability setup - Production readiness\
  \ validation\n\n---\n\nKey Features"
