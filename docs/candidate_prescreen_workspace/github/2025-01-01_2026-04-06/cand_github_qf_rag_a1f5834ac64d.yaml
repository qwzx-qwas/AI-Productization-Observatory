  Running the project


  python3.11 -m venv myenv


  source myenv/bin/activate


  pip install requests beautifulsoup4 langchain langchain-openai faiss-cpu numpy lxml
  openai


  pip install --upgrade pip


  pip install -r requirements.txt


  AWS Deployment Guide


  This guide walks you through the process of deploying your application on an AWS
  EC2 instance.


  1. Launch EC2 Instance


  1. Go to the Amazon AWS console and search for "EC2". 2. Click on "Launch Instance".
  3. Provide a name for your instance.


  View Screenshot


  4. Select the instance type that suits your needs.


  View Screenshot


  2. Configure Network Settings


  1. Click on "Edit" in the Network Settings section.


  View Screenshot


  2. Click on "Add security group rule".


  View Screenshot


  3. Add port range 8501 and set the source type to "Anywhere". 4. Click on "Launch
  Instance".


  View Screenshot


  3. Connect to Your Instance


  1. Once the instance is launched, click on the instance ID.


  View Screenshot


  2. Click on "Connect".


  View Screenshot


