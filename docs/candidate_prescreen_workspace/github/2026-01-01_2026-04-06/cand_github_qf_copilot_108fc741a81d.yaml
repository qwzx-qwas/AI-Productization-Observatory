summary: SOCFortress CoPilot
raw_evidence_excerpt: "SOCFortress CoPilot\n\nSOCFortress CoPilot focuses on providing\
  \ a single pane of glass for all your security operations needs. Simplify your open\
  \ source security stack with a single platform focused on making open source security\
  \ tools easier to use and more accessible.\n\nTable of contents\n\n- Getting Started\
  \ - Install / Upgrade - Connectors - Help - License - Sponsoring\n\nGetting started\n\
  \n\U0001F4DA **Documentation:** https://docs.socfortress.co\n\nCoPilot's true power\
  \ comes from the ability to integrate with your existing security stack. We have\
  \ built-in integrations with the following tools:\n\n- Wazuh - Graylog - Velociraptor\
  \ - Grafana - InfluxDB\n\n\u2757\uFE0F **Note:** CoPilot is currently in beta. We\
  \ are actively working on adding more integrations and features. If you have any\
  \ suggestions or feedback, please let us know!\n\nInstall / Upgrade\n\nAll install\
  \ + upgrade instructions live in the docs site (so the README doesn\u2019t drift):\n\
  \n- **Docs home:** https://docs.socfortress.co - **Install / Upgrade:** https://docs.socfortress.co/getting-started/install-upgrade\
  \ - (Source file) `docs/getting-started/install-upgrade.mdx`\n\nQuick upgrade reminder\
  \ (from your CoPilot directory):\n\nConnectors\n\nCoPilot is designed to be a single\
  \ pane of glass for your security operations. Think of it as a hub for all your\
  \ security tools. CoPilot Connectors are the glue that binds your security tools\
  \ to CoPilot. We take advantage of the APIs and webhooks provided by your security\
  \ tools to provide a seamless integration.\n\nHelp\n\nYou can reach us on Discord\
  \ or by \U0001F4E7 if you have any question, issue or idea!\n\nLicense\n\nThe contents\
  \ of this repository is available under AGPL-3.0 license.\n\nSponsoring\n\nIf you\
  \ like this project and want to support it, you can consider becoming a sponsor\
  \ to help us continue maintaining it and adding new features."
