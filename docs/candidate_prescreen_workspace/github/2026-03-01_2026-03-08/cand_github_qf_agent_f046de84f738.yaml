  \ **Prerequisites**\n\nBefore installing DeepCode, ensure you have the following:\n\
  \n| Requirement | Version | Purpose |\n|-------------|---------|---------|\n| **Python**\
  \ | 3.9+ | Core runtime |\n| **Node.js** | 18+ | New UI frontend |\n| **npm** |\
  \ 8+ | Package management |\n\n```bash\n# Check your versions\npython --version\
  \   # Should be 3.9+\nnode --version     # Should be 18+\nnpm --version      # Should\
  \ be 8+\n```\n\n<details>\n<summary><strong>\U0001F4E5 Install Node.js (if not installed)</strong></summary>\n\
  \n```bash\n# macOS (using Homebrew)\nbrew install node\n\n# Ubuntu/Debian\ncurl\
  \ -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -\nsudo apt-get install\
  \ -y nodejs\n\n# Windows\n# Download from https://nodejs.org/\n```\n\n</details>\n\
  \n### \U0001F4E6 **Step 1: Installation**\n\nChoose one of the following installation\
  \ methods:\n\n#### \u26A1 **Direct Installation (Recommended)**\n\n```bash\n# \U0001F680\
  \ Install DeepCode package directly\npip install deepcode-hku\n\n# \U0001F511 Download\
  \ configuration files\ncurl -O https://raw.githubusercontent.com/HKUDS/DeepCode/main/mcp_agent.config.yaml\n\
  curl -O https://raw.githubusercontent.com/HKUDS/DeepCode/main/mcp_agent.secrets.yaml\n\
  ```\n\n#### \U0001F527 **Development Installation (From Source)**\n\n<details>\n\
  <summary><strong>\U0001F4C2 Click to expand development installation options</strong></summary>\n\
  \n##### \U0001F525 **Using UV (Recommended for Development)**\n\n```bash\ngit clone\
  \ https://github.com/HKUDS/DeepCode.git\ncd DeepCode/\n\ncurl -LsSf https://astral.sh/uv/install.sh\
  \ | sh\nuv venv --python=3.13\nsource .venv/bin/activate  # On Windows: .venv\\\
  Scripts\\activate\nuv pip install -r requirements.txt\n\n# Install frontend dependencies\n\
  npm install --prefix new_ui/frontend\n```\n\n##### \U0001F40D **Using Traditional\
  \ pip**\n\n```bash\ngit clone https://github.com/HKUDS/DeepCode.git\ncd DeepCode/\n\
  \npip install -r requirements.txt\n\n# Install frontend dependencies\nnpm install\
  \ --prefix new_ui/frontend\n```\n\n</details>\n\n### \U0001F527 **Step 2: Configuration**\n\
  \n> The following configuration applies to **all installation methods** (pip, UV,\
  \ source, and Docker).\n\n#### \U0001F511 API Keys *(required)*\n\nEdit `mcp_agent.secrets.yaml`\
  \ with your API keys:\n\n```yaml\n# At least ONE provider API key is required\n\
  openai:\n  api_key: \"your_openai_api_key\"\n  base_url: \"https://openrouter.ai/api/v1\"\
  \  # Optional: for OpenRouter or custom endpoints\n\nanthropic:\n  api_key: \"your_anthropic_api_key\"\
  \  # For Claude models\n\ngoogle:\n  api_key: \"your_google_api_key\"     # For\
  \ Gemini models\n```\n\n#### \U0001F916 LLM Provider *(optional)*\n\nEdit `mcp_agent.config.yaml`\
  \ to choose your preferred LLM provider (line ~106):\n\n```yaml\n# Options: \"google\"\
  , \"anthropic\", \"openai\"\n# If not set or unavailable, will automatically fallback\
  \ to first available provider\nllm_provider: \"google\"\n```\n\n#### \U0001F50D\
  \ Search API Keys *(optional)*\n\nConfigure web search in `mcp_agent.config.yaml`:\n\
  \n```yaml\n# For Brave Search (default) \u2014 set in brave.env section (line ~28)\n\
  brave:\n  env:\n    BRAVE_API_KEY: \"your_brave_api_key_here\"\n\n# For Bocha-MCP\
  \ (alternative) \u2014 set in bocha-mcp.env section (line ~74)\nbocha-mcp:\n  env:\n\
  \    BOCHA_API_KEY: \"your_bocha_api_key_here\"\n```\n\n#### \U0001F4C4 Document\
  \ Segmentation *(optional)*\n\nControl document processing in `mcp_agent.config.yaml`:\n\
  \n```yaml\ndocument_segmentation:\n  enabled: true          # true/false \u2014\
  \ whether to use intelligent document segmentation\n  size_threshold_chars: 50000\
  \  # Document size threshold to trigger segmentation\n```\n\n<details>\n<summary><strong>\U0001FA9F\
  \ Windows Users: Additional MCP Server Configuration</strong></summary>\n\nIf you're\
  \ using Windows, you may need to configure MCP servers manually in `mcp_agent.config.yaml`:\n\
  \n```bash\n# 1. Install MCP servers globally\nnpm i -g @modelcontextprotocol/server-brave-search\n\
  npm i -g @modelcontextprotocol/server-filesystem\n\n# 2. Find your global node_modules\
  \ path\nnpm -g root\n```\n\nThen update your `mcp_agent.config.yaml` to use absolute\
  \ paths:\n\n```yaml\nmcp:\n  servers:\n    brave:\n      command: \"node\"\n   \
  \   args: [\"C:/Program Files/nodejs/node_modules/@modelcontextprotocol/server-brave-search/dist/index.js\"\
  ]\n    filesystem:\n      command: \"node\"\n      args: [\"C:/Program Files/nodejs/node_modules/@modelcontextprotocol/server-filesystem/dist/index.js\"\
  , \".\"]\n```\n\n> **Note**: Replace the path with your actual global node_modules\
  \ path from step 2.\n\n</details>\n\n<details>\n<summary><strong>\U0001F50D Search\
  \ Server Configuration (Optional)</strong></summary>\n\nDeepCode supports multiple\
  \ search servers for web search functionality. You can configure your preferred\
  \ option in `mcp_agent.config.yaml`:\n\n```yaml\n# Default search server configuration\n\
  # Options: \"brave\" or \"bocha-mcp\"\ndefault_search_server: \"brave\"\n```\n\n\
  **Available Options:**\n- **\U0001F50D Brave Search** (`\"brave\"`): Default option\
  \ with high-quality search results. Requires `BRAVE_API_KEY`. Recommended for most\
  \ users.\n- **\U0001F310 Bocha-MCP** (`\"bocha-mcp\"`): Alternative search server.\
  \ Requires `BOCHA_API_KEY`. Uses local Python server implementation.\n\n**Full MCP\
  \ server configuration in mcp_agent.config.yaml:**\n```yaml\n# For Brave Search\
  \ (default) - around line 28\nbrave:\n  command: \"npx\"\n  args: [\"-y\", \"@modelcontextprotocol/server-brave-search\"\
  ]\n  env:\n    BRAVE_API_KEY: \"your_brave_api_key_here\"\n\n# For Bocha-MCP (alternative)\
  \ - around line 74\nbocha-mcp:\n  command: \"python\"\n  args: [\"tools/bocha_search_server.py\"\
  ]\n  env:\n    PYTHONPATH: \".\"\n    BOCHA_API_KEY: \"your_bocha_api_key_here\"\
  \n```\n\n> **\U0001F4A1 Tip**: Both search servers require API key configuration.\
  \ Choose the one that best fits your API access and requirements.\n\n</details>\n\
  \n### \u26A1 **Step 3: Launch Application**\n\nChoose your preferred launch method:\n\
  \n<table width=\"100%\">\n<tr>\n<th width=\"33%\">\U0001F433 Docker (Recommended)</th>\n\
  <th width=\"33%\">\U0001F680 Local (<code>deepcode</code> command)</th>\n<th width=\"\
