  ```bash\ndeepcode\n# Frontend \u2192 http://localhost:5173\n# Backend  \u2192 http://localhost:8000\n\
  # Ctrl+C to stop\n```\n\nFeatures: User-in-Loop, real-time progress, inline chat.\n\
  \n</td><td>\n\n```bash\n# macOS / Linux\n./run.sh\n# or: python deepcode.py\n\n\
  # Windows\nrun.bat\n# or: python deepcode.py\n\n# Classic Streamlit UI\ndeepcode\
  \ --classic\n\n# CLI mode\ndeepcode --cli\n# or: python cli/main_cli.py\n```\n\n\
  </td></tr>\n</table>\n\n<details>\n<summary><strong>\U0001F433 Docker Management\
  \ Commands</strong></summary>\n\n```bash\n./deepcode_docker/run_docker.sh stop \
  \     # Stop\n./deepcode_docker/run_docker.sh restart   # Restart (no rebuild needed\
  \ for config changes)\n./deepcode_docker/run_docker.sh --build   # Force rebuild\n\
  ./deepcode_docker/run_docker.sh logs      # Real-time logs\n./deepcode_docker/run_docker.sh\
  \ status    # Health check\n./deepcode_docker/run_docker.sh clean     # Remove containers\
  \ & images\n```\n\nOr with Docker Compose directly:\n```bash\ndocker compose -f\
  \ deepcode_docker/docker-compose.yml up --build   # Build & start\ndocker compose\
  \ -f deepcode_docker/docker-compose.yml down         # Stop\ndocker compose -f deepcode_docker/docker-compose.yml\
  \ logs -f      # Logs\n```\n\n> **\U0001F4A1** Config files are mounted as volumes\
  \ \u2014 edit and restart, no rebuild needed.\n> **\U0001F4A1** Windows users: run\
  \ `docker compose` commands directly if shell scripts aren't available.\n\n</details>\n\
  \n### \U0001F3AF **Step 4: Generate Code**\n\n1. **\U0001F4C4 Input** \u2014 Upload\
  \ a research paper, type requirements, or paste a URL\n2. **\U0001F916 Processing**\
  \ \u2014 The multi-agent system analyzes, plans, and generates\n3. **\u26A1 Output**\
  \ \u2014 Receive production-ready code with tests and documentation\n\n---\n\n###\
  \ \U0001F527 **Troubleshooting**\n\n<details>\n<summary><strong>\u2753 Common Issues\
  \ & Solutions</strong></summary>\n\n| Problem | Cause | Fix |\n|---|---|---|\n|\
  \ Docker build fails with `tsc: not found` | Corrupted build cache | `docker builder\
  \ prune -f` then rebuild with `--no-cache` |\n| `error during connect` / `cannot\
  \ find the file` | Docker Desktop not running | Start Docker Desktop, wait until\
  \ ready, retry |\n| Frontend blank page | Corrupted `node_modules` | `cd new_ui/frontend\
  \ && rm -rf node_modules && npm install` |\n| `ERR_CONNECTION_REFUSED` | Wrong port\
  \ / backend not running | Docker: `http://localhost:8000`. Local: `http://localhost:5173`\
  \ |\n| `npm install` \u2192 `Could not read package.json` | Wrong directory | Use\
  \ `npm install --prefix new_ui/frontend` |\n| Windows: MCP servers not working |\
  \ Need absolute paths | See [Windows MCP Configuration](#-step-2-configuration)\
  \ above |\n\n</details>\n\n  ---\n\n## \U0001F916 nanobot Integration (Feishu Chatbot)\n\
  \n> Chat with DeepCode from **Feishu** \u2014 powered by [nanobot](https://github.com/HKUDS/nanobot).\n\
  \n<div align=\"center\">\n\n```mermaid\nflowchart LR\n    subgraph Clients[\"\U0001F4AC\
  \ Chat Platforms\"]\n        direction TB\n        F[\"<b>Feishu</b><br/>WebSocket\"\
  ]\n        T[\"<b>Telegram</b><br/>Polling\"]\n        D[\"<b>Discord</b><br/>Gateway\"\
  ]\n    end\n\n    subgraph Gateway[\"\U0001F408 nanobot Gateway\"]\n        direction\
  \ TB\n        A[\"Agent Loop<br/><i>LLM + Tool Calls</i>\"]\n    end\n\n    subgraph\
  \ Engine[\"\U0001F9E0 DeepCode Engine\"]\n        direction TB\n        P2C[\"Paper\
  \ \u2192 Code\"]\n        C2C[\"Chat \u2192 Code\"]\n        TRK[\"Task Tracking\"\
  ]\n    end\n\n    F & T & D <-->|\"messages\"| A\n    A -->|\"HTTP API\"| P2C &\
  \ C2C & TRK\n    A -.->|\"LLM API\"| LLM[\"\u2601\uFE0F OpenRouter\"]\n\n    style\
  \ Clients fill:#1a1a2e,stroke:#00d9ff,color:#fff\n    style Gateway fill:#1a1a2e,stroke:#4ecdc4,color:#fff\n\
  \    style Engine fill:#1a1a2e,stroke:#ff6b6b,color:#fff\n    style LLM fill:#1a1a2e,stroke:#9b59b6,color:#fff\n\
  ```\n\n</div>\n\n<div align=\"center\">\n<table><tr>\n<td align=\"center\"><a href=\"\
  https://github.com/HKUDS/DeepCode\"><img src=\"./assets/logo.png\" alt=\"DeepCode\"\
  \ height=\"55\"/></a></td>\n<td align=\"center\"><h2>\u2726</h2></td>\n<td align=\"\
  center\"><a href=\"https://github.com/HKUDS/nanobot\"><img src=\"./assets/nanobot.png\"\
  \ alt=\"nanobot\" height=\"55\"/></a></td>\n</tr></table>\n</div>\n\nBoth services\
  \ run inside the same **Docker Compose** network. Prerequisites: **Docker Desktop**\
  \ + **OpenRouter API Key** ([get one](https://openrouter.ai/keys)) + **Feishu App**.\n\
  \n---\n\n### Step 1 \xB7 Create a Feishu Bot\n\n<details open>\n<summary><b>Feishu\
  \ / Lark</b> (Recommended \u2014 WebSocket, no public IP needed)</summary>\n\n1.\
  \ Go to [Feishu Open Platform](https://open.feishu.cn/app) \u2192 **Create Custom\
  \ App**\n2. Enable **Bot** capability in App Features\n3. Add permissions: `im:message`\
  \ \xB7 `im:message:send_as_bot`\n4. Event Subscription \u2192 select **Long Connection**\
  \ \u2192 add `im.message.receive_v1`\n5. Note your **App ID** (`cli_xxx`) and **App\
  \ Secret** \u2192 Publish the app\n\n> **Note**: Feishu requires an active WebSocket\
  \ connection before you can save \"Long Connection\" mode. Start nanobot first (Step\
  \ 3), then come back to configure Event Subscription.\n\n</details>\n\n### Step\
  \ 2 \xB7 Configure\n\n```bash\ncp nanobot_config.json.example nanobot_config.json\n\
  ```\n\nEdit `nanobot_config.json` \u2014 fill in the 3 required fields:\n\n```jsonc\n\
  {\n  \"channels\": {\n    \"feishu\": {\n      \"enabled\": true,\n      \"appId\"\
  : \"cli_xxx\",              // \u2190 Feishu App ID\n      \"appSecret\": \"xxx\"\
  ,              // \u2190 Feishu App Secret\n      \"allowFrom\": []            \
  \      // [] = allow all users\n    }\n  },\n  \"providers\": {\n    \"openrouter\"\
  : {\n      \"apiKey\": \"sk-or-v1-xxx\"         // \u2190 OpenRouter API Key\n \
  \   }\n  },\n  \"agents\": {\n    \"defaults\": {\n      \"model\": \"anthropic/claude-sonnet-4-20250514\"\
  \n    }\n  }\n}\n```\n\n> **Model choice**: Any model on [openrouter.ai/models](https://openrouter.ai/models).\
  \ Use `anthropic/claude-sonnet-4-20250514` for English, `minimax/minimax-m2.1` for\
  \ Chinese.\n\n---\n\n### Step 3 \xB7 Launch\n\nMake sure `mcp_agent.secrets.yaml`\
  \ has your DeepCode API keys (see [Configuration](#-step-2-configuration)), then:\n\
  \n```bash\n./nanobot/run_nanobot.sh -d          # Start both DeepCode + nanobot\
  \ in background\n```\n\nThe script checks Docker, validates configs, builds images\
  \ (first run only), and starts both containers.\n\n```\n\u2713 DeepCode API:  http://localhost:8000\n\
  \u2713 Nanobot:       http://localhost:18790\n```\n\nNow open Feishu \u2192 find\
  \ your bot \u2192 send a message!\n\n<details>\n<summary><b>Management Commands</b></summary>\n\
  \n```bash\n./nanobot/run_nanobot.sh              # Start (foreground)\n./nanobot/run_nanobot.sh\
  \ -d           # Start (background)\n./nanobot/run_nanobot.sh stop         # Stop\
  \ all services\n./nanobot/run_nanobot.sh restart      # Restart (config changes\
  \ take effect immediately)\n./nanobot/run_nanobot.sh --build      # Force rebuild\
  \ Docker images\n./nanobot/run_nanobot.sh logs         # View real-time logs\n./nanobot/run_nanobot.sh\
  \ status       # Health check\n./nanobot/run_nanobot.sh clean        # Remove containers\
  \ & images\n```\n\n</details>\n\n<details>\n<summary><b>Troubleshooting</b></summary>\n\
  \n| Problem | Fix |\n|---|---|\n| Feishu bot doesn't respond | Check logs (`./nanobot/run_nanobot.sh\
  \ logs`), verify `appId`/`appSecret`, ensure app is published with Long Connection\
  \ mode |\n| Can't connect to DeepCode | Verify `deepcode` container is healthy:\
  \ `curl http://localhost:8000/health` |\n| Wrong language output | Switch model\
  \ \u2014 `minimax-m2.1` defaults to Chinese, use Claude/GPT for English |\n| Config\
  \ not taking effect | Just restart: `./nanobot/run_nanobot.sh restart` (no rebuild\
  \ needed) |\n| Clear chat history | Send `/clear` in chat, or: `docker exec nanobot\
  \ sh -c 'rm -rf /root/.nanobot/sessions/*.jsonl'` |\n\n</details>\n\n---\n\n## \U0001F4A1\
  \ Examples\n\n\n\n### \U0001F3AC **Live Demonstrations**\n\n\n\n<table align=\"\
  center\">\n<tr>\n<td width=\"33%\" align=\"center\">\n\n#### \U0001F4C4 **Paper2Code\
  \ Demo**\n**Research to Implementation**\n\n<div align=\"center\">\n  <a href=\"\
  https://www.youtube.com/watch?v=MQZYpLkzsbw\">\n    <img src=\"https://img.youtube.com/vi/MQZYpLkzsbw/maxresdefault.jpg\"\
  \ alt=\"Paper2Code Demo\" width=\"100%\" style=\"border-radius: 10px; box-shadow:\
  \ 0 4px 8px rgba(0,0,0,0.1);\"/>\n  </a>\n\n  **[\u25B6\uFE0F Watch Demo](https://www.youtube.com/watch?v=MQZYpLkzsbw)**\n\
  \n  *Transform academic papers into production-ready code automatically*\n</div>\n\
  \n</td>\n<td width=\"33%\" align=\"center\">\n\n#### \U0001F5BC\uFE0F **Image Processing\
  \ Demo**\n**AI-Powered Image Tools**\n\n<div align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=nFt5mLaMEac\"\
  >\n    <img src=\"https://img.youtube.com/vi/nFt5mLaMEac/maxresdefault.jpg\" alt=\"\
  Image Processing Demo\" width=\"100%\" style=\"border-radius: 10px; box-shadow:\
  \ 0 4px 8px rgba(0,0,0,0.1);\"/>\n  </a>\n\n  **[\u25B6\uFE0F Watch Demo](https://www.youtube.com/watch?v=nFt5mLaMEac)**\n\
  \n  *Intelligent image processing with background removal and enhancement*\n</div>\n\
  \n</td>\n<td width=\"33%\" align=\"center\">\n\n#### \U0001F310 **Frontend Implementation**\n\
  **Complete Web Application**\n\n<div align=\"center\">\n  <a href=\"https://www.youtube.com/watch?v=78wx3dkTaAU\"\
  >\n    <img src=\"https://img.youtube.com/vi/78wx3dkTaAU/maxresdefault.jpg\" alt=\"\
  Frontend Demo\" width=\"100%\" style=\"border-radius: 10px; box-shadow: 0 4px 8px\
  \ rgba(0,0,0,0.1);\"/>\n  </a>\n\n  **[\u25B6\uFE0F Watch Demo](https://www.youtube.com/watch?v=78wx3dkTaAU)**\n\
  \n  *Full-stack web development from concept to deployment*\n</div>\n\n</td>\n</tr>\n\
  </table>\n\n\n\n### \U0001F195 **Recent Updates**\n\n#### \U0001F4C4 **Smart Document\
  \ Segmentation (v1.2.0)**\n- **Intelligent Processing**: Automatically handles large\
  \ research papers and technical documents that exceed LLM token limits\n- **Configurable\
  \ Control**: Toggle segmentation via configuration with size-based thresholds\n\
  - **Semantic Analysis**: Advanced content understanding with algorithm, concept,\
  \ and formula preservation\n- **Backward Compatibility**: Seamlessly falls back\
  \ to traditional processing for smaller documents\n\n### \U0001F680 **Coming Soon**\n\
  \nWe're continuously enhancing DeepCode with exciting new features:\n\n#### \U0001F527\
  \ **Enhanced Code Reliability & Validation**\n- **Automated Testing**: Comprehensive\
  \ functionality testing with execution verification and error detection.\n- **Code\
  \ Quality Assurance**: Multi-level validation through static analysis, dynamic testing,\
  \ and performance benchmarking.\n- **Smart Debugging**: AI-powered error detection\
  \ with automatic correction suggestions\n\n#### \U0001F4CA **PaperBench Performance\
  \ Showcase**\n- **Benchmark Dashboard**: Comprehensive performance metrics on the\
  \ PaperBench evaluation suite.\n- **Accuracy Metrics**: Detailed comparison with\
  \ state-of-the-art paper reproduction systems.\n- **Success Analytics**: Statistical\
  \ analysis across paper categories and complexity levels.\n\n#### \u26A1 **System-wide\
  \ Optimizations**\n- **Performance Boost**: Multi-threaded processing and optimized\
  \ agent coordination for faster generation.\n- **Enhanced Reasoning**: Advanced\
  \ reasoning capabilities with improved context understanding.\n- **Expanded Support**:\
  \ Extended compatibility with additional programming languages and frameworks.\n\
