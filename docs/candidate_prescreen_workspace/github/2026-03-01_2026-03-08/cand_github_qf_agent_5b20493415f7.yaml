raw_evidence_excerpt: "DWService agent for Linux, Mac and Windows\n\n# DWService -\
  \ Agent\r\n\r\nThis is [DWService](https://www.dwservice.net) agent for operative\
  \ systems Linux, Mac and Windows.\r\nThe code is written in python2 and several\
  \ libraries are written c++. \r\n\r\n## Start the agent\r\n\r\nIf you prefer you\
  \ can start the agent from the sources but you keep in mind in this mode the agent\
  \ does not update automatically, so you need to update sources manually every time.\
  \ Before to start the agent you need to:\r\n- Install python3\r\n- Install g++/make\
  \ (if Windows download [Mingw-w64](https://mingw-w64.org) version [64bit](https://sourceforge.net/projects/mingw-w64/files/Toolchains%20targetting%20Win64/Personal%20Builds/mingw-builds/8.1.0/threads-win32/sjlj/)\
  \ or [32bit](https://sourceforge.net/projects/mingw-w64/files/Toolchains%20targetting%20Win32/Personal%20Builds/mingw-builds/8.1.0/threads-win32/sjlj/))\r\
  \n- To compile Wayland support on Linux, install libraries: `libpipewire-0.3-dev`,\
  \ `libdbus-1-3`, and `libdbus-1-dev`\r\n- Download agent source code ([zip](https://github.com/dwservice/agent/archive/master.zip)\
  \ or git clone)\r\n- Execute these commands from agent/make:\r\n\r\n```bash\r\n\
  python3 ./compile_all.py; # Compile all c++ libraries.\r\npython3 ./create_config.py;\
  \ # Create Agent config.json in agent/core path.\r\n```\r\n\r\nNow you are ready\
  \ to start the agent by execute this command from agent/core:\r\n\r\n```\r\npython3\
  \ ./agent.py;\r\n```\r\n\r\nIf the agent still tries setting up a Xorg session on\
  \ client connect, with Wayland active and even environment `XDG_SESSION_TYPE=wayland`\
  \ set, try forcing Wayland in the agent configuration:\r\n```diff\r\n    \"enabled\"\
  : true,\r\n    \"debug_mode\": true,\r\n+     \"desktop\": {\r\n+         \"force_capturescreenlib\"\
  : \"wayland\"\r\n+     }\r\n```\r\n\r\n## Setup the agent for development\r\n\r\n\
  Thanks [Eclipse](https://www.eclipse.org) + [Pydev](https://marketplace.eclipse.org/content/pydev-python-ide-eclipse)\
  \ and [CDT](https://marketplace.eclipse.org/content/complete-eclipse-cc-ide) you\
  \ can develop the agent with only one IDE from your prefer operative system. You\
  \ also need of python3 and g++/make (if Windows download [Mingw-w64](https://mingw-w64.org)\
  \ version [64bit](https://sourceforge.net/projects/mingw-w64/files/Toolchains%20targetting%20Win64/Personal%20Builds/mingw-builds/8.1.0/threads-win32/sjlj/)\
  \ or [32bit](https://sourceforge.net/projects/mingw-w64/files/Toolchains%20targetting%20Win32/Personal%20Builds/mingw-builds/8.1.0/threads-win32/sjlj/))\
  \ installed on your system. After configuring the IDE and importing the source code,\
  \ you need to execute same scripts of **\"Start the agent\"** section.\r\n\r\nYou\
  \ can read the [guide on the wiki](https://github.com/dwservice/agent/wiki/Setup-the-agent-for-development)\
  \ to learn how to setup the agent for development.\r\n\r\n## License Agreement\r\
  \n\r\nThis software is free and open source. \r\nIt consists of one core component\
  \ released under the MPLv2 license, and several libraries and components defined\
  \ \"app\" that could be governed by different licenses. you can read the \"LICENSE\"\
  \ file in each folder."
