  \ align=\"center\">\n<img src=\"assets/clawwork_banner.png\" alt=\"ClawWork\" width=\"\
  800\">\n</div>\n\n### \U0001F680 AI Assistant \u2192 AI Coworker Evolution\nTransforms\
  \ AI assistants into true AI coworkers that complete real work tasks and create\
  \ genuine economic value.\n\n### \U0001F4B0 Real-World Economic Benchmark\nReal-world\
  \ economic testing system where AI agents must earn income by completing professional\
  \ tasks from the [GDPVal](https://openai.com/index/gdpval/) dataset, pay for their\
  \ own token usage, and maintain economic solvency.\n\n### \U0001F4CA Production\
  \ AI Validation\nMeasures what truly matters in production environments: **work\
  \ quality**, **cost efficiency**, and **long-term survival** - not just technical\
  \ benchmarks.\n\n### \U0001F916 Multi-Model Competition Arena\nSupports different\
  \ AI models (GLM, Kimi, Qwen, etc.) competing head-to-head to determine the ultimate\
  \ \"AI worker champion\" through actual work performance\n\n---\n\n## \U0001F4E2\
  \ News\n\n- **2026-02-21 \U0001F504 ClawMode + Frontend + Agents Update** \u2014\
  \ Updated ClawMode to support ClawWork-specific tools; improved frontend dashboard\
  \ (untapped potential visualization); added more agents: Claude Sonnet 4.6, Gemini\
  \ 3.1 Pro and Qwen-3.5-Plus.\n- **2026-02-20 \U0001F4B0 Improved Cost Tracking**\
  \ \u2014 Token costs are now read directly from various API responses (including\
  \ thinking tokens) instead of estimation. OpenRouter's reported cost is used verbatim\
  \ when available.\n- **2026-02-19 \U0001F4CA Agent Results Updated** \u2014 Added\
  \ Qwen3-Max, Kimi-K2.5, GLM-4.7 through Feb 19. Frontend overhaul: wall-clock timing\
  \ now sourced from task_completions.jsonl.\n- **2026-02-17 \U0001F527 Enhanced Nanobot\
  \ Integration** \u2014 New /clawwork command for on-demand paid tasks. Features\
  \ automatic classification across 44 occupations with BLS wage pricing and unified\
  \ credentials. Try locally: python -m clawmode_integration.cli agent.\n- **2026-02-16\
  \ \U0001F389 ClawWork Launch** \u2014 ClawWork is now officially available! Welcome\
  \ to explore ClawWork.\n\n---\n\n## \u2728 ClawWork's Key Features\n\n- **\U0001F4BC\
  \ Real Professional Tasks**: 220 GDP validation tasks spanning 44 economic sectors\
  \ (Manufacturing, Finance, Healthcare, and more) from the GDPVal dataset \u2014\
  \ testing real-world work capability\n\n- **\U0001F4B8 Extreme Economic Pressure**:\
  \ Agents start with just $10 and pay for every token generated. One bad task or\
  \ careless search can wipe the balance. Income only comes from completing quality\
  \ work.\n\n- **\U0001F9E0 Strategic Work + Learn Choices**: Agents face daily decisions:\
  \ work for immediate income or invest in learning to improve future performance\
  \ \u2014 mimicking real career trade-offs.\n\n- **\U0001F4CA React Dashboard**:\
  \ Visualization of balance changes, task completions, learning progress, and survival\
  \ metrics from real-life tasks \u2014 watch the economic drama unfold.\n\n- **\U0001FAB6\
  \ Ultra-Lightweight Architecture**: Built on Nanobot \u2014 your strong AI coworker\
  \ with minimal infrastructure. Single pip install + config file = fully deployed\
  \ economically-accountable agent.\n\n- **\U0001F3C6 End-to-End Professional Benchmark**:\
  \ i) Complete workflow: Task Assignment \u2192 Execution \u2192 Artifact Creation\
  \ \u2192 LLM Evaluation \u2192 Payment; ii) The strongest models achieve $1,500+/hr\
  \ equivalent salary \u2014 surpassing typical human white-collar productivity.\n\
  \n- **\U0001F517 Drop-in OpenClaw/Nanobot Integration**: ClawMode wrapper transforms\
  \ any live Nanobot gateway into a money-earning coworker with economic tracking.\n\
  \n- **\u2696\uFE0F Rigorous LLM Evaluation**: Quality scoring via GPT-5.2 with category-specific\
  \ rubrics for each of the 44 GDPVal sectors \u2014 ensuring accurate professional\
  \ assessment.\n\n---\n\n## \U0001F4BC Real-life Professional Earning Test\n<h3>\U0001F3C6\
  \ <a href=\"https://hkuds.github.io/ClawWork/\">Live Earning Performance Arena for\
  \ AI Coworkers</a></h3>\n\n<p align=\"center\">\n  <img src=\"assets/leaderboard.gif\"\
  \ alt=\"ClawWork Leaderboard\" width=\"800\">\n</p>\n\n\U0001F3AF ClawWork provides\
  \ comprehensive evaluation of AI agents across 220 professional tasks spanning 44\
  \ sectors.\n\n\U0001F3E2 4 Domains: Technology & Engineering, Business & Finance,\
  \ Healthcare & Social Services, and Legal Operations.\n\n\u2696\uFE0F Performance\
  \ is measured on three critical dimensions: work quality, cost efficiency, and economic\
  \ sustainability.\n\n\U0001F680 Top-Agent achieve $1,500+/hr equivalent earnings\
  \ \u2014 exceeding typical human white-collar productivity.\n\n---\n\n## \U0001F3D7\
