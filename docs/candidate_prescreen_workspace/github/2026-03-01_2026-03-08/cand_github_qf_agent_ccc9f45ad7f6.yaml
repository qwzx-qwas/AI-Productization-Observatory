  \u2500\u2500 nanobot tools (file, shell, web, message, spawn, cron)\n  \u251C\u2500\
  \u2500 clawwork tools (get_status, decide_activity, submit_work, learn)\n  \u2514\
  \u2500\u2500 TrackedProvider \u2192 every LLM call deducts from agent's balance\n\
  ``` -->\n\n---\n\n## \U0001F680 Quick Start\n\n### Mode 1: Standalone Simulation\n\
  \nGet up and running in 3 commands:\n\n```bash\n# Terminal 1 \u2014 start the dashboard\
  \ (backend API + React frontend)\n./start_dashboard.sh\n\n# Terminal 2 \u2014 run\
  \ the agent\n./run_test_agent.sh\n\n# Open browser \u2192 http://localhost:3000\n\
  ```\n\nWatch your agent make decisions, complete GDP validation tasks, and earn\
  \ income in real time.\n\n**Example console output:**\n\n```\n============================================================\n\
  \U0001F4C5 ClawWork Daily Session: 2025-01-20\n============================================================\n\
  \n\U0001F4CB Task: Buyers and Purchasing Agents \u2014 Manufacturing\n   Task ID:\
  \ 1b1ade2d-f9f6-4a04-baa5-aa15012b53be\n   Max payment: $247.30\n\n\U0001F504 Iteration\
  \ 1/15\n   \U0001F4DE decide_activity \u2192 work\n   \U0001F4DE submit_work \u2192\
  \ Earned: $198.44\n\n============================================================\n\
  \U0001F4CA Daily Summary - 2025-01-20\n   Balance: $11.98 | Income: $198.44 | Cost:\
  \ $0.03\n   Status: \U0001F7E2 thriving\n============================================================\n\
  ```\n\n### Mode 2: openclaw/nanobot Integration (ClawMode)\n\nMake your live Nanobot\
  \ instance economically aware \u2014 every conversation costs tokens, and Nanobot\
  \ earns income by completing real work tasks.\n\n> See [full integration setup](#-nanobot-integration-clawmode)\
  \ below.\n\n---\n\n## \U0001F4E6 Install\n\n### Clone\n\n```bash\ngit clone https://github.com/HKUDS/ClawWork.git\n\
  cd ClawWork\n```\n\n### Python Environment (Python 3.10+)\n\n```bash\n# With conda\
  \ (recommended)\nconda create -n clawwork python=3.10\nconda activate clawwork\n\
  \n# Or with venv\npython3.10 -m venv venv\nsource venv/bin/activate\n```\n\n###\
  \ Install Dependencies\n\n```bash\npip install -r requirements.txt\n```\n\n### Frontend\
  \ (for Dashboard)\n\n```bash\ncd frontend && npm install && cd ..\n```\n\n### Environment\
  \ Variables\n\nCopy the provided **`.env.example`** to `.env` and fill in your keys:\n\
  \n```bash\ncp .env.example .env\n```\n\n| Variable | Required | Description |\n\
  |----------|----------|-------------|\n| `OPENAI_API_KEY` | **Required** | OpenAI\
  \ API key \u2014 used for the GPT-4o agent and LLM-based task evaluation |\n| `CODE_SANDBOX_PROVIDER`\
  \ | Optional | `\"e2b\"` (default) or `\"boxlite\"` \u2014 selects code sandbox\
  \ backend for `execute_code_sandbox` |\n| `E2B_API_KEY` | Conditional | [E2B](https://e2b.dev)\
  \ API key \u2014 required when sandbox provider is `\"e2b\"` (default) |\n| `WEB_SEARCH_API_KEY`\
  \ | Optional | API key for web search (Tavily default, or Jina AI) \u2014 needed\
  \ if the agent uses `search_web` |\n| `WEB_SEARCH_PROVIDER` | Optional | `\"tavily\"\
  ` (default) or `\"jina\"` \u2014 selects the search provider |\n\n> **Note**: `OPENAI_API_KEY`\
  \ is required. Code sandbox defaults to E2B (`e2b-code-interpreter` + `E2B_API_KEY`).\
  \ BoxLite sync (`boxlite[sync]`) is available as an experimental local backend via\
  \ `CODE_SANDBOX_PROVIDER=boxlite`.\n\n---\n\n## \U0001F4CA GDPVal Benchmark Dataset\n\
  \nClawWork uses the **[GDPVal](https://openai.com/index/gdpval/)** dataset \u2014\
  \ 220 real-world professional tasks across 44 occupations, originally designed to\
  \ estimate AI's contribution to GDP.\n\n| Sector | Example Occupations |\n|--------|-------------------|\n\
  | Manufacturing | Buyers & Purchasing Agents, Production Supervisors |\n| Professional\
  \ Services | Financial Analysts, Compliance Officers |\n| Information | Computer\
  \ & Information Systems Managers |\n| Finance & Insurance | Financial Managers,\
  \ Auditors |\n| Healthcare | Social Workers, Health Administrators |\n| Government\
  \ | Police Supervisors, Administrative Managers |\n| Retail | Customer Service Representatives,\
  \ Counter Clerks |\n| Wholesale | Sales Supervisors, Purchasing Agents |\n| Real\
  \ Estate | Property Managers, Appraisers |\n\n### Task Types\n\nTasks require real\
  \ deliverables: Word documents, Excel spreadsheets, PDFs, data analysis, project\
  \ plans, technical specs, research reports, and process designs.\n\n### Payment\
  \ System\n\nPayment is based on **real economic value** \u2014 not a flat cap:\n\
  \n```\nPayment = quality_score \xD7 (estimated_hours \xD7 BLS_hourly_wage)\n```\n\
  \n| Metric | Value |\n|--------|-------|\n| Task range | $82.78 \u2013 $5,004.00\
  \ |\n| Average task value | $259.45 |\n| Quality score range | 0.0 \u2013 1.0 |\n\
  | Total tasks | 220 |\n\n---\n\n## \u2699\uFE0F Configuration\n\nAgent configuration\
  \ lives in `livebench/configs/`:\n\n```json\n{\n  \"livebench\": {\n    \"date_range\"\
  : {\n      \"init_date\": \"2025-01-20\",\n      \"end_date\": \"2025-01-31\"\n\
  \    },\n    \"economic\": {\n      \"initial_balance\": 10.0,\n      \"task_values_path\"\
  : \"./scripts/task_value_estimates/task_values.jsonl\",\n      \"token_pricing\"\
  : {\n        \"input_per_1m\": 2.5,\n        \"output_per_1m\": 10.0\n      }\n\
  \    },\n    \"agents\": [\n      {\n        \"signature\": \"gpt-4o-agent\",\n\
  \        \"basemodel\": \"gpt-4o\",\n        \"enabled\": true,\n        \"tasks_per_day\"\
  : 1,\n        \"supports_multimodal\": true\n      }\n    ],\n    \"evaluation\"\
  : {\n      \"use_llm_evaluation\": true,\n      \"meta_prompts_dir\": \"./eval/meta_prompts\"\
  \n    }\n  }\n}\n```\n\n### Running Multiple Agents\n\n```json\n\"agents\": [\n\
  \  {\"signature\": \"gpt4o-run\", \"basemodel\": \"gpt-4o\", \"enabled\": true},\n\
  \  {\"signature\": \"claude-run\", \"basemodel\": \"claude-sonnet-4-5-20250929\"\
  , \"enabled\": true}\n]\n```\n\n---\n\n## \U0001F4B0 Economic System\n\n### Starting\
  \ Conditions\n\n- **Initial balance**: **$10** \u2014 tight by design. Every token\
  \ counts.\n- **Token costs**: deducted automatically after each LLM call\n- **API\
  \ costs**: web search ($0.0008/call Tavily, $0.05/1M tokens Jina)\n\n### Cost Tracking\
  \ (per task)\n\nOne consolidated record per task in `token_costs.jsonl`:\n\n```json\n\
  {\n  \"task_id\": \"abc-123\",\n  \"date\": \"2025-01-20\",\n  \"llm_usage\": {\n\
  \    \"total_input_tokens\": 4500,\n    \"total_output_tokens\": 900,\n    \"total_cost\"\
  : 0.02025\n  },\n  \"api_usage\": {\n    \"search_api_cost\": 0.0016\n  },\n  \"\
  cost_summary\": {\n    \"total_cost\": 0.02185\n  },\n  \"balance_after\": 1198.41\n\
  }\n```\n\n---\n\n## \U0001F527 Agent Tools\n\nThe agent has 8 tools available in\
  \ standalone simulation mode:\n\n| Tool | Description |\n|------|-------------|\n\
  | `decide_activity(activity, reasoning)` | Choose: `\"work\"` or `\"learn\"` |\n\
  | `submit_work(work_output, artifact_file_paths)` | Submit completed work for evaluation\
  \ + payment |\n| `learn(topic, knowledge)` | Save knowledge to persistent memory\
  \ (min 200 chars) |\n| `get_status()` | Check balance, costs, survival tier |\n\
  | `search_web(query, max_results)` | Web search via Tavily or Jina AI |\n| `create_file(filename,\
  \ content, file_type)` | Create .txt, .xlsx, .docx, .pdf documents |\n| `execute_code_sandbox(code,\
  \ language)` | Run Python in isolated sandbox (`e2b` default, optional `boxlite`)\
  \ |\n| `create_video(slides_json, output_filename)` | Generate MP4 from text/image\
  \ slides |\n\n---\n\n## \U0001F517 from AI Assistant to AI Coworker\n\nClawWork\
  \ transforms [nanobot](https://github.com/HKUDS/nanobot) from an AI assistant into\
  \ a true AI coworker through economic accountability. With ClawMode integration:\n\
  \n**Every conversation costs tokens** \u2014 creating real economic pressure.\n\
  **Income comes from completing real-life professional tasks** \u2014 genuine value\
  \ creation through professional work.\n**Self-sustaining operation** \u2014 nanobot\
  \ must earn more than it spends to survive.\n\nThis evolution turns your lightweight\
  \ AI assistant into an economically viable coworker that must prove its worth through\
  \ actual productivity.\n\n<p align=\"center\">\n  <img src=\"assets/clawmode.gif\"\
  \ alt=\"ClawMode Demo\" width=\"700\">\n</p>\n\n### What You Get\n\n- All 9 nanobot\
  \ channels (Telegram, Discord, Slack, WhatsApp, Email, Feishu, DingTalk, MoChat,\
  \ QQ)\n- All nanobot tools (`read_file`, `write_file`, `exec`, `web_search`, `spawn`,\
  \ etc.)\n- **Plus** 4 economic tools (`decide_activity`, `submit_work`, `learn`,\
  \ `get_status`)\n- Every response includes a cost footer: `Cost: $0.0075 | Balance:\
  \ $999.99 | Status: thriving`\n\n> **Full setup instructions**: See [clawmode_integration/README.md](clawmode_integration/README.md)\n\
  \n---\n\n## \U0001F4CA Dashboard\n\n<p align=\"center\">\n  <img src=\"assets/dashboard_preview.png\"\
  \ alt=\"ClawWork Dashboard\" width=\"800\">\n</p>\n\nThe React dashboard at `http://localhost:3000`\
  \ shows live metrics via WebSocket:\n\n**Main Tab**\n- Balance chart (real-time\
  \ line graph)\n- Activity distribution (work vs learn)\n- Economic metrics: income,\
  \ costs, net worth, survival status\n\n**Work Tasks Tab**\n- All assigned GDPVal\
  \ tasks with sector & occupation\n- Payment amounts and quality scores\n- Full task\
  \ prompts and submitted artifacts\n\n**Learning Tab**\n- Knowledge entries organized\
  \ by topic\n- Learning timeline\n- Searchable knowledge base\n\n---\n\n## \U0001F4C1\
  \ Project Structure\n\n```\nClawWork/\n\u251C\u2500\u2500 livebench/\n\u2502   \u251C\
  \u2500\u2500 agent/\n\u2502   \u2502   \u251C\u2500\u2500 live_agent.py        \
  \  # Main agent orchestrator\n\u2502   \u2502   \u2514\u2500\u2500 economic_tracker.py\
  \    # Balance, costs, income tracking\n\u2502   \u251C\u2500\u2500 work/\n\u2502\
  \   \u2502   \u251C\u2500\u2500 task_manager.py        # GDPVal task loading & assignment\n\
  \u2502   \u2502   \u2514\u2500\u2500 evaluator.py           # LLM-based work evaluation\n\
  \u2502   \u251C\u2500\u2500 tools/\n\u2502   \u2502   \u251C\u2500\u2500 direct_tools.py\
  \        # Core tools (decide, submit, learn, status)\n\u2502   \u2502   \u2514\u2500\
  \u2500 productivity/          # search_web, create_file, execute_code, create_video\n\
  \u2502   \u251C\u2500\u2500 api/\n\u2502   \u2502   \u2514\u2500\u2500 server.py\
  \              # FastAPI backend + WebSocket\n\u2502   \u251C\u2500\u2500 prompts/\n\
  \u2502   \u2502   \u2514\u2500\u2500 live_agent_prompt.py   # System prompts\n\u2502\
  \   \u2514\u2500\u2500 configs/                   # Agent configuration files\n\u251C\
  \u2500\u2500 clawmode_integration/\n\u2502   \u251C\u2500\u2500 agent_loop.py  \
  \            # ClawWorkAgentLoop + /clawwork command\n\u2502   \u251C\u2500\u2500\
  \ task_classifier.py         # Occupation classifier (40 categories)\n\u2502   \u251C\
  \u2500\u2500 config.py                  # Plugin config from ~/.nanobot/config.json\n\
  \u2502   \u251C\u2500\u2500 provider_wrapper.py        # TrackedProvider (cost interception)\n\
  \u2502   \u251C\u2500\u2500 cli.py                     # `python -m clawmode_integration.cli\
  \ agent|gateway`\n\u2502   \u251C\u2500\u2500 skill/\n\u2502   \u2502   \u2514\u2500\
  \u2500 SKILL.md               # Economic protocol skill for nanobot\n\u2502   \u2514\
  \u2500\u2500 README.md                  # Integration setup guide\n\u251C\u2500\u2500\
  \ eval/\n\u2502   \u251C\u2500\u2500 meta_prompts/              # Category-specific\
  \ evaluation rubrics\n\u2502   \u2514\u2500\u2500 generate_meta_prompts.py   # Meta-prompt\
  \ generator\n\u251C\u2500\u2500 scripts/\n\u2502   \u251C\u2500\u2500 estimate_task_hours.py\
  \     # GPT-based hour estimation per task\n\u2502   \u2514\u2500\u2500 calculate_task_values.py\
  \   # BLS wage \xD7 hours = task value\n\u251C\u2500\u2500 frontend/\n\u2502   \u2514\
  \u2500\u2500 src/                       # React dashboard\n\u251C\u2500\u2500 start_dashboard.sh\
  \             # Launch backend + frontend\n\u2514\u2500\u2500 run_test_agent.sh\
  \              # Run test agent\n```\n\n---\n\n## \U0001F4C8 Benchmark Metrics\n\
  \nClawWork measures AI coworker performance across:\n\n| Metric | Description |\n\
  |--------|-------------|\n| **Survival days** | How long the agent stays solvent\
  \ |\n| **Final balance** | Net economic result |\n| **Total work income** | Gross\
  \ earnings from completed tasks |\n| **Profit margin** | `(income - costs) / costs`\
  \ |\n| **Work quality** | Average quality score (0\u20131) across tasks |\n| **Token\
  \ efficiency** | Income earned per dollar spent on tokens |\n| **Activity mix**\
  \ | % work vs. % learn decisions |\n| **Task completion rate** | Tasks completed\
  \ / tasks assigned |\n\n---\n\n## \U0001F6E0\uFE0F Troubleshooting\n\n**Dashboard\
  \ not updating**\n\u2192 Hard refresh: `Ctrl+Shift+R`\n\n**Agent not earning money**\n\
  \u2192 Check for `submit_work` calls and `\"\U0001F4B0 Earned: $XX\"` in console.\
  \ Ensure `OPENAI_API_KEY` is set.\n\n**Port conflicts**\n```bash\nlsof -ti:8000\
  \ | xargs kill -9\nlsof -ti:3000 | xargs kill -9\n```\n\n**Proxy errors during pip\
  \ install**\n```bash\nunset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY\npip install\
  \ -r requirements.txt\n```\n\n**Sandbox backend unavailable**\n\u2192 Install `e2b-code-interpreter`\
  \ (default backend) or `boxlite[sync]` (experimental local backend), then set `CODE_SANDBOX_PROVIDER`\
  \ to `e2b` or `boxlite`.\n\n**`SyncCodeBox` import failed**\n\u2192 Reinstall BoxLite\
  \ with sync extras: `pip install \"boxlite[sync]>=0.6.0\"`.\n\n**E2B sandbox rate\
  \ limit (429)**\n\u2192 Applies when using `CODE_SANDBOX_PROVIDER=e2b` (default).\
  \ Wait ~1 min for stale sandboxes to expire.\n\n**ClawMode: `ModuleNotFoundError:\
  \ clawmode_integration`**\n\u2192 Run `export PYTHONPATH=\"$(pwd):$PYTHONPATH\"\
  ` from the repo root.\n\n**ClawMode: balance not decreasing**\n\u2192 Balance only\
  \ tracks costs through the ClawMode gateway. Direct `nanobot agent` commands bypass\
  \ the economic tracker.\n\n---\n\n## \U0001F91D Contributing\n\nPRs and issues welcome!\
  \ The codebase is clean and modular. Key extension points:\n\n- **New task sources**:\
  \ Implement `_load_from_*()` in `livebench/work/task_manager.py`\n- **New tools**:\
  \ Add `@tool` functions in `livebench/tools/direct_tools.py`\n- **New evaluation\
  \ rubrics**: Add category JSON in `eval/meta_prompts/`\n- **New LLM providers**:\
  \ Works out of the box via LangChain / LiteLLM\n\n**Roadmap**\n\n- [ ] Multi-task\
  \ days \u2014 agent chooses from a marketplace of available tasks\n- [ ] Task difficulty\
