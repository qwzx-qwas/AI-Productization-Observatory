  \ |\n| `PHONE_AGENT_MODEL`         | \u6A21\u578B\u540D\u79F0                  \
  \ | `autoglm-phone-9b`         |\n| `PHONE_AGENT_API_KEY`       | \u6A21\u578B\u8BA4\
  \u8BC1 API Key           | `EMPTY`                    |\n| `PHONE_AGENT_MAX_STEPS`\
  \     | \u6BCF\u4E2A\u4EFB\u52A1\u6700\u5927\u6B65\u6570               | `100` \
