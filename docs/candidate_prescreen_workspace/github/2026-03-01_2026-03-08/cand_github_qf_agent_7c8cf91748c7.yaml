  \            |\n| `Swipe`      | \u6ED1\u52A8\u5C4F\u5E55            |\n| `Back`\
  \       | \u8FD4\u56DE\u4E0A\u4E00\u9875           |\n| `Home`       | \u8FD4\u56DE\
  \u684C\u9762            |\n| `Long Press` | \u957F\u6309              |\n| `Double\
  \ Tap` | \u53CC\u51FB              |\n| `Wait`       | \u7B49\u5F85\u9875\u9762\u52A0\
  \u8F7D          |\n| `Take_over`  | \u8BF7\u6C42\u4EBA\u5DE5\u63A5\u7BA1(\u767B\u5F55\
  /\u9A8C\u8BC1\u7801\u7B49) |\n\n## \u81EA\u5B9A\u4E49\u56DE\u8C03\n\n\u5904\u7406\
  \u654F\u611F\u64CD\u4F5C\u786E\u8BA4\u548C\u4EBA\u5DE5\u63A5\u7BA1\uFF1A\n\n```python\n\
  def my_confirmation(message: str) -> bool:\n    \"\"\"\u654F\u611F\u64CD\u4F5C\u786E\
  \u8BA4\u56DE\u8C03\"\"\"\n    return input(f\"\u786E\u8BA4\u6267\u884C {message}\uFF1F\
  (y/n): \").lower() == \"y\"\n\n\ndef my_takeover(message: str) -> None:\n    \"\"\
  \"\u4EBA\u5DE5\u63A5\u7BA1\u56DE\u8C03\"\"\"\n    print(f\"\u8BF7\u624B\u52A8\u5B8C\
  \u6210: {message}\")\n    input(\"\u5B8C\u6210\u540E\u6309\u56DE\u8F66\u7EE7\u7EED\
  ...\")\n\n\nagent = PhoneAgent(\n    confirmation_callback=my_confirmation,\n  \
  \  takeover_callback=my_takeover,\n)\n```\n\n## \u793A\u4F8B\n\n\u67E5\u770B `examples/`\
