  \          | (\u81EA\u52A8\u68C0\u6D4B)                     |\n| `PHONE_AGENT_DEVICE_TYPE`\
  \   | \u8BBE\u5907\u7C7B\u578B (`adb` \u6216 `hdc`)   | `adb`                  \
  \    |\n| `PHONE_AGENT_LANG`          | \u8BED\u8A00 (`cn` \u6216 `en`)       |\
  \ `cn`                       |\n\n### \u6A21\u578B\u914D\u7F6E\n\n```python\nfrom\
  \ phone_agent.model import ModelConfig\n\nconfig = ModelConfig(\n    base_url=\"\
  http://localhost:8000/v1\",\n    api_key=\"EMPTY\",  # API \u5BC6\u94A5(\u5982\u9700\
  \u8981)\n    model_name=\"autoglm-phone-9b\",  # \u6A21\u578B\u540D\u79F0\n    max_tokens=3000,\
  \  # \u6700\u5927\u8F93\u51FA token \u6570\n    temperature=0.1,  # \u91C7\u6837\
  \u6E29\u5EA6\n    frequency_penalty=0.2,  # \u9891\u7387\u60E9\u7F5A\n)\n```\n\n\
  ### Agent \u914D\u7F6E\n\n```python\nfrom phone_agent.agent import AgentConfig\n\
  \nconfig = AgentConfig(\n    max_steps=100,  # \u6BCF\u4E2A\u4EFB\u52A1\u6700\u5927\
  \u6B65\u6570\n    device_id=None,  # ADB \u8BBE\u5907 ID(None \u4E3A\u81EA\u52A8\
  \u68C0\u6D4B)\n    lang=\"cn\",  # \u8BED\u8A00\u9009\u62E9\uFF1Acn(\u4E2D\u6587\
  )\u6216 en(\u82F1\u6587)\n    verbose=True,  # \u6253\u5370\u8C03\u8BD5\u4FE1\u606F\
  (\u5305\u62EC\u601D\u8003\u8FC7\u7A0B\u548C\u6267\u884C\u52A8\u4F5C)\n)\n```\n\n\
