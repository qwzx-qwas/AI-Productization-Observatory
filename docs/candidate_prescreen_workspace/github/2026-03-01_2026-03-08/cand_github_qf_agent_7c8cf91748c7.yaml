  \u81EA\u884C\u90E8\u7F72\u6A21\u578B\u670D\u52A1\uFF0C\u6216\u4F7F\u7528\u7B2C\u4E09\
  \u65B9\u6A21\u578B\u670D\u52A1\u5546\u3002\n\n#### \u9009\u9879 A: \u4F7F\u7528\u7B2C\
  \u4E09\u65B9\u6A21\u578B\u670D\u52A1\n\n\u5982\u679C\u4F60\u4E0D\u60F3\u81EA\u884C\
  \u90E8\u7F72\u6A21\u578B\uFF0C\u53EF\u4EE5\u4F7F\u7528\u4EE5\u4E0B\u5DF2\u90E8\u7F72\
  \u6211\u4EEC\u6A21\u578B\u7684\u7B2C\u4E09\u65B9\u670D\u52A1\uFF1A\n\n**1. \u667A\
  \u8C31 BigModel**\n\n- \u6587\u6863: https://docs.bigmodel.cn/cn/api/introduction\n\
  - `--base-url`: `https://open.bigmodel.cn/api/paas/v4`\n- `--model`: `autoglm-phone`\n\
  - `--apikey`: \u5728\u667A\u8C31\u5E73\u53F0\u7533\u8BF7\u4F60\u7684 API Key\n\n\
  **2. ModelScope(\u9B54\u642D\u793E\u533A)**\n\n- \u6587\u6863: https://modelscope.cn/models/ZhipuAI/AutoGLM-Phone-9B\n\
  - `--base-url`: `https://api-inference.modelscope.cn/v1`\n- `--model`: `ZhipuAI/AutoGLM-Phone-9B`\n\
  - `--apikey`: \u5728 ModelScope \u5E73\u53F0\u7533\u8BF7\u4F60\u7684 API Key\n\n\
  \u4F7F\u7528\u7B2C\u4E09\u65B9\u670D\u52A1\u7684\u793A\u4F8B\uFF1A\n\n```bash\n\
  # \u4F7F\u7528\u667A\u8C31 BigModel\npython main.py --base-url https://open.bigmodel.cn/api/paas/v4\
  \ --model \"autoglm-phone\" --apikey \"your-bigmodel-api-key\" \"\u6253\u5F00\u7F8E\
  \u56E2\u641C\u7D22\u9644\u8FD1\u7684\u706B\u9505\u5E97\"\n\n# \u4F7F\u7528 ModelScope\n\
  python main.py --base-url https://api-inference.modelscope.cn/v1 --model \"ZhipuAI/AutoGLM-Phone-9B\"\
  \ --apikey \"your-modelscope-api-key\" \"\u6253\u5F00\u7F8E\u56E2\u641C\u7D22\u9644\
  \u8FD1\u7684\u706B\u9505\u5E97\"\n```\n\n#### \u9009\u9879 B: \u81EA\u884C\u90E8\
  \u7F72\u6A21\u578B\n\n\u5982\u679C\u4F60\u5E0C\u671B\u5728\u672C\u5730\u6216\u81EA\
  \u5DF1\u7684\u670D\u52A1\u5668\u4E0A\u90E8\u7F72\u6A21\u578B\uFF1A\n\n1. \u6309\u7167\
  \ `requirements.txt` \u4E2D `For Model Deployment` \u7AE0\u8282\u81EA\u884C\u5B89\
  \u88C5\u63A8\u7406\u5F15\u64CE\u6846\u67B6\u3002\n\n\u5BF9\u4E8ESGLang\uFF0C \u9664\
  \u4E86\u4F7F\u7528pip\u5B89\u88C5\uFF0C\u4F60\u4E5F\u53EF\u4EE5\u4F7F\u7528\u5B98\
  \u65B9docker:\n>\n> ```shell\n> docker pull lmsysorg/sglang:v0.5.6.post1\n> ```\n\
  >\n> \u8FDB\u5165\u5BB9\u5668\uFF0C\u6267\u884C\n>\n> ```\n> pip install nvidia-cudnn-cu12==9.16.0.29\n\
  > ```\n\n\u5BF9\u4E8E vLLM\uFF0C\u9664\u4E86\u4F7F\u7528pip \u5B89\u88C5\uFF0C\u4F60\
  \u4E5F\u53EF\u4EE5\u4F7F\u7528\u5B98\u65B9docker:\n>\n> ```shell\n> docker pull\
  \ vllm/vllm-openai:v0.12.0\n> ```\n>\n> \u8FDB\u5165\u5BB9\u5668\uFF0C\u6267\u884C\
  \n>\n> ```\n> pip install -U transformers --pre\n> ```\n\n**\u6CE8\u610F**: \u4E0A\
  \u8FF0\u6B65\u9AA4\u51FA\u73B0\u7684\u5173\u4E8E transformers \u7684\u4F9D\u8D56\
  \u51B2\u7A81\u53EF\u4EE5\u5FFD\u7565\u3002\n\n1. \u5728\u5BF9\u5E94\u5BB9\u5668\u6216\
  \u8005\u5B9E\u4F53\u673A\u4E2D(\u975E\u5BB9\u5668\u5B89\u88C5)\u4E0B\u8F7D\u6A21\
  \u578B\uFF0C\u901A\u8FC7 SGlang / vLLM \u542F\u52A8\uFF0C\u5F97\u5230 OpenAI \u683C\
  \u5F0F\u670D\u52A1\u3002\u8FD9\u91CC\u63D0\u4F9B\u4E00\u4E2A vLLM\u90E8\u7F72\u65B9\
  \u6848\uFF0C\u8BF7\u4E25\u683C\u9075\u5FAA\u6211\u4EEC\u63D0\u4F9B\u7684\u542F\u52A8\
  \u53C2\u6570:\n\n- vLLM:\n\n```shell\npython3 -m vllm.entrypoints.openai.api_server\
  \ \\\n --served-model-name autoglm-phone-9b \\\n --allowed-local-media-path /  \
  \ \\\n --mm-encoder-tp-mode data \\\n --mm_processor_cache_type shm \\\n --mm_processor_kwargs\
  \ \"{\\\"max_pixels\\\":5000000}\" \\\n --max-model-len 25480  \\\n --chat-template-content-format\
  \ string \\\n --limit-mm-per-prompt \"{\\\"image\\\":10}\" \\\n --model zai-org/AutoGLM-Phone-9B\
  \ \\\n --port 8000\n```\n\n- SGLang:\n\n```shell\npython3 -m sglang.launch_server\
  \ --model-path  zai-org/AutoGLM-Phone-9B \\\n        --served-model-name autoglm-phone-9b\
  \  \\\n        --context-length 25480  \\\n        --mm-enable-dp-encoder   \\\n\
  \        --mm-process-config '{\"image\":{\"max_pixels\":5000000}}'  \\\n      \
  \  --port 8000\n```\n\n- \u8BE5\u6A21\u578B\u7ED3\u6784\u4E0E `GLM-4.1V-9B-Thinking`\
  \ \u76F8\u540C, \u5173\u4E8E\u6A21\u578B\u90E8\u7F72\u7684\u8BE6\u7EC6\u5185\u5BB9\
  \uFF0C\u4F60\u4E5F\u4EE5\u67E5\u770B [GLM-V](https://github.com/zai-org/GLM-V)\n\
  \  \u83B7\u53D6\u6A21\u578B\u90E8\u7F72\u548C\u4F7F\u7528\u6307\u5357\u3002\n\n\
  - \u8FD0\u884C\u6210\u529F\u540E\uFF0C\u5C06\u53EF\u4EE5\u901A\u8FC7 `http://localhost:8000/v1`\
  \ \u8BBF\u95EE\u6A21\u578B\u670D\u52A1\u3002 \u5982\u679C\u60A8\u5728\u8FDC\u7A0B\
  \u670D\u52A1\u5668\u90E8\u7F72\u6A21\u578B, \u4F7F\u7528\u8BE5\u670D\u52A1\u5668\
  \u7684IP\u8BBF\u95EE\u6A21\u578B.\n\n### 4. \u68C0\u67E5\u6A21\u578B\u90E8\u7F72\
  \n\n\u6A21\u578B\u670D\u52A1\u542F\u52A8\u540E\uFF0C\u53EF\u4EE5\u4F7F\u7528\u68C0\
  \u67E5\u811A\u672C\u9A8C\u8BC1\u90E8\u7F72\u662F\u5426\u6210\u529F\uFF1A\n\n```bash\n\
  python scripts/check_deployment_cn.py --base-url http://\u4F60\u7684IP:\u4F60\u7684\
  \u7AEF\u53E3/v1 --model \u6A21\u578B\u540D\u79F0\n```\n\n\u811A\u672C\u5C06\u53D1\
  \u9001\u6D4B\u8BD5\u8BF7\u6C42\u5E76\u5C55\u793A\u6A21\u578B\u7684\u63A8\u7406\u7ED3\
  \u679C\uFF0C\u4F60\u53EF\u4EE5\u6839\u636E\u8F93\u51FA\u5224\u65AD\u6A21\u578B\u90E8\
  \u7F72\u662F\u5426\u6B63\u5E38\u5DE5\u4F5C\u3002\n\n\u57FA\u4E8E\u7ED9\u5B9A\u7684\
  \u4EFB\u52A1, \u9884\u671F\u8F93\u51FA\u5982\u4E0B\u3002**\u5982\u679C\u601D\u7EF4\
  \u94FE\u957F\u5EA6\u5F88\u77ED, \u6216\u8005\u51FA\u73B0\u4E86\u4E71\u7801, \u5F88\
  \u53EF\u80FD\u662F\u6A21\u578B\u90E8\u7F72\u5931\u8D25**, \u8BF7\u4ED4\u7EC6\u68C0\
  \u67E5\u6587\u6863\u8981\u6C42\u7684\u914D\u7F6E\u548C\u4F9D\u8D56\u3002\n\n```\n\
  <think>\u7528\u6237\u60F3\u8981\u6BD4\u8F83\u8FD9\u4E2A\u6D17\u53D1\u6C34\u5728\u4EAC\
  \u4E1C\u548C\u6DD8\u5B9D\u4E0A\u7684\u4EF7\u683C\uFF0C\u7136\u540E\u9009\u62E9\u6700\
  \u4FBF\u5B9C\u7684\u5E73\u53F0\u4E0B\u5355\u3002\u5F53\u524D\u5728\u5C0F\u7EA2\u4E66\
  app\u4E0A\uFF0C\u663E\u793A\u7684\u662F\u4E00\u4E2A\u5173\u4E8ELUMMI MOOD\u6D17\u53D1\
  \u6C34\u7684\u5E16\u5B50\u3002\n\n\u6211\u9700\u8981\uFF1A\n1. \u5148\u542F\u52A8\
  \u4EAC\u4E1Capp\uFF0C\u641C\u7D22\u8FD9\u4E2A\u6D17\u53D1\u6C34\n2. \u67E5\u770B\
  \u4EAC\u4E1C\u7684\u4EF7\u683C\n3. \u518D\u542F\u52A8\u6DD8\u5B9Dapp\uFF0C\u641C\
  \u7D22\u8FD9\u4E2A\u6D17\u53D1\u6C34\n4. \u67E5\u770B\u6DD8\u5B9D\u7684\u4EF7\u683C\
  \n5. \u6BD4\u8F83\u4EF7\u683C\u540E\uFF0C\u9009\u62E9\u6700\u4FBF\u5B9C\u7684\u4EAC\
  \u4E1C\u6216\u6DD8\u5B9D\u4E0B\u5355\n\n\u9996\u5148\uFF0C\u6211\u9700\u8981\u4ECE\
  \u5F53\u524D\u7684\u5C0F\u7EA2\u4E66\u754C\u9762\u9000\u51FA\uFF0C\u7136\u540E\u542F\
  \u52A8\u4EAC\u4E1Capp\u3002</think>\n<answer>do(action=\"Launch\", app=\"\u4EAC\u4E1C\
  \")\n```\n\n**\u53C2\u6570\u8BF4\u660E\uFF1A**\n- `--base-url`: \u6A21\u578B\u670D\
  \u52A1\u5730\u5740(\u6839\u636E\u5B9E\u9645\u90E8\u7F72\u5730\u5740\u4FEE\u6539\
  )\n- `--model`: \u6A21\u578B\u540D\u79F0\n- `--messages-file`: \u53EF\u9009\uFF0C\
  \u6307\u5B9A\u81EA\u5B9A\u4E49\u6D4B\u8BD5\u6D88\u606F\u6587\u4EF6(\u9ED8\u8BA4\u4F7F\
  \u7528 `scripts/sample_messages.json`)\n\n## \u4F7F\u7528 AutoGLM\n\n### \u547D\u4EE4\
  \u884C\n\n\u6839\u636E\u4F60\u90E8\u7F72\u7684\u6A21\u578B, \u8BBE\u7F6E `--base-url`\
  \ \u548C `--model` \u53C2\u6570, \u8BBE\u7F6E `--device-type` \u6307\u5B9A\u662F\
  \u5B89\u5353\u8BBE\u5907\u6216\u9E3F\u8499\u8BBE\u5907 (\u9ED8\u8BA4\u503C adb \u8868\
  \u793A\u5B89\u5353\u8BBE\u5907, hdc \u8868\u793A\u9E3F\u8499\u8BBE\u5907). \u4F8B\
  \u5982:\n\n```bash\n# Android \u8BBE\u5907 - \u4EA4\u4E92\u6A21\u5F0F\npython main.py\
  \ --base-url http://localhost:8000/v1 --model \"autoglm-phone-9b\"\n\n# Android\
  \ \u8BBE\u5907 - \u6307\u5B9A\u4EFB\u52A1\npython main.py --base-url http://localhost:8000/v1\
  \ \"\u6253\u5F00\u7F8E\u56E2\u641C\u7D22\u9644\u8FD1\u7684\u706B\u9505\u5E97\"\n\
  \n# \u9E3F\u8499\u8BBE\u5907 - \u4EA4\u4E92\u6A21\u5F0F\npython main.py --device-type\
  \ hdc --base-url http://localhost:8000/v1 --model \"autoglm-phone-9b\"\n\n# \u9E3F\
  \u8499\u8BBE\u5907 - \u6307\u5B9A\u4EFB\u52A1\npython main.py --device-type hdc\
  \ --base-url http://localhost:8000/v1 \"\u6253\u5F00\u7F8E\u56E2\u641C\u7D22\u9644\
  \u8FD1\u7684\u706B\u9505\u5E97\"\n\n# \u4F7F\u7528 API Key \u8FDB\u884C\u8BA4\u8BC1\
  \npython main.py --apikey sk-xxxxx\n\n# \u4F7F\u7528\u82F1\u6587 system prompt\n\
  python main.py --lang en --base-url http://localhost:8000/v1 \"Open Chrome browser\"\
  \n\n# \u5217\u51FA\u652F\u6301\u7684\u5E94\u7528\uFF08Android\uFF09\npython main.py\
  \ --list-apps\n\n# \u5217\u51FA\u652F\u6301\u7684\u5E94\u7528\uFF08\u9E3F\u8499\uFF09\
  \npython main.py --device-type hdc --list-apps\n```\n\n### Python API\n\n```python\n\
  from phone_agent import PhoneAgent\nfrom phone_agent.model import ModelConfig\n\n\
  # Configure model\nmodel_config = ModelConfig(\n    base_url=\"http://localhost:8000/v1\"\
  ,\n    model_name=\"autoglm-phone-9b\",\n)\n\n# \u521B\u5EFA Agent\nagent = PhoneAgent(model_config=model_config)\n\
  \n# \u6267\u884C\u4EFB\u52A1\nresult = agent.run(\"\u6253\u5F00\u6DD8\u5B9D\u641C\
  \u7D22\u65E0\u7EBF\u8033\u673A\")\nprint(result)\n```\n\n## \u8FDC\u7A0B\u8C03\u8BD5\
  \n\nPhone Agent \u652F\u6301\u901A\u8FC7 WiFi/\u7F51\u7EDC\u8FDB\u884C\u8FDC\u7A0B\
  \ ADB/HDC \u8C03\u8BD5\uFF0C\u65E0\u9700 USB \u8FDE\u63A5\u5373\u53EF\u63A7\u5236\
  \u8BBE\u5907\u3002\n\n### \u914D\u7F6E\u8FDC\u7A0B\u8C03\u8BD5\n\n#### \u5728\u624B\
  \u673A\u7AEF\u5F00\u542F\u65E0\u7EBF\u8C03\u8BD5\n\n##### Android \u8BBE\u5907\n\
  \n\u786E\u4FDD\u624B\u673A\u548C\u7535\u8111\u5728\u540C\u4E00\u4E2AWiFi\u4E2D\uFF0C\
  \u5982\u56FE\u6240\u793A\n\n![\u5F00\u542F\u65E0\u7EBF\u8C03\u8BD5](resources/setting.png)\n\
  \n##### \u9E3F\u8499\u8BBE\u5907\n\n\u786E\u4FDD\u624B\u673A\u548C\u7535\u8111\u5728\
  \u540C\u4E00\u4E2AWiFi\u4E2D\uFF1A\n1. \u8FDB\u5165 `\u8BBE\u7F6E > \u7CFB\u7EDF\
  \u548C\u66F4\u65B0 > \u5F00\u53D1\u8005\u9009\u9879`\n2. \u5F00\u542F `USB \u8C03\
  \u8BD5` \u548C `\u65E0\u7EBF\u8C03\u8BD5`\n3. \u8BB0\u5F55\u663E\u793A\u7684 IP\
  \ \u5730\u5740\u548C\u7AEF\u53E3\u53F7\n\n#### \u5728\u7535\u8111\u7AEF\u4F7F\u7528\
  \u6807\u51C6 ADB/HDC \u547D\u4EE4\n\n```bash\n# Android \u8BBE\u5907 - \u901A\u8FC7\
  \ WiFi \u8FDE\u63A5, \u6539\u6210\u624B\u673A\u663E\u793A\u7684 IP \u5730\u5740\u548C\
  \u7AEF\u53E3\nadb connect 192.168.1.100:5555\n\n# \u9A8C\u8BC1\u8FDE\u63A5\nadb\
  \ devices\n# \u5E94\u663E\u793A\uFF1A192.168.1.100:5555    device\n\n# \u9E3F\u8499\
  \u8BBE\u5907 - \u901A\u8FC7 WiFi \u8FDE\u63A5\nhdc tconn 192.168.1.100:5555\n\n\
  # \u9A8C\u8BC1\u8FDE\u63A5\nhdc list targets\n# \u5E94\u663E\u793A\uFF1A192.168.1.100:5555\n\
  ```\n\n### \u8BBE\u5907\u7BA1\u7406\u547D\u4EE4\n\n#### Android \u8BBE\u5907\uFF08\
  ADB\uFF09\n\n```bash\n# \u5217\u51FA\u6240\u6709\u5DF2\u8FDE\u63A5\u8BBE\u5907\n\
  adb devices\n\n# \u8FDE\u63A5\u8FDC\u7A0B\u8BBE\u5907\nadb connect 192.168.1.100:5555\n\
  \n# \u65AD\u5F00\u6307\u5B9A\u8BBE\u5907\nadb disconnect 192.168.1.100:5555\n\n\
  # \u6307\u5B9A\u8BBE\u5907\u6267\u884C\u4EFB\u52A1\npython main.py --device-id 192.168.1.100:5555\
  \ --base-url http://localhost:8000/v1 --model \"autoglm-phone-9b\" \"\u6253\u5F00\
  \u6296\u97F3\u5237\u89C6\u9891\"\n```\n\n#### \u9E3F\u8499\u8BBE\u5907\uFF08HDC\uFF09\
  \n\n```bash\n# \u5217\u51FA\u6240\u6709\u5DF2\u8FDE\u63A5\u8BBE\u5907\nhdc list\
  \ targets\n\n# \u8FDE\u63A5\u8FDC\u7A0B\u8BBE\u5907\nhdc tconn 192.168.1.100:5555\n\
  \n# \u65AD\u5F00\u6307\u5B9A\u8BBE\u5907\nhdc tdisconn 192.168.1.100:5555\n\n# \u6307\
  \u5B9A\u8BBE\u5907\u6267\u884C\u4EFB\u52A1\npython main.py --device-type hdc --device-id\
  \ 192.168.1.100:5555 --base-url http://localhost:8000/v1 --model \"autoglm-phone-9b\"\
  \ \"\u6253\u5F00\u6296\u97F3\u5237\u89C6\u9891\"\n```\n\n### Python API \u8FDC\u7A0B\
  \u8FDE\u63A5\n\n#### Android \u8BBE\u5907\uFF08ADB\uFF09\n\n```python\nfrom phone_agent.adb\
  \ import ADBConnection, list_devices\n\n# \u521B\u5EFA\u8FDE\u63A5\u7BA1\u7406\u5668\
  \nconn = ADBConnection()\n\n# \u8FDE\u63A5\u8FDC\u7A0B\u8BBE\u5907\nsuccess, message\
  \ = conn.connect(\"192.168.1.100:5555\")\nprint(f\"\u8FDE\u63A5\u72B6\u6001: {message}\"\
  )\n\n# \u5217\u51FA\u5DF2\u8FDE\u63A5\u8BBE\u5907\ndevices = list_devices()\nfor\
  \ device in devices:\n    print(f\"{device.device_id} - {device.connection_type.value}\"\
  )\n\n# \u5728 USB \u8BBE\u5907\u4E0A\u542F\u7528 TCP/IP\nsuccess, message = conn.enable_tcpip(5555)\n\
  ip = conn.get_device_ip()\nprint(f\"\u8BBE\u5907 IP: {ip}\")\n\n# \u65AD\u5F00\u8FDE\
  \u63A5\nconn.disconnect(\"192.168.1.100:5555\")\n```\n\n#### \u9E3F\u8499\u8BBE\u5907\
  \uFF08HDC\uFF09\n\n```python\nfrom phone_agent.hdc import HDCConnection, list_devices\n\
  \n# \u521B\u5EFA\u8FDE\u63A5\u7BA1\u7406\u5668\nconn = HDCConnection()\n\n# \u8FDE\
  \u63A5\u8FDC\u7A0B\u8BBE\u5907\nsuccess, message = conn.connect(\"192.168.1.100:5555\"\
  )\nprint(f\"\u8FDE\u63A5\u72B6\u6001: {message}\")\n\n# \u5217\u51FA\u5DF2\u8FDE\
  \u63A5\u8BBE\u5907\ndevices = list_devices()\nfor device in devices:\n    print(f\"\
  {device.device_id} - {device.connection_type.value}\")\n\n# \u65AD\u5F00\u8FDE\u63A5\
  \nconn.disconnect(\"192.168.1.100:5555\")\n```\n\n### \u8FDC\u7A0B\u8FDE\u63A5\u95EE\
  \u9898\u6392\u67E5\n\n**\u8FDE\u63A5\u88AB\u62D2\u7EDD\uFF1A**\n\n- \u786E\u4FDD\
  \u8BBE\u5907\u548C\u7535\u8111\u5728\u540C\u4E00\u7F51\u7EDC\n- \u68C0\u67E5\u9632\
  \u706B\u5899\u662F\u5426\u963B\u6B62 5555 \u7AEF\u53E3\n- \u786E\u8BA4\u5DF2\u542F\
  \u7528 TCP/IP \u6A21\u5F0F\uFF1A`adb tcpip 5555`\n\n**\u8FDE\u63A5\u65AD\u5F00\uFF1A\
