  \ and Zhao, Wenyi and Dong, Yuxiao},\n  journal={arXiv preprint arXiv:2509.18119},\n\
  \  year={2025}\n}\n```\n\n---\n\n## \u81EA\u52A8\u5316\u90E8\u7F72\u6307\u5357(\u9762\
  \u5411 AI)\n\n> **\u672C\u7AE0\u8282\u4E13\u4E3A AI \u52A9\u624B(\u5982 Claude Code)\u8BBE\
  \u8BA1\uFF0C\u7528\u4E8E\u81EA\u52A8\u5316\u90E8\u7F72 Open-AutoGLM\u3002**\n>\n\
  > \u5982\u679C\u4F60\u662F\u4EBA\u7C7B\u8BFB\u8005\uFF0C\u53EF\u4EE5\u8DF3\u8FC7\
  \u672C\u7AE0\u8282\uFF0C\u6309\u7167\u4E0A\u9762\u7684\u6587\u6863\u64CD\u4F5C\u5373\
  \u53EF\u3002\n\n---\n\n### \u9879\u76EE\u6982\u8FF0\n\nOpen-AutoGLM \u662F\u4E00\
  \u4E2A\u624B\u673A Agent \u6846\u67B6\uFF1A\n- **\u8F93\u5165**\uFF1A\u7528\u6237\
  \u7684\u81EA\u7136\u8BED\u8A00\u6307\u4EE4(\u5982\"\u6253\u5F00\u5FAE\u4FE1\u53D1\
  \u6D88\u606F\u7ED9\u5F20\u4E09\")\n- **\u8F93\u51FA**\uFF1A\u81EA\u52A8\u64CD\u4F5C\
  \u7528\u6237\u7684\u5B89\u5353\u624B\u673A\u5B8C\u6210\u4EFB\u52A1\n- **\u539F\u7406\
  **\uFF1A\u622A\u56FE \u2192 \u89C6\u89C9\u6A21\u578B\u7406\u89E3\u754C\u9762 \u2192\
  \ \u8F93\u51FA\u70B9\u51FB\u5750\u6807 \u2192 ADB \u6267\u884C\u64CD\u4F5C \u2192\
  \ \u5FAA\u73AF\n\n\u67B6\u6784\u5206\u4E3A\u4E24\u90E8\u5206\uFF1A\n1. **Agent \u4EE3\
  \u7801**(\u672C\u4ED3\u5E93)\uFF1A\u8FD0\u884C\u5728\u7528\u6237\u7535\u8111\u4E0A\
  \uFF0C\u8D1F\u8D23\u8C03\u7528\u6A21\u578B\u3001\u89E3\u6790\u52A8\u4F5C\u3001\u63A7\
  \u5236\u624B\u673A\n2. **\u89C6\u89C9\u6A21\u578B\u670D\u52A1**\uFF1A\u53EF\u4EE5\
  \u662F\u8FDC\u7A0B API\uFF0C\u4E5F\u53EF\u4EE5\u672C\u5730\u90E8\u7F72\n\n---\n\n\
  ### \u90E8\u7F72\u524D\u7F6E\u68C0\u67E5\n\n\u5728\u5F00\u59CB\u90E8\u7F72\u524D\
  \uFF0C\u8BF7\u9010\u9879\u5411\u7528\u6237\u786E\u8BA4\u4EE5\u4E0B\u5185\u5BB9\uFF1A\
  \n\n#### \u786C\u4EF6\u73AF\u5883\n- [ ] \u7528\u6237\u6709\u4E00\u53F0\u5B89\u5353\
  \u624B\u673A(Android 7.0+)\n- [ ] \u7528\u6237\u6709\u4E00\u6839\u652F\u6301\u6570\
  \u636E\u4F20\u8F93\u7684 USB \u6570\u636E\u7EBF(\u4E0D\u662F\u4EC5\u5145\u7535\u7EBF\
  )\n- [ ] \u624B\u673A\u548C\u7535\u8111\u53EF\u4EE5\u901A\u8FC7\u6570\u636E\u7EBF\
  \u8FDE\u63A5\n\n#### \u624B\u673A\u7AEF\u914D\u7F6E\n- [ ] \u624B\u673A\u5DF2\u5F00\
  \u542F\u300C\u5F00\u53D1\u8005\u6A21\u5F0F\u300D(\u8BBE\u7F6E \u2192 \u5173\u4E8E\
  \u624B\u673A \u2192 \u8FDE\u7EED\u70B9\u51FB\u7248\u672C\u53F7 7 \u6B21)\n- [ ]\
  \ \u624B\u673A\u5DF2\u5F00\u542F\u300CUSB \u8C03\u8BD5\u300D(\u8BBE\u7F6E \u2192\
  \ \u5F00\u53D1\u8005\u9009\u9879 \u2192 USB \u8C03\u8BD5)\n- [ ] \u90E8\u5206\u673A\
  \u578B\u9700\u8981\u540C\u65F6\u5F00\u542F\u300CUSB \u8C03\u8BD5(\u5B89\u5168\u8BBE\
  \u7F6E)\u300D\n- [ ] \u624B\u673A\u5DF2\u5B89\u88C5 ADB Keyboard \u5E94\u7528(\u4E0B\
  \u8F7D\u5730\u5740\uFF1Ahttps://github.com/senzhk/ADBKeyBoard/blob/master/ADBKeyboard.apk)\n\
  - [ ] ADB Keyboard \u5DF2\u5728\u7CFB\u7EDF\u8BBE\u7F6E\u4E2D\u542F\u7528(\u8BBE\
  \u7F6E \u2192 \u8BED\u8A00\u548C\u8F93\u5165\u6CD5 \u2192 \u542F\u7528 ADB Keyboard)\n\
  \n#### \u6A21\u578B\u670D\u52A1\u786E\u8BA4(\u4E8C\u9009\u4E00)\n\n**\u8BF7\u660E\
  \u786E\u8BE2\u95EE\u7528\u6237\uFF1A\u4F60\u662F\u5426\u5DF2\u6709\u53EF\u7528\u7684\
  \ AutoGLM \u6A21\u578B\u670D\u52A1\uFF1F**\n\n- **\u9009\u9879 A\uFF1A\u4F7F\u7528\
  \u5DF2\u90E8\u7F72\u7684\u6A21\u578B\u670D\u52A1(\u63A8\u8350)**\n  - \u7528\u6237\
  \u63D0\u4F9B\u6A21\u578B\u670D\u52A1\u7684 URL(\u5982 `http://xxx.xxx.xxx.xxx:8000/v1`)\n\
  \  - \u65E0\u9700\u672C\u5730 GPU\uFF0C\u65E0\u9700\u4E0B\u8F7D\u6A21\u578B\n  -\
  \ \u76F4\u63A5\u4F7F\u7528\u8BE5 URL \u4F5C\u4E3A `--base-url` \u53C2\u6570\n\n\
  - **\u9009\u9879 B\uFF1A\u672C\u5730\u90E8\u7F72\u6A21\u578B(\u9AD8\u914D\u7F6E\u8981\
  \u6C42)**\n  - \u9700\u8981 NVIDIA GPU(\u5EFA\u8BAE 24GB+ \u663E\u5B58)\n  - \u9700\
  \u8981\u5B89\u88C5 vLLM \u6216 SGLang\n  - \u9700\u8981\u4E0B\u8F7D\u7EA6 20GB \u7684\
  \u6A21\u578B\u6587\u4EF6\n  - **\u5982\u679C\u7528\u6237\u662F\u65B0\u624B\u6216\
  \u4E0D\u786E\u5B9A\uFF0C\u5F3A\u70C8\u5EFA\u8BAE\u9009\u62E9\u9009\u9879 A**\n\n\
  ---\n\n### \u90E8\u7F72\u6D41\u7A0B\n\n#### \u9636\u6BB5\u4E00\uFF1A\u73AF\u5883\
  \u51C6\u5907\n\n```bash\n# 1. \u5B89\u88C5 ADB \u5DE5\u5177\n# MacOS:\nbrew install\
  \ android-platform-tools\n# \u6216\u624B\u52A8\u4E0B\u8F7D\uFF1Ahttps://developer.android.com/tools/releases/platform-tools\n\
  \n# Windows: \u4E0B\u8F7D\u540E\u89E3\u538B\uFF0C\u6DFB\u52A0\u5230 PATH \u73AF\u5883\
  \u53D8\u91CF\n\n# 2. \u9A8C\u8BC1 ADB \u5B89\u88C5\nadb version\n# \u5E94\u8F93\u51FA\
  \u7248\u672C\u4FE1\u606F\n\n# 3. \u8FDE\u63A5\u624B\u673A\u5E76\u9A8C\u8BC1\n# \u7528\
  \u6570\u636E\u7EBF\u8FDE\u63A5\u624B\u673A\uFF0C\u624B\u673A\u4E0A\u70B9\u51FB\u300C\
  \u5141\u8BB8 USB \u8C03\u8BD5\u300D\nadb devices\n# \u5E94\u8F93\u51FA\u8BBE\u5907\
  \u5217\u8868\uFF0C\u5982\uFF1A\n# List of devices attached\n# XXXXXXXX    device\n\
  ```\n\n**\u5982\u679C `adb devices` \u663E\u793A\u7A7A\u5217\u8868\u6216 unauthorized\uFF1A\
  **\n1. \u68C0\u67E5\u624B\u673A\u4E0A\u662F\u5426\u5F39\u51FA\u6388\u6743\u6846\uFF0C\
  \u70B9\u51FB\u300C\u5141\u8BB8\u300D\n2. \u68C0\u67E5 USB \u8C03\u8BD5\u662F\u5426\
  \u5F00\u542F\n3. \u5C1D\u8BD5\u66F4\u6362\u6570\u636E\u7EBF\u6216 USB \u63A5\u53E3\
  \n4. \u6267\u884C `adb kill-server && adb start-server` \u540E\u91CD\u8BD5\n\n####\
  \ \u9636\u6BB5\u4E8C\uFF1A\u5B89\u88C5 Agent\n\n```bash\n# 1. \u514B\u9686\u4ED3\
  \u5E93(\u5982\u679C\u8FD8\u6CA1\u6709\u514B\u9686)\ngit clone https://github.com/zai-org/Open-AutoGLM.git\n\
  cd Open-AutoGLM\n\n# 2. \u521B\u5EFA\u865A\u62DF\u73AF\u5883(\u63A8\u8350)\npython\
  \ -m venv venv\nsource venv/bin/activate  # Windows: venv\\Scripts\\activate\n\n\
  # 3. \u5B89\u88C5\u4F9D\u8D56\npip install -r requirements.txt\npip install -e .\n\
  ```\n\n**\u6CE8\u610F\uFF1A\u4E0D\u9700\u8981 clone \u6A21\u578B\u4ED3\u5E93\uFF0C\
  \u6A21\u578B\u901A\u8FC7 API \u8C03\u7528\u3002**\n\n#### \u9636\u6BB5\u4E09\uFF1A\
  \u914D\u7F6E\u6A21\u578B\u670D\u52A1\n\n**\u5982\u679C\u7528\u6237\u9009\u62E9\u9009\
  \u9879 A(\u4F7F\u7528\u5DF2\u90E8\u7F72\u7684\u6A21\u578B)\uFF1A**\n\n\u4F60\u53EF\
  \u4EE5\u4F7F\u7528\u4EE5\u4E0B\u7B2C\u4E09\u65B9\u6A21\u578B\u670D\u52A1\uFF1A\n\
  \n1. **\u667A\u8C31 BigModel**\n   - \u6587\u6863\uFF1Ahttps://docs.bigmodel.cn/cn/api/introduction\n\
  \   - `--base-url`\uFF1A`https://open.bigmodel.cn/api/paas/v4`\n   - `--model`\uFF1A\
  `autoglm-phone`\n   - `--apikey`\uFF1A\u5728\u667A\u8C31\u5E73\u53F0\u7533\u8BF7\
  \u4F60\u7684 API Key\n\n2. **ModelScope(\u9B54\u642D\u793E\u533A)**\n   - \u6587\
  \u6863\uFF1Ahttps://modelscope.cn/models/ZhipuAI/AutoGLM-Phone-9B\n   - `--base-url`\uFF1A\
  `https://api-inference.modelscope.cn/v1`\n   - `--model`\uFF1A`ZhipuAI/AutoGLM-Phone-9B`\n\
  \   - `--apikey`\uFF1A\u5728 ModelScope \u5E73\u53F0\u7533\u8BF7\u4F60\u7684 API\
  \ Key\n\n\u4F7F\u7528\u793A\u4F8B\uFF1A\n\n```bash\n# \u4F7F\u7528\u667A\u8C31 BigModel\n\
  python main.py --base-url https://open.bigmodel.cn/api/paas/v4 --model \"autoglm-phone\"\
  \ --apikey \"your-bigmodel-api-key\" \"\u6253\u5F00\u7F8E\u56E2\u641C\u7D22\u9644\
  \u8FD1\u7684\u706B\u9505\u5E97\"\n\n# \u4F7F\u7528 ModelScope\npython main.py --base-url\
  \ https://api-inference.modelscope.cn/v1 --model \"ZhipuAI/AutoGLM-Phone-9B\" --apikey\
  \ \"your-modelscope-api-key\" \"\u6253\u5F00\u7F8E\u56E2\u641C\u7D22\u9644\u8FD1\
  \u7684\u706B\u9505\u5E97\"\n```\n\n\u6216\u8005\u76F4\u63A5\u4F7F\u7528\u7528\u6237\
  \u63D0\u4F9B\u7684\u5176\u4ED6\u6A21\u578B\u670D\u52A1 URL\uFF0C\u8DF3\u8FC7\u672C\
  \u5730\u6A21\u578B\u90E8\u7F72\u6B65\u9AA4\u3002\n\n**\u5982\u679C\u7528\u6237\u9009\
  \u62E9\u9009\u9879 B(\u672C\u5730\u90E8\u7F72\u6A21\u578B)\uFF1A**\n\n```bash\n\
  # 1. \u5B89\u88C5 vLLM\npip install vllm\n\n# 2. \u542F\u52A8\u6A21\u578B\u670D\u52A1\
  (\u4F1A\u81EA\u52A8\u4E0B\u8F7D\u6A21\u578B\uFF0C\u7EA6 20GB)\npython3 -m vllm.entrypoints.openai.api_server\
  \ \\\n  --served-model-name autoglm-phone-9b \\\n  --allowed-local-media-path /\
  \ \\\n  --mm-encoder-tp-mode data \\\n  --mm_processor_cache_type shm \\\n  --mm_processor_kwargs\
  \ \"{\\\"max_pixels\\\":5000000}\" \\\n  --max-model-len 25480 \\\n  --chat-template-content-format\
  \ string \\\n  --limit-mm-per-prompt \"{\\\"image\\\":10}\" \\\n  --model zai-org/AutoGLM-Phone-9B\
  \ \\\n  --port 8000\n\n# \u6A21\u578B\u670D\u52A1 URL \u4E3A\uFF1Ahttp://localhost:8000/v1\n\
  ```\n\n#### \u9636\u6BB5\u56DB\uFF1A\u9A8C\u8BC1\u90E8\u7F72\n\n```bash\n# \u5728\
  \ Open-AutoGLM \u76EE\u5F55\u4E0B\u6267\u884C\n# \u5C06 {MODEL_URL} \u66FF\u6362\
  \u4E3A\u5B9E\u9645\u7684\u6A21\u578B\u670D\u52A1\u5730\u5740\n\npython main.py --base-url\
  \ {MODEL_URL} --model \"autoglm-phone-9b\" \"\u6253\u5F00\u5FAE\u4FE1\uFF0C\u5BF9\
  \u6587\u4EF6\u4F20\u8F93\u52A9\u624B\u53D1\u9001\u6D88\u606F\uFF1A\u90E8\u7F72\u6210\
  \u529F\"\n```\n\n**\u9884\u671F\u7ED3\u679C\uFF1A**\n- \u624B\u673A\u81EA\u52A8\u6253\
  \u5F00\u5FAE\u4FE1\n- \u81EA\u52A8\u641C\u7D22\u300C\u6587\u4EF6\u4F20\u8F93\u52A9\
  \u624B\u300D\n- \u81EA\u52A8\u53D1\u9001\u6D88\u606F\u300C\u90E8\u7F72\u6210\u529F\
  \u300D\n\n---\n\n### \u5F02\u5E38\u5904\u7406\n\n| \u9519\u8BEF\u73B0\u8C61 | \u53EF\
