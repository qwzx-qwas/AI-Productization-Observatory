  \u8F93\u5165\u6CD5 > \u865A\u62DF\u952E\u76D8 \u4E2D\u542F\u7528\n3. Agent \u4F1A\
  \u5728\u9700\u8981\u8F93\u5165\u65F6\u81EA\u52A8\u5207\u6362\u5230 ADB Keyboard\n\
  \n### \u622A\u56FE\u5931\u8D25(\u9ED1\u5C4F)\n\n\u8FD9\u901A\u5E38\u610F\u5473\u7740\
  \u5E94\u7528\u6B63\u5728\u663E\u793A\u654F\u611F\u9875\u9762(\u652F\u4ED8\u3001\u5BC6\
  \u7801\u3001\u94F6\u884C\u7C7B\u5E94\u7528)\u3002Agent \u4F1A\u81EA\u52A8\u68C0\u6D4B\
  \u5E76\u8BF7\u6C42\u4EBA\u5DE5\u63A5\u7BA1\u3002\n\n### windows \u7F16\u7801\u5F02\
  \u5E38\u95EE\u9898\n\n\u62A5\u9519\u4FE1\u606F\u5F62\u5982 `UnicodeEncodeError gbk\
  \ code`\n\n\u89E3\u51B3\u529E\u6CD5: \u5728\u8FD0\u884C\u4EE3\u7801\u7684\u547D\u4EE4\
  \u524D\u9762\u52A0\u4E0A\u73AF\u5883\u53D8\u91CF: `PYTHONIOENCODING=utf-8`\n\n###\
  \ \u4EA4\u4E92\u6A21\u5F0F\u975ETTY\u73AF\u5883\u65E0\u6CD5\u4F7F\u7528\n\n\u62A5\
