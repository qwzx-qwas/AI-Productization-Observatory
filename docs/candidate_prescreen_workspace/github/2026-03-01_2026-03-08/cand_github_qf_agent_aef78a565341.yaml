raw_evidence_excerpt: "Full toolkit for running an AI agent service built with LangGraph,\
  \ FastAPI and Streamlit\n\n# \U0001F9F0 AI Agent Service Toolkit\n\n[![build status](https://github.com/JoshuaC215/agent-service-toolkit/actions/workflows/test.yml/badge.svg)](https://github.com/JoshuaC215/agent-service-toolkit/actions/workflows/test.yml)\
  \ [![codecov](https://codecov.io/github/JoshuaC215/agent-service-toolkit/graph/badge.svg?token=5MTJSYWD05)](https://codecov.io/github/JoshuaC215/agent-service-toolkit)\
  \ [![Python Version](https://img.shields.io/python/required-version-toml?tomlFilePath=https%3A%2F%2Fraw.githubusercontent.com%2FJoshuaC215%2Fagent-service-toolkit%2Frefs%2Fheads%2Fmain%2Fpyproject.toml)](https://github.com/JoshuaC215/agent-service-toolkit/blob/main/pyproject.toml)\n\
  [![GitHub License](https://img.shields.io/github/license/JoshuaC215/agent-service-toolkit)](https://github.com/JoshuaC215/agent-service-toolkit/blob/main/LICENSE)\
  \ [![Streamlit App](https://static.streamlit.io/badges/streamlit_badge_black_red.svg)](https://agent-service-toolkit.streamlit.app/)\n\
  \nA full toolkit for running an AI agent service built with LangGraph, FastAPI and\
  \ Streamlit.\n\nIt includes a [LangGraph](https://langchain-ai.github.io/langgraph/)\
  \ agent, a [FastAPI](https://fastapi.tiangolo.com/) service to serve it, a client\
  \ to interact with the service, and a [Streamlit](https://streamlit.io/) app that\
  \ uses the client to provide a chat interface. Data structures and settings are\
  \ built with [Pydantic](https://github.com/pydantic/pydantic).\n\nThis project offers\
  \ a template for you to easily build and run your own agents using the LangGraph\
  \ framework. It demonstrates a complete setup from agent definition to user interface,\
  \ making it easier to get started with LangGraph-based projects by providing a full,\
  \ robust toolkit.\n\n**[\U0001F3A5 Watch a video walkthrough of the repo and app](https://www.youtube.com/watch?v=pdYVHw_YCNY)**\n\
  \n## Overview\n\n### [Try the app!](https://agent-service-toolkit.streamlit.app/)\n\
  \n<a href=\"https://agent-service-toolkit.streamlit.app/\"><img src=\"media/app_screenshot.png\"\
  \ width=\"600\"></a>\n\n### Quickstart\n\nRun directly in python\n\n```sh\n# At\
  \ least one LLM API key is required\necho 'OPENAI_API_KEY=your_openai_api_key' >>\
  \ .env\n\n# uv is the recommended way to install agent-service-toolkit, but \"pip\
  \ install .\" also works\n# For uv installation options, see: https://docs.astral.sh/uv/getting-started/installation/\n\
  curl -LsSf https://astral.sh/uv/0.7.19/install.sh | sh\n\n# Install dependencies.\
  \ \"uv sync\" creates .venv automatically\nuv sync --frozen\nsource .venv/bin/activate\n\
  python src/run_service.py\n\n# In another shell\nsource .venv/bin/activate\nstreamlit\
  \ run src/streamlit_app.py\n```\n\nRun with docker\n\n```sh\necho 'OPENAI_API_KEY=your_openai_api_key'\
  \ >> .env\ndocker compose watch\n```\n\n### Architecture Diagram\n\n<img src=\"\
  media/agent_architecture.png\" width=\"600\">\n\n### Key Features\n\n1. **LangGraph\
  \ Agent and latest features**: A customizable agent built using the LangGraph framework.\
  \ Implements the latest LangGraph v1.0 features including human in the loop with\
  \ `interrupt()`, flow control with `Command`, long-term memory with `Store`, and\
  \ `langgraph-supervisor`.\n1. **FastAPI Service**: Serves the agent with both streaming\
  \ and non-streaming endpoints.\n1. **Advanced Streaming**: A novel approach to support\
  \ both token-based and message-based streaming.\n1. **Streamlit Interface**: Provides\
  \ a user-friendly chat interface for interacting with the agent, including voice\
  \ input and output.\n1. **Multiple Agent Support**: Run multiple agents in the service\
  \ and call by URL path. Available agents and models are described in `/info`\n1.\
  \ **Asynchronous Design**: Utilizes async/await for efficient handling of concurrent\
  \ requests.\n1. **Content Moderation**: Implements Safeguard for content moderation\
  \ (requires Groq API key).\n1. **RAG Agent**: A basic RAG agent implementation using\
  \ ChromaDB - see [docs](docs/RAG_Assistant.md).\n1. **Feedback Mechanism**: Includes\
  \ a star-based feedback system integrated with LangSmith.\n1. **Docker Support**:\
  \ Includes Dockerfiles and a docker compose file for easy development and deployment.\n\
  1. **Testing**: Includes robust unit and integration tests for the full repo.\n\n\
  ### Key Files\n\nThe repository is structured as follows:\n\n- `src/agents/`: Defines\
  \ several agents with different capabilities\n- `src/schema/`: Defines the protocol\
  \ schema\n- `src/core/`: Core modules including LLM definition and settings\n- `src/service/service.py`:\
  \ FastAPI service to serve the agents\n- `src/client/client.py`: Client to interact\
  \ with the agent service\n- `src/streamlit_app.py`: Streamlit app providing a chat\
  \ interface\n- `tests/`: Unit and integration tests\n\n## Setup and Usage\n\n1.\
  \ Clone the repository:\n\n   ```sh\n   git clone https://github.com/JoshuaC215/agent-service-toolkit.git\n\
  \   cd agent-service-toolkit\n   ```\n\n2. Set up environment variables:\n   Create\
  \ a `.env` file in the root directory. At least one LLM API key or configuration\
  \ is required. See the [`.env.example` file](./.env.example) for a full list of\
  \ available environment variables, including a variety of model provider API keys,\
  \ header-based authentication, LangSmith tracing, testing and development modes,\
  \ and OpenWeatherMap API key.\n\n3. You can now run the agent service and the Streamlit\
  \ app locally, either with Docker or just using Python. The Docker setup is recommended\
  \ for simpler environment setup and immediate reloading of the services when you\
  \ make changes to your code.\n\n### Additional setup for specific AI providers\n\
  \n- [Setting up Ollama](docs/Ollama.md)\n- [Setting up VertexAI](docs/VertexAI.md)\n\
  - [Setting up RAG with ChromaDB](docs/RAG_Assistant.md)\n\n### Building or customizing\
  \ your own agent\n\nTo customize the agent for your own use case:\n\n1. Add your\
  \ new agent to the `src/agents` directory. You can copy `research_assistant.py`\
  \ or `chatbot.py` and modify it to change the agent's behavior and tools.\n1. Import\
  \ and add your new agent to the `agents` dictionary in `src/agents/agents.py`. Your\
  \ agent can be called by `/<your_agent_name>/invoke` or `/<your_agent_name>/stream`.\n\
  1. Adjust the Streamlit interface in `src/streamlit_app.py` to match your agent's\
  \ capabilities.\n\n\n### Handling Private Credential files\n\nIf your agents or\
  \ chosen LLM require file-based credential files or certificates, the `privatecredentials/`\
  \ has been provided for your development convenience. All contents, excluding the\
  \ `.gitkeep` files, are ignored by git and docker's build process. See [Working\
  \ with File-based Credentials](docs/File_Based_Credentials.md) for suggested use.\n\
  \n\n### Docker Setup\n\nThis project includes a Docker setup for easy development\
  \ and deployment. The `compose.yaml` file defines three services: `postgres`, `agent_service`\
  \ and `streamlit_app`. The `Dockerfile` for each service is in their respective\
  \ directories.\n\nFor local development, we recommend using [docker compose watch](https://docs.docker.com/compose/file-watch/).\
  \ This feature allows for a smoother development experience by automatically updating\
  \ your containers when changes are detected in your source code.\n\n1. Make sure\
  \ you have Docker and Docker Compose (>= [v2.23.0](https://docs.docker.com/compose/release-notes/#2230))\
  \ installed on your system.\n\n2. Create a `.env` file from the `.env.example`.\
  \ At minimum, you need to provide an LLM API key (e.g., OPENAI_API_KEY).\n   ```sh\n\
  \   cp .env.example .env\n   # Edit .env to add your API keys\n   ```\n\n3. Build\
  \ and launch the services in watch mode:\n\n   ```sh\n   docker compose watch\n\
  \   ```\n\n   This will automatically:\n   - Start a PostgreSQL database service\
  \ that the agent service connects to\n   - Start the agent service with FastAPI\n\
  \   - Start the Streamlit app for the user interface\n\n4. The services will now\
  \ automatically update when you make changes to your code:\n   - Changes in the\
  \ relevant python files and directories will trigger updates for the relevant services.\n\
  \   - NOTE: If you make changes to the `pyproject.toml` or `uv.lock` files, you\
  \ will need to rebuild the services by running `docker compose up --build`.\n\n\
  5. Access the Streamlit app by navigating to `http://localhost:8501` in your web\
  \ browser.\n\n6. The agent service API will be available at `http://0.0.0.0:8080`.\
  \ You can also use the OpenAPI docs at `http://0.0.0.0:8080/redoc`.\n\n7. Use `docker\
  \ compose down` to stop the services.\n\nThis setup allows you to develop and test\
  \ your changes in real-time without manually restarting the services.\n\n### Building\
  \ other apps on the AgentClient\n\nThe repo includes a generic `src/client/client.AgentClient`\
  \ that can be used to interact with the agent service. This client is designed to\
  \ be flexible and can be used to build other apps on top of the agent. It supports\
  \ both synchronous and asynchronous invocations, and streaming and non-streaming\
  \ requests.\n\nSee the `src/run_client.py` file for full examples of how to use\
  \ the `AgentClient`. A quick example:\n\n```python\nfrom client import AgentClient\n\
  client = AgentClient()\n\nresponse = client.invoke(\"Tell me a brief joke?\")\n\
  response.pretty_print()\n# ================================== Ai Message ==================================\n\
  #\n# A man walked into a library and asked the librarian, \"Do you have any books\
  \ on Pavlov's dogs and Schr\xF6dinger's cat?\"\n# The librarian replied, \"It rings\
  \ a bell, but I'm not sure if it's here or not.\"\n\n```\n\n### Development with\
  \ LangGraph Studio\n\nThe agent supports [LangGraph Studio](https://langchain-ai.github.io/langgraph/concepts/langgraph_studio/),\
  \ the IDE for developing agents in LangGraph.\n\n`langgraph-cli[inmem]` is installed\
  \ with `uv sync`. You can simply add your `.env` file to the root directory as described\
  \ above, and then launch LangGraph Studio with `langgraph dev`. Customize `langgraph.json`\
  \ as needed. See the [local quickstart](https://langchain-ai.github.io/langgraph/cloud/how-tos/studio/quick_start/#local-development-server)\
  \ to learn more.\n\n### Local development without Docker\n\nYou can also run the\
  \ agent service and the Streamlit app locally without Docker, just using a Python\
  \ virtual environment.\n\n1. Create a virtual environment and install dependencies:\n\
  \n   ```sh\n   uv sync --frozen\n   source .venv/bin/activate\n   ```\n\n2. Run\
  \ the FastAPI server:\n\n   ```sh\n   python src/run_service.py\n   ```\n\n3. In\
  \ a separate terminal, run the Streamlit app:\n\n   ```sh\n   streamlit run src/streamlit_app.py\n\
  \   ```\n\n4. Open your browser and navigate to the URL provided by Streamlit (usually\
  \ `http://localhost:8501`).\n\n## Projects built with or inspired by agent-service-toolkit\n\
  \nThe following are a few of the public projects that drew code or inspiration from\
  \ this repo.\n\n- **[PolyRAG](https://github.com/QuentinFuxa/PolyRAG)** - Extends\
  \ agent-service-toolkit with RAG capabilities over both PostgreSQL databases and\
  \ PDF documents.\n- **[alexrisch/agent-web-kit](https://github.com/alexrisch/agent-web-kit)**\
  \ - A Next.JS frontend for agent-service-toolkit\n- **[raushan-in/dapa](https://github.com/raushan-in/dapa)**\
  \ - Digital Arrest Protection App (DAPA) enables users to report financial scams\
  \ and frauds efficiently via a user-friendly platform.\n\n**Please create a pull\
  \ request editing the README or open a discussion with any new ones to be added!**\
  \ Would love to include more projects.\n\n## Contributing\n\nContributions are welcome!\
  \ Please feel free to submit a Pull Request. Currently the tests need to be run\
  \ using the local development without Docker setup. To run the tests for the agent\
  \ service:\n\n1. Ensure you're in the project root directory and have activated\
  \ your virtual environment.\n\n2. Install the development dependencies and pre-commit\
  \ hooks:\n\n   ```sh\n   uv sync --frozen\n   pre-commit install\n   ```\n\n3. Run\
  \ the tests using pytest:\n\n   ```sh\n   pytest\n   ```\n\n## License\n\nThis project\
  \ is licensed under the MIT License - see the LICENSE file for details."
