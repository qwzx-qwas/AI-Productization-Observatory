title: Qwen-Agent
summary: Agent framework and applications built upon Qwen>=3.0, featuring Function
  Calling, MCP, Code Interpreter, RAG, Chrome extension, etc.
raw_evidence_excerpt: "Agent framework and applications built upon Qwen>=3.0, featuring\
  \ Function Calling, MCP, Code Interpreter, RAG, Chrome extension, etc.\n\n<!---\n\
  Copyright 2023 The Qwen team, Alibaba Group. All rights reserved.\n\nLicensed under\
  \ the Apache License, Version 2.0 (the \"License\");\nyou may not use this file\
  \ except in compliance with the License.\nYou may obtain a copy of the License at\n\
  \n   http://www.apache.org/licenses/LICENSE-2.0\n\nUnless required by applicable\
  \ law or agreed to in writing, software\ndistributed under the License is distributed\
  \ on an \"AS IS\" BASIS,\nWITHOUT WARRANTIES OR CONDITIONS OF ANY KIND, either express\
  \ or implied.\nSee the License for the specific language governing permissions and\n\
  limitations under the License.\n-->\n\n[\u4E2D\u6587](https://github.com/QwenLM/Qwen-Agent/blob/main/README_CN.md)\
  \ \uFF5C English\n\n<p align=\"center\">\n    <img src=\"https://qianwen-res.oss-accelerate-overseas.aliyuncs.com/logo_qwen_agent.png\"\
  \ width=\"400\"/>\n<p>\n<br>\n\n<p align=\"center\">\n          \U0001F49C <a href=\"\
  https://chat.qwen.ai/\"><b>Qwen Chat</b></a>&nbsp&nbsp | &nbsp&nbsp\U0001F917 <a\
  \ href=\"https://huggingface.co/Qwen\">Hugging Face</a>&nbsp&nbsp | &nbsp&nbsp\U0001F916\
  \ <a href=\"https://modelscope.cn/organization/qwen\">ModelScope</a>&nbsp&nbsp |\
  \ &nbsp&nbsp \U0001F4D1 <a href=\"https://qwenlm.github.io/\">Blog</a> &nbsp&nbsp\
  \ \uFF5C &nbsp&nbsp\U0001F4D6 <a href=\"https://qwenlm.github.io/Qwen-Agent/en/\"\
  >Documentation</a>\n\n<br>\n\U0001F4CA <a href=\"https://qwenlm.github.io/Qwen-Agent/en/benchmarks/deepplanning/\"\
  >Benchmark</a>&nbsp&nbsp | &nbsp&nbsp\U0001F4AC <a href=\"https://github.com/QwenLM/Qwen/blob/main/assets/wechat.png\"\
  >WeChat (\u5FAE\u4FE1)</a>&nbsp&nbsp | &nbsp&nbsp\U0001FAE8 <a href=\"https://discord.gg/CV4E9rpNSD\"\
  >Discord</a>&nbsp&nbsp\n</p>\n\n\nQwen-Agent is a framework for developing LLM applications\
  \ based on the instruction following, tool usage, planning, and\nmemory capabilities\
  \ of Qwen.\nIt also comes with example applications such as Browser Assistant, Code\
  \ Interpreter, and Custom Assistant.\nNow Qwen-Agent plays as the backend of [Qwen\
  \ Chat](https://chat.qwen.ai/).\n\n# News\n* \U0001F525\U0001F525\U0001F525Feb 16,\
  \ 2026: Open-sourced Qwen3.5. For usage examples, refer to [Qwen3.5 Agent Demo](./examples/assistant_qwen3.5.py).\n\
  * Jan 27, 2026: Open-sourced agent evaluation benchmark [DeepPlanning](https://qwenlm.github.io/Qwen-Agent/en/benchmarks/deepplanning/)\
  \ and added Qwen-Agent [documentation](https://qwenlm.github.io/Qwen-Agent/en/guide/).\n\
  * Sep 23, 2025: Added [Qwen3-VL Tool-call Demo](./examples/cookbook_think_with_images.ipynb),\
  \ supporting tools such as zoom in, image search, and web search.\n* Jul 23, 2025:\
  \ Add [Qwen3-Coder Tool-call Demo](./examples/assistant_qwen3_coder.py); Added native\
  \ API tool call interface support, such as using vLLM's built-in tool call parsing.\n\
  * May 1, 2025: Add [Qwen3 Tool-call Demo](./examples/assistant_qwen3.py), and add\
  \ [MCP Cookbooks](./examples/).\n* Mar 18, 2025: Support for the `reasoning_content`\
  \ field; adjust the default [Function Call template](./qwen_agent/llm/fncall_prompts/nous_fncall_prompt.py),\
  \ which is applicable to the Qwen2.5 series general models and QwQ-32B. If you need\
  \ to use the old version of the template, please refer to the [example](./examples/function_calling.py)\
  \ for passing parameters.\n* Mar 7, 2025: Added [QwQ-32B Tool-call Demo](./examples/assistant_qwq.py).\
  \ It supports parallel, multi-step, and multi-turn tool calls.\n* Dec 3, 2024: Upgrade\
  \ GUI to Gradio 5 based. Note: GUI requires Python 3.10 or higher.\n* Sep 18, 2024:\
  \ Added [Qwen2.5-Math Demo](./examples/tir_math.py) to showcase the Tool-Integrated\
  \ Reasoning capabilities of Qwen2.5-Math. Note: The python executor is not sandboxed\
  \ and is intended for local testing only, not for production use.\n\n# Getting Started\n\
  \n## Installation\n\n- Install the stable version from PyPI:\n```bash\npip install\
  \ -U \"qwen-agent[gui,rag,code_interpreter,mcp]\"\n# Or use `pip install -U qwen-agent`\
  \ for the minimal requirements.\n# The optional requirements, specified in double\
  \ brackets, are:\n#   [gui] for Gradio-based GUI support;\n#   [rag] for RAG support;\n\
  #   [code_interpreter] for Code Interpreter support;\n#   [mcp] for MCP support.\n\
  ```\n\n- Alternatively, you can install the latest development version from the\
  \ source:\n```bash\ngit clone https://github.com/QwenLM/Qwen-Agent.git\ncd Qwen-Agent\n\
  pip install -e ./\"[gui,rag,code_interpreter,mcp]\"\n# Or `pip install -e ./` for\
  \ minimal requirements.\n```\n\n## Preparation: Model Service\n\nYou can either\
  \ use the model service provided by Alibaba\nCloud's [DashScope](https://help.aliyun.com/zh/dashscope/developer-reference/quick-start),\
  \ or deploy and use your own\nmodel service using the open-source Qwen models.\n\
  \n- If you choose to use the model service offered by DashScope, please ensure that\
  \ you set the environment\nvariable `DASHSCOPE_API_KEY` to your unique DashScope\
  \ API key.\n\n- Alternatively, if you prefer to deploy and use your own model service,\
  \ please follow the instructions provided in the README of Qwen2 for deploying an\
  \ OpenAI-compatible API service.\nSpecifically, consult the [vLLM](https://github.com/QwenLM/Qwen2?tab=readme-ov-file#vllm)\
  \ section for high-throughput GPU deployment or the [Ollama](https://github.com/QwenLM/Qwen2?tab=readme-ov-file#ollama)\
  \ section for local CPU (+GPU) deployment.\nFor the QwQ and Qwen3 model, it is recommended\
  \ to **do not** add the `--enable-auto-tool-choice` and `--tool-call-parser hermes`\
  \ parameters, as Qwen-Agent will parse the tool outputs from vLLM on its own.\n\
  For Qwen3-Coder, it is recommended to enable both of the above parameters, use vLLM's\
  \ built-in tool parsing, and combine with the `use_raw_api` parameter [usage](#how-to-pass-llm-parameters-to-the-agent).\n\
  \n## Developing Your Own Agent\n\nQwen-Agent offers atomic components, such as LLMs\
  \ (which inherit from `class BaseChatModel` and come with [function calling](https://github.com/QwenLM/Qwen-Agent/blob/main/examples/function_calling.py))\
  \ and Tools (which inherit\nfrom `class BaseTool`), along with high-level components\
  \ like Agents (derived from `class Agent`).\n\nThe following example illustrates\
  \ the process of creating an agent capable of reading PDF files and utilizing tools,\
  \ as\nwell as incorporating a custom tool:\n\n```py\nimport pprint\nimport urllib.parse\n\
  import json5\nfrom qwen_agent.agents import Assistant\nfrom qwen_agent.tools.base\
  \ import BaseTool, register_tool\nfrom qwen_agent.utils.output_beautify import typewriter_print\n\
  \n\n# Step 1 (Optional): Add a custom tool named `my_image_gen`.\n@register_tool('my_image_gen')\n\
  class MyImageGen(BaseTool):\n    # The `description` tells the agent the functionality\
  \ of this tool.\n    description = 'AI painting (image generation) service, input\
  \ text description, and return the image URL drawn based on text information.'\n\
  \    # The `parameters` tell the agent what input parameters the tool has.\n   \
  \ parameters = [{\n        'name': 'prompt',\n        'type': 'string',\n      \
  \  'description': 'Detailed description of the desired image content, in English',\n\
  \        'required': True\n    }]\n\n    def call(self, params: str, **kwargs) ->\
  \ str:\n        # `params` are the arguments generated by the LLM agent.\n     \
  \   prompt = json5.loads(params)['prompt']\n        prompt = urllib.parse.quote(prompt)\n\
  \        return json5.dumps(\n            {'image_url': f'https://image.pollinations.ai/prompt/{prompt}'},\n\
  \            ensure_ascii=False)\n\n\n# Step 2: Configure the LLM you are using.\n\
  llm_cfg = {\n    # Use the model service provided by DashScope:\n    'model': 'qwen-max-latest',\n\
  \    'model_type': 'qwen_dashscope',\n    # 'api_key': 'YOUR_DASHSCOPE_API_KEY',\n\
  \    # It will use the `DASHSCOPE_API_KEY' environment variable if 'api_key' is\
  \ not set here.\n\n    # Use a model service compatible with the OpenAI API, such\
  \ as vLLM or Ollama:\n    # 'model': 'Qwen2.5-7B-Instruct',\n    # 'model_server':\
  \ 'http://localhost:8000/v1',  # base_url, also known as api_base\n    # 'api_key':\
  \ 'EMPTY',\n\n    # (Optional) LLM hyperparameters for generation:\n    'generate_cfg':\
  \ {\n        'top_p': 0.8\n    }\n}\n\n# Step 3: Create an agent. Here we use the\
  \ `Assistant` agent as an example, which is capable of using tools and reading files.\n\
  system_instruction = '''After receiving the user's request, you should:\n- first\
  \ draw an image and obtain the image url,\n- then run code `request.get(image_url)`\
  \ to download the image,\n- and finally select an image operation from the given\
  \ document to process the image.\nPlease show the image using `plt.show()`.'''\n\
  tools = ['my_image_gen', 'code_interpreter']  # `code_interpreter` is a built-in\
  \ tool for executing code. For configuration details, please refer to the FAQ.\n\
  files = ['./examples/resource/doc.pdf']  # Give the bot a PDF file to read.\nbot\
  \ = Assistant(llm=llm_cfg,\n                system_message=system_instruction,\n\
  \                function_list=tools,\n                files=files)\n\n# Step 4:\
  \ Run the agent as a chatbot.\nmessages = []  # This stores the chat history.\n\
  while True:\n    # For example, enter the query \"draw a dog and rotate it 90 degrees\"\
  .\n    query = input('\\nuser query: ')\n    # Append the user query to the chat\
  \ history.\n    messages.append({'role': 'user', 'content': query})\n    response\
  \ = []\n    response_plain_text = ''\n    print('bot response:')\n    for response\
  \ in bot.run(messages=messages):\n        # Streaming output.\n        response_plain_text\
  \ = typewriter_print(response, response_plain_text)\n    # Append the bot responses\
  \ to the chat history.\n    messages.extend(response)\n```\n\nIn addition to using\
  \ built-in agent implementations such as `class Assistant`, you can also develop\
  \ your own agent implemetation by inheriting from `class Agent`.\n\nThe framework\
  \ also provides a convenient GUI interface, supporting the rapid deployment of Gradio\
  \ Demos for Agents.\nFor example, in the case above, you can quickly launch a Gradio\
  \ Demo using the following code:\n\n```py\nfrom qwen_agent.gui import WebUI\nWebUI(bot).run()\
  \  # bot is the agent defined in the above code, we do not repeat the definition\
  \ here for saving space.\n```\nNow you can chat with the Agent in the web UI. Please\
  \ refer to the [examples](https://github.com/QwenLM/Qwen-Agent/blob/main/examples)\
  \ directory for more usage examples.\n\n# FAQ\n## How to Use the Code Interpreter\
  \ Tool?\n\nWe implement a code interpreter tool based on local Docker containers.\
  \ You can enable the built-in `code interpreter` tool for your agent, allowing it\
  \ to autonomously write code according to specific scenarios, execute it securely\
  \ within an isolated sandbox environment, and return the execution results.\n\n\u26A0\
  \uFE0F **Note**: Before using this tool, please ensure that Docker is installed\
  \ and running on your local operating system. The time required to build the container\
  \ image for the first time depends on your network conditions. For Docker installation\
  \ and setup instructions, please refer to the [official documentation](https://docs.docker.com/desktop/).\n\
  \n\n## How to Use MCP?\n\nYou can select the required tools on the open-source [MCP\
  \ server website](https://github.com/modelcontextprotocol/servers) and configure\
  \ the relevant environment.\n\nExample of MCP invocation format:\n```\n{\n    \"\
  mcpServers\": {\n        \"memory\": {\n            \"command\": \"npx\",\n    \
  \        \"args\": [\"-y\", \"@modelcontextprotocol/server-memory\"]\n        },\n\
  \        \"filesystem\": {\n            \"command\": \"npx\",\n            \"args\"\
  : [\"-y\", \"@modelcontextprotocol/server-filesystem\", \"/path/to/allowed/files\"\
  ]\n        },\n        \"sqlite\" : {\n            \"command\": \"uvx\",\n     \
  \       \"args\": [\n                \"mcp-server-sqlite\",\n                \"\
  --db-path\",\n                \"test.db\"\n            ]\n        }\n    }\n}\n\
  ```\nFor more details, you can refer to the [MCP usage example](./examples/assistant_mcp_sqlite_bot.py)\n\
  \nThe dependencies required to run this example are as follows:\n```\n# Node.js\
  \ (Download and install the latest version from the Node.js official website)\n\
  # uv 0.4.18 or higher (Check with uv --version)\n# Git (Check with git --version)\n\
  # SQLite (Check with sqlite3 --version)\n\n# For macOS users, you can install these\
  \ components using Homebrew:\nbrew install uv git sqlite3\n\n# For Windows users,\
  \ you can install these components using winget:\nwinget install --id=astral-sh.uv\
  \ -e\nwinget install git.git sqlite.sqlite\n```\n## Do you have function calling\
  \ (aka tool calling)?\n\nYes. The LLM classes provide [function calling](https://github.com/QwenLM/Qwen-Agent/blob/main/examples/function_calling.py).\
  \ Additionally, some Agent classes also are built upon the function calling capability,\
  \ e.g., FnCallAgent and ReActChat.\n\nThe current default tool calling template\
  \ natively supports **Parallel Function Calls**.\n\n## How to pass LLM parameters\
  \ to the Agent?\n```py\nllm_cfg = {\n    # The model name being used:\n    'model':\
  \ 'qwen3-32b',\n    # The model service being used:\n    'model_type': 'qwen_dashscope',\n\
  \    # If 'api_key' is not set here, it will default to reading the `DASHSCOPE_API_KEY`\
  \ environment variable:\n    'api_key': 'YOUR_DASHSCOPE_API_KEY',\n\n    # Using\
  \ an OpenAI API compatible model service, such as vLLM or Ollama:\n    # 'model':\
  \ 'qwen3-32b',\n    # 'model_server': 'http://localhost:8000/v1',  # base_url, also\
  \ known as api_base\n    # 'api_key': 'EMPTY',\n\n    # (Optional) LLM hyperparameters:\n\
  \    'generate_cfg': {\n        # This parameter will affect the tool-call parsing\
  \ logic. Default is False:\n          # Set to True: when content is `<think>this\
  \ is the thought</think>this is the answer`\n          # Set to False: when response\
  \ consists of reasoning_content and content\n        # 'thought_in_content': True,\n\
  \n        # tool-call template: default is nous (recommended for qwen3):\n     \
  \   # 'fncall_prompt_type': 'nous'\n\n        # Maximum input length, messages will\
  \ be truncated if they exceed this length, please adjust according to model API:\n\
  \        # 'max_input_tokens': 58000\n\n        # Parameters that will be passed\
  \ directly to the model API, such as top_p, enable_thinking, etc., according to\
  \ the API specifications:\n        # 'top_p': 0.8\n\n        # Using the API's native\
  \ tool call interface\n        # 'use_raw_api': True,\n    }\n}\n```\n\n## How to\
  \ do question-answering over super-long documents involving 1M tokens?\n\nWe have\
  \ released [a fast RAG solution](https://github.com/QwenLM/Qwen-Agent/blob/main/examples/assistant_rag.py),\
  \ as well as [an expensive but competitive agent](https://github.com/QwenLM/Qwen-Agent/blob/main/examples/parallel_doc_qa.py),\
  \ for doing question-answering over super-long documents. They have managed to outperform\
  \ native long-context models on two challenging benchmarks while being more efficient,\
  \ and perform perfectly in the single-needle \"needle-in-the-haystack\" pressure\
  \ test involving 1M-token contexts. See the [blog](https://qwenlm.github.io/blog/qwen-agent-2405/)\
  \ for technical details.\n\n<p align=\"center\">\n    <img src=\"https://qianwen-res.oss-cn-beijing.aliyuncs.com/assets/qwen_agent/qwen-agent-2405-blog-long-context-results.png\"\
  \ width=\"400\"/>\n<p>\n\n# Application: BrowserQwen\n\nBrowserQwen is a browser\
  \ assistant built upon Qwen-Agent. Please refer to its [documentation](https://github.com/QwenLM/Qwen-Agent/blob/main/browser_qwen.md)\
  \ for details.\n\n# Disclaimer\n\nThe Docker container-based code interpreter mounts\
  \ only the specified working directory and implements basic sandbox isolation, but\
  \ it should still be used with caution in production environments."
