raw_evidence_excerpt: "CompassVPN Agent\n\n## \u26A0\uFE0F Caution: This project is\
  \ under active development! \u26A0\uFE0F\n\n# Compass VPN Agent\n\n### Read the\
  \ complete guide [on our website](https://www.compassvpn.org/installation/).\n\n\
  ## Features\n### [Read Here.](https://www.compassvpn.org/features/)\n\n## Requirements\n\
  \n### [Read Here.](https://www.compassvpn.org/installation/#requirements)\n\n# How\
  \ to run\n\n## 1. Setup Agent\n\n### Follow [this tutorial](https://www.compassvpn.org/installation/)\
  \ to get the Compass VPN Agent running.\n\n## 2. Setup Manager\n### Follow [this\
  \ tutorial](https://www.compassvpn.org/installation/manager-setup/) to create a\
  \ manager.\n\nEnsure you obtain the authentication values from the manager setup.\
  \ These values will be required to be included in the `env_file` of the agent.\n\
  \n## Commands\n\n### Bootstrap: _(first time)_\n```bash\n./bootstrap.sh\n```\n\n\
  ### Rebuild and restart all services:\n```bash\n./restart.sh\n```\n\n### Start the\
  \ Panel\n```bash\n./start_panel.sh\n```\n\n### View Configuration Links:\n```bash\n\
  ./show_configs.sh\n```\n\n### Check & Update:\n```bash\n./check_update.sh\n```\n\
  \n### Show Logs:\n```bash\n./logs.sh\n```\n\n## Services\n\n### `xray-config`\n\
  Creates `config.json`, monitors configurations, and export Xray configurations via\
  \ `/metrics` path.\n\n### `xray`\nReads `config.json` from the **xray-config** service\
  \ and runs the Xray-core.\n\n### `v2ray-exporter`\nExports V2Ray/Xray configuration\
  \ metrics.\n\n### `node-exporter`\nPrometheus Node Exporter that collects all critical\
  \ metrics of the agent machine.\n\n### `nginx`\nNGINX webserver to manage Xray inbounds\
  \ and fallbacks, enhancing both performance and security.\n\n### `metric-forwarder`\n\
  Reads metrics from `xray-config`, `node-exporter`, and `v2ray-exporter` services\
  \ and pushes them to a remote manager `Pushgateway` service or `Grafana Cloud Prometheus`\
  \ endpoint.\n\n### `user-metrics`\nTracks approximate active unique users across\
  \ all configured inbounds and monitors blocked requests due to junk traffic, providing\
  \ insights into bandwidth optimization."
