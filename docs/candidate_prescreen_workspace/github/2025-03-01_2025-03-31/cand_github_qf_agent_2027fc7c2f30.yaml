  macOS/Linux: `source venv/bin/activate`


  5. Install dependencies:


  Manual Installation


  1. Clone the repository:


  2. Create a virtual environment:


  3. Activate the virtual environment: - On Windows: `venv\Scripts\activate` - On
  macOS/Linux: `source venv/bin/activate`


  4. Install dependencies:


  Usage


  1. Activate your virtual environment (if not already activated)


  2. Run the application:


  3. Open your browser and navigate to:


  4. Enter the URL of the website you want to extract


  5. Check "Use Advanced Rendering (Selenium)" for JavaScript-heavy websites


  6. Click "Extract Website" and wait for the download to complete


  Using Advanced Rendering


  The advanced rendering option uses Selenium with Chrome WebDriver to: - Execute
  JavaScript - Render dynamic content - Scroll through the page to trigger lazy loading
  - Click on UI elements to expose hidden content - Extract resources loaded by JavaScript
  frameworks


  This option is recommended for modern websites, especially those built with React,
  Angular, Vue, or other JavaScript frameworks.


  Using with Cursor IDE


  After extracting a website:


  1. Unzip the downloaded file to a directory 2. Open with Cursor IDE:


  3. Explore the code structure and assets 4. Ask Cursor AI to analyze the code with
  prompts like: - "Explain the CSS structure of this website" - "How can I implement
  a similar hero section in my project?" - "Analyze this navigation component and
  create a similar one for my React app"


  AI Agent Integration


  WebTwin can be a powerful tool when combined with AI agents, enabling sophisticated
  workflows for code analysis, design extraction, and content repurposing.


  Integration with Cursor AI


  Cursor''s AI capabilities can be supercharged with WebTwin''s extraction abilities:


  1. **Extract and Modify Workflow**:


  Example prompts: - "Convert this landing page to use Tailwind CSS instead of Bootstrap"
  - "Refactor this JavaScript code to use React hooks" - "Simplify this complex CSS
  layout while maintaining the same visual appearance"


  2. **Component Library Creation**:


  Example prompts: - "Extract all button styles from these websites and create a unified
  component library" - "Analyze these navigation patterns and create a best-practices
  implementation"


  3. **Learn from Production Code**:


  Example prompts: - "Explain how this site implements its responsive design strategy"
  - "Show me how this animation effect works and help me implement something similar"


  Integration with OpenAI Assistants API & Agent SDK


  WebTwin can be integrated with the OpenAI Assistants API and Agent SDK to create
  specialized AI agents:


  1. **Setup a Website Analysis Agent**:


  2. **Create a Website Transformation Pipeline**:


  3. **Build a Web Design Critique Agent**: - Feed WebTwin extractions to an AI agent
  trained to evaluate design principles - Receive detailed feedback on accessibility,
  usability, and visual design


  Advanced Agent Workflows


  Combine WebTwin with AI agents for advanced workflows:


  1. **Cross-Site Design Pattern Analysis**: - Extract multiple sites in the same
  industry - Use AI to identify common patterns and best practices - Generate a report
  on industry-standard approaches


  2. **Automated Component Library Generation**: - Extract multiple sites - Use AI
  to identify and categorize UI components - Generate a unified component library
  with documentation


  3. **SEO and Content Strategy Analysis**: - Extract content-rich websites - Use
  AI to analyze content structure, metadata, and keyword usage - Generate SEO recommendations
  and content strategy insights


  4. **Competitive Analysis**: - Extract competitor websites - Use AI to compare features,
  UX patterns, and technical implementations - Generate a competitive analysis report
  with strengths and weaknesses


  Architecture


  The application is built with a modular architecture designed for flexibility and
  performance:


  Data Flow


  Key Components


  1. **Flask Web Server**: Provides the user interface and handles HTTP requests 2.
  **HTTP Client**: Makes requests to fetch website content using the Requests library
  3. **Selenium Renderer**: Optional component for JavaScript rendering and dynamic
  content 4. **Content Parser**: Analyzes HTML to extract assets and structure using
  BeautifulSoup 5. **Asset Downloader**: Downloads all discovered assets with sophisticated
  retry logic 6. **ZIP Creator**: Packages everything into an organized downloadable
  archive


  Processing Stages


  1. **URL Submission**: User provides a URL and rendering options 2. **Content Acquisition**:
  HTML content is fetched (with or without JavaScript rendering) 3. **Structure Analysis**:
  HTML is parsed and analyzed for assets and components 4. **Asset Discovery**: All
  linked resources are identified and categorized 5. **Parallel Downloading**: Assets
  are downloaded with optimized concurrent requests 6. **Organization & Packaging**:
  Files are organized and compressed into a ZIP archive


  For more detailed technical information, see app_architecture.md.


  Limitations'
