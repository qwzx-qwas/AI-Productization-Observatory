  SakanaAI/AI-Scientist - OpenDevin: An Open Platform for AI Software Developers as
  Generalist Agents - TextGrad: Automatic "Differentiation" via Text - Trace is the
  New AutoDiff -- Unlocking Efficient Optimization of Computational Workflows - Agentless:
  Demystifying LLM-based Software Engineering Agents - Competition-Level Code Generation
  with AlphaCode - AI Agents That Matter - Sibyl: Simple yet Effective Agent Framework
  for Complex Real-world Reasoning - Trial and Error: Exploration-Based Trajectory
  Optimization for LLM Agents - Self-Rewarding Language Models - ArchCode: Incorporating
  Software Requirements in Code Generation with Large Language Models - MedAgent-Zero:
  Agent Hospital: A Simulacrum of Hospital with Evolvable Medical Agents - Cognitive
