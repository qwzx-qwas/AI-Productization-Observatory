raw_evidence_excerpt: 'System 2 Reasoning Link Collection


  OpenThought - System 2 Research Links


  Here you find a collection of material (books, papers, blog-posts etc.) related
  to reasoning and cognition in AI systems. Specifically we want to cover agents,
  cognitive architectures, general problem solving strategies and self-improvement.


  The term "System 2" in the page title refers to the slower, more deliberative, and
  more logical mode of thought as described by Daniel Kahneman in his book Thinking,
  Fast and Slow.


  You know a great resource we should add? Please see How to contribute.


  Cognitive Architectures


  (looking for additional links & articles and summaries)


  - SOAR) (State, Operator, And Result) by John Laird, Allen Newell, and Paul Rosenbloom
  - ACT-R (Adaptive Control of Thought-Rational) by John Anderson at CMU - SPAUN (Semantic
  Pointer Architecture Unified Network) by Chris Eliasmith at Waterloo, SPAUN 2.0
  by Feng-Xuan Choo - ART (Adaptive resonance theory) by Stephen Grossberg and Gail
  Carpenter - CLARION) (Connectionist Learning with Adaptive Rule Induction ON-line)
  by Ron Sun - EPIC (Executive Process/Interactive Control) by David Kieras and David
  Meyer - LIDA) (Learning Intelligent Distribution Agent) by Stan Franklin, 2015 Paper
  - Sigma by Paul Rosenbloom - OpenCog by Ben Goertzel - NARS (Non-Axiomatic Reasoning
  System) by Pei Wang - Icarus by Pat Langley - MicroPsi by Joscha Bach - Thousand
  Brains Theory & HTM (Hierarchical Temporal Memory) by Jeff Hawkins - SPH (Sparse
  Predictive Hierarchie) by Eric Laukien - Leabra (Local, Error-driven and Associative,
  Biologically Realistic Algorithm), 2016 Paper by Randall O''Reilly - CogNGen (COGnitive
  Neural GENerative system) by Alexander Ororbia and Mary Alexandria Kelly, see also
  here and here - KIX (KIX: A Metacognitive Generalization Framework) by A. Kumar
  and Paul Schrater - ACE (Autonomous Cognitive Entity) by David Shapiro et al., gh:
  daveshap/ACE_Framework - Iterative Updating of Working Memory by Jared Reser, website,
  Video


