raw_evidence_excerpt: 'Open form hack for GitHub Copilot


  Coding with an AI pair programmer


  GitHub Copilot is your AI pair programmer, built to support you throughout your
  development experience. As with any new tool, using GitHub Copilot requires learning
  a few new skills. This project is built to do exactly that, to give you an opportunity
  to build a project, using the language and tools you typically use, with GitHub
  Copilot.


  > **Start hacking!**


  Requirements


  This project is configured with a devcontainer, which can be run locally or in a
  codespace. Please refer to the setup exercise for more information.


  The project does assume you are familiar with programming, but is not prescriptive
  about language or framework choice.


  License


  This project is licensed under the terms of the MIT open source license. Please
  refer to MIT for the full terms.


  Maintainers


  You can find the list of maintainers in CODEOWNERS


  Support


  This project is provided as-is, and may be updated over time. If you have questions,
  please open an issue.'
