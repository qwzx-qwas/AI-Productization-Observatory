raw_evidence_excerpt: 'Official repository for RAG-Gym


  Retrieval-Augmented Generation Gymnasium (RAG-Gym)


  `RAG-Gym` is a unified framework for optimizing agentic RAG with process supervision.


  Table of Contents - Introduction - Requirements - Usage - - Inference with RAG-Gym
  - - Training with RAG-Gym - - - Process Data Collection - - - Supervised Fine-tuning
  (SFT) - - - Direct Preference Optimization (DPO) - - - Process Reward Modeling (PRM)
  - - Inference with PRM - Citation


  Introduction


  The figure below shows the overview of RAG-Gym: (a) RAG-Gym formulates the knowledge-intensive
  question-answering task as a nested Markov Decision Process (MDP). The process reward
  data is collected by randomly sampling action candidates at each time step and using
  an external annotator to select the best one. (b) Different process supervision
  methods implemented in RAG-Gym.


  Requirements


  - Install PyTorch suitable for your system''s CUDA version by following the official
  instructions (2.1.1+cu121 in our case).


  - Install the required packages using: `pip install -r requirements.txt`.


  - For OpenAI models, an OpenAI API key is needed. Replace the placeholder with your
  key in `rag_gym/config.py`.


  - `Git-lfs` is required to download corpora for the information retrieval environment.


  - `Java/21` is requried for using BM25.


  Usage


