raw_evidence_excerpt: "This is a RAG implementation using Open Source stack. BioMistral\
  \ 7B has been used to build this app along with PubMedBert as an embedding model,\
  \ Qdrant as a self hosted Vector DB, and Langchain & Llama CPP as an orchestration\
  \ frameworks.\n\nMedical-RAG-using-Bio-Mistral-7B This is a RAG implementation using\
  \ Open Source stack. BioMistral 7B has been used to build this app along with PubMedBert\
  \ as an embedding model, Qdrant as a self hosted Vector DB, and Langchain & Llama\
  \ CPP as an orchestration frameworks. Reference Implementation on Intel AI PC Disclaimer\
  \ This demo is intended only for the purpose of exploring new LLM use cases at the\
  \ edge and not recommended for production-grade medical chatbot\n\nDevice Under\
  \ Test Processor: Intel\xAE Core\u2122 Ultra 7 165H OS: Windows 11 Pro 23H2 RAM:\
  \ 64GB Python 3.11.9\n\nPrerequisite Install Microsoft Visual C++ compiler toolset\
  \ required for installing llama-cpp-python\n\nSteps 1. Clone this repository 2.\
  \ Create a Python virtual environment and install the dependencies\n\n3. Download\
  \ the INT4 version of BioMistral-7B model in GGUF format 4. Download the embedding\
  \ model\n\n5. Install Docker Desktop for Windows with optional proxy settings 6.\
  \ Create the Qdrant container\n\nAccess the Dashboard using http://localhost:6333/dashboard\
  \ 7. Create embeddings for the new documents in data\n\nCheck the new Collection\
  \ on the Qdrant Dashboard\n\n8. Run the application\n\nSample Outputs"
