raw_evidence_excerpt: "Curated AI Prompts for Cursor Rules, Cline, Windsurf and Github\
  \ Copilot\n\nAI Prompts & Rules\n\n**Instructa AI Prompts** is an open-source repository\
  \ dedicated to collecting and sharing AI prompts, best practices, and curated rules\
  \ for developers. From project scaffolding to coding standards, our goal is to help\
  \ you quickly set up and refine your workflow with ready-to-use prompts.\n\nTry\
  \ it out here or use these prompts directly in your favorite AI coding environment.\n\
  \nTable of Contents\n\n- \U0001F4D6 Usage - \U0001F91D Contributing - \U0001F6DF\
  \ Community & Support - \U0001F517 Related Projects - \u2696\uFE0F License\n\n---\n\
  \nUsage\n\nTo dynamically include prompts in AI-assisted coding tools like Cursor,\
  \ GitHub Copilot, Zed, Windsurf, and Cline, you can utilize their respective configuration\
  \ features. This approach ensures that your AI assistant adheres to project-specific\
  \ coding standards, best practices, and automation workflows.\n\nNeed a Guide? Read\
  \ the blog post: How to use Cursor Rules | X Post\n\n**How to Use AI Prompts in\
  \ Different Tools**\n\n| AI Tool | How to Include Prompts | |-------------------|-----------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|\
  \ | **Cursor** | Add prompts as project rules inside the `.cursor/rules/` directory\
  \ (e.g., `.cursor/rules/cursorrules.mdc`). Cursor will automatically detect and\
  \ apply them. For detailed guidance, refer to the official Cursor rule guide. |\
  \ | **GitHub Copilot**| Create a `.github/copilot-instructions.md` file in your\
  \ repository's root directory and add natural language instructions in Markdown\
  \ format. These instructions will guide Copilot's behavior across your project.\
  \ More information is available in the GitHub Copilot documentation. | | **Zed**\
  \ | Store prompts in the `.zed/` directory within your project. You can configure\
  \ project-specific settings by creating a `.zed/settings.json` file, allowing Zed\
  \ to apply these configurations accordingly. Consult the Zed documentation for further\
  \ details. | | **Windsurf** | Add a .windsurfrules file into the project root. Windsurf\
  \ Getting Started Guide. | | **Cline** | 1. Click Cline extension settings 2. Find\
  \ \"Custom Instructions\" field 3. Add your instructions Cline GitHub repository.\
  \ |\n\nBy configuring these settings, you can ensure that your AI tools operate\
  \ in alignment with your project's specific requirements and standards.\n\n\U0001F91D\
  \ Contributing Prompts\n\nWe welcome all contributions! Whether you're adding new\
  \ prompts, improving existing ones, or fixing typos - every bit helps.\n\n**Quick\
  \ Start**: 1. Create a folder under `prompts/ ` 2. Add metadata in `aiprompt.json`\
  \ (see example) 3. Include `.mdc` files with YAML front-matter for rules 4. Submit\
  \ a Pull Request\n\nFor full details, please see our Contribution Guidelines.\n\n\
  Community & Support\n\n- **Discussions**: Share ideas, get help, or suggest improvements\
  \ on our GitHub Discussions. - **Issues**: Report bugs or request new prompt categories\
  \ through GitHub Issues.\n\nSocial\n\n- X/Twitter: @kregenrek - Bluesky: @kevinkern.dev\n\
  \nLicense\n\nMIT License\n\nThis repository is open-source under the MIT license.\
  \ You\u2019re free to use, modify, and distribute it under those terms. Enjoy building!"
