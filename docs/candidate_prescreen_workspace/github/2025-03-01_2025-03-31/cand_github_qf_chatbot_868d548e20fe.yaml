raw_evidence_excerpt: "\U0001F30C Open-source hub for building, managing, and sharing\
  \ AI chatbots with secure tools, public bot sharing, and ready-to-use system bots\n\
  \nBot Verse \U0001F680\n\n**Bot Verse** is an innovative platform for creating,\
  \ sharing, and interacting with AI chatbots. Users can manage their own chatbots,\
  \ explore public and system chatbots, and leverage pre-made solutions for various\
  \ tasks. This project is open source and welcomes contributions from the community.\n\
  \n<div align = \"center\"\n\nTable of Contents\n\n- Features \U0001F31F - Authentication\
  \ \U0001F510 - CRUD for Chatbots \u270D\uFE0F - Public Chatbots \U0001F30D - System\
  \ Chatbots \U0001F6E0\uFE0F - Search Functionality \U0001F50D - Dark/Light Mode\
  \ Toggle \U0001F317 - Tech Stack \U0001F6E0\uFE0F - Open Source Programs \U0001F4AA\
  \ - Ready to Contribute? \u2728 - Valuable Contributors \u2764\uFE0F\u2728 - Show\
  \ Your Support \u2764\uFE0F - License \U0001F4C4\n\nFeatures \U0001F31F\n\n- **Authentication**\
  \ \U0001F510: Secure sign-up, login, and logout functionality. - **CRUD for Chatbots**\
  \ \u270D\uFE0F: Create, update, delete, and manage your chatbots effortlessly. -\
  \ **Public Chatbots** \U0001F30D: Share your chatbots with the community and discover\
  \ others' creations. - **System Chatbots** \U0001F6E0\uFE0F: Use pre-made chatbots\
  \ for common tasks and questions. - **Search Functionality** \U0001F50D: Easily\
  \ filter chatbots by name or description in the dashboard. - **Dark/Light Mode Toggle**\
  \ \U0001F317: Switch between light and dark themes using a toggle button, with preferences\
  \ saved using localStorage.\n\nTech Stack \U0001F6E0\uFE0F\n\nOpen Source Programs\n\
  \nGSSOC 2024\n\nThis project was part of GirlScript Summer of Code Extd. We welcome\
  \ contributions from the community.\n\nApertre 2.0\n\nThis project is part of Apertre\
  \ 2.0. We welcome contributions from the community.\n\n\U0001F680 Repo Activity\n\
  \nReady to Contribute?\n\nKindly go through CONTRIBUTING.md to understand everything\
  \ from setup to contributing guidelines and must follow Code of Conduct\n\nIf you\
  \ would like to contribute to the project, please follow our contribution guidelines.\n\
  \nFor more detailed development instructions, refer to DEVELOPMENT.md.\n\nTip from\
  \ us \U0001F607 It always takes time to understand and learn. So, don't worry at\
  \ all. We know you have got this ! \U0001F4AA\n\nShow Your Support\n\nIf you find\
  \ this project interesting and inspiring, please consider showing your support by\
  \ starring it on GitHub! Your star goes a long way in helping us to reach more developers\
  \ and encourages to keep enhancing the project.\n\nLicense\n\nBot Verse is licensed\
  \ under the MIT License. See the LICENSE file for more information.\n\nI love connecting\
  \ with different people , so if you want to say hi, I'll be happy to meet you more!\
  \ :) Welcome to our community\u2014 join our Discord ."
