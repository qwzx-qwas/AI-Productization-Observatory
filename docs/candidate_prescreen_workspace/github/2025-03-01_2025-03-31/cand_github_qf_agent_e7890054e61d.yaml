summary: ZerePy an open-source framework for AI agents written in Python
raw_evidence_excerpt: "ZerePy an open-source framework for AI agents written in Python\n\
  \nZerePy\n\nZerePy is an open-source Python framework designed to let you deploy\
  \ your own agents on X, powered by multiple LLMs.\n\nZerePy is built from a modularized\
  \ version of the Zerebro backend. With ZerePy, you can launch your own agent with\
  \ similar core functionality as Zerebro. For creative outputs, you'll need to fine-tune\
  \ your own model.\n\nFeatures\n\nCore Platform\n\n- CLI interface for managing agents\
  \ - Modular connection system - Blockchain integration\n\nOnchain Activity\n\n-\
  \ Solana - Ethereum - GOAT (Great Onchain Agent Toolkit) - Monad\n\nSocial Platform\
  \ Integrations\n\n- Twitter/X - Farcaster - Echochambers\n\nLanguage Model Support\n\
  \n- OpenAI - Anthropic - EternalAI - Ollama - Hyperbolic - Galadriel - XAI (Grok)\n\
  \nQuickstart\n\nThe quickest way to start using ZerePy is to use our Replit template:\n\
  \n1. Fork the template (you will need you own Replit account) 2. Click the run button\
  \ on top 3. Voila! your CLI should be ready to use, you can jump to the configuration\
  \ section\n\nRequirements\n\nSystem:\n\n- Python 3.10 or higher - Poetry 1.5 or\
  \ higher\n\nEnvironment Variables:\n\n- LLM: make an account and grab an API key\
  \ (at least one) - OpenAI: https://platform.openai.com/api-keys - Anthropic: https://console.anthropic.com/account/keys\
  \ - EternalAI: https://eternalai.oerg/api - Hyperbolic: https://app.hyperbolic.xyz\
  \ - Galadriel: https://dashboard.galadriel.com - Social (based on your needs): -\
  \ X API: https://developer.x.com/en/docs/authentication/oauth-1-0a/api-key-and-secret\
  \ - Farcaster: Warpcast recovery phrase - Echochambers: API key and endpoint - On-chain\
  \ Integration: - Solana: private key - Ethereum: private keys - Monad: private key\n\
  \nInstallation\n\n1. First, install Poetry for dependency management if you haven't\
  \ already:\n\nFollow the steps here to use the official installation: https://python-poetry.org/docs/#installing-with-the-official-installer\n\
  \n2. Clone the repository:\n\n3. Go to the `zerepy` directory:\n\n4. Install dependencies:\n\
  \nThis will create a virtual environment and install all required dependencies.\n\
  \nUsage\n\n1. Activate the virtual environment:\n\n2. Run the application:\n\nConfigure\
  \ connections & launch an agent\n\n1. Configure your desired connections:\n\n2.\
  \ Use `list-connections` to see all available connections and their status\n\n3.\
  \ Load your agent (usually one is loaded by default, which can be set using the\
  \ CLI or in agents/general.json):\n\n4. Start your agent:\n\nGOAT Integration\n\n\
  GOAT (Go Agent Tools) is a powerful plugin system that allows your agent to interact\
  \ with various blockchain networks and protocols. Here's how to set it up:\n\nPrerequisites\n\
  \n1. An RPC provider URL (e.g., from Infura, Alchemy, or your own node) 2. A wallet\
  \ private key for signing transactions\n\nInstallation\n\nInstall any of the additional\
  \ GOAT plugins you want to use:\n\nConfiguration\n\n1. Configure the GOAT connection\
  \ using the CLI:\n\nYou'll be prompted to enter:\n\n- RPC provider URL - Wallet\
  \ private key (will be stored securely in .env)\n\n2. Add GOAT plugins configuration\
  \ to your agent's JSON file:\n\nNote that the order of plugins in the configuration\
  \ doesn't matter, but each plugin must have a `name` and `args` field with the appropriate\
  \ configuration options. You will have to check the documentation for each plugin\
  \ to see what arguments are available.\n\nAvailable Plugins\n\nEach plugin provides\
  \ specific functionality:\n\n- **1inch**: Interact with 1inch DEX aggregator for\
  \ best swap rates - **allora**: Connect with Allora protocol - **coingecko**: Get\
  \ real-time price data for cryptocurrencies using the CoinGecko API - **dexscreener**:\
  \ Access DEX trading data and analytics - **erc20**: Interact with ERC20 tokens\
  \ (transfer, approve, check balances) - **farcaster**: Interact with the Farcaster\
  \ social protocol - **nansen**: Access Nansen's on-chain analytics - **opensea**:\
  \ Interact with NFTs on OpenSea marketplace - **rugcheck**: Analyze token contracts\
  \ for potential security risks - Many more to come...\n\nNote: While these plugins\
  \ are available in the GOAT SDK, you'll need to install them separately using Poetry\
  \ and configure them in your agent's JSON file. Each plugin may require its own\
  \ API keys or additional setup.\n\nPlugin Configuration\n\nEach plugin has its own\
  \ configuration options that can be specified in the agent's JSON file:\n\n1. **ERC20\
  \ Plugin**:\n\n2. **Coingecko Plugin**:\n\nPlatform Features\n\nGOAT\n\n- Interact\
  \ with EVM chains through a unified interface - Manage ERC20 tokens: - Check token\
  \ balances - Transfer tokens - Approve token spending - Get token metadata (decimals,\
  \ symbol, name) - Access real-time cryptocurrency data: - Get token prices - Track\
  \ market data - Monitor price changes - Extensible plugin system for future protocols\
  \ - Secure wallet management with private key storage - Multi-chain support through\
  \ configurable RPC endpoints\n\nSolana\n\n- Transfer SOL and SPL tokens - Swap tokens\
  \ using Jupiter - Check token balances - Stake SOL - Monitor network TPS - Query\
  \ token information - Request testnet/devnet funds\n\nEVM Chains\n\n- Transfer ETH\
  \ and ERC-20 Tokens - Swap tokens using Kyberswao - Check token balances\n\nTwitter/X\n\
  \n- Post tweets from prompts - Read timeline with configurable count - Reply to\
  \ tweets in timeline - Like tweets in timeline\n\nFarcaster\n\n- Post casts - Reply\
  \ to casts - Like and requote casts - Read timeline - Get cast replies\n\nEchochambers\n\
  \n- Post new messages to rooms - Reply to messages based on room context - Read\
  \ room history - Get room information and topics\n\nDiscord\n\n- List channels for\
  \ a server - Read messages from a channel - Read mentioned messages from a channel\
  \ - Post new messages to a channel - Reply to messages in a channel - React to a\
  \ message in a channel\n\nCreate your own agent\n\nThe secret to having a good output\
  \ from the agent is to provide as much detail as possible in the configuration file.\
  \ Craft a story and a context for the agent, and pick very good examples of tweets\
  \ to include.\n\nIf you want to take it a step further, you can fine tune your own\
  \ model: https://platform.openai.com/docs/guides/fine-tuning.\n\nCreate a new JSON\
  \ file in the `agents` directory following this structure:\n\nAvailable Commands\n\
  \nUse `help` in the CLI to see all available commands. Key commands include:\n\n\
  - `list-agents`: Show available agents - `load-agent`: Load a specific agent - `agent-loop`:\
  \ Start autonomous behavior - `agent-action`: Execute single action - `list-connections`:\
  \ Show available connections - `list-actions`: Show available actions for a connection\
  \ - `configure-connection`: Set up a new connection - `chat`: Start interactive\
  \ chat with agent - `clear`: Clear the terminal screen\n\nStar History\n\n---\n\n\
  Made with \u2665 Blorm\n\nDesigned in California"
