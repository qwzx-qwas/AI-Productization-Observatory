summary: A simple, interactive tool to select and share code with AI assistants like
  Claude and ChatGPT. Analyzes file relationships and generates context-rich output.
raw_evidence_excerpt: "A simple, interactive tool to select and share code with AI\
  \ assistants like Claude and ChatGPT. Analyzes file relationships and generates\
  \ context-rich output.\n\nCodeSelect\n\n**Easily select and share code with AI assistants**\n\
  \nCodeSelect is a lightweight tool that helps developers share code with AI assistants\
  \ like Claude or ChatGPT. It provides a simple interface to select files from a\
  \ project and exports them in an AI-friendly format with intelligent context about\
  \ project structure and relationships between files.\n\n\U0001F680 Quick Install\n\
  \n\u2728 Features\n\n- **Visual File Selection**: Interactive UI to easily select\
  \ files with checkboxes - **Intelligent Code Analysis**: Automatically detects imports\
  \ and relationships between files - **Multi-language Support**: Works with Python,\
  \ C/C++, JavaScript, Java, Go, Ruby, PHP, Rust, Swift and more - **Zero Dependencies**:\
  \ Works with standard Python libraries only - **Non-admin Installation**: No special\
  \ privileges required - **Clipboard Integration**: Automatically copies output to\
  \ clipboard - **AI-optimized Format**: Structures output to help AI assistants understand\
  \ project context\n\n\U0001F6E0\uFE0F Usage\n\n\U0001F5A5\uFE0F Interface Controls\n\
  \n- **\u2191/\u2193**: Navigate between files - **Space**: Toggle selection of file/directory\
  \ - **\u2190/\u2192**: Collapse/expand directories - **A**: Select all files - **N**:\
  \ Deselect all files - **C**: Toggle clipboard copy - **D** or **Enter**: Complete\
  \ selection and export - **X** or **Esc**: Exit without saving\n\n\U0001F4C4 Output\
  \ Formats\n\nCodeSelect offers three output formats:\n\n- **LLM** (default): Optimized\
  \ for language models with context about file relationships - **Markdown**: GitHub-compatible\
  \ markdown with syntax highlighting - **TXT**: Plain text format for maximum compatibility\n\
  \n\u2699\uFE0F Advanced Options\n\n\U0001F50D How It Works\n\n1. **Scan**: CodeSelect\
  \ scans your project directory structure 2. **Select**: Interactive interface lets\
  \ you choose which files to include 3. **Analyze**: Automatically detects dependencies\
  \ between files 4. **Generate**: Creates a specially formatted output optimized\
  \ for AI assistants 5. **Copy**: Automatically copies result to clipboard for easy\
  \ pasting\n\n\U0001F4BB Development\n\nCodeSelect was developed in just 30 minutes\
  \ with the help of Claude, Anthropic's AI assistant. It demonstrates how AI can\
  \ help create useful developer tools through iterative improvements.\n\nContributions\
  \ are welcome! Please feel free to submit a Pull Request.\n\n\U0001F5D1\uFE0F Uninstallation\n\
  \nTo remove CodeSelect from your system:"
