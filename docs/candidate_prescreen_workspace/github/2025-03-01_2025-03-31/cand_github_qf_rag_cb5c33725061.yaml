title: LLM-Powered-RAG-System
summary: A collection of RAG systems powered by LLM.
raw_evidence_excerpt: "A collection of RAG systems powered by LLM.\n\nLLM-Powered-RAG-System\n\
  \n- LLM-Powered-RAG-System - Frameworks - Projects - Components - Chat with Documents\
  \ - Database - Optimize Method - Others - Evaluation - Papers - Blog - Other Resources\n\
  \nFrameworks\n\n- pandas-ai - Chat with your data (SQL, CSV, pandas, polars, noSQL,\
  \ etc). PandasAI makes data analysis conversational using LLMs (GPT 3.5 / 4, Anthropic,\
  \ VertexAI) and RAG.\n\nProjects\n\n- QAnything - Question and Answer based on Anything.\n\
  \nComponents\n\nChat with Documents\n\n- privateGPT - Interact with your documents\
  \ using the power of GPT, 100% privately, no data leaks - localGPT - Chat with your\
  \ documents on your local device using GPT models. No data leaves your device and\
  \ 100% private. - ChatFiles - Document Chatbot - pdfGPT - PDF GPT allows you to\
  \ chat with the contents of your PDF file by using GPT capabilities. The most effective\
  \ open source solution to turn your pdf files in a chatbot!\n\n- IncarnaMind - Connect\
  \ and chat with your multiple documents (pdf and txt) through GPT 3.5, GPT-4 Turbo,\
  \ Claude and Local Open-Source LLMs\n\nDatabase\n\n- lancedb - Developer-friendly,\
  \ serverless vector database for AI applications. Easily add long-term memory to\
  \ your LLM apps! -\n\nOptimize Method\n\n- instructor - Your Gateway to Structured\
  \ Outputs with OpenAI\n\nOthers\n\n- chatgpt-retrieval-plugin - The ChatGPT Retrieval\
  \ Plugin lets you easily find personal or work documents by asking questions in\
  \ natural language.\n\nEvaluation\n\nPapers\n\n- Awesome-LLM-RAG - This repo aims\
  \ to record advanced papers of Retrieval Agumented Generation (RAG) in LLMs.\n\n\
  Blog\n\n- Building RAG-based LLM Applications for Production - A-Guide-to-Retrieval-Augmented-LLM\
  \ - \u4E00\u6587\u8BE6\u8C0820\u591A\u79CDRAG\u4F18\u5316\u65B9\u6CD5\n\nOther Resources\n\
  \n- rag-resources - A collection of curated RAG (Retrieval Augmented Generation)\
  \ resources. - RAG-Survey - Awesome-LLM-RAG-Application - the resources about the\
  \ application based on LLM with RAG pattern"
