summary: "A NestJS library for building efficient, scalable, and quick solutions based\
  \ on the OpenAI Assistant API (chatbots) \U0001F916 \U0001F680  Chatbot, Ready API\
  \ and UI, OpenAI Functions, GPT-4 Vision, GPT-4o"
raw_evidence_excerpt: "A NestJS library for building efficient, scalable, and quick\
  \ solutions based on the OpenAI Assistant API (chatbots) \U0001F916 \U0001F680 Chatbot,\
  \ Ready API and UI, OpenAI Functions, GPT-4 Vision, GPT-4o\n\nA NestJS library for\
  \ building efficient, scalable, and fast solutions using the OpenAI Assistant API\
  \ (chatbots). Kickstart your AI Assistant development in under 15 minutes \U0001F680\
  \n\nAI Assistant\n\nIntroducing the NestJS library. Whether you're building a virtual\
  \ assistant, or an interactive chatbot for engaging user experiences, our library\
  \ empowers you to leverage cutting-edge AI capabilities with minimal effort.\n\n\
  **The library provides ready-to-use API endpoints** handling your assistant and\
  \ WebSocket server for real-time communication between the client and the assistant.\
  \ Install the library and paste the config to get it running.\n\n\U0001F4DA Watch\
  \ the tutorial\n\nVideo - AI Assistant in 15 min\n\n\U0001F680 Features\n\nAI Assistant\
  \ library features\n\n- **Function calling**: create functions, so assistant can\
  \ execute your custom logic! - **TTS (Text-to-Speech)**: convert text to speech,\
  \ so you can hear your assistant! - **STT (Speech-to-Text)**: convert speech to\
  \ text, so you can make conversation easier! - **File support**: add files to the\
  \ assistant, so you can extend assistant's knowledge base with custom data! - **WebSockets**:\
  \ establish WebSocket server for real-time communication between the client and\
  \ the assistant! - **REST API**: Just use ready REST API for communication with\
  \ the assistant! - **Vision with GPT-4o** - use the GPT-4o and make your assistant\
  \ understand images and generate text based on them!\n\nAdditional features in the\
  \ repository\n\nThe repository contains a library but also provides additional features.\
  \ You can just clone the repository and use it instantly to gain from all features:\n\
  \n- **Embedded chatbot**: embed the chatbot on various websites through JavaScript\
  \ scripts! - **Chatbot client application**: use ready client application (SPA)\
  \ with a chatbot!\n\n\U0001F3C6 Getting started\n\nIn this section, you will learn\
  \ how to integrate the AI Assistant library into your NestJS application. The following\
  \ steps will guide you through the process of setting up the library and creating\
  \ simple functionalities.\n\nStep 0: Prerequisites\n\n- Node.js (`^20.0.0` version)\
  \ - npm (`^10.0.0` version) - NestJS (`^10.0.0` version) - OpenAI (`^4.51.0` version)\
  \ - OpenAI API key\n\nOpen or create your NestJS application where you would like\
  \ to integrate the AI Assistant. To create a new NestJS application, use the following\
  \ command:\n\nNow you have to install the packages. Go to the next step.\n\nStep\
  \ 1: Installation\n\nMake sure you are in the root directory of your project. Install\
  \ the library and `openai` package using npm:\n\nThe library is installed but we\
  \ have to configure it. Go to the next step.\n\nStep 2: Env variables\n\nSet up\
  \ your environment variables, create environment variables in the `.env` file in\
  \ the root directory of the project, and populate it with the necessary secrets.\
  \ The assistant ID is optional and serves as a unique identifier for your assistant.\
  \ When the environment variable is not set, the assistant will be created automatically.\
  \ You can use the assistant ID to connect to an existing assistant, which can be\
  \ found in the OpenAI platform after creating an assistant.\n\nCreate a `.env` file\
  \ in the root directory of your project and populate it with the necessary secrets:\n\
  \nAdd the following content to the `.env` file:\n\nPlease note that the `.env` file\
  \ should not be committed to the repository. *Add the `.env` file to the `.gitignore`*\
  \ file to prevent it from being committed.\n\nThis was the first step needed to\
  \ run the library. The next step is to configure the assistant.\n\nStep 3: Configuration\n\
  \nThe library provides a way to configure the assistant with the `AssistantModule.forRoot`\
  \ method. The method takes a configuration object as an argument. Create a new configuration\
  \ file like in a sample configuration file (chat.config.ts) and fill it with the\
  \ necessary configuration.\n\nMore details about the configuration can be found\
  \ in the wiki.\n\nWhat is this step for? From now you can run your application and\
  \ call the assistant.\n\nStep 4: Function calling\n\nFunction calling allows you\
  \ to extend the assistant's capabilities with custom logic. **If you are not going\
  \ to use function calling you can jump to: Step 5: Testing.**\n\nCreate a new service\
  \ that extends the `AgentBase` class, fill the definition and implement the `output`\
  \ method.\n\n- The `output` method is the main method that will be called when the\
  \ function is invoked by the assistant. - The `definition` property is an object\
  \ that describes the function and its parameters so the assistant can understand\
  \ how to call it.\n\nFor more information about function calling, you can refer\
  \ to the OpenAI documentation.\n\nThe instructions for creating a function can be\
  \ found in the wiki, while examples can be found in the agents directory.\n\nWhat\
  \ is this step for?\n\nIf you've defined a function and the output method, you can\
  \ now call it from the assistant just by asking him to do the action described in\
  \ the function definition.\n\nStep 5: Running the application and testing\n\nRun\
  \ your application and this will allow you to test the assistant.\n\nThen you can\
  \ test the assistant. 1. First, you need to create a thread. You can create one\
  \ by sending a POST request to the `/assistant/threads` endpoint with the **empty\
  \ object in the body**. 2. Then you can send a message to the assistant by sending\
  \ a POST request to the `/assistant/chat` endpoint with the following body:\n\n\
  3. The assistant will respond with a message. You can send more messages to the\
  \ assistant by sending a POST request to the `/assistant/chat` endpoint with the\
  \ same body as in step 2.\n\nCongrats! You have successfully integrated the AI Assistant\
  \ library into your NestJS application. \U0001F389\n\n\U0001F914 Are you stuck?\n\
  \nThe complete documentation on how to run the demo with all applications and libraries\
  \ from the repository can be found in the wiki.\n\nBoldare's engineers are here\
  \ to help you. If you have any questions or need help with the implementation, feel\
  \ free to book a call with one of our engineers.\n\nLearn more how **Boldare can\
  \ help you with AI development**.\n\nYou can also ask questions in the GitHub Discussions\
  \ section.\n\nContributions\n\nWould you like to see new features in the library?\
  \ - You can freely contribute to the project! Just create a pull request with your\
  \ changes. - Talk your idea over with one of our engineers. - You can also post\
  \ your idea here.\n\nLicense\n\n`@boldare/openai-assistant` and this repository\
  \ is MIT licensed"
