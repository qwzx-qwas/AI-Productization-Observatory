raw_evidence_excerpt: "Crew Agent Generator\n\nOverview This is a **CrewAI Generator**\
  \ built using **Streamlit** that allows users to generate AI agent configurations\
  \ dynamically. The tool leverages **OpenAI's GPT-4o-mini** to analyze user requirements\
  \ and create a structured CrewAI setup, including agents, tasks, and necessary tools.\n\
  \nYour browser does not support the video tag.\n\nFeatures - Accepts simple English\
  \ input to define AI agents and tasks - Automatically generates a structured AI\
  \ workflow - Provides ready-to-use Python code for CrewAI - Built using **Streamlit**\
  \ for an interactive UI\n\nInstallation To set up and run this application, follow\
  \ these steps:\n\n1. Clone the repository:\n\n2. Install dependencies: Install the\
  \ required dependencies:\n\n3. Set up OpenAI API Key Create a `.env` file in the\
  \ root directory and add your OpenAI API key:\n\nAlternatively, manually create\
  \ the `.env` file and add:\n\n4. Run the application Start the Streamlit app:\n\n\
  This will launch the application in your default web browser.\n\nUsage 1. Open the\
  \ Streamlit app in your browser. 2. Enter a prompt describing your AI agent requirements.\
  \ 3. Click on **Generate Crew** to create a structured AI workflow. 4. View the\
  \ generated code and copy it for your project.\n\nContributing Feel free to fork\
  \ the repository, submit pull requests, and suggest improvements on LinkedIn \u2764\
  \uFE0F"
