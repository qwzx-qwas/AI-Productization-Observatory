summary: Intelligent data apps and assets with LLMs
raw_evidence_excerpt: "Intelligent data apps and assets with LLMs\n\ndbgpts\n\nThis\
  \ repo will contains some data apps\u3001AWEL operators\u3001AWEL workflow templates\
  \ and agents which build upon DB-GPT.\n\n- apps - workflow - agents - operators\
  \ - resources\n\nQuick Start At first you need to install DB-GPT project.\n\nWe\
  \ will show how to install a dbgpts from the official repository to your local DB-GPT\
  \ environment.\n\nActivate python virtual environment\n\nChange to your DB-GPT project\
  \ directory and run the following command to activate your virtual environment:\n\
  \nMake sure you have installed the required packages:\n\nList the available flows\n\
  \nList all installed dbgpts\n\nInstall a dbgpts from official repository\n\nView\
  \ all dbgpts In DB-GPT\n\nWait 10 seconds, then open the web page of DB-GPT, you\
  \ will see the new AWEL flow in web page.\n\nLike this:\n\nChat With Your dbgpts.\n\
  \nOutput:\n\n**Note**: just AWEL flow(workflow) support run with command line for\
  \ now.\n\nUninstallation\n\nMore commands\n\nYou can run `dbgpt app --help` to see\
  \ more commands. The output will be like this:\n\nRun `dbgpt run flow chat --help`\
  \ to see more commands for running flows. The output will be like this:\n\nRun `dbgpt\
  \ repo --help` to see more commands for managing repositories. The output will be\
  \ like this:\n\nWhat's the `repo`?\n\n**A repository is a collection of dbgpts.**\n\
  \nThe `dbgpts` can manage by multiple repositories, the official repository is eosphoros/dbgpts.\n\
  \nAnd you can add you own repository by `dbgpt repo add --repo --url `, example:\
  \ - Your git repo: `dbgpt repo add --repo fangyinc/dbgpts --url https://github.com/fangyinc/dbgpts.git`\
  \ - Your local repo: `dbgpt repo add --repo local/dbgpts --url /path/to/your/repo`\n\
  \nHow to create a dbgpts?\n\nClone the `dbgpts` repository\n\nCreate a python environment\n\
  \nInstall the required packages\n\nCreate a new workflow template\n\nCreate a new\
  \ operator"
