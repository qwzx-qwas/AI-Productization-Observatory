raw_evidence_excerpt: "AI workflows generated with natural language\n\nDevChat: AI\
  \ Workflows Generated with Natural Language\n\n\U0001FA84 Without leaving the IDE,\
  \ direct AI to perform tasks using natural language.\n\n\U0001F9E9 Bridge the last\
  \ mile of AI productivity through knowledge engineering.\n\n\U0001F6E0\uFE0F Tailor\
  \ the AI coding assistant to align perfectly with your specific needs.\n\n***\n\n\
  While tools like GitHub Copilot, Cursor, and Cline are making coding increasingly\
  \ intelligent, and platforms like Dify, Flowise, and Coze enable drag-and-drop workflows,\
  \ we developers still find ourselves wading through vast AI-less seas daily, wearied\
  \ by the myriad tedious processes in development.\n\nWhile some complex customization\
  \ demands of enterprises have turned tool adaptation into tar pits, hands-on enthusiasts\
  \ are busily engaged in various personalized tasks. Every dev team has its own character\
  \ and deserves tailored AI services, and implementing these shouldn\u2019t be arduous.\n\
  \nWe\u2019ve built the DevChat open-source community to help every developer effortlessly\
  \ cross the last mile of LLM productivity!\n\nCore Features\n\n\u2764\uFE0F Simplified\
  \ Personalization: Create Custom Workflows with a Few Sentences - Say goodbye to\
  \ the rigid and learning-intensive \u201Cdrag-and-drop\u201D workflow frameworks.\
  \ With just a few sentences, you can easily generate intelligent workflows that\
  \ assist or handle various tasks for you \u2014 whether it\u2019s submitting a standardized\
  \ GitLab MR, generating API automated API test cases, or having the AI provide progress\
  \ updates via voice notifications. - Through the open-source community, we aim to\
  \ build a rich collection of intelligent workflows, ranging from plugins that access\
  \ rich IDE context to various autonomous agents, ensuring there\u2019s always a\
  \ \u201Cmagical tool\u201D that suits you.\n\n\u2764\uFE0F Deep Understanding of\
  \ Private Knowledge Through Knowledge Engineering - Integrated knowledge graph capabilities\
  \ support diverse semantic queries, combining static pre-construction before queries\
  \ with dynamic construction during queries to balance optimal effectiveness and\
  \ performance. - Classify knowledge for specific scenarios to enhance AI generations.\
  \ - For example, by analyzing all interfaces, parameters, and relationships in API\
  \ documents, our AI autonomous testing tool can use multiple APIs to generate test\
  \ cases, reducing exploratory steps and improving the quality of test scripts.\n\
  \nQuick Start\n\n- Visual Studio Code extension: Install from Visual Studio Marketplace.\n\
  \n- IntelliJ Platform plugin: Install from JetBrains Marketplace.\n\nContributing\n\
  \n- Repositories: - The core library and CLI: https://github.com/devchat-ai/devchat\
  \ - System default workflows: https://github.com/devchat-ai/workflows - Visual Studio\
  \ Code extension: https://github.com/devchat-ai/devchat-vscode - IntelliJ Platform\
  \ plugin: https://github.com/devchat-ai/devchat-intellij\n\n- Issues and pull requests\
  \ are welcome: https://github.com/devchat-ai/devchat/issues\n\n- Join our Discord!\n\
  \nWhat is Prompt-Centric Software Development (PCSD)?\n\n- The traditional code-centric\
  \ paradigm is evolving. Stay ahead of the curve with DevChat.\n\n- Write prompts\
  \ to create code. Transform prompts into all the artifacts in software engineering.\n\
  \n(This image is licensed by devchat.ai under a Creative Commons Attribution-ShareAlike\
  \ 4.0 International License .)\n\n- We like to call it DevPromptOps\n\n(This image\
  \ is licensed by devchat.ai under a Creative Commons Attribution-ShareAlike 4.0\
  \ International License .)\n\nContact\n\nEmail: hello@devchat.ai\n\nWe are creators\
  \ of Apache DevLake."
