title: swark
summary: Create architecture diagrams from code automatically using large language
  models (LLMs).
raw_evidence_excerpt: "Create architecture diagrams from code automatically using\
  \ large language models (LLMs).\n\nAutomatic Architecture Diagrams from Code Free\
  \ \u2022 Open Source \u2022 Powered by LLMs\n\nSwark\n\nSwark is a VS Code extension\
  \ that allows creating architecture diagrams from code automatically using large\
  \ language models (LLMs).\\ Swark is **directly integrated with GitHub Copilot**,\
  \ and requires no authentication or API key.\n\nWhy Swark?\n\n- \U0001F31F **Free\
  \ and Open Source**: All you need is GitHub Copilot, which is now available for\
  \ free. You can review Swark\u2019s code to understand how it works, and contribute\
  \ to make it better. - \U0001F30D **Universal Language Support**: Classic code visualization\
  \ solutions are deterministic and require to incrementally add support in new languages\
  \ or frameworks. With Swark, all the \u201Clogic\u201D is encapsulated within the\
  \ LLM, and therefore it natively support all languages. - \U0001F511 **Seamless\
  \ Integration**: Swark integrates directly with GitHub Copilot. No additional setup,\
  \ authentication, or API keys required. - \U0001F6E1\uFE0F **Privacy First**: Your\
  \ source code is shared only with GitHub Copilot \u2014 no other external APIs or\
  \ providers involved. - \U0001F9DC\u200D\u2640\uFE0F **Mermaid.js**: Swark generates\
  \ diagrams in Mermaid.js, a popular diagram-as-code framework. You can edit and\
  \ refine the diagrams as needed.\n\nUse Cases\n\n- \U0001F50E **Learn a New Codebase**:\
  \ Instantly generate architecture diagrams to gain a high-level understanding of\
  \ unfamiliar repositories. Ideal for onboarding and tackling new projects. - \U0001F916\
  \ **Review AI-Generated Code**: As AI-generated projects become more common, Swark\
  \ helps you quickly visualize their structure and ensure they meet your standards.\
  \ - \U0001F4D5 **Improve Documentation**: Keep your documentation fresh and detailed\
  \ with up-to-date architecture diagrams that take minutes to create. - \U0001F570\
  \uFE0F **Understand Legacy Code**: Quickly visualize and comprehend the structure\
  \ of legacy codebases, making it easier to maintain and refactor. - \U0001F9E9 **Spot\
  \ Design Flaws**: Visualize your repo\u2019s dependency graph to identify unwanted\
  \ dependencies or areas for optimization. - \u2705 **Test Coverage Insights**: Include\
  \ test files in Swark\u2019s input to see test coverage at a glance and address\
  \ gaps.\n\nRequirements\n\n- **GitHub Copilot**: Swark is integrated with GitHub\
  \ Copilot to invoke LLM queries. Install it via Visual Studio Marketplace. Notice\
  \ that **GitHub Copilot now offers a free tier**. - **[Optional] Mermaid Markdown\
  \ Preview**: To preview the diagram in VS Code you can install the Markdown Preview\
  \ Mermaid Support extension. Alternatively, you can use the provided links to open\
  \ it in Mermaid Live Editor.\n\nInstallation\n\nSimply install Swark via the VS\
  \ Code Extension Marketplace.\n\nHow to Use\n\n1. In VS Code, open the Command Palette\
  \ and run: **Swark: Create Architecture Diagram**.\\ Alternatively, you can use\
  \ Swark's default keybindings: `cmd+shift+r` (Mac) or `ctrl+shift+r` (Windows).\
  \ 2. Select a folder to use in Swark's file search. 3. Within a few seconds, a tab\
  \ will open displaying your architecture diagram.\n\nOutput\n\nSwark saves its output\
  \ in `swark-output` folder under your workspace root folder.\\ On each run, Swark\
  \ creates two output files:\n\n- **Diagram file**: Contains the diagram's Mermaid\
  \ code. This file is presented when you run Swark.\\ Filename: ` __ __diagram.md`\
  \ - **Log file**: Contains information about the run, configuration, and files used\
  \ to create the diagram. Can be used for debugging and issue reporting.\\ Filename:\
  \ ` __ __log.md`\n\nFor example:\n\nHow it Works\n\n1. **File Retrieval**: Swark\
  \ retrieves code files within the chosen folder. Swark automatically adjusts the\
  \ number of retrieved files to match the LLM max token limit. 2. **Prompt Building**:\
  \ Based on the retrieved files, Swark builds a prompt to generate an architecture\
  \ diagram. The code files are included in the prompt, together with instructions\
  \ on how to build the diagram. 3. **LLM Request**: Swark invokes LLM request to\
  \ GitHub Copilot via VS Code Language Model API. 4. **Diagram Preview**: Upon a\
  \ successful response, the diagram is presented. This is done by creating a markdown\
  \ file that includes the diagram in Mermaid syntax and previewing it.\n\nCode Access\
  \ and File Sharing\n\nIt's important to note that source code is **only shared with\
  \ GitHub Copilot**, and with no other external APIs or providers.\n\nExtension Settings\n\
  \nThis extension contributes the following settings:\n\n| Setting | Description\
  \ | | ------------------------ | ----------------------------------------------------------------------------------------------------------------------------------------\
  \ | | `swark.maxFiles` | Max number of files to read. The number of files read is\
  \ also affected by the LLM max token limit. | | `swark.fileExtensions` | List of\
  \ file extensions to include in search. | | `swark.excludePatterns` | List of glob\
  \ patterns to exclude from file search. Defaults include: `**/.*` for hidden files,\
  \ `**/node_modules/**` for node modules. | | `swark.languageModel` | Language model\
  \ to use for diagram generation. | | `swark.fixMermaidCycles` | Automatically fix\
  \ cycles in the generated Mermaid diagram to prevent rendering failures. |\n\nRelease\
  \ Notes\n\nSee CHANGELOG.md.\n\nContributing\n\nSwark welcomes community contributions.\
  \ Please see our Contribution Guide for details on how to contribute.\n\nPrivacy\
  \ Notice\n\nThis extension collects telemetry data to help improve the product experience.\
  \ The data collected includes:\n\n- Extension activation and usage events - Selected\
  \ model information - Number of files processed and prompt length - LLM response\
  \ time - Error events\n\nNo source code, file contents, or personal information\
  \ is ever included in the telemetry data.\n\nWe use @vscode/extension-telemetry\
  \ module to collect this data. The data is sent to Azure Application Insights and\
  \ is used solely to improve Swark's functionality and user experience.\n\nYou can\
  \ disable telemetry collection by setting `\"telemetry.telemetryLevel\": \"off\"\
  ` in your VS Code settings.\n\nLicense\n\nSwark is licensed under the GNU Affero\
  \ General Public License v3.0"
