  Development


  Project Structure


  Running Tests


  Model Context Protocol Integration


  The Supabase MCP server implements the Model Context Protocol, which allows AI assistants
  to interact with Supabase databases in a standardized way.


  How It Works


  1. The MCP server exposes tools for database operations (read, create, update, delete)
  2. AI assistants connect to the MCP server using the stdio transport 3. The AI assistant
  can invoke the tools to perform database operations 4. The MCP server handles the
  communication with Supabase and returns the results


  MCP Configuration


  The `example_mcp_config.json` file shows how to configure an AI assistant to use
  the Supabase MCP server:


  This configuration tells the AI assistant: - To use Docker to run the MCP server
  - To pass the Supabase credentials as environment variables - To use the `mcp/supabase`
  Docker image


  Using with AI Assistants


  AI assistants that support the Model Context Protocol can use this server to:


  1. Query data from Supabase tables 2. Insert new records into tables 3. Update existing
  records 4. Delete records


  The assistant will have access to the tools documented in the "Available Tools"
  section above.


  Environment Variables


  | Variable | Description | |----------|-------------| | `SUPABASE_URL` | URL of
  your Supabase project | | `SUPABASE_SERVICE_KEY` | Service role key for Supabase
  authentication |


