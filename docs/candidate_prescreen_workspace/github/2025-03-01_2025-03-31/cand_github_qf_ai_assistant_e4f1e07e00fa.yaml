raw_evidence_excerpt: 'Supabase MCP server created in Python.


  Supabase MCP Server


  A Model Context Protocol (MCP) server that provides tools for interacting with a
  Supabase database. This server enables AI assistants to perform database operations
  through a standardized interface.


  NOTE: This Supabase MCP server was created as a demonstration of my AI IDE coding
  workflow. It is still a work in progress which I will expand on in future videos
  on my channel.


  Features


  - **Read Table Rows**: Query data from Supabase tables with optional filtering,
  pagination, and column selection - **Create Table Records**: Insert new records
  into Supabase tables - **Update Table Records**: Modify existing records in Supabase
  tables based on filters - **Delete Table Records**: Remove records from Supabase
  tables based on filters


  Prerequisites


  - Docker or Docker Desktop - Supabase account and project


  Installation


