raw_evidence_excerpt: "This Chrome extension allows you to easily select any text\
  \ from any webpage and instantly use GPT, Gemini, Grok, Local LLMs with Ollama to\
  \ perform a variety of tasks with just a few clicks\n\nWatch the full tutorial video\
  \ from YouTube:\n\nHow to install this chrome extension locally Follow these steps\
  \ to install the Chrome extension on your browser:\n\nStep 1: Download the Extension\
  \ Files - Download the extension files as a folder or a .zip file. - If it's a `.zip`\
  \ file, extract it to get the folder containing the extension files.\n\nStep 2:\
  \ Open the Chrome Extensions Page - Open Google Chrome. - Type the following URL\
  \ in the address bar and press Enter:\n\nStep 3: Enable Developer Mode - At the\
  \ top-right corner of the Extensions page, toggle the Developer mode switch to turn\
  \ it on.\n\nStep 4: Load the Extension - Click the \"Load unpacked\" button. - In\
  \ the file browser, navigate to the folder where you have saved the extension files.\
  \ - Select the folder and click \"Open\" or \"Select Folder\".\n\nStep 5: Verify\
  \ Installation\n\n- Once loaded, the extension will appear in the list of installed\
  \ extensions on the Extensions page. - If there are any errors, Chrome will show\
  \ a warning. Make sure your files (especially manifest.json) are configured correctly.\n\
  \nHow to use this chrome extension? Follow these steps to use the Chrome extension\
  \ on your browser:\n\nStep 1: Please collect your api key from: GPT or Gemini or\
  \ Grok - Goto the tools website's dashboard and generate api key - Note your api\
  \ key and api endpoint\n\nStep 2: Open the extension popup from extension icon from\
  \ the extension list - Add the api endpoint - Add api key - Fillup other input field\
  \ with any text to pass validations - Select which tool you want to use\n\nStep\
  \ 3: Copy any text from any website - Right click from the mouse - Choose the desire\
  \ menu and clicked\n\nStep 4: After the loading complete you will result like this\
  \ - Click copy button to copy ta raw text\n\nTroubleshoot? - Please reach out to\
  \ me on X: https://x.com/hasan_py or Linkedin: https://www.linkedin.com/in/hasan-py\n\
  \n----- Build with \u2764\uFE0F by Hasan"
