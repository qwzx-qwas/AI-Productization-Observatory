raw_evidence_excerpt: 'Whaticket Plus is a multi-channel ticket system for WhatsApp,
  Instagram, and Facebook with chatbot and automation integrations.


  The README pitches it as a system of tickets via WhatsApp with DialogFlow, N8N,
  Typebot, WebHooks, Facebook, Instagram, and a native chatbot flow builder.


  Key product signals


  - Multi-user ticket handling on the same account.

  - Dashboard, campaigns, recurring scheduling, chat internal, sectors and queues.

  - Integrations with Meta official API, Facebook Pixel, webhooks, and external systems.

  - PWA, SaaS positioning, statistics, branded domain, password recovery, and API
  resources.


  The product is described as an operational customer-support system rather than a
  generic SDK/framework.'
