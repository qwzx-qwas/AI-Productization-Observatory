raw_evidence_excerpt: 'All-in-one productivity app and AI assistant with Tasks, Notes,
  Calendar, Diary and Bookmarks.


  My Brain


  All-in-one productivity app and AI assistant with Tasks, Notes, Calendar, Diary
  and Bookmarks.


  Features


  - Local and Private with no data collection at all.

  - Create tasks with priority, sub-tasks, due date and reminders.

  - Create Notes that supports markdown.

  - Record your mood daily and view your mood summary.

  - Save bookmarks for later.

  - View your calendar events with widgets and dashboard.

  - AI assistant and Agent to help you with your daily workflow. You can chat, attach
  objects, and ask the AI to create and find items for you.


  Homepage and release links are provided via F-Droid and GitHub releases.'
