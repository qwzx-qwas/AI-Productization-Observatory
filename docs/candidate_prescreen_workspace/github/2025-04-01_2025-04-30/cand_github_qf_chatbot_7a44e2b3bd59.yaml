summary: Personalize the way Vietnamese learn English using generative AI
raw_evidence_excerpt: 'Personalize the way Vietnamese learn English using generative
  AI


  EngAce is a cutting-edge, generative AI-powered application designed to revolutionize
  the way Vietnamese learn English. This app provides a personalized learning experience
  tailored to each user''s unique needs and preferences. EngAce combines the power
  of artificial intelligence with a comprehensive set of features to create an engaging
  and effective English learning environment. This repository contains the full source
  code, documentation, and resources for the EngAce app. ____________________________


  :raising_hand_man: Our Team | No. | Name | Responsibilities | | --- | --- | ---
  | | 1 | Phan Xuan Quang | Product Design, Backend Development, DevOps, AI Model
  Fine-Tuning| | 2 | Bui Minh Tuan | Frontend Development |


  :triangular_flag_on_post: License


  This project is licensed under the **Creative Commons Attribution-NonCommercial-ShareAlike
  4.0 International** license. See the LICENSE file for details.


  :rotating_light: Features EngAce offers a suite of tools and functionalities aimed
  at making English learning more accessible, enjoyable, and efficient. The app is
  designed with four main features as below.


  1. Intelligent Dictionary


  A comprehensive English dictionary tailored for Vietnamese learners, offering detailed
  explanations, idioms, phrasal verbs, and even more. It provides in-depth Vietnamese
  context when needed, eliminating the hassle of extensive research Key features include:
  - Illustrative Examples: Each definition comes with example sentences to help users
  understand the word in context. - Contextual Search: Users can search for words
  based on specific contexts, making it easier to understand different usages of a
  word.


  2. Personalized Assignment


  EngAce provides personalized practice exercises to help users improve their English
  skills. The feature includes: - Custom Assignment: Users can generate multiple-choice
  assignments tailored to their proficiency level and the topics they want to practice.
  - Adaptive Learning: The app adapts to the user''s performance, providing progressively
  challenging questions to ensure continuous improvement. - Support up to 100 quizzes
  per request, and up to 12 different types of quizz for users to select.


  3. Intelligent Writing Review


  Instantly receive detailed feedback and constructive suggestions to enhance writing
  skills, helping users improve their English writing with precision. The feature
  includes: - Writing Review: Users can submit their writing pieces and receive detailed
  feedback on grammar, style, and coherence. - Improvement Suggestions: The AI provides
  constructive suggestions to help users refine and improve their writing.


  4. Chat with AI Expert


  EngAce includes an AI-powered chatbot that acts as an English learning companion.
  The feature include: - Interactive Discussions: Users can engage in conversations
  with the chatbot on various English learning topics. - Learning Tips: The chatbot
  provides tips and advice to help users overcome common learning challenges. - Q&A
  Support: Users can ask the chatbot questions related to English learning and receive
  informative answers. - Grouding using Google Search engine: Users can request the
  chatbot to use Google Search engine to verify its response automatically. - Deep
  Thinking: User can request the chatbot to think deeply before providing the response
  - Images Attachment: Users can attach multiple images into their images.


  :lock: Data Privacy Statement Your data, including your Gemini API Key and Google
  account information, is securely stored on your personal device only. This data
  will be automatically deleted from our system when you log out of the application.
  We do not store or retain your data on our servers, ensuring that your information
  remains private and secure at all times.


  If you have any concerns or questions about our data privacy practices, please feel
  free to open a new issue.


  :open_hands: Contribution We welcome contributions and encourage you to help this
  project better and better. If you encounter any issues or have suggestions for improvements,
  please open an issue in the Issues section of the repository. Before submitting
  a pull request, please ensure that your changes are well-documented in the Pull
  Request description.


  Thank you for your contribution and for helping to make this project better! :tada:'
