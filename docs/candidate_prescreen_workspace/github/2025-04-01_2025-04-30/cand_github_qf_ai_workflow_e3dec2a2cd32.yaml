raw_evidence_excerpt: "Self-hosted alternative to OpenAI's Responses API compatible\
  \ with Agents SDK and works with all model providers (Claude/R1/Qwen/Ollama etc)\n\
  \nOpen Responses Self-hosted, open-source alternative to OpenAI's Responses API\
  \ \u2014 With \u2764\uFE0F from the team behind julep\n\nDocumentation \u2022 GitHub\
  \ \u2022 Examples\n\n\U0001F4A1 What is Open Responses?\n\nOpen Responses lets you\
  \ run a fully self-hosted version of OpenAI's Responses API. It works seamlessly\
  \ with any large language model (LLM) provider\u2014whether it's Claude, Qwen, Deepseek\
  \ R1, Ollama, or others. It's a fully-compatible drop-in replacement for the official\
  \ API. Swap out OpenAI without changing your existing Agents SDK code.\n\nJust run\
  \ `npx -y open-responses init` and then:\n\n\U0001F525\U0001F525\U0001F525\n\nWhat\
  \ is Responses API?\n\nFrom OpenAI docs on Responses API: > The Responses API is\
  \ our newest core API and an agentic API primitive, combining the simplicity of\
  \ Chat Completions with the ability to do more agentic tasks. > As model capabilities\
  \ evolve, the Responses API is a flexible foundation for building action-oriented\
  \ applications, with built-in tools: > - Web search > - File search > - Computer\
  \ use\n\nYou can read about it in more detail on their announcement blog post.\n\
  \n*****\n\n> [!TIP]\n\n](https://github.com/julep-ai/julep)\n\n\u2728 Why use Open\
  \ Responses?\n\n- **\U0001F504 Bring Your Own Model** - Compatible with any LLM\
  \ provider you prefer. - **\U0001F512 Privacy First** - Fully self-hosted, giving\
  \ you total control over your data. - **\U0001F50C Easy Switch** - Drop-in replacement\
  \ compatible with OpenAI\u2019s official Agents SDK. - **\U0001F680 Fast Setup**\
  \ - Get started quickly with Docker or our straightforward CLI. - **\U0001F6E0\uFE0F\
  \ Built-in Tools** - Supports automatic tool calls like web searches using open-source\
  \ alternatives.\n\n\U0001F680 Quick Start\n\nOne simple command to get going:\n\n\
  \U0001F4BB Quick Examples\n\nUsing the Agents SDK\n\nMore examples here.\n\nUsing\
  \ the OpenAI SDK\n\njavascript\n\nMore examples here.\n\npython\n\nMore examples\
  \ here.\n\n\U0001F4E6 Install Manually\n\nWe publish pre-built docker images which\
  \ you can run using `docker compose` directly.\n\n\U0001F4DA Learn More\n\n- \U0001F680\
  \ Quickstart Guide - \U0001F9E0 API Concepts - \U0001F4DD Code Examples - \U0001F4BB\
  \ CLI Documentation - \U0001F52E Project Roadmap\n\n\U0001F4D6 About Julep AI\n\n\
  Open Responses is proudly built by Julep AI\u2014the open-source platform empowering\
  \ data and ML teams to rapidly create, deploy, and manage stateful AI workflows\
  \ and intelligent agents at scale.\n\n\U0001F91D Contributing\n\nWe\u2019d love\
  \ your contributions! Open Responses is licensed under Apache-2.0.\n\nCheck out\
  \ our main project as well"
