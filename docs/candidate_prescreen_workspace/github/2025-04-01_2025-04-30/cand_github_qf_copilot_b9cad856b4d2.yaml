  3. Follow this guide to make your server accessible to the internet


  In short, we would expose a public URL for our local server using the following
  command (follow the guide for detailed setup instructions):


  4. Follow this guide to create a GitHub app 5. Follow this guide to configure the
  app to use the public URL from (3.) 6. Use your newly installed app! On any copilot
  enabled page, type `@your-app-name ` (from the app created in 4.) to interact with
  your local installation of this extension!


