raw_evidence_excerpt: 'Copilot Extension to connect and chat with GitHub Models


  @models Copilot Extension


  This is an agent-based GitHub Copilot Extension that provides a way to interact
  with GitHub Models, directly in Copilot Chat.


  What it can do


  You can ask it things like "what models are available?" or "which model should I
  use for my use-case?". You can also ask it to execute a basic prompt using a particular
  model.


  | Description | Image | | --- |--- | | User asking `@models` for a recommended model
  that is low-cost and supports function calling | !User asking @models for a recommended
  model that is low-cost and supports function calling | | Dialogue with the Extension,
  asking for an OpenAI model | !Dialogue with the Extension, asking for an OpenAI
  model | | User executing a basic prompt using the model that the extension recommended
  | !User executing a basic prompt using the model that the extension recommended
  |


