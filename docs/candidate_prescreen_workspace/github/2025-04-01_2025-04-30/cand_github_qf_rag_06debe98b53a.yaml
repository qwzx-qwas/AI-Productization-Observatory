title: TAG-Bench
summary: 'TAG-Bench: A benchmark for table-augmented generation (TAG)'
raw_evidence_excerpt: 'TAG-Bench: A benchmark for table-augmented generation (TAG)


  Text2SQL is Not Enough: Unifying AI and Databases with TAG


  [#license-gh-package]: https://lbesson.mit-license.org/ [#arxiv-paper-package]:
  https://arxiv.org/abs/2408.14717


  Table-Augmented Generation (TAG) is a unified and general-purpose paradigm for answering
  natural language questions over databases. The TAG model represents a wide range
  of interactions between the LM and database that have been previously unexplored
  in methods such as Text2SQL and RAG. We provide the first benchmark to study the
  TAG problem and find that standard methods struggle to answer such queries, confirming
  the need for further research in this area.


  TAG v1 Benchmark The initial TAG v1 benchmark is built upon the BIRD Text2SQL benchmark.
  To enhance the complexity of the queries and challenge the capabilities of LLMs,
  the queries in the TAG benchmark have been modified to require either world knowledge
  or semantic reasoning that goes beyond the information explicitly available in the
  database. We use and modify a subset of match-based, comparison, ranking, and aggregation
  queries from BIRD. In total, there are 80 queries, with 20 of each type. 40 of these
  queries require parameteric knowledge of the model and the other 40 require the
  model to perform reasoning.


  Setup Here are the steps to reproduce the results in the paper.


  1. Create a conda environment and download dependencies


  2. Download BIRD DBs and convert them to Pandas DataFrames


  Now you should have a `dev_folder` folder that contains the databases and a `pandas_dfs`
  folders for the DataFrames.


  3. Create indexes on each table (recommended to do with GPU)


  Now you should have an `indexes` folder that contains the indexes.


  4. Get Text2SQL prompts


  This should have modified the `tag_queries.csv` file to add a Text2SQL prompt column.


  Evaluation After performing the setup steps above, you can run the following to
  reproduce results in the paper. Run these in the tag directory to get the method
  outputs. You should edit the `lm` object in each file to point to the language model
  server you want to use. Check the LOTUS documentation for configuring models.


  Hand-written TAG on LOTUS


  Text2SQL


  Text2SQL + LM


  RAG


  Retrieval + LM Rank


