raw_evidence_excerpt: "Botpress OSS \u2013 v12\n\nBotpress \u2014 The building blocks\
  \ for building chatbots\n\n**IMPORTANT**: With the launch of Botpress Cloud, the\
  \ documentation for Botpress v12 can now be found here.\n\nWhat is Botpress?\n\n\
  Botpress is the standard developer stack to build, run, and improve conversational\
  \ AI applications. Powered by natural language understanding, a messaging API, and\
  \ a fully featured studio, Botpress allows developers and conversation designers\
  \ around the globe to build remarkable chatbots without compromise.\n\nThe fastest\
  \ & easiest way to get started with Botpress is by signing up for free to **Botpress\
  \ Cloud**. Alternatively, continue reading for more information about Botpress v12.\n\
  \n**Out of the box, Botpress v12 includes:**\n\n- Administration panel to orchestrate\
  \ and monitor your chatbots - Conversation Studio to design a conversation, manage\
  \ content, code custom integration - Easy integration with messaging channels (Messenger,\
  \ WhatsApp, Slack, Teams, Webchat, Telegram, SMS & more) - Natural Language Understanding\
  \ - Complete list of features and specs here\n\nGetting Started\n\nThere are a few\
  \ ways to get started with Botpress v12:\n\n- Download the latest binary for your\
  \ OS here and follow the installation docs. - Use the official Docker image and\
  \ follow the hosting docs - Run from sources, follow build docs - Deploy it in the\
  \ cloud using these shortlinks:\n\nDocumentation\n\n- Main Documentation - SDK Reference\
  \ - Code Examples - Video Tutorials\n\nCommunity\n\n- Discord - Get community support\
  \ and find answers to your questions - Issues - Report bugs and file feature requests\
  \ - Blog - How to's, case studies, and announcements - Contributing - Start contributing\
  \ to Botpress - Partners - List of agencies who can help you with Botpress\n\nLicense\n\
  \nBotpress is dual-licensed under AGPLv3 and the Botpress Proprietary License.\n\
  \nBy default, any bot created with Botpress is licensed under AGPLv3, but you may\
  \ change to the Botpress License from within your bot's web interface in a few clicks.\n\
  \nFor more information about how the dual-license works and why it works that way,\
  \ please see the FAQS ."
