raw_evidence_excerpt: 'Knowledge Graph RAG System


  A comprehensive implementation of Retrieval-Augmented Generation (RAG) systems using
  knowledge graphs and Neo4j. This repository demonstrates how to build, query, and
  leverage knowledge graphs for enhanced AI applications.


  Overview


  This project showcases different approaches to building and utilizing knowledge
  graphs for RAG systems:


  1. **Simple Knowledge Graph** - Basic Neo4j implementation for creating and querying
  knowledge graphs 2. **Knowledge Graph RAG** - Advanced RAG system using knowledge
  graphs for structured information retrieval 3. **Healthcare Knowledge Graph** -
  Domain-specific implementation for healthcare data 4. **Text Preparation for RAG**
  - Tools for preparing and processing text data for RAG systems


  Features


  - Neo4j integration for knowledge graph storage and querying - LangChain integration
  for RAG pipeline implementation - Entity extraction and relationship mapping - Full-text
  search capabilities - Hybrid retrieval combining structured and unstructured data
  - Conversation history handling for contextual responses - Domain-specific implementations
  (healthcare, Roman Empire)


  Project Structure


  Prerequisites


  - Python 3.8+ - Neo4j Aura instance or local Neo4j database - OpenAI API key


  Installation


  1. Clone the repository:


  2. Install dependencies:


  3. Create a `.env` file with your credentials:


  Usage


  Simple Knowledge Graph


  Knowledge Graph RAG


  Healthcare Knowledge Graph


  Key Components


  Knowledge Graph Creation


  The system supports multiple approaches to knowledge graph creation: - Manual entity
  and relationship creation - Automated extraction from text using LLMs - Import from
  structured data (CSV)


  RAG Implementation


  The RAG system combines: - Structured data retrieval from the knowledge graph -
  Unstructured data retrieval using vector search - Context-aware question answering
  with conversation history


  Entity Extraction


  The system uses LLMs to extract entities from text, which are then stored in the
  knowledge graph for future retrieval.


  Contributing


  Contributions are welcome! Please feel free to submit a Pull Request.


  Acknowledgments


  - Neo4j for the graph database - LangChain for the RAG framework - OpenAI for the
  language models'
