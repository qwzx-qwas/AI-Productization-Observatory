title: morph
summary: ' Python + Markdown framework for building internal apps.'
raw_evidence_excerpt: "Python + Markdown framework for building internal apps.\n\n\
  Features\n\nMorph is a python-centric full-stack framework for building and deploying\
  \ AI apps.\n\n- **Fast to start** \U0001F680 - Allows you to get up and running\
  \ with just three commands. - **Deploy and operate \U0001F310** - Easily deploy\
  \ your AI apps and manage them in production. Managed cloud is available for user\
  \ authentication and secure data connection. - **No HTML/CSS knowledge required\U0001F530\
  ** - With **Markdown-based syntax** and **pre-made components**, you can create\
  \ flexible, visually appealing designs without writing a single line of HTML or\
  \ CSS. - **Customizable \U0001F6E0\uFE0F** - **Chain Python and SQL** for advanced\
  \ AI workflows. Custom CSS and custom React components are available for building\
  \ tailored UI.\n\nQuick start\n\n1. Install morph\n\n2. Create a new project\n\n\
  3. Start dev server\n\n4. Visit `http://localhsot:8080` on browser.\n\nHow it works\n\
  \nUnderstanding the concept of developing an AI app in Morph will let you do a flying\
  \ start.\n\n1. Develop the AI workflow in Python and give it an alias. 2. Create\
  \ an .mdx file. Each .mdx file becomes a page of your app. 3. Place the component\
  \ in the MDX file and specify the alias to connect to.\n\nBuilding AI Apps\n\nA\
  \ little example\n\n1. Create each files in `python` and `pages` directories.\n\n\
  Python: Using Langchain to create a AI workflow.\n\nMDX: Define the page and connect\
  \ the data.\n\n2. Run `morph serve` to open the app!\n\nDocumentation\n\nVisit https://docs.morph-data.io\
  \ for more documentation.\n\nContributing\n\nThanks for your interest in helping\
  \ improve Morph \u2764\uFE0F\n\n- Before contributing, please read the CONTRIBUTING.md.\
  \ - If you find any issues, please let us know and open an issue.\n\nLisence\n\n\
  Morph is Apache 2.0 licensed."
