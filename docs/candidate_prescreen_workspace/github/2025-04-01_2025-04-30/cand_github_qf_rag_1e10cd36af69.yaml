raw_evidence_excerpt: 'LLM RAG Configuration Environment - Copy `.env.example` file
  to `.env` - Fill in the required values Installation Using `pip` - Create and activate
  new Python virtual environment - `pip install -r requirements.txt` - `pip install
  -e .` (basic packages) or `pip install -e .[ragatouille]` (with `ragatouille` for
  ColBERT) Using `uv` - `uv sync --group dev` (basic packages) or `uv sync --group
  dev --extra ragatouille` (with `ragatouille` for ColBERT) - `uv pip install -e .`


