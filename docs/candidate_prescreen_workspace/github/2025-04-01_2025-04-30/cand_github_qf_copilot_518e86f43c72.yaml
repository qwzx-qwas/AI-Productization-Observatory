raw_evidence_excerpt: "This is a repository is a self-paced repository to build an\
  \ application using GitHub Copilot agent mode\n\nBuild applications with GitHub\
  \ Copilot agent mode\n\n_Build an application with GitHub Copilot agent mode in\
  \ less than an hour._\n\nWelcome\n\nPeople love how GitHub Copilot helps them write\
  \ code faster and with fewer errors. But what if GitHub could create a full stack\
  \ application for your job role based on requirements written in natural language.\
  \ In this exercise, we will prompt GitHub Copilot agent mode to create us a complete\
  \ application.\n\n- **Who is this for**: Intermediate developers familiar with GitHub\
  \ Copilot, basic GitHub, and basic web development - **What you'll learn**: We'll\
  \ introduce GitHub Copilot agent mode and how to use it for application development.\
  \ - **What you'll build**: You'll use GitHub Copilot agent mode to create a fitness\
  \ application as the gym teacher of a high school. - **How long**: This course takes\
  \ less than one hour to complete.\n\nIn this exercise, you will:\n\n1. Start up\
  \ a preconfigured development environment for making a full stack application. 2.\
  \ Prompt in GitHub Copilot Chat and select the edit tab and select agent mode from\
  \ the edit/agent drop down. 3. Try creating the application with GPT-4o. 4. Try\
  \ other LLM models to see other output.\n\nHow to start this exercise\n\n1. Right-click\
  \ **Copy Exercise** and open the link in a new tab.\n\n2. In the new tab, most of\
  \ the fields will automatically fill in for you.\n\n- For owner, choose your personal\
  \ account or an organization to host the repository. - We recommend creating a public\
  \ repository, as private repositories will use Actions minutes. - Scroll down and\
  \ click the **Create repository** button at the bottom of the form.\n\n3. After\
  \ your new repository is created, wait about 20 seconds for the exercise to be prepared\
  \ and buttons updated. You will continue working from your copy of the exercise.\n\
  \n- The **Copy Exercise** button will deactivate, changing to gray. - The **Start\
  \ Exercise** button will activate, changing to green. - You will likely need to\
  \ refresh the page.\n\n4. Click **Start Exercise**. Follow the step-by-step instructions\
  \ and feedback will be provided as you progress.\n\n> [!IMPORTANT] > The **Start\
  \ Exercise** button will activate after copying the repository. You will probably\
  \ need to refresh the page.\n\n---\n\nReview the GitHub status page\n\n\xA9 2025\
  \ GitHub \u2022 Code of Conduct \u2022 MIT License"
