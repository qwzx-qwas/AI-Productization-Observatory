raw_evidence_excerpt: "AI Agents & MCPs & AI Workflow Automation \u2022 (~400 MCP\
  \ servers for AI agents) \u2022 AI Automation / AI Agent with MCPs \u2022 AI Workflows\
  \ & AI Agents \u2022 MCPs for AI Agents\n\nAn open source replacement for Zapier\n\
  \nDocumentation \U0001F32A\uFE0F Create a Piece \U0001F589 Deploy \U0001F525 Join\
  \ Discord\n\n\U0001F92F Welcome to Activepieces\n\nAll-in-one AI automation designed\
  \ to be **extensible** through a **type-safe** pieces framework written in **TypeScript**.\
  \ When you contribute pieces to Activepieces they become automatically available\
  \ as MCP servers that you can use with LLMs through Claude Desktop, Cursor or Windsurf!\n\
  \n\U0001F525 Why Activepieces is Different:\n\n- **\U0001F496 Loved by Everyone**:\
  \ Intuitive interface and great experience for both technical and non-technical\
  \ users with a quick learning curve.\n\n- **\U0001F310 Open Ecosystem:** All pieces\
  \ are open source and available on npmjs.com, **60% of the pieces are contributed\
  \ by the community**.\n\n- **\U0001F6E0\uFE0F Largest open source MCP toolkit**:\
  \ All our pieces (280+) are available as MCP that you can use with LLMs on Claude\
  \ Desktop, Cursor or Windsurf.\n\n- **\U0001F6E0\uFE0F Pieces are written in Typescript**:\
  \ Pieces are npm packages in TypeScript, offering full customization with the best\
  \ developer experience, including **hot reloading** for **local** piece development\
  \ on your machine. \U0001F60E\n\n- **\U0001F916 AI-First**: Native AI pieces let\
  \ you experiment with various providers, or create your own agents using our AI\
  \ SDK to help you build flows inside the builder.\n\n- **\U0001F3E2 Enterprise-Ready**:\
  \ Developers set up the tools, and anyone in the organization can use the no-code\
  \ builder. Full customization from branding to control.\n\n- **\U0001F512 Secure\
  \ by Design**: Self-hosted and network-gapped for maximum security and control over\
  \ your data.\n\n- **\U0001F9E0 Human in the Loop**: Delay execution for a period\
  \ of time or require approval. These are just pieces built on top of the piece framework,\
  \ and you can build many pieces like that. \U0001F3A8\n\n- **\U0001F4BB Human Input\
  \ Interfaces**: Built-in support for human input triggers like \"Chat Interface\"\
  \ \U0001F4AC and \"Form Interface\" \U0001F4DD\n\n\U0001F6E0\uFE0F Builder Features:\n\
  \n- [x] Loops - [x] Branches - [x] Auto Retries - [x] HTTP - [x] Code with **NPM**\
  \ - [x] ASK AI in Code Piece (Non technical user can clean data without knowing\
  \ to code) - [x] Flows are fully versioned. - [x] Languages Translations - [x] Customizable\
  \ Templates - [X] 200+ Pieces, check https://www.activepieces.com/pieces\n\n**We\
  \ release updates frequently. Check the product changelog for the latest features.**\n\
  \n\U0001F50C Create Your Own Piece\n\nActivepieces supports integrations with Google\
  \ Sheets, OpenAI, Discord, RSS, and over 200 other services. Check out the full\
  \ list of supported integrations, which is constantly expanding thanks to our community's\
  \ contributions.\n\nAs an **open ecosystem**, all integration source code is accessible\
  \ in our repository. These integrations are versioned and published directly to\
  \ npmjs.com upon contribution.\n\nYou can easily create your own integration using\
  \ our TypeScript framework. For detailed instructions, please refer to our Contributor's\
  \ Guide.\n\nLicense\n\nActivepieces' Community Edition is released as open source\
  \ under the MIT license and enterprise features are released under Commercial License\n\
  \nRead more about the feature comparison here https://www.activepieces.com/pricing\n\
  \n\U0001F4AD Join Our Community\n\n\U0001F310 Contributions\n\nWe welcome contributions\
  \ big or small and in different directions. The best way to do this is to check\
  \ this document and we are always up to talk on our Discord Server.\n\n\U0001F4DA\
  \ Translations\n\nNot into coding but still interested in contributing? Come join\
  \ our Discord and visit https://www.activepieces.com/docs/about/i18n for more information.\n\
