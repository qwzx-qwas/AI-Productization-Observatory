title: ollama
summary: Get up and running with Kimi-K2.5, GLM-5, MiniMax, DeepSeek, gpt-oss, Qwen,
  Gemma and other models.
raw_evidence_excerpt: "Get up and running with Kimi-K2.5, GLM-5, MiniMax, DeepSeek,\
  \ gpt-oss, Qwen, Gemma and other models.\n\nOllama\n\nStart building with open models.\n\
  \nDownload\n\nmacOS\n\nor download manually\n\nWindows\n\nor download manually\n\
  \nLinux\n\nManual install instructions\n\nDocker\n\nThe official Ollama Docker image\
  \ `ollama/ollama` is available on Docker Hub.\n\nLibraries\n\n- ollama-python -\
  \ ollama-js\n\nCommunity\n\n- Discord - \U0001D54F (Twitter) - Reddit\n\nGet started\n\
  \nYou'll be prompted to run a model or connect Ollama to your existing agents or\
  \ applications such as `claude`, `codex`, `openclaw` and more.\n\nCoding\n\nTo launch\
  \ a specific integration:\n\nSupported integrations include Claude Code, Codex,\
  \ Droid, and OpenCode.\n\nAI assistant\n\nUse OpenClaw to turn Ollama into a personal\
  \ AI assistant across WhatsApp, Telegram, Slack, Discord, and more:\n\nChat with\
  \ a model\n\nRun and chat with Gemma 3:\n\nSee ollama.com/library for the full list.\n\
  \nSee the quickstart guide for more details.\n\nREST API\n\nOllama has a REST API\
  \ for running and managing models.\n\nSee the API documentation for all endpoints.\n\
  \nPython\n\nJavaScript\n\nSupported backends\n\n- llama.cpp project founded by Georgi\
  \ Gerganov.\n\nDocumentation\n\n- CLI reference - REST API reference - Importing\
  \ models - Modelfile reference - Building from source\n\nCommunity Integrations\n\
  \n> Want to add your project? Open a pull request.\n\nChat Interfaces\n\nWeb\n\n\
  - Open WebUI - Extensible, self-hosted AI interface - Onyx - Connected AI workspace\
  \ - LibreChat - Enhanced ChatGPT clone with multi-provider support - Lobe Chat -\
  \ Modern chat framework with plugin ecosystem (docs) - NextChat - Cross-platform\
  \ ChatGPT UI (docs) - Perplexica - AI-powered search engine, open-source Perplexity\
  \ alternative - big-AGI - AI suite for professionals - Lollms WebUI - Multi-model\
  \ web interface - ChatOllama - Chatbot with knowledge bases - Bionic GPT - On-premise\
  \ AI platform - Chatbot UI - ChatGPT-style web interface - Hollama - Minimal web\
  \ interface - Chatbox - Desktop and web AI client - chat - Chat web app for teams\
  \ - Ollama RAG Chatbot - Chat with multiple PDFs using RAG - Tkinter-based client\
  \ - Python desktop client\n\nDesktop\n\n- Dify.AI - LLM app development platform\
  \ - AnythingLLM - All-in-one AI app for Mac, Windows, and Linux - Maid - Cross-platform\
  \ mobile and desktop client - Witsy - AI desktop app for Mac, Windows, and Linux\
  \ - Cherry Studio - Multi-provider desktop client - Ollama App - Multi-platform\
  \ client for desktop and mobile - PyGPT - AI desktop assistant for Linux, Windows,\
  \ and Mac - Alpaca - GTK4 client for Linux and macOS - SwiftChat - Cross-platform\
  \ including iOS, Android, and Apple Vision Pro - Enchanted - Native macOS and iOS\
  \ client - RWKV-Runner - Multi-model desktop runner - Ollama Grid Search - Evaluate\
  \ and compare models - macai - macOS client for Ollama and ChatGPT - AI Studio -\
  \ Multi-provider desktop IDE - Reins - Parameter tuning and reasoning model support\
  \ - ConfiChat - Privacy-focused with optional encryption - LLocal.in - Electron\
  \ desktop client - MindMac - AI chat client for Mac - Msty - Multi-model desktop\
  \ client - BoltAI for Mac - AI chat client for Mac - IntelliBar - AI-powered assistant\
  \ for macOS - Kerlig AI - AI writing assistant for macOS - Hillnote - Markdown-first\
  \ AI workspace - Perfect Memory AI - Productivity AI personalized by screen and\
  \ meeting history\n\nMobile\n\n- Ollama Android Chat - One-click Ollama on Android\n\
  \n> SwiftChat, Enchanted, Maid, Ollama App, Reins, and ConfiChat listed above also\
  \ support mobile platforms.\n\nCode Editors & Development\n\n- Cline - VS Code extension\
  \ for multi-file/whole-repo coding - Continue - Open-source AI code assistant for\
  \ any IDE - Void - Open source AI code editor, Cursor alternative - Copilot for\
  \ Obsidian - AI assistant for Obsidian - twinny - Copilot and Copilot chat alternative\
  \ - gptel Emacs client - LLM client for Emacs - Ollama Copilot - Use Ollama as GitHub\
  \ Copilot - Obsidian Local GPT - Local AI for Obsidian - Ellama Emacs client - LLM\
  \ tool for Emacs - orbiton - Config-free text editor with Ollama tab completion\
  \ - AI ST Completion - Sublime Text 4 AI assistant - VT Code - Rust-based terminal\
  \ coding agent with Tree-sitter - QodeAssist - AI coding assistant for Qt Creator\
  \ - AI Toolkit for VS Code - Microsoft-official VS Code extension - Open Interpreter\
  \ - Natural language interface for computers\n\nLibraries & SDKs\n\n- LiteLLM -\
  \ Unified API for 100+ LLM providers - Semantic Kernel - Microsoft AI orchestration\
  \ SDK - LangChain4j - Java LangChain (example) - LangChainGo - Go LangChain (example)\
  \ - Spring AI - Spring framework AI support (docs) - LangChain and LangChain.js\
  \ with example - Ollama for Ruby - Ruby LLM library - any-llm - Unified LLM interface\
  \ by Mozilla - OllamaSharp for .NET - .NET SDK - LangChainRust - Rust LangChain\
  \ (example) - Agents-Flex for Java - Java agent framework (example) - Elixir LangChain\
  \ - Elixir LangChain - Ollama-rs for Rust - Rust SDK - LangChain for .NET - .NET\
  \ LangChain (example) - chromem-go - Go vector database with Ollama embeddings (example)\
  \ - LangChainDart - Dart LangChain - LlmTornado - Unified C# interface for multiple\
  \ inference APIs - Ollama4j for Java - Java SDK - Ollama for Laravel - Laravel integration\
  \ - Ollama for Swift - Swift SDK - LlamaIndex and LlamaIndexTS - Data framework\
  \ for LLM apps - Haystack - AI pipeline framework - Firebase Genkit - Google AI\
  \ framework - Ollama-hpp for C++ - C++ SDK - PromptingTools.jl - Julia LLM toolkit\
  \ (example) - Ollama for R - rollama - R SDK - Portkey - AI gateway - Testcontainers\
  \ - Container-based testing - LLPhant - PHP AI framework\n\nFrameworks & Agents\n\
  \n- AutoGPT - Autonomous AI agent platform - crewAI - Multi-agent orchestration\
  \ framework - Strands Agents - Model-driven agent building by AWS - Cheshire Cat\
  \ - AI assistant framework - any-agent - Unified agent framework interface by Mozilla\
  \ - Stakpak - Open source DevOps agent - Hexabot - Conversational AI builder - Neuro\
  \ SAN - Multi-agent orchestration (docs)\n\nRAG & Knowledge Bases\n\n- RAGFlow -\
  \ RAG engine based on deep document understanding - R2R - Open-source RAG engine\
  \ - MaxKB - Ready-to-use RAG chatbot - Minima - On-premises or fully local RAG -\
  \ Chipper - AI interface with Haystack RAG - ARGO - RAG and deep research on Mac/Windows/Linux\
  \ - Archyve - RAG-enabling document library - Casibase - AI knowledge base with\
  \ RAG and SSO - BrainSoup - Native client with RAG and multi-agent automation\n\n\
  Bots & Messaging\n\n- LangBot - Multi-platform messaging bots with agents and RAG\
  \ - AstrBot - Multi-platform chatbot with RAG and plugins - Discord-Ollama Chat\
  \ Bot - TypeScript Discord bot - Ollama Telegram Bot - Telegram bot - LLM Telegram\
  \ Bot - Telegram bot for roleplay\n\nTerminal & CLI\n\n- aichat - All-in-one LLM\
  \ CLI with Shell Assistant, RAG, and AI tools - oterm - Terminal client for Ollama\
  \ - gollama - Go-based model manager for Ollama - tlm - Local shell copilot - tenere\
  \ - TUI for LLMs - ParLlama - TUI for Ollama - llm-ollama - Plugin for Datasette's\
  \ LLM CLI - ShellOracle - Shell command suggestions - LLM-X - Progressive web app\
  \ for LLMs - cmdh - Natural language to shell commands - VT - Minimal multimodal\
  \ AI chat app\n\nProductivity & Apps\n\n- AppFlowy - AI collaborative workspace,\
  \ self-hostable Notion alternative - Screenpipe - 24/7 screen and mic recording\
  \ with AI-powered search - Vibe - Transcribe and analyze meetings - Page Assist\
  \ - Chrome extension for AI-powered browsing - NativeMind - Private, on-device browser\
  \ AI assistant - Ollama Fortress - Security proxy for Ollama - 1Panel - Web-based\
  \ Linux server management - Writeopia - Text editor with Ollama integration - QA-Pilot\
  \ - GitHub code repository understanding - Raycast extension - Ollama in Raycast\
  \ - Painting Droid - Painting app with AI integrations - Serene Pub - AI roleplaying\
  \ app - Mayan EDMS - Document management with Ollama workflows - TagSpaces - File\
  \ management with AI tagging\n\nObservability & Monitoring"
