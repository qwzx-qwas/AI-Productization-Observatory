summary: "\U0001F4AC Typebot is a powerful chatbot builder that you can self-host."
raw_evidence_excerpt: "\U0001F4AC Typebot is a powerful chatbot builder that you can\
  \ self-host.\n\nTypebot is a Fair Source chatbot builder. It allows you to create\
  \ advanced chatbots visually, embed them anywhere on your web/mobile apps, and collect\
  \ results in real-time\n\nTry Typebot \u2022 Docs\n\n---\n\nBuilder demo\n\nFeatures\n\
  \nTypebot makes it easy to create advanced chatbots. It provides the building blocks\
  \ that are adaptable to any business use case. I improve Typebot regularly with\
  \ bug fixes, new features, and performance improvements.\n\n**Chat builder** with\
  \ 34+ building blocks such as:\n\n- \U0001F4AC Bubbles: Text, Image / GIF, video,\
  \ audio, embed. - \U0001F524 Inputs: Text, email, phone number, buttons, picture\
  \ choice, date picker, payment (Stripe), file picker... - \U0001F9E0 Logic: Conditional\
  \ branching, URL redirections, scripting (Javascript), A/B testing. - \U0001F50C\
  \ Integrations: Webhook / HTTP requests, OpenAI, Google Sheets, Google Analytics,\
  \ Meta Pixel, Zapier, Make.com, Chatwoot, More to come...\n\n**Theme** your chatbot\
  \ to match your brand identity:\n\n- \U0001F3A8 Customize the fonts, background,\
  \ colors, roundness, shadows, and more - \U0001F4AA Advanced theming with custom\
  \ CSS - \U0001F4BE Reusable theme templates\n\n**Share** your typebot anywhere:\n\
  \n- \U0001F517 Custom domain - \U0001F468\u200D\U0001F4BB Embed as a container,\
  \ popup, or chat bubble easily with the native JS library - \u26A1 Blazing-fast\
  \ embed lib. No iframe, no external dependencies, no performance impact - \U0001F4BB\
  \ Executable with HTTP requests\n\nCollect your **Results** and get insights:\n\n\
  - \U0001F4CA In-depth analytics with drop-off rates, completion rates, and more\
  \ - \U0001F4E5 Export results to CSV\n\nBuilt for **developers**:\n\n- \U0001F513\
  \ No vendor-locking. Features built with flexibility in mind. - \U0001F4BB Easy-to-use\
  \ APIs.\n\nGetting started with Typebot\n\nThe easiest way to get started with Typebot\
  \ is with the official managed service in the Cloud. You'll have high availability,\
  \ backups, security, and maintenance all managed for you by me, Baptiste, Typebot's\
  \ founder.\n\nThe cloud version can save a substantial amount of developer time\
  \ and resources. For most sites, this ends up being the best value option and the\
  \ revenue goes to funding the maintenance and further development of Typebot. So\
  \ you\u2019ll be supporting Fair Source software and getting a great service! \U0001F499\
  \n\nSupport & Community\n\nYou'll find a lot of resources to help you get started\
  \ with Typebot in the documentation.\n\n- Have a question? Join the Discord server\
  \ and get instant help. - Found a bug? Create an issue\n\nSelf-hosting\n\nInterested\
  \ in self-hosting Typebot on your server? Take a look at the self-hosting installation\
  \ instructions.\n\nHow to Contribute\n\nYou are awesome, let's build great software\
  \ together. Head over to the Contribute docs to get started. \U0001F4AA\n\nRun the\
  \ project locally\n\nFollow the Local installation section of in the Contributing\
  \ docs.\n\nTop contributors\n\nMade with contrib.rocks.\n\nLicense\n\nTypebot's\
  \ code is protected under a Functional Source License. You will find more information\
  \ about the license and how to comply with it here."
