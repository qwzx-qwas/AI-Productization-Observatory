title: promptflow
summary: Build high-quality LLM apps - from prototyping, testing to production deployment
  and monitoring.
raw_evidence_excerpt: "Build high-quality LLM apps - from prototyping, testing to\
  \ production deployment and monitoring.\n\nPrompt flow\n\n> Welcome to join us to\
  \ make prompt flow better by > participating discussions, > opening issues, > submitting\
  \ PRs.\n\n**Prompt flow** is a suite of development tools designed to streamline\
  \ the end-to-end development cycle of LLM-based AI applications, from ideation,\
  \ prototyping, testing, evaluation to production deployment and monitoring. It makes\
  \ prompt engineering much easier and enables you to build LLM apps with production\
  \ quality.\n\nWith prompt flow, you will be able to:\n\n- **Create and iteratively\
  \ develop flow** - Create executable flows that link LLMs, prompts, Python code\
  \ and other tools together. - Debug and iterate your flows, especially tracing interaction\
  \ with LLMs with ease. - **Evaluate flow quality and performance** - Evaluate your\
  \ flow's quality and performance with larger datasets. - Integrate the testing and\
  \ evaluation into your CI/CD system to ensure quality of your flow. - **Streamlined\
  \ development cycle for production** - Deploy your flow to the serving platform\
  \ you choose or integrate into your app's code base easily. - (Optional but highly\
  \ recommended) Collaborate with your team by leveraging the cloud version of Prompt\
  \ flow in Azure AI.\n\n------\n\nInstallation\n\nTo get started quickly, you can\
  \ use a pre-built development environment. **Click the button below** to open the\
  \ repo in GitHub Codespaces, and then continue the readme!\n\nIf you want to get\
  \ started in your local environment, first install the packages:\n\nEnsure you have\
  \ a python environment, `python>=3.9, <=3.11` is recommended.\n\nQuick Start \u26A1\
  \n\n**Create a chatbot with prompt flow**\n\nRun the command to initiate a prompt\
  \ flow from a chat template, it creates folder named `my_chatbot` and generates\
  \ required files within it:\n\n**Setup a connection for your API key**\n\nFor OpenAI\
  \ key, establish a connection by running the command, using the `openai.yaml` file\
  \ in the `my_chatbot` folder, which stores your OpenAI key (override keys and name\
  \ with --set to avoid yaml file changes):\n\nFor Azure OpenAI key, establish the\
  \ connection by running the command, using the `azure_openai.yaml` file:\n\n**Chat\
  \ with your flow**\n\nIn the `my_chatbot` folder, there's a `flow.dag.yaml` file\
  \ that outlines the flow, including inputs/outputs, nodes, connection, and the LLM\
  \ model, etc\n\n> Note that in the `chat` node, we're using a connection named `open_ai_connection`\
  \ (specified in `connection` field) and the `gpt-35-turbo` model (specified in `deployment_name`\
  \ field). The deployment_name filed is to specify the OpenAI model, or the Azure\
  \ OpenAI deployment resource.\n\nInteract with your chatbot by running: (press `Ctrl\
  \ + C` to end the session)\n\n**Core value: ensuring \"High Quality\u201D from prototype\
  \ to production**\n\nExplore our **15-minute tutorial** that guides you through\
  \ prompt tuning \u27A1 batch testing \u27A1 evaluation, all designed to ensure high\
  \ quality ready for production.\n\nNext Step! Continue with the **Tutorial** \U0001F447\
  \ section to delve deeper into prompt flow.\n\nTutorial \U0001F3C3\u200D\u2642\uFE0F\
  \n\nPrompt flow is a tool designed to **build high quality LLM apps**, the development\
  \ process in prompt flow follows these steps: develop a flow, improve the flow quality,\
  \ deploy the flow to production.\n\nDevelop your own LLM apps\n\nVS Code Extension\n\
  \nWe also offer a VS Code extension (a flow designer) for an interactive flow development\
  \ experience with UI.\n\nYou can install it from the visualstudio marketplace .\n\
  \nDeep delve into flow development\n\nGetting started with prompt flow: A step by\
  \ step guidance to invoke your first flow run.\n\nLearn from use cases\n\nTutorial:\
  \ Chat with PDF: An end-to-end tutorial on how to build a high quality chat application\
  \ with prompt flow, including flow development and evaluation with metrics. > More\
  \ examples can be found here. We welcome contributions of new use cases!\n\nSetup\
  \ for contributors\n\nIf you're interested in contributing, please start with our\
  \ dev setup guide: dev_setup.md.\n\nNext Step! Continue with the **Contributing**\
  \ \U0001F447 section to contribute to prompt flow.\n\nContributing\n\nThis project\
  \ welcomes contributions and suggestions. Most contributions require you to agree\
  \ to a Contributor License Agreement (CLA) declaring that you have the right to,\
  \ and actually do, grant us the rights to use your contribution. For details, visit\
  \ https://cla.opensource.microsoft.com.\n\nWhen you submit a pull request, a CLA\
  \ bot will automatically determine whether you need to provide a CLA and decorate\
  \ the PR appropriately (e.g., status check, comment). Simply follow the instructions\
  \ provided by the bot. You will only need to do this once across all repos using\
  \ our CLA.\n\nThis project has adopted the Microsoft Open Source Code of Conduct.\
  \ For more information see the Code of Conduct FAQ or contact opencode@microsoft.com\
  \ with any additional questions or comments.\n\nTrademarks\n\nThis project may contain\
  \ trademarks or logos for projects, products, or services. Authorized use of Microsoft\
  \ trademarks or logos is subject to and must follow Microsoft's Trademark & Brand\
  \ Guidelines. Use of Microsoft trademarks or logos in modified versions of this\
  \ project must not cause confusion or imply Microsoft sponsorship. Any use of third-party\
  \ trademarks or logos are subject to those third-party's policies.\n\nCode of Conduct\n\
  \nThis project has adopted the Microsoft Open Source Code of Conduct. For more information\
  \ see the Code of Conduct FAQ or contact opencode@microsoft.com with any additional\
  \ questions or comments.\n\nData Collection\n\nThe software may collect information\
  \ about you and your use of the software and send it to Microsoft if configured\
  \ to enable telemetry. Microsoft may use this information to provide services and\
  \ improve our products and services. You may turn on the telemetry as described\
  \ in the repository. There are also some features in the software that may enable\
  \ you and Microsoft to collect data from users of your applications. If you use\
  \ these features, you must comply with applicable law, including providing appropriate\
  \ notices to users of your applications together with a copy of Microsoft's privacy\
  \ statement. Our privacy statement is located at https://go.microsoft.com/fwlink/?LinkID=824704.\
  \ You can learn more about data collection and use in the help documentation and\
  \ our privacy statement. Your use of the software operates as your consent to these\
  \ practices.\n\nTelemetry Configuration\n\nTelemetry collection is on by default.\n\
  \nTo opt out, please run `pf config set telemetry.enabled=false` to turn it off.\n\
  \nLicense\n\nCopyright (c) Microsoft Corporation. All rights reserved.\n\nLicensed\
  \ under the MIT license."
