title: context-engineering-intro
summary: Context engineering is the new vibe coding - it's the way to actually make
  AI coding assistants work. Claude Code is the best for this so that's what this
  repo is centered around, but you can apply this strategy with any AI coding assistant!
raw_evidence_excerpt: "Context engineering is the new vibe coding - it's the way to\
  \ actually make AI coding assistants work. Claude Code is the best for this so that's\
  \ what this repo is centered around, but you can apply this strategy with any AI\
  \ coding assistant!\n\nContext Engineering Template\n\nA comprehensive template\
  \ for getting started with Context Engineering - the discipline of engineering context\
  \ for AI coding assistants so they have the information necessary to get the job\
  \ done end to end.\n\n> **Context Engineering is 10x better than prompt engineering\
  \ and 100x better than vibe coding.**\n\n\U0001F680 Quick Start\n\n\U0001F4DA Table\
  \ of Contents\n\n- What is Context Engineering? - Template Structure - Step-by-Step\
  \ Guide - Writing Effective INITIAL.md Files - The PRP Workflow - Using Examples\
  \ Effectively - Best Practices\n\nWhat is Context Engineering?\n\nContext Engineering\
  \ represents a paradigm shift from traditional prompt engineering:\n\nPrompt Engineering\
  \ vs Context Engineering\n\n**Prompt Engineering:** - Focuses on clever wording\
  \ and specific phrasing - Limited to how you phrase a task - Like giving someone\
  \ a sticky note\n\n**Context Engineering:** - A complete system for providing comprehensive\
  \ context - Includes documentation, examples, rules, patterns, and validation -\
  \ Like writing a full screenplay with all the details\n\nWhy Context Engineering\
  \ Matters\n\n1. **Reduces AI Failures**: Most agent failures aren't model failures\
  \ - they're context failures 2. **Ensures Consistency**: AI follows your project\
  \ patterns and conventions 3. **Enables Complex Features**: AI can handle multi-step\
  \ implementations with proper context 4. **Self-Correcting**: Validation loops allow\
  \ AI to fix its own mistakes\n\nTemplate Structure\n\nThis template doesn't focus\
  \ on RAG and tools with context engineering because I have a LOT more in store for\
  \ that soon. ;)\n\nStep-by-Step Guide\n\n1. Set Up Global Rules (CLAUDE.md)\n\n\
  The `CLAUDE.md` file contains project-wide rules that the AI assistant will follow\
  \ in every conversation. The template includes:\n\n- **Project awareness**: Reading\
  \ planning docs, checking tasks - **Code structure**: File size limits, module organization\
  \ - **Testing requirements**: Unit test patterns, coverage expectations - **Style\
  \ conventions**: Language preferences, formatting rules - **Documentation standards**:\
  \ Docstring formats, commenting practices\n\n**You can use the provided template\
  \ as-is or customize it for your project.**\n\n2. Create Your Initial Feature Request\n\
  \nEdit `INITIAL.md` to describe what you want to build:\n\n**See `INITIAL_EXAMPLE.md`\
  \ for a complete example.**\n\n3. Generate the PRP\n\nPRPs (Product Requirements\
  \ Prompts) are comprehensive implementation blueprints that include:\n\n- Complete\
  \ context and documentation - Implementation steps with validation - Error handling\
  \ patterns - Test requirements\n\nThey are similar to PRDs (Product Requirements\
  \ Documents) but are crafted more specifically to instruct an AI coding assistant.\n\
  \nRun in Claude Code:\n\n**Note:** The slash commands are custom commands defined\
  \ in `.claude/commands/`. You can view their implementation: - `.claude/commands/generate-prp.md`\
  \ - See how it researches and creates PRPs - `.claude/commands/execute-prp.md` -\
  \ See how it implements features from PRPs\n\nThe `$ARGUMENTS` variable in these\
  \ commands receives whatever you pass after the command name (e.g., `INITIAL.md`\
  \ or `PRPs/your-feature.md`).\n\nThis command will: 1. Read your feature request\
  \ 2. Research the codebase for patterns 3. Search for relevant documentation 4.\
  \ Create a comprehensive PRP in `PRPs/your-feature-name.md`\n\n4. Execute the PRP\n\
  \nOnce generated, execute the PRP to implement your feature:\n\nThe AI coding assistant\
  \ will: 1. Read all context from the PRP 2. Create a detailed implementation plan\
  \ 3. Execute each step with validation 4. Run tests and fix any issues 5. Ensure\
  \ all success criteria are met\n\nWriting Effective INITIAL.md Files\n\nKey Sections\
  \ Explained\n\n**FEATURE**: Be specific and comprehensive - \u274C \"Build a web\
  \ scraper\" - \u2705 \"Build an async web scraper using BeautifulSoup that extracts\
  \ product data from e-commerce sites, handles rate limiting, and stores results\
  \ in PostgreSQL\"\n\n**EXAMPLES**: Leverage the examples/ folder - Place relevant\
  \ code patterns in `examples/` - Reference specific files and patterns to follow\
  \ - Explain what aspects should be mimicked\n\n**DOCUMENTATION**: Include all relevant\
  \ resources - API documentation URLs - Library guides - MCP server documentation\
  \ - Database schemas\n\n**OTHER CONSIDERATIONS**: Capture important details - Authentication\
  \ requirements - Rate limits or quotas - Common pitfalls - Performance requirements\n\
  \nThe PRP Workflow\n\nHow /generate-prp Works\n\nThe command follows this process:\n\
  \n1. **Research Phase** - Analyzes your codebase for patterns - Searches for similar\
  \ implementations - Identifies conventions to follow\n\n2. **Documentation Gathering**\
  \ - Fetches relevant API docs - Includes library documentation - Adds gotchas and\
  \ quirks\n\n3. **Blueprint Creation** - Creates step-by-step implementation plan\
  \ - Includes validation gates - Adds test requirements\n\n4. **Quality Check** -\
  \ Scores confidence level (1-10) - Ensures all context is included\n\nHow /execute-prp\
  \ Works\n\n1. **Load Context**: Reads the entire PRP 2. **Plan**: Creates detailed\
  \ task list using TodoWrite 3. **Execute**: Implements each component 4. **Validate**:\
  \ Runs tests and linting 5. **Iterate**: Fixes any issues found 6. **Complete**:\
  \ Ensures all requirements met\n\nSee `PRPs/EXAMPLE_multi_agent_prp.md` for a complete\
  \ example of what gets generated.\n\nUsing Examples Effectively\n\nThe `examples/`\
  \ folder is **critical** for success. AI coding assistants perform much better when\
  \ they can see patterns to follow.\n\nWhat to Include in Examples\n\n1. **Code Structure\
  \ Patterns** - How you organize modules - Import conventions - Class/function patterns\n\
  \n2. **Testing Patterns** - Test file structure - Mocking approaches - Assertion\
  \ styles\n\n3. **Integration Patterns** - API client implementations - Database\
  \ connections - Authentication flows\n\n4. **CLI Patterns** - Argument parsing -\
  \ Output formatting - Error handling\n\nExample Structure\n\nBest Practices\n\n\
  1. Be Explicit in INITIAL.md - Don't assume the AI knows your preferences - Include\
  \ specific requirements and constraints - Reference examples liberally\n\n2. Provide\
  \ Comprehensive Examples - More examples = better implementations - Show both what\
  \ to do AND what not to do - Include error handling patterns\n\n3. Use Validation\
  \ Gates - PRPs include test commands that must pass - AI will iterate until all\
  \ validations succeed - This ensures working code on first try\n\n4. Leverage Documentation\
  \ - Include official API docs - Add MCP server resources - Reference specific documentation\
  \ sections\n\n5. Customize CLAUDE.md - Add your conventions - Include project-specific\
  \ rules - Define coding standards\n\nResources\n\n- Claude Code Documentation -\
  \ Context Engineering Best Practices"
