raw_evidence_excerpt: 'AI-powered healthcare web app with symptom detection, nearest
  doctor search, blockchain medical records, X-Ray diagnosis, and Face ID auth.


  NearestDoctor - AI Healthcare Assistant


  Your intelligent, AI-powered companion for smarter, faster, and safer healthcare.


  About The Project


  NearestDoctor is a full-stack AI-powered healthcare web application that bridges
  the gap between patients and medical professionals. It covers the patient journey
  from first symptom to secured medical record.


  Key Features


  - AI Symptom Detection and Chatbot for illness prediction and specialist recommendation.

  - Location-Based Doctor Search.

  - Smart Appointment Scheduling.

  - Blockchain Medical Records.

  - X-Ray Lung Diagnosis.

  - Mental Health Test.

  - Doctor Identity Verification.

  - Multi-Mode Authentication.


  A public demo/homepage is listed at https://nearest-doctor.vercel.app.'
