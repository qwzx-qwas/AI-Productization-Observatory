raw_evidence_excerpt: 'OrbitOS is an AI-powered personal productivity system where
  knowledge management and daily task planning are orchestrated by an AI assistant.


  The README describes an Obsidian-based productivity framework where users capture
  ideas, plan their day, research topics, connect notes and projects, and archive
  completed work through natural-language conversations with AI.


  Key product signals


  - Daily planning workflow.

  - Project creation from rough ideas.

  - Research and knowledge parsing workflows.

  - Intelligent knowledge graph with linked notes and projects.

  - Direct usage through Claude Code or Gemini CLI as the planning assistant.


  This is presented as a directly usable personal productivity system rather than
  a generic library.'
