title: personal-os
summary: Local AI agent powered task management system that processes backlog notes
  into prioritized tasks based on user goals.
raw_evidence_excerpt: 'PersonalOS is an AI-powered task management system that keeps
  you focused on what matters.


  The README instructs users to brain dump into BACKLOG.md, ask an AI assistant to
  process it, and receive organized tasks prioritized by goals.


  Key Features


  - Goal-driven prioritization.

  - Knowledge base and backlog processing.

  - Natural-language commands such as process my backlog and what should I work on.

  - Smart deduplication and session evals.

  - MCP integration for Claude and other AI assistants.


  This is positioned as a directly usable personal productivity system rather than
  a generic SDK.'
