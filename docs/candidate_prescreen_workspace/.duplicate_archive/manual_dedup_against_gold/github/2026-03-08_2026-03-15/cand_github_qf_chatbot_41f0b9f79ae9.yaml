raw_evidence_excerpt: "The project's aim is to develop a chatbot that can help people\
  \ create spec documents without knowing the specification.To get started with, the\
  \ bot will consume the spec, JSON schema and serves the user as an expert. So based\
  \ on a set of questions and answers it will generate an AsyncApi spec document according\
  \ to the use cases.\n\nAsyncapi Chatbot Documentation\n\nOverview\n\nThe AsyncApi\
  \ chatbot is a way of exploring how we could help people to write the asyncapi spec\
  \ document without knowing the specification. So based on a set of questions and\
  \ answers it will generate an AsyncApi spec document according to the use cases.\n\
  \nProject Architecture\n\nThe Asyncapi chatbot was built using the following tech\
  \ stack.\n\n1. Wit.ai \u2014> Used in building the bot's knowledge 2. Node.js \u2014\
  > Used in writing the server-side bot's code 3. React.js \u2014> Used in writing\
  \ the client-side bot's code 4. Lerna \u2014> Used in making the project a monorepo,\
  \ for ease of testing purpose\n\nProject's Flow\n\nThe project has two flows which\
  \ are Question flow and Generation flow\n\n1. Question Flow \u2014> This is the\
  \ module that allows the bot to handle anything question-related(the bot can only\
  \ handle asyncapi-related questions). This functionality also enables the bot to\
  \ have the capacity to handle questions in the middle of a conversation without\
  \ losing track of the conversation. 2. Generator Flow \u2014> This is the module\
  \ that gives the bot the capacity to generate asyncapi spec document based on the\
  \ user input and also validates user input based on the question asked by the bot.\
  \ The spec is generated in real-time during the conversation.\n\nProject structuring\n\
  \nThe project is structured in 3 parts which consist of the server, test-client,\
  \ and client\n\nServer\n\nThe server structure consists of all the code that allows\
  \ the bot to communicate with the users effectively. Here is a detailed explanation\
  \ of each substructure in the server.\n\n1. Controllers \u2014> This folder consist\
  \ of the code handler that determines if the user's input is a question or a spec\
  \ related input 2. Helpers \u2014> This folder consists of all the external modules\
  \ the bot is using for communication. E.g. wit.js(for communicating with the wit.ai\
  \ NLP) and socket.js(used for real-time communication between the bot and users)\
  \ 3. Models \u2014> This folder consists of all data required by the bot. E.g the\
  \ question models which consist of all the questions the bot asks the user. 4. Services\
  \ \u2014> This folder consists of codes that process the user's input. E.g the generatorFlow.js(this\
  \ handles all the spec generation-related inputs), questionFlow.js(this handles\
  \ all question-related inputs), and generator.js(this handles the generation of\
  \ the final asyncapi specification in a YAML format 5. Utils \u2014> This folder\
  \ consists of all reusable codes used across the bots server-side e.g schema validation\n\
  \nTest Client\n\nThis is an Interactive CLI that can be used to interact with the\
  \ bot... Nothing much here\n\nCommon bots vocabulary\n\n1. Skip or Not now \u2014\
  > To tell the bot to skip a question 2. Exit or Kill\u2014> To tell the bot to end\
  \ the conversation [Not available yet] 3. ? \u2014> To tell the bot to repeat the\
  \ question [Not available yet]\n\nProject's Todo\n\n- [ ] An interactive user interface\
  \ that can be plugged into the asycapi website, playground, and the upcoming studio\
  \ - [ ] Ability to readout specs and give info about channels that users ask for\
  \ from the spec - [ ] Handle and understand more vocabulary - [ ] Ability to answer\
  \ more asyncapi related questions - [ ] Ability to modify an existing spec by parsing\
  \ an existing spec link. So users can tell the bot they want to modify the specification\n\
  \nGetting started\n\nPrerequisite\n\n1. Git 2. Node: any 12.x version starting with\
  \ v12.0.0 or greater 3. Yarn 4. A fork of the repo (for any contributions) 5. A\
  \ clone of the chatbots repo on your local machine\n\nInstallation\n\n1. cd chatbots\
  \ to go into the project root 2. run yarn to install the dependencies\n\nRunning\
  \ locally **Note: Tell the bot \"i want to generate\" to trigger a conversation\
  \ with the bot**\n\nFollow this step to run the project with the live server.\n\n\
  1. Run yarn test-client to start the interactive CLI that communicates with the\
  \ live server.\n\nFollow this step to run the project with local server\n\n1. yarn\
  \ start:dev to start the project 2. open http://localhost:5000 to ensure the project\
  \ server is running. 3. open http://localhost:3000 to open the chatbot's UI in your\
  \ favorite browser[Not available yet]\n\nContributing\n\nRead more in CONTRIBUTING.md."
