version: review_rules_v2
source_of_truth: hand_maintained_artifact
priority_system:
  - P0
  - P1
  - P2
  - P3
issue_types:
  - entity_merge_uncertainty
  - taxonomy_low_confidence
  - taxonomy_conflict
  - score_conflict
  - suspicious_result
resolution_actions:
  - confirm_auto_result
  - override_auto_result
  - mark_unresolved
  - reject_issue
  - needs_more_evidence
queue_buckets:
  - queue_bucket: high_impact_merge
    when:
      issue_type: entity_merge_uncertainty
      priority_code: P0
  - queue_bucket: taxonomy_conflict
    when:
      issue_type: taxonomy_conflict
  - queue_bucket: score_conflict
    when:
      issue_type:
        - score_conflict
        - suspicious_result
  - queue_bucket: low_confidence_backlog
    when:
      issue_type: taxonomy_low_confidence
  - queue_bucket: stale_followup
    when:
      stale: true
maker_checker_required_for:
  - P0 taxonomy override
  - P0 score override
  - P0 entity merge or split
maker_checker_writeback:
  required_fields:
    - reviewer
    - reviewed_at
    - resolution_action
    - resolution_notes
    - approver
    - approved_at
    - review_issue_id
  approved_writeback_required_for_high_impact_override: true
  effective_result_writeback_mode: new_version_only
unresolved_handling:
  canonical_source_of_truth:
    - taxonomy_assignment
    - score_run
    - review_issue
  main_report_policy:
    scope: effective_resolved_only
    exclude_category_codes:
      - unresolved
  unresolved_registry_view:
    derived_from:
      - review_issue
      - taxonomy_assignment
    required_fields:
      - target_id
      - issue_type
      - priority_code
      - resolution_action
      - review_issue_id
      - resolution_notes
      - reviewed_at
      - is_stale
      - is_effective_unresolved
  unresolved_modes:
    - writeback_unresolved
    - review_only_unresolved
sample_pool_rules:
  candidate_pool:
    selector: top_10_candidate_samples
    per_batch_top_limit: 10
    whitelist_bypass_limit: true
    required_review_status: closed
    exclude_effective_category_codes:
      - unresolved
    exclude_resolution_actions:
      - needs_more_evidence
    ordering:
      - need_clarity_band_high_first
      - build_evidence_band_high_second
      - attention_score_secondary_only
    whitelist_field: whitelist_reason
  training_pool:
    source: candidate_pool
    require_review_closure: true
    require_sufficient_evidence: true
    require_clear_adjudication: true
    exclude_effective_category_codes:
      - unresolved
  gold_set:
    pool_name: gold_set_300
    require_double_annotation: true
    require_adjudication: true
annotation_contract:
  target_type: product
  decision_form_required_fields:
    - sample_id
    - target_type
    - target_id
    - primary_category_code
    - secondary_category_code
    - primary_persona_code
    - delivery_form_code
    - build_evidence_band
    - need_clarity_band
    - rationale
    - evidence_refs
    - adjudication_status
  decision_form_optional_fields:
    - review_recommended
    - review_reason
    - taxonomy_change_suggestion
  adjudication_statuses:
    - single_annotated
    - double_annotated
    - adjudicated
    - needs_review
  default_double_annotation_channels:
    - local_project_user
    - llm
  default_adjudicator_role: local_project_user
  gold_set_finalization_requires_adjudicator_confirmation: true
  field_mappings:
    primary_category_code:
      canonical_object: taxonomy_assignment
      canonical_field: category_code
      label_role: primary
    secondary_category_code:
      canonical_object: taxonomy_assignment
      canonical_field: category_code
      label_role: secondary
    primary_persona_code:
      canonical_object: product_profile
      canonical_field: primary_persona_code
    delivery_form_code:
      canonical_object: product_profile
      canonical_field: delivery_form_code
    build_evidence_band:
      canonical_object: score_component
      canonical_field: band
      score_type: build_evidence_score
    need_clarity_band:
      canonical_object: score_component
      canonical_field: band
      score_type: need_clarity_score
  review_recommended_when:
    - evidence_conflict
    - primary_job_not_unique
    - unstable_product_merge
    - unresolved_assignment
    - taxonomy_boundary_not_explainable
  terminology_alignment:
    needs_review: annotation_workflow_signal_only
    needs_more_evidence: review_resolution_without_stable_writeback
    mark_unresolved: review_resolution_for_effective_unresolved
    override_auto_result: review_resolution_for_new_effective_result
  taxonomy_change_suggestion:
    record_only_until_adjudicator_confirmation: true
    auto_writeback_allowed: false
